<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Game</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Ensure the body takes full height and prevents overlapping */
        body {
            background-color: #020617;
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .custom-scroll::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen p-0 m-0">

    <!-- Main App Container mimicking 1000603030.jpg -->
    <div id="window-canvas" class="relative w-full max-w-md h-[100vh] bg-[#050714] flex flex-col justify-between overflow-hidden border-x border-slate-900 pb-[80px]">
        <!-- Content will dynamically inject here -->
    </div>

<script>
// --- GAME STATE ---
const state = {
    coins: 895,
    currentSector: "OT SECTOR",
    currentNode: 7,
    totalNodes: 50,
    difficulty: "EASY",
    timer: 12,
    perks: {
        freeze: 3,
        half: 1,
        shield: 2,
        skip: 0,
        hint: 4
    }
};

// --- REAL SCRIPTURAL DATABASE (Replacing Weird Code/Placeholders) ---
const otExplicitQuestions = [
    { q: "Who led the Israelites out of Egypt?", a: ["Aaron", "Moses", "Joshua", "Caleb"], correct: 1 },
    { q: "Which judge had incredible physical strength?", a: ["Gideon", "Samson", "Barak", "Jephthah"], correct: 1 },
    { q: "Who was the first king of Israel?", a: ["David", "Saul", "Solomon", "Samuel"], correct: 1 },
    { q: "What did God use to confuse the builders of the Tower of Babel?", a: ["Earthquake", "Languages", "Darkness", "Fire"], correct: 1 },
    { q: "How many days did it rain during the Flood?", a: ["7", "20", "40", "100"], correct: 2 },
    { q: "Who was swallowed by a great fish?", a: ["Elijah", "Jonah", "Elisha", "Jeremiah"], correct: 1 },
    { q: "What city's walls fell down after Israel marched around them?", a: ["Ai", "Jericho", "Gaza", "Hebron"], correct: 1 }
    // Add remaining up to 50 nodes sequentially here
];

// --- RENDER UTILITIES ---
function buildInGamePerkBtn(id, label, color, count) {
    const colorMap = {
        sky: 'bg-sky-950/40 text-sky-400 border-sky-800',
        rose: 'bg-rose-950/40 text-rose-400 border-rose-800',
        amber: 'bg-amber-950/40 text-amber-400 border-amber-800',
        emerald: 'bg-emerald-950/40 text-emerald-400 border-emerald-800',
        indigo: 'bg-indigo-950/40 text-indigo-400 border-indigo-800'
    };

    return `
        <button onclick="usePerk('${id}')" class="flex-shrink-0 flex items-center gap-1 px-3 py-2 rounded-xl border text-xs font-semibold ${colorMap[color] || 'border-slate-700'} transition active:scale-95">
            <span>${label}</span>
            <span class="bg-slate-900/80 px-1.5 py-0.5 rounded-md text-[10px] text-slate-300">${count}</span>
        </button>
    `;
}

function renderActiveQuestionPort() {
    // Select active question data based on node index
    const questionIndex = (state.currentNode - 1) % otExplicitQuestions.length;
    const currentQ = otExplicitQuestions[questionIndex];

    const container = document.getElementById('window-canvas');
    
    container.innerHTML = `
        <!-- Top Status Header Bar -->
        <div class="p-4 flex justify-between items-center bg-[#050714]/80 backdrop-blur-md z-10">
            <div class="flex items-center gap-2">
                <span class="inline-block w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span class="text-xs font-bold text-emerald-500 tracking-wider">ON</span>
            </div>
            <div class="flex items-center gap-1.5 bg-amber-950/30 border border-amber-900/50 px-3 py-1 rounded-full">
                <span class="text-amber-500 font-bold text-xs">🪙 ${state.coins}</span>
            </div>
        </div>

        <!-- Sector Progress Meta & Timer Info -->
        <div class="px-6 pt-2">
            <div class="flex justify-between items-end mb-1">
                <div>
                    <h2 class="text-xs font-black text-indigo-400 tracking-widest">${state.currentSector} • NODE ${state.currentNode}/${state.totalNodes}</h2>
                    <span class="text-[10px] font-bold bg-slate-900 border border-slate-800 text-slate-400 px-2 py-0.5 rounded-md uppercase tracking-wider">${state.difficulty}</span>
                </div>
                <div class="text-2xl font-black text-amber-500 tracking-tighter">00:${state.timer < 10 ? '0' + state.timer : state.timer}</div>
            </div>
            <!-- Progress Bar Tracker -->
            <div class="w-full h-1 bg-slate-950 rounded-full overflow-hidden border border-slate-900">
                <div class="h-full bg-gradient-to-r from-orange-600 to-amber-500" style="width: ${(state.currentNode / state.totalNodes) * 100}%"></div>
            </div>
        </div>

        <!-- Question Body Box Area -->
        <div class="px-6 flex-grow flex flex-col justify-center my-4">
            <div class="bg-gradient-to-b from-[#0b0f26] to-[#070a1a] border border-slate-900/80 p-6 rounded-2xl shadow-2xl mb-4 min-h-[140px] flex items-center justify-center">
                <p class="text-center text-slate-200 font-medium leading-relaxed text-sm md:text-base">${currentQ.q}</p>
            </div>

            <!-- Multiple Choice Answer Nodes -->
            <div class="space-y-2.5">
                ${currentQ.a.map((answer, index) => `
                    <button onclick="selectAnswer(${index})" class="w-full text-left bg-[#0c102b] hover:bg-[#11173d] border border-slate-800/80 hover:border-slate-700 p-4 rounded-xl flex justify-between items-center transition-all group active:scale-[0.99]">
                        <span class="text-xs font-semibold text-slate-300 group-hover:text-white">${answer}</span>
                        <span class="w-4 h-4 rounded-full border-2 border-slate-700 group-hover:border-slate-500 flex items-center justify-center text-[8px] text-transparent">✓</span>
                    </button>
                `).join('')}
            </div>
        </div>

        <!-- PERSISTENT FOOTER: Fixed power-ups menu shelf to eliminate layout gaps -->
        <div class="absolute bottom-0 left-0 right-0 p-3 bg-[#03050f]/95 border-t border-slate-950 z-50 flex flex-col gap-2">
            <div class="flex gap-2 overflow-x-auto custom-scroll pb-1">
                ${buildInGamePerkBtn('freeze', 'Freeze', 'sky', state.perks.freeze)}
                ${buildInGamePerkBtn('half', '50/50', 'rose', state.perks.half)}
                ${buildInGamePerkBtn('shield', 'Shield', 'amber', state.perks.shield)}
                ${buildInGamePerkBtn('skip', 'Skip', 'emerald', state.perks.skip)}
                ${buildInGamePerkBtn('hint', 'Hint', 'indigo', state.perks.hint)}
            </div>
            
            <!-- Store Quick Launch Anchor Link -->
            <button onclick="openStoreModal()" class="w-full py-1.5 bg-gradient-to-r from-indigo-950 to-slate-900 border border-indigo-900/60 text-center rounded-lg text-[10px] uppercase font-bold tracking-widest text-indigo-300 hover:from-indigo-900 transition">
                🛒 Buy More Power-Ups
            </button>
        </div>
    `;
}

// --- CONTROLLER ACTIONS ---
function usePerk(perkId) {
    if (state.perks[perkId] > 0) {
        state.perks[perkId]--;
        alert(`Used ${perkId}!`);
        renderActiveQuestionPort();
    } else {
        alert(`Out of ${perkId}! Open store to purchase.`);
    }
}

function selectAnswer(index) {
    const questionIndex = (state.currentNode - 1) % otExplicitQuestions.length;
    if (index === otExplicitQuestions[questionIndex].correct) {
        alert("Correct answer!");
        state.currentNode++;
        state.coins += 10;
    } else {
        alert("Incorrect entry!");
    }
    renderActiveQuestionPort();
}

function openStoreModal() {
    alert("Opening secure checkout portal...");
    // Trigger Paystack execution block
    payWithPaystack(5); // Default Example: 5 GHS for a Power-up Pack
}

// Global Initialization Execution
renderActiveQuestionPort();
</script>
</body>
</html>
