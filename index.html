<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuestLife: Adventure Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: #4f46e5;
            background-image: radial-gradient(circle at 20% 30%, #818cf8 0%, #4f46e5 100%);
            min-height: 100vh;
            font-family: 'Comic Sans MS', sans-serif;
        }
        .adventure-card { 
            background: rgba(255, 255, 255, 0.95); 
            border-radius: 30px;
            border-bottom: 6px solid #e2e8f0;
            color: #1e1b4b;
        }
        .quest-item { transition: all 0.3s ease; }
        .quest-item:active { transform: scale(0.98); }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <div class="w-full max-w-md space-y-6 mt-4">
        <div class="adventure-card p-6 shadow-xl text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-yellow-400"></div>
            <div class="flex justify-between items-center">
                <div class="bg-yellow-400 w-16 h-16 rounded-2xl flex items-center justify-center text-3xl shadow-md border-4 border-white rotate-3">
                    <span id="lvl-badge">1</span>
                </div>
                <div class="text-right">
                    <h2 class="text-2xl font-black text-indigo-900">HERO ONE</h2>
                    <p class="text-lg font-bold text-orange-500">💰 <span id="gold-val">0</span> Coins</p>
                </div>
            </div>
            
            <div class="mt-4 space-y-1">
                <div class="flex justify-between text-xs font-bold text-indigo-400 px-1 uppercase">
                    <span>Exp Points</span>
                    <span id="xp-txt">0%</span>
                </div>
                <div class="w-full h-5 bg-indigo-100 rounded-full border-2 border-indigo-200 p-0.5">
                    <div id="xp-bar" class="h-full bg-gradient-to-r from-green-400 to-emerald-500 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div id="quest-container" class="space-y-3">
            </div>

        <div class="adventure-card p-4 shadow-lg border-t-4 border-indigo-500">
            <input type="text" id="task-input" placeholder="What's your next mission?" class="w-full p-3 bg-indigo-50 rounded-2xl border-2 border-indigo-100 focus:border-indigo-400 focus:outline-none font-bold text-indigo-900 mb-3">
            <button onclick="addNewQuest()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg active:translate-y-1 transition-all text-lg">
                ADD MISSION! 🚀
            </button>
        </div>
    </div>

    <script>
        // --- 1. THE DATA BRAIN ---
        let gameData = JSON.parse(localStorage.getItem('questData')) || {
            lvl: 1, xp: 0, gold: 100, missions: []
        };

        // --- 2. THE SAVE ENGINE ---
        function saveGame() {
            localStorage.setItem('questData', JSON.stringify(gameData));
            refreshUI();
        }

        function refreshUI() {
            document.getElementById('lvl-badge').innerText = gameData.lvl;
            document.getElementById('gold-val').innerText = gameData.gold;
            document.getElementById('xp-txt').innerText = gameData.xp + "%";
            document.getElementById('xp-bar').style.width = gameData.xp + "%";
            
            const container = document.getElementById('quest-container');
            container.innerHTML = "";
            
            gameData.missions.forEach((mission, index) => {
                const div = document.createElement('div');
                div.className = `adventure-card p-4 flex items-center justify-between shadow-sm quest-item ${mission.done ? 'opacity-50 grayscale' : ''}`;
                div.innerHTML = `
                    <div class="flex items-center space-x-4">
                        <button onclick="completeTask(${index})" class="w-10 h-10 rounded-xl border-2 ${mission.done ? 'bg-green-500 border-green-600 text-white' : 'bg-white border-indigo-200 text-transparent'} flex items-center justify-center text-xl font-bold">✓</button>
                        <p class="font-bold text-indigo-900 ${mission.done ? 'line-through' : ''}">${mission.text}</p>
                    </div>
                    <button onclick="deleteMission(${index})" class="w-8 h-8 flex items-center justify-center bg-rose-100 text-rose-500 rounded-lg hover:bg-rose-500 hover:text-white transition-colors">✕</button>
                `;
                container.appendChild(div);
            });
        }

        // --- 3. THE ACTION BUTTONS ---
        function addNewQuest() {
            const input = document.getElementById('task-input');
            if(input.value.trim()) {
                gameData.missions.push({ text: input.value, done: false });
                input.value = "";
                saveGame();
            }
        }

        function completeTask(index) {
            if(!gameData.missions[index].done) {
                gameData.missions[index].done = true;
                gameData.xp += 25;
                gameData.gold += 10;
                
                if(gameData.xp >= 100) {
                    gameData.lvl++;
                    gameData.xp = 0;
                   if(gameData.xp >= 100) {
                    gameData.lvl++;
                    gameData.xp = 0;
                    // Add this visual pop:
                    document.body.style.backgroundColor = "#fbbf24"; 
                    setTimeout(() => document.body.style.backgroundColor = "#4f46e5", 500);
                    alert("🌟 SUPER LEVEL UP! You reached Level " + gameData.lvl + "! 🌟");
                }
                 alert("🌟 SUPER LEVEL UP!

 🌟");

               }
                saveGame();
            }
        }

        function deleteMission(index) {
            gameData.missions.splice(index, 1);
            saveGame();
        }

        // START THE GAME
        refreshUI();
    </script>
</body>
</html>
