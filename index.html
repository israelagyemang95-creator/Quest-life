// --- APP CONTROLLER INTERFACE ---
function initApp() {
    buildDynamicPools();
    renderHome();
}

function buildDynamicPools() {
    const cores = ['ot', 'nt', 'egw', 'at'].map(id => library.find(b => b.id === id));
    let allQs = [];
    cores.forEach(c => { if(c && c.questions) allQs = allQs.concat(c.questions); });
    
    const shuffledMixed = [...allQs].sort(() => 0.5 - Math.random());
    const shuffledMastery = [...allQs].sort(() => 0.3 - Math.random());
    
    library.find(b => b.id === 'mixed').questions = shuffledMixed.slice(0, 50);
    library.find(b => b.id === 'mastery').questions = shuffledMastery.slice(0, 50);
}

function renderPerkBtn(id, label, color) {
    const count = state.perks[id];

        amber: 'bg-amber-950/40 text-amber-400 border-amber-900/50',

        indigo: 'bg-indigo-950/40 text-indigo-400 border-indigo-900/50'
    };

    return `
        <button onclick="triggerPerk('${id}')" class="flex flex-col items-center gap-1 p-2 rounded-xl border ${count > 0 ? colorMap[color] : 'bg-slate-950/60 text-slate-600 border-slate-900'} transition active:scale-90 min-w-[76px]">

                    ? `<span class="bg-black/40 px-1.5 py-0.5 rounded text-[10px] font-bold text-slate-200">x${count}</span>` 
                    : `<span class="bg-black/60 px-1.5 py-0.5 rounded text-[9px] text-amber-500 font-bold flex items-center gap-0.5">🪙${state.perkCosts[id]}</span>`

    `;
}

// --- LOGIC MECHANICS & POWERUP MOTORS ---
function handleAnswer(selectedIndex, correctIndex) {
    const btn = document.getElementById(`ans-btn-${selectedIndex}`);
    
    if (selectedIndex === correctIndex) {
        btn.classList.remove('bg-[#080b1e]/90', 'border-slate-900');
        btn.classList.add('bg-emerald-950/40', 'border-emerald-500', 'text-emerald-300');
        state.coins += 15; 
        
        setTimeout(() => {
            const book = library.find(b => b.id === state.currentBookId);
            if (state.currentNode < book.totalNodes) {
                state.currentNode++;
                renderQuiz();
            } else {
                alert("Sector Complete! Bonus 500 Coins Awarded.");
                state.coins += 500;
                renderHome();
            }
        }, 600);
    } else {
        if (state.activeEffects.shielded) {
            state.activeEffects.shielded = false;
            btn.classList.add('eliminated');
            btn.disabled = true;
            document.getElementById('quiz-interaction-area').classList.add('animate-powerup');
            setTimeout(() => document.getElementById('quiz-interaction-area').classList.remove('animate-powerup'), 400);
            renderQuiz(); 
            return;
        }

        btn.classList.add('animate-wrong');
        setTimeout(() => btn.classList.remove('animate-wrong'), 400);
    }
}

function triggerPerk(id) {
    if (state.perks[id] <= 0) {
        const cost = state.perkCosts[id];
        if (state.coins >= cost) {
            state.coins -= cost;
            state.perks[id]++;
            renderQuiz();
        } else {
            alert("Insufficient coin balance!");
        }
        return;
    }

    const qArea = document.getElementById('quiz-interaction-area');
    const book = library.find(b => b.id === state.currentBookId);
    const qData = book.questions[state.currentNode - 1];

    if (id === 'half') {
        let eliminatedCount = 0;
        for (let i = 0; i < qData.a.length; i++) {
            if (i !== qData.correct && eliminatedCount < 2) {
                const btn = document.getElementById(`ans-btn-${i}`);
                if (btn && !btn.classList.contains('eliminated')) {
                    btn.classList.add('eliminated');
                    btn.disabled = true;
                    eliminatedCount++;
                }
            }
        }
        state.perks[id]--;
        qArea.classList.add('animate-powerup');
        setTimeout(() => qArea.classList.remove('animate-powerup'), 400);
    } 
    else if (id === 'shield') {
        if (!state.activeEffects.shielded) {
            state.activeEffects.shielded = true;
            state.perks[id]--;
            renderQuiz();
        }
    }
    else if (id === 'skip') {
        state.perks[id]--;
        if (state.currentNode < book.totalNodes) {
            state.currentNode++;
            renderQuiz();
        } else {
            renderHome();
        }
    }
    else if (id === 'hint') {
        state.perks[id]--;
        alert("Copilot Matrix Hint: Focus your evaluation profile directly on the core theological tenets of this era.");
        renderQuiz();
    }
}
