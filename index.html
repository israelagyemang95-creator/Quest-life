    <style>
        body { 
            background-color: #050811; 
            font-family: system-ui, -apple-system, sans-serif; 
            overflow-x: hidden;
            background-image: radial-gradient(circle at center, rgba(16, 23, 42, 0.4) 0%, rgba(2, 6, 23, 0.98) 100%);
        }
        
        .game-bg-active {
            background-image: url('https://images.unsplash.com/photo-1601004890684-d8cbf643f5f2?auto=format&fit=crop&w=800&q=80') !important;
            background-size: cover !important;
            background-position: center !important;
            background-blend-mode: overlay !important;
            background-color: rgba(5, 8, 20, 0.85) !important;
        }

        .glass-card { background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; color: white; }
        
        .btn-choice { width: 100%; text-align: left; padding: 1.1rem 1.4rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.07); background: rgba(15, 23, 42, 0.8); font-weight: 600; color: #f1f5f9; transition: all 0.2s ease; position: relative; }
        .btn-choice:hover { background: rgba(30, 41, 59, 0.9); border-color: rgba(255, 255, 255, 0.2); transform: translateY(-1px); }
        
        @keyframes auroraFlow {
            0% { background-position: 0% 50%; filter: hue-rotate(0deg); }
            50% { background-position: 100% 50%; filter: hue-rotate(180deg); }
            100% { background-position: 0% 50%; filter: hue-rotate(360deg); }
        }
        .rainbow-correct { 
            background: linear-gradient(45deg, #10b981, #059669, #34d399, #047857) !important;
            background-size: 300% 300% !important;
            animation: auroraFlow 4s ease infinite !important;
            border-color: transparent !important;
            color: #ffffff !important;
            font-weight: 900 !important;
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.6) !important;
        }

        @keyframes glowingPulse {
            0% { box-shadow: 0 0 5px rgba(34, 197, 94, 0.2); border-color: rgba(34, 197, 94, 0.4); }
            50% { box-shadow: 0 0 20px rgba(234, 179, 8, 0.6); border-color: rgba(234, 179, 8, 0.8); background: rgba(20, 83, 45, 0.4); }
            100% { box-shadow: 0 0 5px rgba(34, 197, 94, 0.2); border-color: rgba(34, 197, 94, 0.4); }

        .completed-glow {
            animation: glowingPulse 1.8s infinite ease-in-out;
        }

        .shield-active { opacity: 1 !important; }
    </style>

        // Book Phase Configuration Arrays
        const phaseBooksMap = {

            mix: ["Creation Era", "Patriarchal Faith", "Exodus Route", "Sanctuary Shadows", "Tribal Rulers", "United Kingdom", "Divided Crowns", "Exile Captivity", "Temple Return", "Wisdom Proverbs", "Prophetic Warnings", "Gospel Inception", "Apostolic Missions", "Grace Doctrines", "Faith Endurance", "Reformation Dawns", "Remnant Movement", "Sanctuary Cleansing", "Three Angels Cry", "New Earth Horizon"],
            egw: ["Conflict Patriarchs", "Prophets and Kings", "Desire of Nations", "Acts of Apostles", "Great Controversy", "Steps to Christ", "Christ Object Lessons", "Mount of Blessing", "Ministry of Healing", "Education Principles", "Early Writings", "Spiritual Gifts", "Selected Messages", "Testimonies Vol 1", "Testimonies Vol 2", "Christian Experience", "Gospel Workers", "Counsels on Diet", "Welfare Ministry", "Final Crisis Events"]

        let state = JSON.parse(localStorage.getItem('bqArcadeV7Data')) || {

        function saveState() {

            document.getElementById('lang-label').innerText = state.lang === 'en' ? "English" : "Twi";
        }

        function initAudioEngine() {
            if (audioContextInstance) return;
            try { audioContextInstance = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
        }

        // Custom Pleasant Chime Tone Melodies
        function playChimeAudio(toneProfile) {
            initAudioEngine();
            if (!audioContextInstance) return;
            try {
                let now = audioContextInstance.currentTime;
                
                if (toneProfile === 'tap') {
                    // Soft high chime
                    createSineTone(523.25, 0.08, 0.03, now); // C5
                    createSineTone(659.25, 0.08, 0.02, now + 0.03); // E5
                } else if (toneProfile === 'correct') {
                    // Ascending Major Triad Cord
                    createSineTone(523.25, 0.15, 0.04, now); // C5
                    createSineTone(659.25, 0.15, 0.04, now + 0.06); // E5
                    createSineTone(783.99, 0.25, 0.04, now + 0.12); // G5
                    createSineTone(1046.50, 0.35, 0.05, now + 0.18); // C6
                } else if (toneProfile === 'wrong') {
                    // Muted minor fall harmonic
                    createTriangleTone(293.66, 0.20, 0.05, now); // D4
                    createTriangleTone(277.18, 0.25, 0.05, now + 0.08); // C#4
                } else if (toneProfile === 'perk') {
                    // Shimmering chime sweep
                    createSineTone(880.00, 0.10, 0.03, now); // A5
                    createSineTone(987.77, 0.10, 0.03, now + 0.04); // B5
                    createSineTone(1174.66, 0.20, 0.03, now + 0.08); // D6
                }
            } catch(e){}
        }

        function createSineTone(freq, duration, volume, timeStamp) {
            let osc = audioContextInstance.createOscillator();
            let gainNode = audioContextInstance.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, timeStamp);
            gainNode.gain.setValueAtTime(volume, timeStamp);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, timeStamp + duration);
            osc.connect(gainNode);
            gainNode.connect(audioContextInstance.destination);
            osc.start(timeStamp);
            osc.stop(timeStamp + duration);
        }

        function createTriangleTone(freq, duration, volume, timeStamp) {
            let osc = audioContextInstance.createOscillator();
            let gainNode = audioContextInstance.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, timeStamp);
            gainNode.gain.setValueAtTime(volume, timeStamp);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, timeStamp + duration);
            osc.connect(gainNode);
            gainNode.connect(audioContextInstance.destination);
            osc.start(timeStamp);
            osc.stop(timeStamp + duration);
        }

        function startArcadePipeline(mode) {
            playChimeAudio('tap');
            currentCampaignMode = mode;
            isActivityGameplayTrack = false;
            
            document.getElementById('back-btn').classList.remove('hidden');
            // Show sector side module launcher only for standard categories
            if(["nt","ot","mix","egw"].includes(mode)) {
                document.getElementById('phase-sectors-btn').classList.remove('hidden');
            } else {
                document.getElementById('phase-sectors-btn').classList.add('hidden');
            }

            compileQuestionsPoolForMode(mode);
            launchNextActiveQuestionEngine();
        }

        function compileQuestionsPoolForMode(mode) {
            let matched = [];
            if(mode === 'nt') matched = window.quizDatabase.filter(b => b.group === 'NT');
            else if(mode === 'ot') matched = window.quizDatabase.filter(b => b.group === 'OT');
            else matched = window.quizDatabase; // Fallback mix pool for mixed, egw & mastery profiles

            campaignActivePool = [];
            matched.forEach(b => {
                b.questions.forEach(q => {
                    q._sourceBookContext = b.name;
                    campaignActivePool.push(q);
                });
            });
            if(campaignActivePool.length === 0) campaignActivePool = [window.quizDatabase[0].questions[0]];
        }

            playChimeAudio('tap');
            const drawer = document.getElementById('sector-modal');

            title.innerText = `SECTORS EXPLORER: ${currentCampaignMode.toUpperCase()}`;
            grid.innerHTML = "";

            let sourceBooks = phaseBooksMap[currentCampaignMode] || phaseBooksMap['nt'];

            for(let i = 1; i <= 20; i++) {
                let difficultyTier = "Easy"; let payoutVal = 15;
                if(i >= 7 && i <= 14) { difficultyTier = "Moderate"; payoutVal = 25; }
                else if(i >= 15) { difficultyTier = "Difficult"; payoutVal = 40; }

                let keyId = `${currentCampaignMode}_${i}`;
                let completed = state.completedActivities[keyId];
                let claimed = state.claimedRewards[keyId];

                let structuralCardStyle = "bg-slate-900 border-l-4 border-indigo-500";
                let actionMarkupButton = `<button onclick="launchSectorSideActivity(${i}, '${difficultyTier}')" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-xs px-3 py-1.5 rounded-xl">START TASK</button>`;

                if(completed) {
                    if(claimed) {
                        structuralCardStyle = "bg-slate-950/40 opacity-50 border-l-4 border-slate-700";
                        actionMarkupButton = `<span class="text-[10px] text-slate-500 uppercase tracking-wider font-bold">Claimed ✓</span>`;
                    } else {
                        structuralCardStyle = "completed-glow bg-emerald-950/60 border border-emerald-500/80";
                        actionMarkupButton = `<button onclick="claimSectorSideReward(${i}, ${payoutVal})" class="bg-gradient-to-r from-amber-500 to-yellow-400 text-slate-950 font-black text-xs px-3 py-1.5 rounded-xl animate__animated animate__pulse animate__infinite">🎁 CLAIM REWARD</button>`;
                    }
                }

                let currentAssignedBook = sourceBooks[i - 1] || "Scriptural Study Node";

                const segment = document.createElement('div');
                segment.className = `p-3.5 rounded-2xl flex items-center justify-between border border-white/5 ${structuralCardStyle}`;
                segment.innerHTML = `
                    <div>
                        <div class="font-black text-slate-200 text-xs flex items-center gap-2">
                            <span>Task ${i}: ${currentAssignedBook}</span>
                            <span class="text-[8px] uppercase px-1.5 py-0.5 rounded bg-slate-950 text-purple-400 font-bold">${difficultyTier}</span>
                        </div>
                        <p class="text-[9px] text-slate-400 mt-0.5">Value Tier Payout: <span class="text-amber-400 font-bold">${payoutVal} 💰</span></p>
                    </div>
                    <div>${actionMarkupButton}</div>
                `;
                grid.appendChild(segment);
            }

            drawer.classList.remove('hidden');
        }

        function closeSectorModal() { drawer = document.getElementById('sector-modal').classList.add('hidden'); }

        function claimSectorSideReward(index, valuationCoins) {
            let keyId = `${currentCampaignMode}_${index}`;
            state.claimedRewards[keyId] = true;
            state.gold += valuationCoins;
            playChimeAudio('correct');
            saveState();
            viewPhaseSectors();
        }

        function launchSectorSideActivity(index, diffTier) {
            closeSectorModal();
            isActivityGameplayTrack = true;
            selectedActivityIndex = index;
            launchNextActiveQuestionEngine(diffTier);
        }

        function launchNextActiveQuestionEngine(forcedTier = "Easy") {
            document.body.classList.add('game-bg-active');
            inputInteractionsBlocked = false; isShieldActive = false;
            document.getElementById('shield-frame').className = "";
            document.getElementById('frost-frame').className = "";

            let subset = campaignActivePool;
            if(isActivityGameplayTrack) {
                subset = campaignActivePool.filter(q => (q.subGroup || "Easy") === forcedTier);
                if(subset.length === 0) subset = campaignActivePool;
            }

            currentActiveQuestion = subset[Math.floor(Math.random() * subset.length)];
            
            // Speed setup logic calibrations
            if(currentCampaignMode === 'mastery') {
                secondsRemaining = 5; blitzyClockSpeedActive = true;
            } else {
                blitzyClockSpeedActive = false;
                secondsRemaining = forcedTier === "Difficult" ? 10 : forcedTier === "Moderate" ? 15 : 20;
            }

            let displayQuestionString = currentActiveQuestion.q;
            let currentChoiceOptions = currentActiveQuestion.a;

            const canvas = document.getElementById('window-canvas'); if(!canvas) return;
            
            let trackingHeadline = isActivityGameplayTrack ? `Side Sector Task Activity ${selectedActivityIndex}` : `Arcade Continuous Session`;
            let trackedBookContext = currentActiveQuestion._sourceBookContext || "Sacred Text Module";

            canvas.innerHTML = `
                <div class="glass-card p-4 space-y-3 flex flex-col bg-slate-900/90 shadow-2xl animate__animated animate__fadeIn">
                    <div class="flex justify-between items-center">
                        <div>
                            <h2 class="text-sm font-black text-indigo-400 uppercase tracking-wider">${trackedBookContext}</h2>
                            <div class="text-xs font-bold text-slate-400 mt-0.5">${trackingHeadline}</div>
                        </div>
                        <div id="clock-wrapper" class="text-2xl font-black tracking-tighter tabular-nums text-amber-400 bg-slate-950/70 px-3 py-1.5 rounded-2xl border border-white/10">
                            ⏰ <span id="clock-digit">${secondsRemaining}</span>s
                        </div>
                    </div>
                </div>

                <div class="glass-card p-6 min-h-[90px] flex items-center justify-center text-center animate__animated animate__zoomIn bg-slate-900/95 border border-indigo-500/20 shadow-xl">
                    <h3 class="text-base font-bold leading-snug text-slate-100">${displayQuestionString}</h3>
                </div>

                <div id="choice-matrix" class="space-y-2.5"></div>

                <div class="fixed bottom-0 left-0 right-0 p-3 bg-slate-950/95 border-t border-white/10 z-40 flex justify-center gap-2">
                    <button onclick="applyInGameUtility('freeze')" class="flex-1 bg-slate-900 border border-sky-500/30 p-2 rounded-xl flex flex-col items-center"><span>❄️</span><span class="text-[9px] text-slate-400 font-bold">Qty: ${state.perks.freeze}</span></button>
                    <button onclick="applyInGameUtility('half')" class="flex-1 bg-slate-900 border border-rose-500/30 p-2 rounded-xl flex flex-col items-center"><span>⚖️</span><span class="text-[9px] text-slate-400 font-bold">Qty: ${state.perks.half}</span></button>
                    <button onclick="applyInGameUtility('skip')" class="flex-1 bg-slate-900 border border-purple-500/30 p-2 rounded-xl flex flex-col items-center"><span>🔮</span><span class="text-[9px] text-slate-400 font-bold">Qty: ${state.perks.skip}</span></button>
                    <button onclick="applyInGameUtility('shield')" class="flex-1 bg-slate-900 border border-amber-500/30 p-2 rounded-xl flex flex-col items-center"><span>🛡️</span><span class="text-[9px] text-slate-400 font-bold">Qty: ${state.perks.shield}</span></button>
                </div>
            `;

            const matrix = document.getElementById('choice-matrix');
            if(matrix && currentChoiceOptions) {
                currentChoiceOptions.forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.className = "btn-choice bg-slate-900/90";
                    btn.innerText = opt;
                    btn.onclick = () => challengeAnswerSubmitted(idx, btn);
                    matrix.appendChild(btn);
                });
            }

            beginCountdownTicker();
        }

        function beginCountdownTicker() {
            clearInterval(countdownTimerRef);
            countdownTimerRef = setInterval(() => {
                if(inputInteractionsBlocked) return;
                secondsRemaining--;
                const elem = document.getElementById('clock-digit'); if(elem) elem.innerText = secondsRemaining;
                
                if(secondsRemaining <= 0) {
                    clearInterval(countdownTimerRef);
                    executeFailureSequence();
                }
            }, 1000);
        }

        function challengeAnswerSubmitted(index, clickTarget) {
            if (inputInteractionsBlocked) return;
            inputInteractionsBlocked = true;
            clearInterval(countdownTimerRef);

            if (index === currentActiveQuestion.correct) {
                clickTarget.className = "btn-choice rainbow-correct text-white shadow-2xl";
                playChimeAudio('correct');

                if(isActivityGameplayTrack) {
                    let keyId = `${currentCampaignMode}_${selectedActivityIndex}`;
                    state.completedActivities[keyId] = true;
                } else {
                    state.gold += 10; // Standard instant arcade play award credits directly
                }
                saveState();

                setTimeout(() => {
                    if(isActivityGameplayTrack) {
                        alert("Activity Task Sector Secured Successfully! Opening side vault logs.");
                        viewPhaseSectors();
                    } else {
                        launchNextActiveQuestionEngine();
                    }
                }, 1300);
            } else {
                clickTarget.className = "btn-choice bg-rose-600 border-rose-400 text-white animate__animated animate__shakeX font-bold shadow-lg";
                playChimeAudio('wrong');
                setTimeout(executeFailureSequence, 1200);
            }
        }

        function executeFailureSequence() {
            clearInterval(countdownTimerRef);
            if(!isShieldActive) {
                state.gold = Math.max(0, state.gold - 20);
                saveState();
            }
            alert("Matrix disruption reset framework executed.");
            if(isActivityGameplayTrack) viewPhaseSectors(); else renderMenuMap();
        }

        function applyInGameUtility(type) {
            if (state.perks[type] <= 0 || inputInteractionsBlocked) return;
            state.perks[type]--; saveState(); playChimeAudio('perk');

            if (type === 'freeze') {
                clearInterval(countdownTimerRef);
                document.getElementById('frost-frame').classList.add('frost-active');
            } else if (type === 'half') {
                const elements = document.getElementById('choice-matrix').getElementsByTagName('button');
                let trackedCount = 0;
                for(let i=0; i<elements.length; i++) {
                    if(i !== currentActiveQuestion.correct && trackedCount < 2) {
                        elements[i].style.opacity = "0.15";
                        elements[i].disabled = true;
                        trackedCount++;
                    }
                }
            } else if (type === 'skip') {
                clearInterval(countdownTimerRef);
                if(isActivityGameplayTrack) {
                    state.completedActivities[`${currentCampaignMode}_${selectedActivityIndex}`] = true;
                    saveState();
                    viewPhaseSectors();
                } else {
                    launchNextActiveQuestionEngine();
                }
            } else if (type === 'shield') {
                isShieldActive = true;
                document.getElementById('shield-frame').classList.add('shield-active');
            }
        }

        function toggleLanguage() { playChimeAudio('tap'); state.lang = state.lang === 'en' ? 'tw' : 'en'; saveState(); if(currentCampaignMode !== "") startArcadePipeline(currentCampaignMode); else renderMenuMap(); }
        function exitToMenu() { playChimeAudio('tap'); clearInterval(countdownTimerRef); renderMenuMap(); }
        
        window.onload = () => { saveState(); renderMenuMap(); };
    </script>
</body>
</html>
