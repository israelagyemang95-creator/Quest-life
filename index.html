<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revelators Pathfinders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;600&display=swap');
        body { font-family: 'Rajdhani', sans-serif; background: #05050a; color: #e2e8f0; }
        .glass { background: rgba(20, 20, 35, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .locked { opacity: 0.6; filter: grayscale(1); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <audio id="sfxCorrect" src="https://actions.google.com/sounds/v1/musical/bell_pluck_correct_answer.ogg"></audio>

    <div class="p-4 flex justify-between items-center glass">
        <h1 class="font-bold text-lg tracking-widest text-cyan-400">REVELATORS</h1>
        <div id="coin-display" class="text-yellow-400 font-bold">💰 500</div>
    </div>

    <main id="app" class="flex-1 p-4 space-y-4">
        </main>

    <nav class="glass flex justify-around p-4">
        <button onclick="renderView('home')">🏠 Home</button>
        <button onclick="renderView('tasks')">📋 Tasks</button>
        <button onclick="renderView('copilot')">🤖 Copilot</button>
    </nav>

    <script>
        let gameState = JSON.parse(localStorage.getItem('gameData')) || {
            coins: 500,
            unlocked: ['NT', 'OT', 'MIX']
        };

        function save() { localStorage.setItem('gameData', JSON.stringify(gameState)); }

        const books = {
            NT: { title: "New Testament", cost: 0 },
            OT: { title: "Old Testament", cost: 0 },
            MIX: { title: "Grand Mixture", cost: 0 },
            EGW: { title: "E.G. White", cost: 1000 },
            BLITZ: { title: "Mastery Blitz", cost: 500 },
            SDA: { title: "SDA Teachings", cost: 1500 }
        };

        function renderView(view) {
            const app = document.getElementById('app');
            if(view === 'home') {
                app.innerHTML = Object.entries(books).map(([id, b]) => `
                    <div onclick="unlock('${id}')" class="glass p-5 rounded-xl cursor-pointer ${gameState.unlocked.includes(id) ? '' : 'locked'}">
                        <h2 class="font-bold text-xl">${b.title}</h2>
                        <p class="text-sm text-gray-400">${b.cost > 0 ? 'Cost: ' + b.cost + ' 💰' : 'Unlocked'}</p>
                    </div>
                `).join('');
            } else if(view === 'copilot') {
                app.innerHTML = `<div class="glass p-6 rounded-xl"><h2 class="text-cyan-400 font-bold">COPILOT ACTIVE</h2><p class="mt-2">System initialized. Awaiting input...</p><input class="w-full mt-4 bg-black p-2 rounded" placeholder="Transmit query..."></div>`;
            }
        }

        function unlock(id) {
            if(gameState.unlocked.includes(id)) return alert("Loading Sector...");
            if(gameState.coins >= books[id].cost) {
                gameState.coins -= books[id].cost;
                gameState.unlocked.push(id);
                save();
                renderView('home');
            } else {
                alert("Insufficient coins!");
            }
        }

        renderView('home');
    </script>
</body>
</html>
