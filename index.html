<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Quest 200</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #bg-overlay {
            position: fixed; inset: 0;
            background-color: #0f172a;
            background-size: cover; background-position: center;
            transition: background-image 1s ease-in-out;
            z-index: 0;
        }
        #bg-tint {
            position: fixed; inset: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.5), rgba(0,0,0,0.8));
            z-index: 1;
        }
        body { min-height: 100vh; background: #0f172a; color: white; font-family: sans-serif; }
        .quiz-card { background: rgba(255, 255, 255, 0.95); border-radius: 20px; color: #1e293b; position: relative; z-index: 10; }
        .btn-opt { width: 100%; text-align: left; padding: 1rem; border-radius: 12px; border: 1px solid #e2e8f0; background: white; font-weight: bold; transition: all 0.2s; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .btn-opt:active { transform: scale(0.98); }

        /* LEVEL UP ANIMATION */
        #level-up-splash {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; opacity: 0; pointer-events: none; transition: all 0.5s ease-in-out;
        }
        #level-up-splash.active { opacity: 1; pointer-events: auto; }
        .pop-card { transform: scale(0.7); transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        #level-up-splash.active .pop-card { transform: scale(1); }
    </style>
</head>
<body class="p-4 flex flex-col items-center">
    <div id="bg-overlay"></div>
    <div id="bg-tint"></div>

    <div id="level-up-splash">
        <div class="pop-card bg-gradient-to-b from-indigo-600 to-indigo-900 p-8 rounded-3xl text-center shadow-2xl max-w-sm w-11/12 border border-indigo-400/30">
            <div class="text-6xl mb-2 animate-bounce">✨🏆✨</div>
            <h1 class="text-4xl font-black text-amber-400 tracking-wider uppercase animate-pulse">Level Up!</h1>
            <div class="my-6 inline-block bg-white/10 px-6 py-2 rounded-full border border-white/10">
                <span id="next-world-txt" class="text-xl font-extrabold text-white">Loading...</span>
            </div>
        </div>
    </div>

    <div class="fixed top-4 right-4 z-50">
        <button onclick="toggleMusic()" id="music-btn" class="bg-slate-900/80 backdrop-blur border border-white/10 p-3 rounded-full text-lg shadow-lg active:scale-95 transition-all">
            🔇 Music Off
        </button>
    </div>

    <div id="game-content" class="w-full max-w-md space-y-6 mt-12 relative z-10">
        <div class="quiz-card p-6 shadow-2xl">
            <h1 id="world-title" class="text-xs font-black uppercase tracking-widest mb-2 text-indigo-600 text-center">INITIALIZING...</h1>
            <div class="flex justify-between items-center">
                <div id="lvl-badge" class="w-12 h-12 rounded-full bg-indigo-600 text-white flex items-center justify-center text-xl font-black shadow-md">1</div>
                <div class="text-right">
                    <p class="text-2xl font-black text-slate-800">💰 <span id="gold-val">0</span></p>
                </div>
            </div>
            <div class="mt-4 w-full h-2 bg-slate-200 rounded-full overflow-hidden">
                <div id="xp-bar" class="h-full bg-green-500 transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <div id="quiz-container" class="space-y-4">
            <div class="quiz-card p-6 text-center italic text-slate-400">Loading questions from file...</div>
        </div>

        <div id="skip-container" class="w-full text-center relative z-10 hidden">
            <button onclick="skipLevel()" class="bg-amber-500 text-slate-900 font-bold py-2 px-4 rounded-xl text-xs shadow-md">
                ⏭️ Skip Level (100 Gold)
            </button>
        </div>
        
        <button onclick="triggerReset()" class="w-full text-center text-xs text-white/30 mt-10 uppercase tracking-widest">Reset Game Data</button>
    </div>

    <script>
        // AUDIO SETUP
        const bgMusic = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3");
        bgMusic.loop = true;
        bgMusic.volume = 0.25;

        const soundCorrect = new Audio("https://assets.mixkit.co/active_storage/sfx/2019/2019-84.wav");
        const soundWrong = new Audio("https://assets.mixkit.co/active_storage/sfx/2958/2958-84.wav");
        const soundLevelUp = new Audio("https://assets.mixkit.co/active_storage/sfx/1435/1435-84.wav");

        let isMusicPlaying = false;
        let quizDatabase = []; // Populated via Fetch
        let activeLevelQuestions = [];
        let isProcessingClick = false;

        let gameData = JSON.parse(localStorage.getItem('bibleQuizRPGData')) || {
            lvl: 1, gold: 100, currentQuestionIndex: 0
        };

        function toggleMusic() {
            const btn = document.getElementById('music-btn');
            if (!isMusicPlaying) {
                bgMusic.play().catch(() => {});
                btn.innerText = "🔊 Music On";
                btn.className = "bg-green-600 border border-white/20 p-3 rounded-full text-lg shadow-lg active:scale-95 transition-all";
                isMusicPlaying = true;
            } else {
                bgMusic.pause();
                btn.innerText = "🔇 Music Off";
                btn.className = "bg-slate-900/80 backdrop-blur border border-white/10 p-3 rounded-full text-lg shadow-lg active:scale-95 transition-all";
                isMusicPlaying = false;
            }
        }

        function playSfx(sfx) {
            sfx.currentTime = 0;
            sfx.play().catch(() => {});
        }

        // LOAD QUESTIONS FROM EXTERNAL FILE
        async function loadData() {
            try {
                const response = await fetch('questions.json');
                if (!response.ok) throw new Error("File not found");
                quizDatabase = await response.json();
                startLevel();
            } catch (err) {
                document.getElementById('world-title').innerText = "ERROR";
                document.getElementById('quiz-container').innerHTML = `
                    <div class="quiz-card p-6 text-center border-red-200 border bg-red-50 text-red-700">
                        <b>questions.json not found!</b><br>
                        Please ensure the file is in the same folder and you are using a local server.
                    </div>`;
            }
        }

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function startLevel() {
            const levelData = quizDatabase.find(l => l.level === gameData.lvl);
            if (levelData) {
                activeLevelQuestions = shuffle([...levelData.questions]);
                renderUI();
            } else if (quizDatabase.length > 0 && gameData.lvl > quizDatabase.length) {
                // End Game State
                document.getElementById('world-title').innerText = "FINISHED";
                document.getElementById('quiz-container').innerHTML = `<div class="quiz-card p-8 text-center font-bold">You've completed all levels!</div>`;
            }
        }

        function renderUI() {
            isProcessingClick = false;
            const levelData = quizDatabase.find(l => l.level === gameData.lvl);
            if (!levelData) return;

            // Background & Headers
            document.getElementById('bg-overlay').style.backgroundImage = `url('${levelData.bgImage}')`;
            document.getElementById('world-title').innerText = levelData.name;
            document.getElementById('lvl-badge').innerText = gameData.lvl;
            document.getElementById('gold-val').innerText = gameData.gold;

            // Progress Bar
            const progress = (gameData.currentQuestionIndex / activeLevelQuestions.length) * 100;
            document.getElementById('xp-bar').style.width = progress + "%";

            // Skip Button Visibility
            document.getElementById('skip-container').classList.toggle('hidden', gameData.gold < 100);

            // Render Question
            const container = document.getElementById('quiz-container');
            container.innerHTML = "";

            if (gameData.currentQuestionIndex < activeLevelQuestions.length) {
                const qObj = activeLevelQuestions[gameData.currentQuestionIndex];
                const card = document.createElement('div');
                card.className = "quiz-card p-6 shadow-xl space-y-4";
                card.innerHTML = `<h2 class="text-xl font-bold text-slate-800">${qObj.q}</h2>`;
                
                const optBox = document.createElement('div');
                optBox.className = "space-y-3";
                
                qObj.a.forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.className = "btn-opt";
                    btn.innerHTML = `<span>${opt}</span><span id="mark-${idx}"></span>`;
                    btn.onclick = () => handleAnswer(idx, qObj.correct, btn);
                    optBox.appendChild(btn);
                });

                card.appendChild(optBox);
                container.appendChild(card);
            }
        }

        function handleAnswer(selected, correct, btn) {
            if (isProcessingClick) return;
            isProcessingClick = true;

            if (selected === correct) {
                playSfx(soundCorrect);
                btn.style.background = "#dcfce7";
                btn.style.borderColor = "#22c55e";
                gameData.gold += 20;
                gameData.currentQuestionIndex++;
                
                if (gameData.currentQuestionIndex >= activeLevelQuestions.length) {
                    gameData.lvl++;
                    gameData.currentQuestionIndex = 0;
                    save();
                    setTimeout(showLevelUp, 600);
                } else {
                    save();
                    setTimeout(renderUI, 800);
                }
            } else {
                playSfx(soundWrong);
                btn.style.background = "#fee2e2";
                btn.style.borderColor = "#ef4444";
                gameData.gold = Math.max(0, gameData.gold - 10);
                save();
                setTimeout(renderUI, 800);
            }
        }

        function showLevelUp() {
            playSfx(soundLevelUp);
            const splash = document.getElementById('level-up-splash');
            const nextLvl = quizDatabase.find(l => l.level === gameData.lvl);
            document.getElementById('next-world-txt').innerText = nextLvl ? nextLvl.name : "Final Chapter";
            
            splash.classList.add('active');
            setTimeout(() => {
                splash.classList.remove('active');
                startLevel();
            }, 2500);
        }

        function skipLevel() {
            if (gameData.gold >= 100 && confirm("Skip this level for 100 Gold?")) {
                gameData.gold -= 100;
                gameData.lvl++;
                gameData.currentQuestionIndex = 0;
                save();
                showLevelUp();
            }
        }

        function save() {
            localStorage.setItem('bibleQuizRPGData', JSON.stringify(gameData));
        }

        function triggerReset() {
            if (confirm("Reset all progress?")) {
                localStorage.removeItem('bibleQuizRPGData');
                location.reload();
            }
        }

        loadData();
    </script>
</body>
</html>
