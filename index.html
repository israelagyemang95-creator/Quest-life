<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revelators Pathfinders Quiz Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { 
            background-color: #030611; 
            font-family: system-ui, -apple-system, sans-serif; 
            overflow-x: hidden;
            position: relative;
        }

        #ambient-particle-canvas, #snow-freeze-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }
        #snow-freeze-canvas { z-index: 45; opacity: 0; transition: opacity 0.4s ease; }
        
        .game-bg-active {
            background-image: url('https://images.unsplash.com/photo-1601004890684-d8cbf643f5f2?auto=format&fit=crop&w=800&q=80') !important;
            background-size: cover !important;
            background-position: center !important;
            background-blend-mode: overlay !important;
            background-color: rgba(3, 6, 17, 0.94) !important;
        }

        .glass-card { 
            background: rgba(13, 18, 35, 0.78); 
            backdrop-filter: blur(24px); 
            -webkit-backdrop-filter: blur(24px); 
            border: 1px solid rgba(255, 255, 255, 0.06); 
            border-radius: 24px; 
            color: white; 
        }

        .level-card-interactive {
            background: rgba(15, 23, 42, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        .level-card-interactive:hover {
            transform: translateY(-4px) scale(1.02);
            background: rgba(23, 37, 84, 0.45);
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.25);
        }
        
        .btn-choice { 
            width: 100%; 
            text-align: left; 
            padding: 1.1rem 1.4rem; 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.07); 
            background: rgba(13, 18, 35, 0.85); 
            font-weight: 600; 
            color: #f1f5f9; 
            transition: all 0.2s ease; 
        }
        .btn-choice:hover { 
            background: rgba(37, 99, 235, 0.15); 
            border-color: rgba(37, 99, 235, 0.4); 
            transform: translateY(-1px); 
        }
        
        @keyframes titleShimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .shimmer-title {
            background: linear-gradient(45deg, #60a5fa, #a78bfa, #f472b6, #34d399, #60a5fa);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: titleShimmer 6s linear infinite;
        }

        @keyframes auroraFlow {
            0% { background-position: 0% 50%; filter: hue-rotate(0deg); }
            50% { background-position: 100% 50%; filter: hue-rotate(180deg); }
            100% { background-position: 0% 50%; filter: hue-rotate(360deg); }
        }
        .rainbow-correct { 
            background: linear-gradient(45deg, #10b981, #2563eb, #8b5cf6, #059669) !important;
            background-size: 300% 300% !important;
            animation: auroraFlow 4s ease infinite !important;
            border-color: transparent !important;
            color: #ffffff !important;
            font-weight: 900 !important;
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.6) !important;
        }

        @keyframes coinShock {
            0%, 100% { transform: scale(1); }
            20%, 60% { transform: scale(0.85) rotate(-6deg); filter: drop-shadow(0 0 15px #ef4444); }
            40%, 80% { transform: scale(1.15) rotate(6deg); filter: drop-shadow(0 0 25px #ef4444); }
        }
        .vibrate-error-bag { animation: coinShock 0.5s ease-in-out 2; border-color: #ef4444 !important; }

        .perk-flash-freeze { animation: huffmanPulse 0.6s ease-out; border-color: #38bdf8 !important; box-shadow: 0 0 30px #0ea5e9 !important; }
        .perk-flash-half { animation: huffmanPulse 0.6s ease-out; border-color: #f43f5e !important; box-shadow: 0 0 30px #e11d48 !important; }
        .perk-flash-skip { animation: huffmanPulse 0.6s ease-out; border-color: #a855f7 !important; box-shadow: 0 0 30px #9333ea !important; }
        .perk-flash-shield { animation: huffmanPulse 0.6s ease-out; border-color: #f59e0b !important; box-shadow: 0 0 30px #d97706 !important; }

        @keyframes huffmanPulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.08); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        .completed-glow { box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); border-color: rgba(16, 185, 129, 0.6); }

        #frost-frame { position: fixed; inset: 0; border: 14px solid rgba(56, 189, 248, 0.45); pointer-events: none; opacity: 0; transition: opacity 0.3s ease; z-index: 40; box-shadow: inset 0 0 80px rgba(14, 165, 233, 0.35); }
        .frost-active { opacity: 1 !important; }
        
        #shield-frame { position: fixed; inset: 0; border: 12px solid rgba(245, 158, 11, 0.5); pointer-events: none; opacity: 0; transition: opacity 0.3s ease; z-index: 40; box-shadow: inset 0 0 60px rgba(245, 158, 11, 0.25); }
        .shield-active { opacity: 1 !important; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="p-4 min-h-screen flex flex-col items-center justify-start text-white select-none">

    <canvas id="ambient-particle-canvas"></canvas>
    <canvas id="snow-freeze-canvas"></canvas>

    <div id="frost-frame"></div>
    <div id="shield-frame"></div>

    <div class="w-full max-w-md flex flex-col gap-2 z-50 relative">
        <div class="flex justify-between items-center w-full px-1">
            <button onclick="exitToMenu(event)" id="back-btn" class="hidden bg-slate-950/95 border border-white/15 text-white px-4 py-1.5 rounded-full font-bold text-[10px] uppercase tracking-wider shadow-xl transition-all">
                🚪 <span data-i18n="mapHub">Map Hub</span>
            </button>
            
            <button id="audio-toggle-btn" onclick="toggleGlobalAudioSystem(event)" class="bg-slate-950/95 border border-emerald-500/30 text-emerald-400 px-3 py-1.5 rounded-full font-black text-[10px] uppercase tracking-widest flex items-center gap-1.5 shadow-xl ml-0">
                <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                <span id="audio-label">AMBIANCE: ON</span>
            </button>

            <div class="flex gap-1.5 ml-auto">
                <button onclick="toggleLanguage(event)" class="bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-500 hover:to-blue-500 text-white px-3 py-1.5 rounded-full font-bold text-[10px] uppercase shadow-lg transition-all">
                    🌐 <span id="lang-label">English</span>
                </button>
                <div id="gold-container" class="bg-slate-950/95 border border-white/15 px-3 py-1.5 rounded-full shadow-2xl flex items-center gap-1.5 transition-all duration-300">
                    <span class="text-xs">💰</span>
                    <span id="gold-val" class="font-black text-amber-400 text-xs drop-shadow-[0_0_10px_rgba(245,158,11,0.5)]">500</span>
                </div>
            </div>
        </div>

        <div id="lobby-activities-bar" class="relative w-full">
            <button onclick="toggleActivitiesDropWindow(event)" class="w-full bg-slate-900/60 hover:bg-slate-900/90 border border-white/5 backdrop-blur-md px-4 py-2.5 rounded-xl text-xs font-bold text-indigo-300 flex justify-between items-center transition-all shadow-md">
                <span class="flex items-center gap-2">📋 <span data-i18n="viewTasks">View Sectors Task Explorer</span></span>
                <span id="activities-drop-arrow" class="transition-transform duration-200 text-[10px]">▼</span>
            </button>
            <div id="activities-drop-window" onclick="event.stopPropagation()" class="hidden absolute top-full left-0 right-0 mt-1.5 bg-slate-950/95 border border-white/10 rounded-2xl p-3 shadow-2xl space-y-2 z-50 max-h-60 overflow-y-auto no-scrollbar"></div>
        </div>
    </div>

    <main id="window-canvas" class="w-full max-w-md mt-6 space-y-4 flex flex-col mb-28 relative z-10"></main>

    <div id="game-alert-modal" class="fixed inset-0 bg-black/85 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div id="alert-box-card" class="glass-card w-full max-w-xs p-6 text-center space-y-4 border-indigo-500/40 bg-slate-950/95 shadow-2xl animate__animated">
            <div id="alert-icon" class="text-5xl">⚠️</div>
            <h3 id="alert-title" class="text-base font-black uppercase tracking-wider text-slate-100">Notification</h3>
            <p id="alert-msg" class="text-xs text-slate-300 leading-relaxed font-medium"></p>
            <button onclick="dismissSystemModal(event)" class="w-full bg-gradient-to-r from-indigo-600 to-blue-600 text-white font-bold text-xs py-3 rounded-xl transition-all shadow-md transform active:scale-95" data-i18n="continueBtn">
                CONTINUE PROCEEDING
            </button>
        </div>
    </div>

    <div id="shop-modal" class="fixed inset-0 bg-black/95 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div class="glass-card w-full max-w-sm p-6 space-y-4 border-indigo-500/30 bg-slate-950/90 shadow-2xl" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center border-b border-white/10 pb-3">
                <div class="flex items-center gap-2"><span>🛒</span><h3 class="text-sm font-black uppercase tracking-wider text-indigo-300" data-i18n="armoryTitle">Armory Depot</h3></div>
                <button onclick="closeShopModal(event)" class="text-slate-400 text-sm bg-white/5 w-7 h-7 rounded-full">✕</button>
            </div>
            <div id="modal-shop-grid" class="space-y-2"></div>
        </div>
    </div>

    <button id="lobby-bag-btn" onclick="openShopModal(event)" class="fixed bottom-6 right-6 z-40 bg-gradient-to-tr from-indigo-500 via-purple-600 to-pink-500 border border-white/20 w-14 h-14 rounded-full flex items-center justify-center shadow-2xl text-xl hover:scale-110 active:scale-95 transition-all animate__animated animate__pulse animate__infinite">🎒</button>

    <script>
        // Localization Storage Core Registry System
        const i18nRegistry = {
            en: {
                mapHub: "Map Hub", viewTasks: "View Sectors Task Explorer", armoryTitle: "Armory Depot", continueBtn: "CONTINUE PROCEEDING",
                subtitle: "Tap a Phase Card to Explore", phase1Title: "Phase 1: New Testament", phase1Desc: "Explore the Gospels and Epistles",
                phase2Title: "Phase 2: Old Testament", phase2Desc: "Continuous Covenant Law Pools", phase3Title: "Phase 3: Grand Mixture Pool",
                phase3Desc: "Randomized Across All Scriptural Cards", phase4Title: "Phase 4: E.G. White Chronicles", phase4Desc: "Prophetic Heritage Insight Pools",
                phase5Title: "Phase 5: Mastery Blitz Mode", phase5Desc: "Extreme High Speed Fire Clock Arena", phase6Title: "Phase 6: Adventist Teachings",
                phase6Desc: "The 28 Fundamental Sanctuary & Prophetic Beliefs", task1: "Answer {target} questions across any stage",
                task2: "Maintain a win streak of {target} choices", task3: "Activate Chrono Freeze {target} times",
                task4: "Survive {target} extreme Mastery Blitz cards", task5: "Possess a volume balance of {target} gold",
                shortageTitle: "Treasury Shortage", shortageMsg: "You do not have enough coins to complete this purchase transaction.",
                clearTitle: "🎉 Activity Set Cleared!", clearMsg: "Superb effort! Completed all active goals. Tier increased to {tier}, reward loaded.",
                walletTitle: "🚨 Wallet Depleted", walletMsg: "Your coin balance has hit zero. Returning to tactical menu map hub.",
                continuousLoop: "Continuous Active Shuffle Loop", unlockSuccess: "🔓 Segment Unlocked!", unlockSuccessMsg: "You have spent the vault entry fee to unlock {name} permanently."
            },
            tw: {
                mapHub: "Kyerɛ Maap", viewTasks: "Hwɛ Dwumadi Ahodoɔ Yi", armoryTitle: "Akodeɛ Koraeɛ", continueBtn: "KƆ SO DWUMADI NO",
                subtitle: "Mia Phase Kaade Biara So", phase1Title: "Phase 1: Apam Foforɔ", phase1Desc: "Hwɛ Asɛmpa Nnwuma Ahodoɔ No",
                phase2Title: "Phase 2: Apam Dada", phase2Desc: "Mmara ne Ahyɛdeɛ Ahodoɔ", phase3Title: "Phase 3: Nneɛma Frafra Koraeɛ",
                phase3Desc: "Nsɛmmisa Frafra afiri Twerɛnsɛm mu", phase4Title: "Phase 4: E.G. White Atwerɛeɛ", phase4Desc: "Nkɔmhyɛ ne Tete Sukuu Ahodoɔ",
                phase5Title: "Phase 5: Mastery Blitz kwan", phase5Desc: "Nnarekodi Nsekene Denden Sukuu", phase6Title: "Phase 6: Adventist Nkyerɛkyerɛ",
                phase6Desc: "Gyidie nnyinasoɔ 28 ne Ɔsoro Kronkronbea no", task1: "Bua nsɛmmisa {target} wɔ fa biara",
                task2: "Kora nkɔsoɔ streak {target} so pɛpɛɛpɛ", task3: "Fa Chrono Freeze dwuma mpren {target}",
                task4: "Tena Mastery Blitz kaade {target} mu", task5: "Kora sika botaeɔ {target} sika kɔkɔɔ so",
                shortageTitle: "Sika Anni Mu", shortageMsg: "Wo sika kɔkɔɔ nnu sɛ wobɛtɔ saa akodeɛ dwumadie perk yi.",
                clearTitle: "🎉 Dwumadi Ahodoɔ No Anyam!", clearMsg: "Mmɔdenbɔ pa! Woawie botaeɛ nketewa no nyinaa. Tier akɔ {tier}.",
                walletTitle: "🚨 Sika Koraeɛ Ahwe Ase", walletMsg: "Wo sika kɔkɔɔ anya asa korakora. Yɛresan akɔ maap hub no mu.",
                continuousLoop: "Kwan a Nsɛmmisa Resesa Berɛ Biara", unlockSuccess: "🔓 Woatumi Abue!", unlockSuccessMsg: "Woatua sika pɛpɛɛpɛ de abue fa foforɔ yi: {name}."
            }
        };

        // Generation Algorithm Engine containing dictionary elements blueprint scaling to 50 items internally per segment
        function generateProceduralDatabaseItems() {
            let baseData = [
                { id: "nt", name: "Matthew", group: "NT", q: "Who was chosen to be the earthly mother of Jesus Christ?", choices: ["Elizabeth", "Mary", "Martha", "Salome"], correct: 1 },
                { id: "nt", name: "Matthew", group: "NT", q: "Where was Jesus Christ born historically?", choices: ["Nazareth", "Jerusalem", "Bethlehem", "Capernaum"], correct: 2 },
                { id: "ot", name: "Genesis", group: "OT", q: "What garden home was explicitly planted for Adam and Eve's habitation?", choices: ["Gethsemane", "Eden", "Sinai", "Ararat"], correct: 1 },
                { id: "ot", name: "Genesis", group: "OT", q: "How many days did God take to create the universe in Genesis?", choices: ["5 Days", "6 Days", "7 Days", "10 Days"], correct: 1 },
                { id: "egw", name: "EGW Chronicles", group: "EGW", q: "Which work traces the cosmic metanarrative between Christ and Satan?", choices: ["Steps to Christ", "The Great Controversy", "Education", "Ministry of Healing"], correct: 1 },
                { id: "egw", name: "EGW Chronicles", group: "EGW", q: "Which book focuses heavily on daily salvation devotional steps?", choices: ["Steps to Christ", "The Desire of Ages", "Patriarchs and Prophets", "Prophets and Kings"], correct: 0 },
                { id: "mastery", name: "Mastery Blitz", group: "MASTERY", q: "In what year did the Millerite great disappointment take place?", choices: ["1798", "1843", "1844", "1850"], correct: 2 },
                { id: "mastery", name: "Mastery Blitz", group: "MASTERY", q: "How many kingdoms are represented by the metal body parts in Daniel 2?", choices: ["3 Kingdoms", "4 Kingdoms", "5 Kingdoms", "6 Kingdoms"], correct: 1 },
                { id: "sda", name: "Adventist Sanctuary", group: "SDA", q: "In what year did the prophetic cleansing of the heavenly sanctuary commence?", choices: ["1798", "1844", "1888", "1931"], correct: 1 },
                { id: "sda", name: "Adventist Sanctuary", group: "SDA", q: "Which compartment of the sanctuary contained the Ark of the Covenant?", choices: ["Courtyard", "Holy Place", "Most Holy Place", "Outer Altar"], correct: 2 }
            ];

            // Programmatically scales the database storage arrays out to 50 index rows per book variant dynamically
            let collections = ["nt", "ot", "egw", "mastery", "sda"];
            let compiledData = [];

            collections.forEach(c => {
                let filters = baseData.filter(b => b.id === c);
                for(let i=1; i<=50; i++) {
                    let sample = filters[(i - 1) % filters.length];
                    compiledData.push({
                        name: sample.name + ` Section [Item ${i}]`,
                        group: sample.group,
                        questions: [{
                            q: sample.q + ` (Verification Crypt #${i})`,
                            a: [...sample.choices],
                            correct: sample.correct
                        }]
                    });
                }
            });
            return compiledData;
        }

        window.quizDatabase = generateProceduralDatabaseItems();

        // System Configuration Profile Storage Cache Structures
        let state = JSON.parse(localStorage.getItem('revelatorsPathfinderV1')) || {
            gold: 750, lang: 'en',
            perks: { freeze: 3, half: 2, skip: 1, shield: 2 },
            unlockedBooks: { nt: true, ot: true, mix: true, egw: false, mastery: false, sda: false },
            stats: { currentStreak: 0, freezeUsed: 0, totalCoinsEarned: 750, blitzSurvivals: 0, overallAnswers: 0 },
            activitySetTier: 1,
            activityProgressCounters: [0, 0, 0, 0, 0]
        };

        const bookVaultLockCosts = { mastery: 500, egw: 1000, sda: 1500 };

        let currentCampaignMode = "";
        let campaignActivePool = [];
        let currentActiveQuestion = null;
        let countdownTimerRef = null;
        let secondsRemaining = 0;
        let inputInteractionsBlocked = false;
        let isShieldActive = false;
        
        let audioCtx = null;
        let globalAudioMuted = false;
        let activeBackgroundToneLoop = null;
        let currentBackgroundMoodType = "lobby"; 

        let activePostAlertCallback = null;

        // Snow Freeze Multi-threaded Canvas System Arrays
        let snowAnimationId = null;
        let snowFlakesArray = [];

        function getString(key, variables = {}) {
            let txt = i18nRegistry[state.lang][key] || i18nRegistry['en'][key] || key;
            for (let v in variables) {
                txt = txt.replace(`{${v}}`, variables[v]);
            }
            return txt;
        }

        function saveState() {
            localStorage.setItem('revelatorsPathfinderV1', JSON.stringify(state));
            document.getElementById('gold-val').innerText = state.gold;
            document.getElementById('lang-label').innerText = state.lang === 'en' ? "English" : "Twi";
            document.getElementById('audio-label').innerText = globalAudioMuted ? "AMBIANCE: OFF" : "AMBIANCE: ON";
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                let key = el.getAttribute('data-i18n');
                el.innerText = getString(key);
            });
        }

        function initStarfieldAmbientLayer() {
            const canvas = document.getElementById('ambient-particle-canvas');
            const ctx = canvas.getContext('2d');
            let dots = [];
            
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            for(let i=0; i<35; i++) {
                dots.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 2 + 1,
                    vY: Math.random() * 0.3 + 0.1,
                    alpha: Math.random() * 0.4 + 0.1
                });
            }

            function loop() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                dots.forEach(d => {
                    d.y -= d.vY;
                    if(d.y < -10) d.y = canvas.height + 10;
                    ctx.fillStyle = `rgba(129, 140, 248, ${d.alpha})`;
                    ctx.beginPath();
                    ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
                    ctx.fill();
                });
                requestAnimationFrame(loop);
            }
            loop();
        }

        // Snow Freeze Particle Pipeline Engine Execution Vector
        function toggleSnowSystemPipeline(run) {
            const canvas = document.getElementById('snow-freeze-canvas');
            const ctx = canvas.getContext('2d');
            
            if (!run) {
                canvas.style.opacity = "0";
                cancelAnimationFrame(snowAnimationId);
                return;
            }

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            canvas.style.opacity = "1";
            snowFlakesArray = [];

            for (let i = 0; i < 65; i++) {
                snowFlakesArray.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 3 + 1.5,
                    speed: Math.random() * 1.5 + 0.5,
                    density: Math.random() * 30
                });
            }

            function frame() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "rgba(224, 242, 254, 0.85)";
                ctx.beginPath();
                for (let i = 0; i < 65; i++) {
                    let p = snowFlakesArray[i];
                    ctx.moveTo(p.x, p.y);
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2, true);

                    p.y += p.speed;
                    p.x += Math.sin(p.density) * 0.6;

                    if (p.y > canvas.height) {
                        snowFlakesArray[i] = { x: Math.random() * canvas.width, y: -10, r: p.r, speed: p.speed, density: p.density };
                    }
                }
                ctx.fill();
                snowAnimationId = requestAnimationFrame(frame);
            }
            frame();
        }

        function initAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                startProceduralAmbianceLoop();
            }
        }

        function startProceduralAmbianceLoop() {
            if (activeBackgroundToneLoop) clearInterval(activeBackgroundToneLoop);
            runMoodSynthesizerTick();
            activeBackgroundToneLoop = setInterval(runMoodSynthesizerTick, currentBackgroundMoodType === 'war' ? 850 : 3500);
        }

        function runMoodSynthesizerTick() {
            if (globalAudioMuted || !audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;

            if (currentBackgroundMoodType === 'war') {
                let drumOsc = audioCtx.createOscillator();
                let drumGain = audioCtx.createGain();
                drumOsc.type = 'triangle';
                drumOsc.frequency.setValueAtTime(58, now);
                drumOsc.frequency.exponentialRampToValueAtTime(0.01, now + 0.45);
                drumGain.gain.setValueAtTime(0.4, now);
                drumGain.gain.exponentialRampToValueAtTime(0.001, now + 0.42);
                drumOsc.connect(drumGain);
                drumGain.connect(audioCtx.destination);
                drumOsc.start(now); drumOsc.stop(now + 0.45);
            } else {
                let ambientFreqs = [146.83, 220.00, 293.66];
                ambientFreqs.forEach((f) => {
                    let osc = audioCtx.createOscillator();
                    let gain = audioCtx.createGain();
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(f, now);
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(0.02, now + 1.2);
                    gain.gain.exponentialRampToValueAtTime(0.0001, now + 3.3);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(now); osc.stop(now + 3.4);
                });
            }
        }

        function switchBackgroundMoodSoundtrack(mood) {
            initAudioContext();
            if (currentBackgroundMoodType === mood) return;
            currentBackgroundMoodType = mood;
            startProceduralAmbianceLoop();
        }

        function toggleGlobalAudioSystem(e) {
            if(e) e.stopPropagation();
            initAudioContext();
            globalAudioMuted = !globalAudioMuted;
            const btn = document.getElementById('audio-toggle-btn');
            if (globalAudioMuted) {

        function playInterfaceFeedbackChime(type) {
            if (globalAudioMuted || !audioCtx) return;
            let now = audioCtx.currentTime;
            if (type === 'correct') {
                [523.25, 659.25, 783.99].forEach((f, i) => {
                    let osc = audioCtx.createOscillator();
                    let gain = audioCtx.createGain();
                    osc.frequency.setValueAtTime(f, now + (i * 0.03));
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(now); osc.stop(now + 0.45);
                });
            } else if (type === 'wrong') {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(115, now);
                gain.gain.setValueAtTime(0.25, now); gain.gain.linearRampToValueAtTime(0.001, now + 0.4);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.42);
            } else {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.frequency.setValueAtTime(400, now);
                gain.gain.setValueAtTime(0.03, now); gain.gain.linearRampToValueAtTime(0.001, now + 0.05);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.06);
            }
        }

            let t = state.activitySetTier;
            return [

                { text: getString('task2', {target: 2+t}), target: 2 + t, current: state.stats.currentStreak },
                { text: getString('task3', {target: 1 + Math.floor(t/2)}), target: 1 + Math.floor(t/2), current: state.activityProgressCounters[2] },
                { text: getString('task4', {target: t}), target: t, current: state.stats.blitzSurvivals },
                { text: getString('task5', {target: 400 + (t * 100)}), target: 400 + (t * 100), current: state.gold }
            ];
        }

        function evaluateActivityIncrements(type, amount = 1) {
            if(type === 'answer') state.activityProgressCounters[0] += amount;
            if(type === 'freeze') state.activityProgressCounters[2] += amount;
            saveState();

            let activeSet = getProceduralActiveSet();
            let completedCount = 0;
            activeSet.forEach(act => { if(act.current >= act.target) completedCount++; });

            if (completedCount >= 5) {
                let milestonePayout = 100 + (state.activitySetTier * 50);
                state.gold += milestonePayout;
                state.activitySetTier++;
                state.activityProgressCounters = [0, 0, 0, 0, 0];
                saveState();
                
                triggerInGameAlert(getString('clearTitle'), getString('clearMsg', {tier: state.activitySetTier}), "🏆");
            }
        }

        function startArcadePipeline(e, mode) {
            if(e) e.stopPropagation();
            playInterfaceFeedbackChime('tap');
            currentCampaignMode = mode;
            
            if (mode === 'mastery') {
                switchBackgroundMoodSoundtrack('war');
            } else {
                switchBackgroundMoodSoundtrack('holy');
            }

            document.getElementById('back-btn').classList.remove('hidden');
            compileQuestionsPoolForMode(mode);
            launchNextActiveQuestionEngine();
        }

        function compileQuestionsPoolForMode(mode) {
            campaignActivePool = [];
            let targetGroup = "";
            if (mode === 'nt') targetGroup = "NT";
            else if (mode === 'ot') targetGroup = "OT";
            else if (mode === 'egw') targetGroup = "EGW";
            else if (mode === 'sda') targetGroup = "SDA";
            else if (mode === 'mastery') targetGroup = "MASTERY";

            if(targetGroup) {
                campaignActivePool = window.quizDatabase.filter(q => q.group === targetGroup);
            } else {
                campaignActivePool = [...window.quizDatabase];
            }
            if(campaignActivePool.length === 0) campaignActivePool = [...window.quizDatabase];
        }

            document.getElementById('shield-frame').className = "";
            document.getElementById('frost-frame').className = "";

            evaluateActivityIncrements('check_only', 0);

            const activeNode = campaignActivePool[Math.floor(Math.random() * campaignActivePool.length)];
            currentActiveQuestion = activeNode.questions[Math.floor(Math.random() * activeNode.questions.length)];
            currentActiveQuestion._sourceBookContext = activeNode.name;

            // Tiered Difficulty Matrix Allocation Engine
            let calculatedDifficultyTier = "EASY";

                calculatedDifficultyTier = "EASY";

            if(currentCampaignMode === 'mastery') {

                calculatedDifficultyTier = "BLITZ OVERDRIVE";

        function beginCountdownTicker() {
            clearInterval(countdownTimerRef);
            countdownTimerRef = setInterval(() => {
                if(inputInteractionsBlocked) return;
                secondsRemaining--;
                const elem = document.getElementById('clock-digit'); if(elem) elem.innerText = secondsRemaining;
                
                if(secondsRemaining <= 0) {
                    clearInterval(countdownTimerRef);
                    executeFailureSequence();
                }
            }, 1000);
        }

        function challengeAnswerSubmitted(index, clickTarget) {
            if (inputInteractionsBlocked) return;
            inputInteractionsBlocked = true;
            clearInterval(countdownTimerRef);

            if (index === currentActiveQuestion.correct) {
                clickTarget.className = "btn-choice rainbow-correct text-white text-xs shadow-2xl transform scale-[1.01]";
                playInterfaceFeedbackChime('correct');
                
                state.stats.currentStreak++;
                state.stats.overallAnswers++;
                state.gold += 15;
                if(currentCampaignMode === 'mastery') state.stats.blitzSurvivals++;
                saveState();
                evaluateActivityIncrements('answer', 1);

                setTimeout(() => { launchNextActiveQuestionEngine(); }, 1400);
            } else {
                clickTarget.className = "btn-choice bg-gradient-to-r from-red-600 to-rose-700 border-rose-400 text-white text-xs animate__animated animate__shakeX font-bold shadow-2xl";
                state.stats.currentStreak = 0; 
                saveState();
                setTimeout(() => { executeFailureSequence(); }, 400);
            }
        }

        // Fluid Coin Penalty Execution Matrix WITHOUT Native Modals
        function executeFailureSequence() {
            clearInterval(countdownTimerRef);
            playInterfaceFeedbackChime('wrong');
            
            if(!isShieldActive) {
                state.gold = Math.max(0, state.gold - 20);
                saveState();
                
                // Triggers an unbuffered custom kinetic shock feedback animation loop directly against economy ledger counters
                const containerNode = document.getElementById('gold-container');
                if(containerNode) {
                    containerNode.classList.add('vibrate-error-bag');
                    setTimeout(() => { containerNode.classList.remove('vibrate-error-bag'); }, 1000);
                }
            }

            if(state.gold <= 0) {
                triggerInGameAlert(getString('walletTitle'), getString('walletMsg'), "💀", () => { exitToMenu(); });
            } else {
                setTimeout(() => { launchNextActiveQuestionEngine(); }, 1100);
            }
        }

            if (state.perks[type] <= 0 || inputInteractionsBlocked) return;
            state.perks[type]--; 
            if(type === 'freeze') evaluateActivityIncrements('freeze', 1);
            saveState(); 
            playInterfaceFeedbackChime('perk');

            // Kinetic animation flashing handlers linked to specific operational assets
            const nodeLookupTable = {
                freeze: 'perk-btn-freeze', half: 'perk-btn-half',
                skip: 'perk-btn-skip', shield: 'perk-btn-shield'
            };
            const targetButtonNode = document.getElementById(nodeLookupTable[type]);
            if(targetButtonNode) {
                let flashClass = `perk-flash-${type}`;
                targetButtonNode.classList.add(flashClass);
                setTimeout(() => { targetButtonNode.classList.remove(flashClass); }, 600);
            }

            if (type === 'freeze') {
                clearInterval(countdownTimerRef);
                document.getElementById('frost-frame').classList.add('frost-active');
                toggleSnowSystemPipeline(true);
            } else if (type === 'half') {
                const elements = document.getElementById('choice-matrix').getElementsByTagName('button');
                let removed = 0;
                for(let i=0; i<elements.length; i++) {
                    if(i !== currentActiveQuestion.correct && removed < 2) {
                        elements[i].style.opacity = "0.12";
                        elements[i].disabled = true;
                        removed++;
                    }
                }
            } else if (type === 'skip') {
                clearInterval(countdownTimerRef);
                launchNextActiveQuestionEngine();
            } else if (type === 'shield') {
                isShieldActive = true;
                document.getElementById('shield-frame').classList.add('shield-active');
            }
        }

        function toggleLanguage(e) { 
            if(e) e.stopPropagation();
            playInterfaceFeedbackChime('tap'); 
            state.lang = state.lang === 'en' ? 'tw' : 'en'; 
            saveState(); 
            renderMenuMap(); 
        }
        
        function exitToMenu(e) { 
            if(e) e.stopPropagation();
            playInterfaceFeedbackChime('tap'); 
            clearInterval(countdownTimerRef); 
            renderMenuMap(); 
        }
        
        window.addEventListener('click', () => {
            document.getElementById('activities-drop-window').classList.add('hidden');
            document.getElementById('activities-drop-arrow').innerText = "▼";
        });

        window.onload = () => { 
            saveState(); 
            initStarfieldAmbientLayer();
            renderMenuMap(); 
        };
    </script>
</body>
</html>
