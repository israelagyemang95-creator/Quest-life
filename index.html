<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mastery Trivia Portal</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center justify-center p-4 md:p-8 selection:bg-amber-500 selection:text-black">

  <div id="game-play-container" class="relative w-full max-w-5xl bg-slate-900/60 backdrop-blur-xl border border-white/10 rounded-2xl p-6 md:p-8 min-h-[500px] shadow-2xl flex flex-col justify-between">
    
    <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-8 border-b border-white/10 pb-6">
      <div>
        <h1 class="text-3xl font-black bg-gradient-to-r from-amber-400 via-orange-400 to-yellow-500 bg-clip-text text-transparent tracking-wider uppercase select-none">
          Mastery Trivia
        </h1>
        <p class="text-xs text-white/40 tracking-widest mt-1 uppercase">Hardware Accelerated Animation Core</p>
      </div>
      
      <div class="bg-black/40 backdrop-blur-md text-amber-400 font-black px-5 py-2.5 rounded-xl border border-amber-500/20 shadow-inner flex items-center gap-2 text-lg">
        <span class="animate-pulse select-none">🪙</span> Balance: <span id="player-coin-balance" class="text-white">750</span>
      </div>
    </div>

    <div class="mb-8">
      <h2 class="text-xs font-bold text-white/50 uppercase tracking-widest mb-3 select-none">Dev Sandbox: Test VFX Engine</h2>
      <div class="grid grid-cols-3 gap-3">
        <button onclick="window.activatePowerUp('freeze')" class="group relative overflow-hidden bg-sky-950/50 hover:bg-sky-900/50 text-sky-400 border border-sky-500/30 font-black py-3 px-4 rounded-xl transition-all shadow-md active:scale-95 flex items-center justify-center gap-2 text-sm uppercase tracking-wider">
          <span class="group-hover:rotate-45 transition-transform duration-300">❄️</span> Freeze Engine
        </button>
        <button onclick="window.activatePowerUp('blitz')" class="group relative overflow-hidden bg-purple-950/50 hover:bg-purple-900/50 text-purple-400 border border-purple-500/30 font-black py-3 px-4 rounded-xl transition-all shadow-md active:scale-95 flex items-center justify-center gap-2 text-sm uppercase tracking-wider">
          <span class="group-hover:scale-125 transition-transform duration-200">⚡</span> Blitz Engine
        </button>
        <button onclick="window.activatePowerUp('shield')" class="group relative overflow-hidden bg-amber-950/50 hover:bg-amber-900/50 text-amber-400 border border-amber-500/30 font-black py-3 px-4 rounded-xl transition-all shadow-md active:scale-95 flex items-center justify-center gap-2 text-sm uppercase tracking-wider">
          <span class="group-hover:bounce transition-transform">🛡️</span> Shield Engine
        </button>
      </div>
    </div>

    <div id="shop-items-container" class="grid grid-cols-1 md:grid-cols-3 gap-6 my-auto">
      <div class="col-span-full text-center py-12 text-white/40 animate-pulse text-sm font-semibold tracking-wide">
        Initializing Shop Catalog Arrays...
      </div>
    </div>

    <div class="mt-8 pt-4 border-t border-white/5 flex justify-between items-center text-xs text-white/30 tracking-wider font-medium select-none">
      <span>SYSTEM COMPOSITOR: ACTIVE</span>
      <span>WEBGL BACKED CANVAS V1.0</span>
    </div>

  </div>

  <script src="questions.js"></script> 
  
  <script src="app.js"></script>
  
  <script>
    // Trigger structural card rendering immediately as soon as the DOM paint routine completes
    document.addEventListener("DOMContentLoaded", () => {
      if (typeof window.renderPowerUpShop === "function") {
        window.renderPowerUpShop();
      } else {
        console.error("Critical Failure: renderPowerUpShop function is missing from your app.js file.");
      }
    });
  </script>

</body>
</html>
