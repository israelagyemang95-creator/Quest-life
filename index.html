        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px) rotate(-1deg); }
            75% { transform: translateX(5px) rotate(1deg); }
        }
        @keyframes fadeOut {

        }
        @keyframes auroraFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes coinShock {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15) rotate(-3deg); filter: drop-shadow(0 0 20px #ef4444); }
        }

        .animate-wrong {

            border-color: #ef4444 !important;

// Difficulty Applier
function applyDifficultyCurve(qArray) {
    return qArray.map((q, idx) => {
        let diff = "easy";
        if (idx >= 15 && idx <= 34) diff = "moderate";
        else if (idx >= 35) diff = "hard";
        return { ...q, difficulty: diff };
    });
}

// Compile Mixed and Mastery dynamically based on unlocked books
function buildDynamicPools() {
    let unlockedQuestions = [];
    ['nt', 'ot', 'egw', 'at'].forEach(bookId => {
        if (state.unlockedBooks[bookId]) {
            const bookData = library.find(b => b.id === bookId);
            unlockedQuestions = unlockedQuestions.concat(bookData.questions);
        }
    });

    // Shuffle and assign exactly 50 for Mixed, 50 for Mastery
    const shuffledMixed = [...unlockedQuestions].sort(() => 0.5 - Math.random());
    const shuffledMastery = [...unlockedQuestions].sort(() => 0.5 - Math.random()); // Different shuffle

    // Ensure we have enough, otherwise duplicate what we have
    while(shuffledMixed.length < 50) { shuffledMixed.push(...shuffledMixed); }
    while(shuffledMastery.length < 50) { shuffledMastery.push(...shuffledMastery); }

    library.find(b => b.id === 'mix').questions = applyDifficultyCurve(shuffledMixed.slice(0, 50));
    // Mastery forces everything to 'blitz' difficulty in the runner, but we map it as hard base
    library.find(b => b.id === 'mastery').questions = applyDifficultyCurve(shuffledMastery.slice(0, 50));
}

function startQuiz() {
    state.view = 'quiz';
    state.activeEffects = { shielded: false };
    executeNextQuestionCycle();
}

function executeNextQuestionCycle() {
    const book = library.find(b => b.id === state.currentBookId);
    
    if (state.currentNode > book.totalNodes) {
        showAlert("SECTOR COMPLETE", "You have successfully cleared all 50 nodes. 500 Coins awarded!", () => {
            state.coins += 500;
            saveState();
            renderHome();
        });
        return;
    }

    // Pull correct question index (0 to 49)
    currentActiveQuestion = book.questions[state.currentNode - 1];
    
    // Timer mappings based on exact array structure
    let diff = currentActiveQuestion.difficulty;
    if (state.currentBookId === 'mastery') diff = 'blitz';

    if (diff === 'hard') initialSecondsAllowed = 10;
    else if (diff === 'moderate') initialSecondsAllowed = 15;
    else if (diff === 'blitz') initialSecondsAllowed = 5;
    else initialSecondsAllowed = 20;

    secondsRemaining = initialSecondsAllowed;
    inputInteractionsBlocked = false;
    
    isFreezeActive = false;
    document.getElementById('frost-frame').classList.remove('frost-active');
    
    renderActiveQuestionPort();
    initiateQuestionCountdownTimer();
}

function renderActiveQuestionPort() {
    const book = library.find(b => b.id === state.currentBookId);
    let displayDiff = state.currentBookId === 'mastery' ? 'WAR ZONE' : currentActiveQuestion.difficulty.toUpperCase();
    let diffColor = displayDiff === 'HARD' || displayDiff === 'WAR ZONE' ? 'text-red-400 border-red-500/30 bg-red-950/40' : displayDiff === 'MODERATE' ? 'text-amber-400 border-amber-500/30 bg-amber-950/40' : 'text-emerald-400 border-emerald-500/30 bg-emerald-950/40';

    let htmlStr = `
        <div class="p-4 flex justify-between items-center glass-panel z-10 pt-8 border-b border-slate-800">
            <button onclick="renderHome()" class="p-2 text-slate-400 hover:text-white transition active:scale-90 bg-slate-900 rounded-full">
                <i data-lucide="chevron-left" class="w-5 h-5"></i>
            </button>
            <div class="flex items-center gap-1.5 bg-amber-950/40 border border-amber-900/50 px-3 py-1 rounded-full">
                <span class="text-amber-500 font-bold text-xs">🪙 ${state.coins}</span>
            </div>
        </div>

        <div class="px-6 pt-4">
            <div class="flex justify-between items-end mb-1.5">
                <div>
                    <h2 class="text-[10px] font-black text-indigo-400 tracking-widest uppercase mb-1">${book.title} • NODE ${state.currentNode}/${book.totalNodes}</h2>
                    <span class="text-[8px] font-black tracking-widest px-2 py-0.5 rounded-full border inline-block ${diffColor}">${displayDiff}</span>
                </div>
                <div class="text-2xl font-black tracking-tighter tabular-nums text-amber-400 drop-shadow-[0_0_8px_rgba(245,158,11,0.5)]">
                    00:<span id="clock-digit">${secondsRemaining < 10 ? '0'+secondsRemaining : secondsRemaining}</span>
                </div>
            </div>
            <div class="w-full h-1.5 bg-slate-900 rounded-full overflow-hidden border border-slate-800 mt-2">
                <div id="countdown-progress-bar" class="h-full bg-emerald-400 w-full transition-all duration-1000 ease-linear rounded-full"></div>
            </div>
        </div>

        <div id="quiz-interaction-area" class="px-6 flex-grow flex flex-col justify-center mt-2 mb-32">
            <div id="q-card" class="bg-gradient-to-b from-[#0e122c] to-[#040616] border border-slate-800 p-6 rounded-2xl shadow-2xl mb-5 min-h-[150px] flex flex-col items-center justify-center relative overflow-hidden">
                ${state.activeEffects.shielded ? '<div class="absolute top-0 left-0 right-0 h-1 bg-amber-500 shadow-[0_2px_10px_rgba(245,158,11,0.5)]"></div>' : ''}
                <p class="text-center text-slate-200 font-semibold leading-relaxed text-base z-10">${currentActiveQuestion.q}</p>
            </div>

            <div class="space-y-3" id="answers-container">
                ${currentActiveQuestion.a.map((answer, index) => `
                    <button id="ans-btn-${index}" onclick="submitAnswer(${index})" class="answer-selection-btn w-full text-left bg-[#080b1e]/90 hover:bg-[#0d1230] border border-slate-800 hover:border-slate-700 p-4 rounded-xl flex justify-between items-center transition-all group active:scale-[0.98]">
                        <span class="text-xs font-bold text-slate-300 group-hover:text-white leading-snug">${answer}</span>
                        <div class="w-4 h-4 rounded-full border border-slate-700 group-hover:border-slate-500 flex items-center justify-center text-[8px] flex-shrink-0 ml-3"></div>
                    </button>
                `).join('')}
            </div>
        </div>

        <div class="absolute bottom-0 left-0 right-0 glass-panel border-t border-slate-800 z-50 p-4 pb-6">
            <div class="flex gap-2.5 overflow-x-auto custom-scroll pb-1 items-center justify-center">
                ${renderPerkBtn('half', '50/50', 'rose')}
                ${renderPerkBtn('shield', 'Shield', 'amber')}
                ${renderPerkBtn('skip', 'Skip', 'emerald')}
                ${renderPerkBtn('hint', 'Hint', 'indigo')}
            </div>
        </div>
    `;
    document.getElementById('app-container').innerHTML = htmlStr;
    lucide.createIcons();
}

function renderPerkBtn(id, label, color) {
    const count = state.perks[id];
    const cost = state.perkCosts[id];
    const colorMap = {
        rose: 'bg-rose-950/40 text-rose-400 border-rose-900/50',
        amber: 'bg-amber-950/40 text-amber-400 border-amber-900/50',
        emerald: 'bg-emerald-950/40 text-emerald-400 border-emerald-900/50',
        indigo: 'bg-indigo-950/40 text-indigo-400 border-indigo-900/50'
    };

    return `
        <button onclick="triggerPerk('${id}')" class="flex flex-col items-center gap-1.5 p-2 rounded-xl border ${count > 0 ? colorMap[color] : 'bg-slate-950/60 text-slate-600 border-slate-900'} transition active:scale-95 min-w-[76px]">
            <span class="text-[9px] font-black uppercase tracking-wider">${label}</span>
            <div class="flex items-center gap-1">
                ${count > 0 
                    ? `<span class="bg-black/50 px-2 py-0.5 rounded text-[10px] font-bold text-white">x${count}</span>` 
                    : `<span class="bg-black/60 px-1.5 py-0.5 rounded text-[9px] text-amber-500 font-bold flex items-center gap-0.5">🪙${cost}</span>`
                }
            </div>
        </button>
    `;
}

function initiateQuestionCountdownTimer() {
    if (countdownTimerRef) clearInterval(countdownTimerRef);
    const progressBar = document.getElementById('countdown-progress-bar');
    
    countdownTimerRef = setInterval(() => {
        if (isFreezeActive || inputInteractionsBlocked) return;

        secondsRemaining--;
        let pct = Math.max(0, (secondsRemaining / initialSecondsAllowed) * 100);
        
        if (progressBar) {
            progressBar.style.width = `${pct}%`;
            if (pct <= 30) { progressBar.className = "h-full bg-red-500 rounded-full shadow-[0_0_15px_rgba(239,68,68,0.8)]"; }
            else if (pct <= 60) { progressBar.className = "h-full bg-amber-400 rounded-full"; }
        }
        
        const clockNode = document.getElementById('clock-digit');
        if(clockNode) clockNode.innerText = secondsRemaining < 10 ? '0'+secondsRemaining : secondsRemaining;

        if (secondsRemaining <= 0) executeFluidFailure();
    }, 1000);
}

function submitAnswer(idx, isSkip = false) {
    if (inputInteractionsBlocked) return;
    inputInteractionsBlocked = true;
    clearInterval(countdownTimerRef);

    const btns = document.getElementsByClassName('answer-selection-btn');
    
    if (idx === currentActiveQuestion.correct || isSkip) {
        let targetBtn = btns[isSkip ? currentActiveQuestion.correct : idx];
        if (targetBtn) {
            targetBtn.className = "w-full p-4 rounded-2xl text-left text-xs font-black flex items-center justify-between rainbow-correct";
        }
        
        state.coins += 15;
        saveState();

        setTimeout(() => {
            state.currentNode++;
            executeNextQuestionCycle();
        }, 1200);

    } else {
        if (btns[idx]) {
            btns[idx].className = "w-full p-4 rounded-2xl text-left text-xs font-black flex items-center justify-between animate-wrong";
        }
        setTimeout(() => { executeFluidFailure(); }, 600);
    }
}

function executeFluidFailure() {
    clearInterval(countdownTimerRef);
    inputInteractionsBlocked = true;
    
    if (state.activeEffects.shielded) {
        state.activeEffects.shielded = false;
        showAlert("SHIELD ACTIVATED", "Your Aegis shield protected your gold.", () => {
            state.currentNode++;
            executeNextQuestionCycle();
        });
        return;
    }

    state.coins = Math.max(0, state.coins - 20);
    saveState();
    
    const uiBox = document.getElementById('quiz-interaction-area');
    if(uiBox) uiBox.classList.add('vibrate-error-bag');

    if(state.coins <= 0) {
        setTimeout(() => {
            showAlert("OUT OF GOLD", "Return to main menu to view tasks.", () => { renderHome(); });
        }, 600);
    } else {
        setTimeout(() => { 
            state.currentNode++;
            executeNextQuestionCycle(); 
        }, 800);
    }
}

// --- POWERUP LOGIC ---
function triggerPerk(id) {
    if (inputInteractionsBlocked) return;

    if (state.perks[id] <= 0) {
        const cost = state.perkCosts[id];
        if (state.coins >= cost) {
            state.coins -= cost;
            state.perks[id]++;
            saveState();
            renderActiveQuestionPort(); // Update UI numbers
        } else {
            showAlert("Insufficient Funds", "Not enough gold to buy this perk.");
        }
        return;
    }

    const qArea = document.getElementById('quiz-interaction-area');

    if (id === 'half') {
        let eliminatedCount = 0;
        for (let i = 0; i < currentActiveQuestion.a.length; i++) {
            if (i !== currentActiveQuestion.correct && eliminatedCount < 2) {
                const btn = document.getElementById(`ans-btn-${i}`);
                if (btn && !btn.classList.contains('eliminated')) {
                    btn.classList.add('eliminated');
                    btn.disabled = true;
                    eliminatedCount++;
                }
            }
        }
        state.perks[id]--;
        qArea.classList.add('animate-powerup');
        setTimeout(() => qArea.classList.remove('animate-powerup'), 400);
    } 
    else if (id === 'shield') {
        if (!state.activeEffects.shielded) {
            state.activeEffects.shielded = true;
            state.perks[id]--;
            renderActiveQuestionPort(); // Resets layout to show top yellow bar
        }
    }
    else if (id === 'skip') {
        state.perks[id]--;
        submitAnswer(null, true);
    }
    else if (id === 'hint') {
        state.perks[id]--;
        alert("Copilot Hint: Focus your evaluation on the core theological tenets regarding this era.");
        renderActiveQuestionPort();
    }
}

// --- UTILS ---
function requestVaultUnlock(id, cost, name) {
    if (state.coins >= cost) { 
        state.coins -= cost; 
        state.unlockedBooks[id] = true; 
        saveState(); 
        showAlert("Sector Unlocked", `You have securely authorized access to ${name}.`, () => { renderHome(); });
    } else { 
        showAlert("Insufficient Funds", "You do not have enough gold to unlock this sector."); 
    }
}

function showAlert(title, msg, callback = null) {
    window.activePostAlertCallback = callback;
    document.getElementById('alert-title').innerText = title;
    document.getElementById('alert-msg').innerText = msg;
    document.getElementById('game-alert-modal').classList.remove('hidden');
}

function dismissSystemModal(e) {
    if(e) e.stopPropagation();
    document.getElementById('game-alert-modal').classList.add('hidden');
    if (window.activePostAlertCallback) { window.activePostAlertCallback(); window.activePostAlertCallback = null; }
}

window.addEventListener('DOMContentLoaded', () => { 
    initApp(); 
});
</script>
