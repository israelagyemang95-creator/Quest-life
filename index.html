<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Quest: Ultimate Arcade Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { 
            background-color: #030611; 
            font-family: system-ui, -apple-system, sans-serif; 
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Ambient Particle Space Canvas Layer */
        #ambient-particle-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.5;
        }
        
        .game-bg-active {
            background-image: url('https://images.unsplash.com/photo-1601004890684-d8cbf643f5f2?auto=format&fit=crop&w=800&q=80') !important;
            background-size: cover !important;
            background-position: center !important;
            background-blend-mode: overlay !important;
            background-color: rgba(3, 6, 17, 0.92) !important;
        }

        /* Catchy Neon Glassmorphism Elements */
        .glass-card { 
            background: rgba(13, 18, 35, 0.75); 
            backdrop-filter: blur(24px); 
            -webkit-backdrop-filter: blur(24px); 
            border: 1px solid rgba(255, 255, 255, 0.06); 
            border-radius: 24px; 
            color: white; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Interactive Level Card Hover Scaling & Glow Effects */
        .level-card-interactive {
            background: rgba(15, 23, 42, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        .level-card-interactive:hover {
            transform: translateY(-4px) scale(1.02);
            background: rgba(23, 37, 84, 0.45);
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.25);
        }
        
        .btn-choice { 
            width: 100%; 
            text-align: left; 
            padding: 1.1rem 1.4rem; 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.07); 
            background: rgba(13, 18, 35, 0.85); 
            font-weight: 600; 
            color: #f1f5f9; 
            transition: all 0.2s ease; 
        }
        .btn-choice:hover { 
            background: rgba(37, 99, 235, 0.15); 
            border-color: rgba(37, 99, 235, 0.4); 
            transform: translateY(-1px); 
        }
        
        /* Shimmering Cosmic Title Text Animation */
        @keyframes titleShimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .shimmer-title {
            background: linear-gradient(45deg, #60a5fa, #a78bfa, #f472b6, #34d399, #60a5fa);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: titleShimmer 6s linear infinite;
        }

        @keyframes auroraFlow {
            0% { background-position: 0% 50%; filter: hue-rotate(0deg); }
            50% { background-position: 100% 50%; filter: hue-rotate(180deg); }
            100% { background-position: 0% 50%; filter: hue-rotate(360deg); }
        }
        .rainbow-correct { 
            background: linear-gradient(45deg, #10b981, #2563eb, #8b5cf6, #059669) !important;
            background-size: 300% 300% !important;
            animation: auroraFlow 4s ease infinite !important;
            border-color: transparent !important;
            color: #ffffff !important;
            font-weight: 900 !important;
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.6) !important;
        }

        .completed-glow { box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); border-color: rgba(16, 185, 129, 0.6); }

        #frost-frame { position: fixed; inset: 0; border: 14px solid rgba(56, 189, 248, 0.45); pointer-events: none; opacity: 0; transition: opacity 0.3s ease; z-index: 40; box-shadow: inset 0 0 80px rgba(14, 165, 233, 0.35); }
        .frost-active { opacity: 1 !important; }
        
        #shield-frame { position: fixed; inset: 0; border: 12px solid rgba(245, 158, 11, 0.5); pointer-events: none; opacity: 0; transition: opacity 0.3s ease; z-index: 40; box-shadow: inset 0 0 60px rgba(245, 158, 11, 0.25); }
        .shield-active { opacity: 1 !important; }

        .wheel-container { position: relative; width: 260px; height: 260px; margin: 0 auto; filter: drop-shadow(0 0 25px rgba(99, 102, 241, 0.35)); }
        #wheel-canvas { width: 100%; height: 100%; border-radius: 50%; border: 6px solid #4f46e5; transition: transform 4s cubic-bezier(0.1, 0.8, 0.25, 1); background: #0f172a; }
        .wheel-pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 14px solid transparent; border-right: 14px solid transparent; border-top: 22px solid #ef4444; z-index: 30; filter: drop-shadow(0 3px 5px rgba(0,0,0,0.4)); }
        
        /* Floating animations for items inside slices */
        @keyframes itemFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-5px) scale(1.08); }
        }
        .wheel-floating-item {
            animation: itemFloat 2.5s ease-in-out infinite;
            filter: drop-shadow(0 0 8px currentColor);
        }
        
        /* Custom scroll hiding styles */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="p-4 min-h-screen flex flex-col items-center justify-start text-white select-none">

    <canvas id="ambient-particle-canvas"></canvas>

    <div id="frost-frame"></div>
    <div id="shield-frame"></div>

    <div class="w-full max-w-md flex flex-col gap-2 z-50 relative">
        
        <div class="flex justify-between items-center w-full px-1">
            <button onclick="exitToMenu()" id="back-btn" class="hidden bg-slate-950/95 border border-white/15 text-white px-4 py-1.5 rounded-full font-bold text-[10px] uppercase tracking-wider shadow-xl transition-all">
                🚪 Map Hub
            </button>
            
            <button id="audio-toggle-btn" onclick="toggleGlobalAudioSystem()" class="bg-slate-950/95 border border-emerald-500/30 text-emerald-400 px-3 py-1.5 rounded-full font-black text-[10px] uppercase tracking-widest flex items-center gap-1.5 shadow-xl ml-0">
                <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                <span>AMBIANCE: ON</span>
            </button>

            <div class="flex gap-1.5 ml-auto">
                <button onclick="toggleLanguage()" class="bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-500 hover:to-blue-500 text-white px-3 py-1.5 rounded-full font-bold text-[10px] uppercase shadow-lg transition-all">
                    🌐 <span id="lang-label">English</span>
                </button>
                <div id="gold-container" class="bg-slate-950/95 border border-white/15 px-3 py-1.5 rounded-full shadow-2xl flex items-center gap-1.5">
                    <span class="text-xs">💰</span>
                    <span id="gold-val" class="font-black text-amber-400 text-xs drop-shadow-[0_0_10px_rgba(245,158,11,0.5)]">500</span>
                </div>
            </div>
        </div>

        <div id="lobby-activities-bar" class="relative w-full">
            <button onclick="toggleActivitiesDropWindow(event)" class="w-full bg-slate-900/60 hover:bg-slate-900/90 border border-white/5 backdrop-blur-md px-4 py-2.5 rounded-xl text-xs font-bold text-indigo-300 flex justify-between items-center transition-all shadow-md">
                <span class="flex items-center gap-2">📋 View Sectors Task Explorer</span>
                <span id="activities-drop-arrow" class="transition-transform duration-200 text-[10px]">▼</span>
            </button>
            <div id="activities-drop-window" class="hidden absolute top-full left-0 right-0 mt-1.5 bg-slate-950/95 border border-white/10 rounded-2xl p-3 shadow-2xl space-y-2 z-50 max-h-60 overflow-y-auto no-scrollbar"></div>
        </div>

        <div id="lobby-wheel-bar" class="relative w-full">
            <button onclick="toggleWheelDropWindow(event)" class="w-full bg-gradient-to-r from-amber-950/30 via-slate-900/60 to-amber-950/30 hover:brightness-110 border border-amber-500/20 backdrop-blur-md px-4 py-2.5 rounded-xl text-xs font-bold text-amber-400 flex justify-between items-center transition-all shadow-md">
                <span class="flex items-center gap-2">🎯 Launch Prophetic Reward Wheel</span>
                <span id="wheel-drop-arrow" class="transition-transform duration-200 text-[10px]">▼</span>
            </button>
            
            <div id="wheel-drop-window" class="hidden absolute top-full left-0 right-0 mt-1.5 bg-slate-950/98 border border-amber-500/30 rounded-3xl p-5 shadow-2xl z-50 text-center space-y-4">
                <div class="wheel-container">
                    <div class="wheel-pointer"></div>
                    <canvas id="wheel-canvas" width="250" height="250"></canvas>
                </div>
                <button onclick="spinWheelActionLogic()" id="spin-action-trigger" class="w-full bg-gradient-to-r from-amber-400 via-orange-500 to-red-500 text-slate-950 font-black text-xs py-3 rounded-xl shadow-xl hover:brightness-110 active:scale-[0.98] transition-all tracking-wider uppercase">
                    START PROPHETIC SPIN
                </button>
            </div>
        </div>

    </div>

    <main id="window-canvas" class="w-full max-w-md mt-6 space-y-4 flex flex-col mb-28 relative z-10"></main>

    <div id="game-alert-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div id="alert-box-card" class="glass-card w-full max-w-xs p-6 text-center space-y-4 border-indigo-500/40 bg-slate-950/95 shadow-2xl animate__animated">
            <div id="alert-icon" class="text-5xl">⚠️</div>
            <h3 id="alert-title" class="text-base font-black uppercase tracking-wider text-slate-100">Notification</h3>
            <p id="alert-msg" class="text-xs text-slate-300 leading-relaxed font-medium"></p>
            <button onclick="dismissSystemModal()" class="w-full bg-gradient-to-r from-indigo-600 to-blue-600 text-white font-bold text-xs py-3 rounded-xl transition-all shadow-md transform active:scale-95">
                CONTINUE PROCEEDING
            </button>
        </div>
    </div>

    <div id="shop-modal" class="fixed inset-0 bg-black/95 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div class="glass-card w-full max-w-sm p-6 space-y-4 border-indigo-500/30 bg-slate-950/90 shadow-2xl">
            <div class="flex justify-between items-center border-b border-white/10 pb-3">
                <div class="flex items-center gap-2"><span>🛒</span><h3 class="text-sm font-black uppercase tracking-wider text-indigo-300">Armory Depot</h3></div>
                <button onclick="closeShopModal()" class="text-slate-400 text-sm bg-white/5 w-7 h-7 rounded-full">✕</button>
            </div>
            <div id="modal-shop-grid" class="space-y-2"></div>
        </div>
    </div>

    <button id="lobby-bag-btn" onclick="openShopModal()" class="fixed bottom-6 right-6 z-40 bg-gradient-to-tr from-indigo-500 via-purple-600 to-pink-500 border border-white/20 w-14 h-14 rounded-full flex items-center justify-center shadow-2xl text-xl hover:scale-110 active:scale-95 transition-all animate__animated animate__pulse animate__infinite">🎒</button>

    <script>
        // Game Scriptural Database Framework Definitions
        window.quizDatabase = [
            { name: "Matthew", group: "NT", questions: [{ q: "Who was chosen to be the earthly mother of Jesus Christ?", a: ["Elizabeth", "Mary", "Martha", "Salome"], correct: 1 }] },
            { name: "Mark", group: "Mark", questions: [{ q: "Which prophet did Mark quote at the opening of his Gospel script?", a: ["Isaiah", "Jeremiah", "Ezekiel", "Daniel"], correct: 0 }] },
            { name: "Luke", group: "NT", questions: [{ q: "What was the professional trade of Luke before writing?", a: ["Tax Collector", "Physician", "Fisherman", "Tentmaker"], correct: 1 }] },
            { name: "John", group: "NT", questions: [{ q: "Complete the prophetic text: 'In the beginning was the...'", a: ["Light", "Spirit", "Word", "Kingdom"], correct: 2 }] },
            { name: "Genesis", group: "OT", questions: [{ q: "What garden home was explicitly planted for Adam and Eve's habitation?", a: ["Gethsemane", "Eden", "Sinai", "Ararat"], correct: 1 }] },
            { name: "Exodus", group: "OT", questions: [{ q: "Out of what elemental item did God call Moses in the desert?", a: ["Cloud", "Bush", "Rock", "Whirlwind"], correct: 1 }] },
            { name: "EGW Writings", group: "EGW", questions: [{ q: "Which work traces the cosmic metanarrative between Christ and Satan?", a: ["Steps to Christ", "The Great Controversy", "Education", "Ministry of Healing"], correct: 1 }] },
            { name: "Adventist Sanctuary", group: "SDA", questions: [{ q: "In what year did the prophetic cleansing of the heavenly sanctuary commence?", a: ["1798", "1844", "1888", "1931"], correct: 1 }] },
            { name: "Fundamental Beliefs", group: "SDA", questions: [{ q: "Which day is recognized as the biblical Sabbath according to Adventist Teachings?", a: ["First Day (Sunday)", "Sixth Day (Friday)", "Seventh Day (Saturday)", "Any chosen rest day"], correct: 2 }] },
            { name: "State of the Dead", group: "SDA", questions: [{ q: "How does Scripture describe the condition of death according to Adventist doctrine?", a: ["An immediate purgatory", "A state of unconscious sleep", "Disembodied spirit wandering", "Immediate ascent to eternal torment"], correct: 1 }] }
        ];

        // Core State Engine System Configuration
        let state = JSON.parse(localStorage.getItem('bqArcadeV12Data')) || {
            gold: 500, lang: 'en',
            perks: { freeze: 3, half: 2, skip: 1, shield: 2 },
            lastSpinTimestamp: 0,
            stats: { currentStreak: 0, freezeUsed: 0, totalCoinsEarned: 500, blitzSurvivals: 0, overallAnswers: 0 },
            activitySetTier: 1,
            activityProgressCounters: [0, 0, 0, 0, 0]
        };

        // Textless Pure Animated Vector Rewards Configurations Array
        const prizes = [
            { icon: "💡", color: "#fbbf24", action: () => { state.perks.half += 1; } },
            { icon: "🎫", color: "#3b82f6", action: () => { state.perks.skip += 1; } },
            { icon: "🪙", color: "#f59e0b", action: () => { state.gold += 50; } },
            { icon: "❄️", color: "#22d3ee", action: () => { state.perks.freeze += 1; } },
            { icon: "💰", color: "#eab308", action: () => { state.gold += 100; } },
            { icon: "🛡️", color: "#10b981", action: () => { state.perks.shield += 1; } }
        ];

        let currentCampaignMode = "";
        let campaignActivePool = [];
        let currentActiveQuestion = null;
        let countdownTimerRef = null;
        let secondsRemaining = 0;
        let inputInteractionsBlocked = false;
        let isShieldActive = false;
        
        // Procedural Hardware Audio Synth Engine Configuration
        let audioCtx = null;
        let globalAudioMuted = false;
        let activeBackgroundToneLoop = null;
        let currentBackgroundMoodType = "lobby"; 

        // Spinning Wheel Animation Loop Global Handlers
        let wheelAnimationId = null;
        let wheelBaseRotation = 0;
        let wheelPulseScaleDelta = 0;
        let isWheelActivelySpinning = false;
        let activePostAlertCallback = null;

        function saveState() {
            localStorage.setItem('bqArcadeV12Data', JSON.stringify(state));
            document.getElementById('gold-val').innerText = state.gold;
            document.getElementById('lang-label').innerText = state.lang === 'en' ? "English" : "Twi";
        }

        // Ambient Dynamic Starfield Particle Routine
        function initStarfieldAmbientLayer() {
            const canvas = document.getElementById('ambient-particle-canvas');
            const ctx = canvas.getContext('2d');
            let dots = [];
            
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            for(let i=0; i<35; i++) {
                dots.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 2 + 1,
                    vY: Math.random() * 0.3 + 0.1,
                    alpha: Math.random() * 0.4 + 0.1
                });
            }

            function loop() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                dots.forEach(d => {
                    d.y -= d.vY;
                    if(d.y < -10) d.y = canvas.height + 10;
                    ctx.fillStyle = `rgba(129, 140, 248, ${d.alpha})`;
                    ctx.beginPath();
                    ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
                    ctx.fill();
                });
                requestAnimationFrame(loop);
            }
            loop();
        }

        // --- DYNAMIC AUDIO ENGINE HUB ---
        function initAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                startProceduralAmbianceLoop();
            }
        }

        function startProceduralAmbianceLoop() {
            if (activeBackgroundToneLoop) clearInterval(activeBackgroundToneLoop);
            
            // Core heartbeat tick loop for atmospheric generations
            runMoodSynthesizerTick();
            activeBackgroundToneLoop = setInterval(runMoodSynthesizerTick, currentBackgroundMoodType === 'war' ? 850 : 3500);
        }

        function runMoodSynthesizerTick() {
            if (globalAudioMuted || !audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const now = audioCtx.currentTime;

            if (currentBackgroundMoodType === 'war') {
                // --- DRAMATIC WAR SOUNDS (Phase 5 Mastery Level) ---
                // Deep striking battlefield drum transient pulse
                let drumOsc = audioCtx.createOscillator();
                let drumGain = audioCtx.createGain();
                drumOsc.type = 'triangle';
                drumOsc.frequency.setValueAtTime(58, now);
                drumOsc.frequency.exponentialRampToValueAtTime(0.01, now + 0.45);
                
                drumGain.gain.setValueAtTime(0.4, now);
                drumGain.gain.exponentialRampToValueAtTime(0.001, now + 0.42);
                
                drumOsc.connect(drumGain);
                drumGain.connect(audioCtx.destination);
                drumOsc.start(now);
                drumOsc.stop(now + 0.45);

                // High tension warning sweeps
                let tensionOsc = audioCtx.createOscillator();
                let tensionGain = audioCtx.createGain();
                let filter = audioCtx.createBiquadFilter();
                
                tensionOsc.type = 'sawtooth';
                tensionOsc.frequency.setValueAtTime(70, now);
                tensionOsc.frequency.linearRampToValueAtTime(110, now + 0.7);
                
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(220, now);

                tensionGain.gain.setValueAtTime(0, now);
                tensionGain.gain.linearRampToValueAtTime(0.08, now + 0.2);
                tensionGain.gain.exponentialRampToValueAtTime(0.001, now + 0.75);

                tensionOsc.connect(filter);
                filter.connect(tensionGain);
                tensionGain.connect(audioCtx.destination);
                tensionOsc.start(now);
                tensionOsc.stop(now + 0.8);

            } else if (currentBackgroundMoodType === 'holy') {
                // --- CALM SCRIPTURAL CHORAL SOUNDS (Standard Stages) ---
                let harmonies = [220.00, 277.18, 329.63, 440.00]; // A Major harmonic triad pad layers
                harmonies.forEach((f, index) => {
                    let osc = audioCtx.createOscillator();
                    let gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(f, now);
                    
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(0.02, now + 0.8 + (index * 0.1));
                    gain.gain.exponentialRampToValueAtTime(0.0001, now + 3.2);
                    
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(now);
                    osc.stop(now + 3.4);
                });
            } else {
                // --- LOBBY AMBIENT THEME ---
                let ambientFreqs = [146.83, 220.00, 293.66]; // D open fifth layers
                ambientFreqs.forEach((f) => {
                    let osc = audioCtx.createOscillator();
                    let gain = audioCtx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(f, now);
                    
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(0.02, now + 1.2);
                    gain.gain.exponentialRampToValueAtTime(0.0001, now + 3.3);
                    
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(now);
                    osc.stop(now + 3.4);
                });
            }
        }

        function switchBackgroundMoodSoundtrack(mood) {
            initAudioContext();
            if (currentBackgroundMoodType === mood) return;
            currentBackgroundMoodType = mood;
            startProceduralAmbianceLoop();
        }

        function toggleGlobalAudioSystem() {
            initAudioContext();
            globalAudioMuted = !globalAudioMuted;
            const btn = document.getElementById('audio-toggle-btn');
            if (globalAudioMuted) {
                btn.className = "bg-slate-950/95 border border-white/10 text-slate-500 px-3 py-1.5 rounded-full font-black text-[10px] uppercase tracking-widest flex items-center gap-1.5 shadow-xl";
                btn.innerHTML = `<span class="w-2 h-2 rounded-full bg-slate-600"></span><span>AMBIANCE: OFF</span>`;
            } else {
                btn.className = "bg-slate-950/95 border border-emerald-500/30 text-emerald-400 px-3 py-1.5 rounded-full font-black text-[10px] uppercase tracking-widest flex items-center gap-1.5 shadow-xl";
                btn.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span><span>AMBIANCE: ON</span>`;
                runMoodSynthesizerTick();
            }
        }

        function playInterfaceFeedbackChime(type) {
            if (globalAudioMuted || !audioCtx) return;
            let now = audioCtx.currentTime;
            if (type === 'correct') {
                [523.25, 659.25, 783.99].forEach((f, i) => {
                    let osc = audioCtx.createOscillator();
                    let gain = audioCtx.createGain();
                    osc.frequency.setValueAtTime(f, now + (i * 0.03));
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(now); osc.stop(now + 0.45);
                });
            } else if (type === 'wrong') {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(130, now);
                let f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.setValueAtTime(300, now);
                gain.gain.setValueAtTime(0.15, now); gain.gain.linearRampToValueAtTime(0.001, now + 0.3);
                osc.connect(f); f.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.35);
            } else {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.frequency.setValueAtTime(400, now);
                gain.gain.setValueAtTime(0.03, now); gain.gain.linearRampToValueAtTime(0.001, now + 0.05);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.06);
            }
        }

        // Custom Modal Overlay Execution Engine
        function triggerInGameAlert(title, message, icon, completeCallback = null) {
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-msg').innerText = message;
            document.getElementById('alert-icon').innerText = icon || '⚠️';
            activePostAlertCallback = completeCallback;
            
            const element = document.getElementById('game-alert-modal');
            element.classList.remove('hidden');
            document.getElementById('alert-box-card').className = "glass-card w-full max-w-xs p-6 text-center space-y-4 border-indigo-500/40 bg-slate-950/90 animate__animated animate__jackInTheBox";
        }

        function dismissSystemModal() {
            playInterfaceFeedbackChime('tap');
            document.getElementById('game-alert-modal').classList.add('hidden');
            if (activePostAlertCallback) {

                { text: `Maintain a win streak of ${2 + t} choices`, target: 2 + t, current: state.stats.currentStreak },
                { text: `Activate Chrono Freeze ${1 + Math.floor(t/2)} times`, target: 1 + Math.floor(t/2), current: state.activityProgressCounters[2] },
                { text: `Survive ${t} extreme Mastery Blitz cards`, target: t, current: state.stats.blitzSurvivals },

            let activeSet = getProceduralActiveSet();
            let completedCount = 0;
            activeSet.forEach(act => { if(act.current >= act.target) completedCount++; });

            if (completedCount >= 5) {
                let milestonePayout = 100 + (state.activitySetTier * 50);
                state.gold += milestonePayout;
                state.activitySetTier++;
                state.activityProgressCounters = [0, 0, 0, 0, 0];
                saveState();
                
                triggerInGameAlert(
                    "🎉 Activity Set Cleared!",

        // --- TOP DROPDOWN POPUP CONTROLLERS ---

        function renderDropActivitiesList() {

                let borderStyle = "border-white/5 bg-slate-900/40";

                div.innerHTML = `

        function toggleWheelDropWindow(e) {
            if(e) e.stopPropagation();

            if (win.classList.contains('hidden')) {
                win.classList.remove('hidden');

                isWheelActivelySpinning = false;
                wheelPulseScaleDelta = 0;
                runInteractiveWheelLoopAnimation();
            } else {
                win.classList.add('hidden');
                arrow.innerText = "▼";
                cancelAnimationFrame(wheelAnimationId);
            }
        }

        // Canvas Dynamic Drawing Loop
        function runInteractiveWheelLoopAnimation() {
            if(!isWheelActivelySpinning) {
                wheelPulseScaleDelta += 0.05; 
            }
            renderWheelCanvasLiveFrame();
            wheelAnimationId = requestAnimationFrame(runInteractiveWheelLoopAnimation);
        }

        function renderWheelCanvasLiveFrame() {
            const canvas = document.getElementById('wheel-canvas');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            const numSectors = prizes.length;
            const arcSize = (2 * Math.PI) / numSectors;

            ctx.clearRect(0,0,250,250);
            
            for(let i=0; i<numSectors; i++) {
                let angle = (i * arcSize) + wheelBaseRotation;
                ctx.fillStyle = (i % 2 === 0) ? "#111827" : "#1f2937";
                ctx.beginPath();
                ctx.moveTo(125, 125);
                ctx.arc(125, 125, 118, angle, angle + arcSize);
                ctx.lineTo(125, 125);
                ctx.fill();
                
                ctx.strokeStyle = "rgba(99, 102, 241, 0.3)";
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // Render floating animated reward symbol icons centered in segments
                ctx.save();
                ctx.translate(125, 125);
                ctx.rotate(angle + arcSize / 2);
                
                // Pulsing scaling calculations
                let currentScale = 1.0;
                if(!isWheelActivelySpinning) {
                    currentScale = 1.0 + Math.sin(wheelPulseScaleDelta + i) * 0.12;
                }
                
                ctx.font = `${Math.floor(22 * currentScale)}px system-ui`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                
                // Add icon glow shadow tracking
                ctx.shadowColor = prizes[i].color;
                ctx.shadowBlur = isWheelActivelySpinning ? 4 : 10 + Math.abs(Math.sin(wheelPulseScaleDelta)) * 15;
                
                // Draw icon midway out the wheel radius
                ctx.fillText(prizes[i].icon, 78, 0);
                ctx.restore();
            }

            // Draw Central Ring Cap Pin
            ctx.beginPath();
            ctx.arc(125, 125, 18, 0, Math.PI*2);
            ctx.fillStyle = "#4f46e5";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#6366f1";
            ctx.fill();
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function spinWheelActionLogic() {
            const now = Date.now();
            const cooldownPeriod = 24 * 60 * 60 * 1000;
            if (now - state.lastSpinTimestamp < cooldownPeriod) {
                triggerInGameAlert("Engine Recharging", "Your daily prophetic reward drop is cooling down. Return tomorrow.", "⏳");
                return;
            }

            playInterfaceFeedbackChime('tap');
            document.getElementById('spin-action-trigger').disabled = true;
            state.lastSpinTimestamp = now;
            saveState();

            isWheelActivelySpinning = true;
            let vel = 0.45;
            let decay = 0.993;
            
            function brakeRotationTick() {
                wheelBaseRotation += vel;
                vel *= decay;

                if (vel < 0.002) {
                    isWheelActivelySpinning = false;
                    let rad = wheelBaseRotation % (2 * Math.PI);
                    let targetRad = (2 * Math.PI) - rad;
                    if(targetRad < 0) targetRad += (2 * Math.PI);
                    
                    let sectorArc = (2 * Math.PI) / prizes.length;
                    let adjustedRad = (targetRad - (Math.PI / 2) + (2 * Math.PI)) % (2 * Math.PI);
                    let idx = Math.floor(adjustedRad / sectorArc);
                    let winner = prizes[idx] || prizes[0];

                    winner.action();
                    saveState();

                    triggerInGameAlert(
                        "🎁 Prize Unlocked!", 
                        `The animated needle settled perfectly! Reward item applied to your inventory stack storage cache.`, 
                        winner.icon, 
                        () => {
                            document.getElementById('spin-action-trigger').disabled = false;
                            toggleWheelDropWindow();
                            renderMenuMap();
                        }
                    );
                } else {
                    requestAnimationFrame(brakeRotationTick);
                }
            }
            brakeRotationTick();
        }

        function startArcadePipeline(mode) {

        function compileQuestionsPoolForMode(mode) {

            else if (mode === 'sda') targetGroup = "SDA";

                campaignActivePool = [...window.quizDatabase];

            evaluateActivityIncrements('check_only', 0);

            const activeNode = campaignActivePool[Math.floor(Math.random() * campaignActivePool.length)];

            currentActiveQuestion._sourceBookContext = activeNode.name;

            secondsRemaining = (currentCampaignMode === 'mastery') ? 5 : 15;

            const canvas = document.getElementById('window-canvas');
            canvas.innerHTML = `
                <div class="glass-card p-4 space-y-3 flex flex-col bg-slate-900/90 shadow-2xl animate__animated animate__fadeInDown">
                    <div class="flex justify-between items-center">

        function beginCountdownTicker() {
            clearInterval(countdownTimerRef);
            countdownTimerRef = setInterval(() => {
                if(inputInteractionsBlocked) return;
                secondsRemaining--;
                const elem = document.getElementById('clock-digit'); if(elem) elem.innerText = secondsRemaining;
                
                if(secondsRemaining <= 0) {
                    clearInterval(countdownTimerRef);
                    executeFailureSequence("Countdown Time Expired!");
                }
            }, 1000);

        function challengeAnswerSubmitted(index, clickTarget) {
            if (inputInteractionsBlocked) return;
            inputInteractionsBlocked = true;
            clearInterval(countdownTimerRef);

            if (index === currentActiveQuestion.correct) {
                clickTarget.className = "btn-choice rainbow-correct text-white text-xs shadow-2xl transform scale-[1.01]";
                playInterfaceFeedbackChime('correct');
                
                state.stats.currentStreak++;
                state.gold += 15;
                if(currentCampaignMode === 'mastery') state.stats.blitzSurvivals++;
                saveState();
                evaluateActivityIncrements('answer', 1);

                setTimeout(() => { launchNextActiveQuestionEngine(); }, 1400);
            } else {
                clickTarget.className = "btn-choice bg-gradient-to-r from-red-600 to-rose-700 border-rose-400 text-white text-xs animate__animated animate__shakeX font-bold shadow-2xl";
                playInterfaceFeedbackChime('wrong');
                state.stats.currentStreak = 0; 
                saveState();
                setTimeout(() => { executeFailureSequence("Incorrect Answer Choice Selected!"); }, 1200);
            }
        }

        function executeFailureSequence(reason) {
            clearInterval(countdownTimerRef);
            
            if(!isShieldActive) {
                state.gold = Math.max(0, state.gold - 20);
                saveState();
            }

            if(state.gold <= 0) {
                triggerInGameAlert(
                    "🚨 Wallet Depleted", 
                    "Your coin balance has hit zero. Returning to tactical menu map hub.", 
                    "💀", 
                    () => { exitToMenu(); }
                );
            } else {

                    "⚠️ Deducted -20 Coins", 
                    `${reason} 20 coins deducted from cache. Shuffling instantly to next pool.`, 
                    "📉", 
                    () => { launchNextActiveQuestionEngine(); }
                );
            }
        }

        function applyInGameUtility(type) {
            if (state.perks[type] <= 0 || inputInteractionsBlocked) return;
            state.perks[type]--; 
            if(type === 'freeze') evaluateActivityIncrements('freeze', 1);
            saveState(); 
            playInterfaceFeedbackChime('perk');

            if (type === 'freeze') {
                clearInterval(countdownTimerRef);
                document.getElementById('frost-frame').classList.add('frost-active');
            } else if (type === 'half') {
                const elements = document.getElementById('choice-matrix').getElementsByTagName('button');
                let removed = 0;
                for(let i=0; i<elements.length; i++) {
                    if(i !== currentActiveQuestion.correct && removed < 2) {
                        elements[i].style.opacity = "0.15";
                        elements[i].disabled = true;
                        removed++;
                    }
                }
            } else if (type === 'skip') {
                clearInterval(countdownTimerRef);
                launchNextActiveQuestionEngine();
            } else if (type === 'shield') {
                isShieldActive = true;
                document.getElementById('shield-frame').classList.add('shield-active');
            }
        }

        function toggleLanguage() { playInterfaceFeedbackChime('tap'); state.lang = state.lang === 'en' ? 'tw' : 'en'; saveState(); renderMenuMap(); }
        function exitToMenu() { playInterfaceFeedbackChime('tap'); clearInterval(countdownTimerRef); renderMenuMap(); }
        
        // Window Click dismiss listener out-of-bounds drop handlers
        window.addEventListener('click', () => {
            document.getElementById('activities-drop-window').classList.add('hidden');
            document.getElementById('activities-drop-arrow').innerText = "▼";
            
            document.getElementById('wheel-drop-window').classList.add('hidden');
            document.getElementById('wheel-drop-arrow').innerText = "▼";
            cancelAnimationFrame(wheelAnimationId);
        });

        window.onload = () => { 
            saveState(); 
            initStarfieldAmbientLayer();
            renderMenuMap(); 
        };

    <script>
        // Game Scriptural Database Framework Definitions
        window.quizDatabase = [
            { name: "Matthew", group: "NT", questions: [{ q: "Who was chosen to be the earthly mother of Jesus Christ?", a: ["Elizabeth", "Mary", "Martha", "Salome"], correct: 1 }] },
            { name: "Mark", group: "Mark", questions: [{ q: "Which prophet did Mark quote at the opening of his Gospel script?", a: ["Isaiah", "Jeremiah", "Ezekiel", "Daniel"], correct: 0 }] },
            { name: "Luke", group: "NT", questions: [{ q: "What was the professional trade of Luke before writing?", a: ["Tax Collector", "Physician", "Fisherman", "Tentmaker"], correct: 1 }] },
            { name: "John", group: "NT", questions: [{ q: "Complete the prophetic text: 'In the beginning was the...'", a: ["Light", "Spirit", "Word", "Kingdom"], correct: 2 }] },
            { name: "Genesis", group: "OT", questions: [{ q: "What garden home was explicitly planted for Adam and Eve's habitation?", a: ["Gethsemane", "Eden", "Sinai", "Ararat"], correct: 1 }] },
            { name: "Exodus", group: "OT", questions: [{ q: "Out of what elemental item did God call Moses in the desert?", a: ["Cloud", "Bush", "Rock", "Whirlwind"], correct: 1 }] },
            { name: "EGW Writings", group: "EGW", questions: [{ q: "Which work traces the cosmic metanarrative between Christ and Satan?", a: ["Steps to Christ", "The Great Controversy", "Education", "Ministry of Healing"], correct: 1 }] },
            { name: "Adventist Sanctuary", group: "SDA", questions: [{ q: "In what year did the prophetic cleansing of the heavenly sanctuary commence?", a: ["1798", "1844", "1888", "1931"], correct: 1 }] },
            { name: "Fundamental Beliefs", group: "SDA", questions: [{ q: "Which day is recognized as the biblical Sabbath according to Adventist Teachings?", a: ["First Day (Sunday)", "Sixth Day (Friday)", "Seventh Day (Saturday)", "Any chosen rest day"], correct: 2 }] },
            { name: "State of the Dead", group: "SDA", questions: [{ q: "How does Scripture describe the condition of death according to Adventist doctrine?", a: ["An immediate purgatory", "A state of unconscious sleep", "Disembodied spirit wandering", "Immediate ascent to eternal torment"], correct: 1 }] }
        ];

        // Core State Engine System Configuration
        let state = JSON.parse(localStorage.getItem('bqArcadeV12Data')) || {
            gold: 500, lang: 'en',
            perks: { freeze: 3, half: 2, skip: 1, shield: 2 },
            lastSpinTimestamp: 0,
            stats: { currentStreak: 0, freezeUsed: 0, totalCoinsEarned: 500, blitzSurvivals: 0, overallAnswers: 0 },
            activitySetTier: 1,
            activityProgressCounters: [0, 0, 0, 0, 0]
        };

        // Textless Pure Animated Vector Rewards Configurations Array
        const prizes = [
            { icon: "💡", color: "#fbbf24", action: () => { state.perks.half += 1; } },
            { icon: "🎫", color: "#3b82f6", action: () => { state.perks.skip += 1; } },
            { icon: "🪙", color: "#f59e0b", action: () => { state.gold += 50; } },
            { icon: "❄️", color: "#22d3ee", action: () => { state.perks.freeze += 1; } },
            { icon: "💰", color: "#eab308", action: () => { state.gold += 100; } },
            { icon: "🛡️", color: "#10b981", action: () => { state.perks.shield += 1; } }
        ];

        let currentCampaignMode = "";
        let campaignActivePool = [];
        let currentActiveQuestion = null;
        let countdownTimerRef = null;
        let secondsRemaining = 0;
        let inputInteractionsBlocked = false;
        let isShieldActive = false;
        
        // Procedural Hardware Audio Synth Engine Configuration
        let audioCtx = null;
        let globalAudioMuted = false;
        let activeBackgroundToneLoop = null;
        let currentBackgroundMoodType = "lobby"; 

        // Spinning Wheel Animation Loop Global Handlers
        let wheelAnimationId = null;
        let wheelBaseRotation = 0;
        let wheelPulseScaleDelta = 0;
        let isWheelActivelySpinning = false;
        let activePostAlertCallback = null;

        function saveState() {
            localStorage.setItem('bqArcadeV12Data', JSON.stringify(state));
            document.getElementById('gold-val').innerText = state.gold;
            document.getElementById('lang-label').innerText = state.lang === 'en' ? "English" : "Twi";
        }

        // Ambient Dynamic Starfield Particle Routine
        function initStarfieldAmbientLayer() {
            const canvas = document.getElementById('ambient-particle-canvas');
            const ctx = canvas.getContext('2d');
            let dots = [];
            
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            for(let i=0; i<35; i++) {
                dots.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 2 + 1,
                    vY: Math.random() * 0.3 + 0.1,
                    alpha: Math.random() * 0.4 + 0.1
                });
            }

            function loop() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                dots.forEach(d => {
                    d.y -= d.vY;
                    if(d.y < -10) d.y = canvas.height + 10;
                    ctx.fillStyle = `rgba(129, 140, 248, ${d.alpha})`;
                    ctx.beginPath();
                    ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
                    ctx.fill();
                });
                requestAnimationFrame(loop);
            }
            loop();
        }

        // --- DYNAMIC AUDIO ENGINE HUB ---
        function initAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                startProceduralAmbianceLoop();
            }
        }

        function startProceduralAmbianceLoop() {
            if (activeBackgroundToneLoop) clearInterval(activeBackgroundToneLoop);
            
            // Core heartbeat tick loop for atmospheric generations
            runMoodSynthesizerTick();
            activeBackgroundToneLoop = setInterval(runMoodSynthesizerTick, currentBackgroundMoodType === 'war' ? 850 : 3500);
        }

        function runMoodSynthesizerTick() {
            if (globalAudioMuted || !audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const now = audioCtx.currentTime;

            if (currentBackgroundMoodType === 'war') {
                // --- DRAMATIC WAR SOUNDS (Phase 5 Mastery Level) ---
                // Deep striking battlefield drum transient pulse
                let drumOsc = audioCtx.createOscillator();
                let drumGain = audioCtx.createGain();
                drumOsc.type = 'triangle';
                drumOsc.frequency.setValueAtTime(58, now);
                drumOsc.frequency.exponentialRampToValueAtTime(0.01, now + 0.45);
                
                drumGain.gain.setValueAtTime(0.4, now);
                drumGain.gain.exponentialRampToValueAtTime(0.001, now + 0.42);
                
                drumOsc.connect(drumGain);
                drumGain.connect(audioCtx.destination);
                drumOsc.start(now);
                drumOsc.stop(now + 0.45);

                // High tension warning sweeps
                let tensionOsc = audioCtx.createOscillator();
                let tensionGain = audioCtx.createGain();
                let filter = audioCtx.createBiquadFilter();
                
                tensionOsc.type = 'sawtooth';
                tensionOsc.frequency.setValueAtTime(70, now);
                tensionOsc.frequency.linearRampToValueAtTime(110, now + 0.7);
                
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(220, now);

                tensionGain.gain.setValueAtTime(0, now);
                tensionGain.gain.linearRampToValueAtTime(0.08, now + 0.2);
                tensionGain.gain.exponentialRampToValueAtTime(0.001, now + 0.75);

                tensionOsc.connect(filter);
                filter.connect(tensionGain);
                tensionGain.connect(audioCtx.destination);
                tensionOsc.start(now);
                tensionOsc.stop(now + 0.8);

            } else if (currentBackgroundMoodType === 'holy') {
                // --- CALM SCRIPTURAL CHORAL SOUNDS (Standard Stages) ---
                let harmonies = [220.00, 277.18, 329.63, 440.00]; // A Major harmonic triad pad layers
                harmonies.forEach((f, index) => {
                    let osc = audioCtx.createOscillator();
                    let gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(f, now);
                    
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(0.02, now + 0.8 + (index * 0.1));
                    gain.gain.exponentialRampToValueAtTime(0.0001, now + 3.2);
                    
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(now);
                    osc.stop(now + 3.4);
                });
            } else {
                // --- LOBBY AMBIENT THEME ---
                let ambientFreqs = [146.83, 220.00, 293.66]; // D open fifth layers
                ambientFreqs.forEach((f) => {
                    let osc = audioCtx.createOscillator();
                    let gain = audioCtx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(f, now);
                    
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(0.02, now + 1.2);
                    gain.gain.exponentialRampToValueAtTime(0.0001, now + 3.3);
                    
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(now);
                    osc.stop(now + 3.4);
                });
            }
        }

        function switchBackgroundMoodSoundtrack(mood) {
            initAudioContext();
            if (currentBackgroundMoodType === mood) return;
            currentBackgroundMoodType = mood;
            startProceduralAmbianceLoop();
        }

        function toggleGlobalAudioSystem() {
            initAudioContext();
            globalAudioMuted = !globalAudioMuted;
            const btn = document.getElementById('audio-toggle-btn');
            if (globalAudioMuted) {
                btn.className = "bg-slate-950/95 border border-white/10 text-slate-500 px-3 py-1.5 rounded-full font-black text-[10px] uppercase tracking-widest flex items-center gap-1.5 shadow-xl";
                btn.innerHTML = `<span class="w-2 h-2 rounded-full bg-slate-600"></span><span>AMBIANCE: OFF</span>`;
            } else {
                btn.className = "bg-slate-950/95 border border-emerald-500/30 text-emerald-400 px-3 py-1.5 rounded-full font-black text-[10px] uppercase tracking-widest flex items-center gap-1.5 shadow-xl";
                btn.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span><span>AMBIANCE: ON</span>`;
                runMoodSynthesizerTick();
            }
        }

        function playInterfaceFeedbackChime(type) {
            if (globalAudioMuted || !audioCtx) return;
            let now = audioCtx.currentTime;
            if (type === 'correct') {
                [523.25, 659.25, 783.99].forEach((f, i) => {
                    let osc = audioCtx.createOscillator();
                    let gain = audioCtx.createGain();
                    osc.frequency.setValueAtTime(f, now + (i * 0.03));
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(now); osc.stop(now + 0.45);
                });
            } else if (type === 'wrong') {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(130, now);
                let f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.setValueAtTime(300, now);
                gain.gain.setValueAtTime(0.15, now); gain.gain.linearRampToValueAtTime(0.001, now + 0.3);
                osc.connect(f); f.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.35);
            } else {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.frequency.setValueAtTime(400, now);
                gain.gain.setValueAtTime(0.03, now); gain.gain.linearRampToValueAtTime(0.001, now + 0.05);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.06);
            }
        }

        // Custom Modal Overlay Execution Engine
        function triggerInGameAlert(title, message, icon, completeCallback = null) {
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-msg').innerText = message;
            document.getElementById('alert-icon').innerText = icon || '⚠️';
            activePostAlertCallback = completeCallback;
            
            const element = document.getElementById('game-alert-modal');
            element.classList.remove('hidden');
            document.getElementById('alert-box-card').className = "glass-card w-full max-w-xs p-6 text-center space-y-4 border-indigo-500/40 bg-slate-950/90 animate__animated animate__jackInTheBox";
        }

        function dismissSystemModal() {
            playInterfaceFeedbackChime('tap');
            document.getElementById('game-alert-modal').classList.add('hidden');
            if (activePostAlertCallback) {
                const cb = activePostAlertCallback;
                activePostAlertCallback = null;
                cb();
            }
        }

        // Infinite Scaling Task Generation Algorithm
        function getProceduralActiveSet() {
            let t = state.activitySetTier;
            return [
                { text: `Answer ${3 + t} questions across any stage`, target: 3 + t, current: state.activityProgressCounters[0] },
                { text: `Maintain a win streak of ${2 + t} choices`, target: 2 + t, current: state.stats.currentStreak },
                { text: `Activate Chrono Freeze ${1 + Math.floor(t/2)} times`, target: 1 + Math.floor(t/2), current: state.activityProgressCounters[2] },
                { text: `Survive ${t} extreme Mastery Blitz cards`, target: t, current: state.stats.blitzSurvivals },
                { text: `Possess a volume balance of ${400 + (t * 100)} gold`, target: 400 + (t * 100), current: state.gold }
            ];
        }

        function evaluateActivityIncrements(type, amount = 1) {
            if(type === 'answer') state.activityProgressCounters[0] += amount;
            if(type === 'freeze') state.activityProgressCounters[2] += amount;
            saveState();

            let activeSet = getProceduralActiveSet();

            if (completedCount >= 5) {

                state.gold += milestonePayout;
                state.activitySetTier++;
                state.activityProgressCounters = [0, 0, 0, 0, 0];
                saveState();
                
                triggerInGameAlert(
                    "🎉 Activity Set Cleared!",

        function toggleWheelDropWindow(e) {
            if(e) e.stopPropagation();

        // Canvas Dynamic Drawing Loop
        function runInteractiveWheelLoopAnimation() {
            if(!isWheelActivelySpinning) {
                wheelPulseScaleDelta += 0.05; 
            }
            renderWheelCanvasLiveFrame();
            wheelAnimationId = requestAnimationFrame(runInteractiveWheelLoopAnimation);
        }

        function renderWheelCanvasLiveFrame() {
            const canvas = document.getElementById('wheel-canvas');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            const numSectors = prizes.length;
            const arcSize = (2 * Math.PI) / numSectors;

            ctx.clearRect(0,0,250,250);
            
            for(let i=0; i<numSectors; i++) {
                let angle = (i * arcSize) + wheelBaseRotation;
                ctx.fillStyle = (i % 2 === 0) ? "#111827" : "#1f2937";
                ctx.beginPath();
                ctx.moveTo(125, 125);
                ctx.arc(125, 125, 118, angle, angle + arcSize);
                ctx.lineTo(125, 125);
                ctx.fill();
                
                ctx.strokeStyle = "rgba(99, 102, 241, 0.3)";
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // Render floating animated reward symbol icons centered in segments
                ctx.save();
                ctx.translate(125, 125);
                ctx.rotate(angle + arcSize / 2);
                
                // Pulsing scaling calculations
                let currentScale = 1.0;
                if(!isWheelActivelySpinning) {
                    currentScale = 1.0 + Math.sin(wheelPulseScaleDelta + i) * 0.12;
                }
                
                ctx.font = `${Math.floor(22 * currentScale)}px system-ui`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                
                // Add icon glow shadow tracking
                ctx.shadowColor = prizes[i].color;
                ctx.shadowBlur = isWheelActivelySpinning ? 4 : 10 + Math.abs(Math.sin(wheelPulseScaleDelta)) * 15;
                
                // Draw icon midway out the wheel radius
                ctx.fillText(prizes[i].icon, 78, 0);
                ctx.restore();
            }

            // Draw Central Ring Cap Pin
            ctx.beginPath();
            ctx.arc(125, 125, 18, 0, Math.PI*2);
            ctx.fillStyle = "#4f46e5";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#6366f1";
            ctx.fill();
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function spinWheelActionLogic() {
            const now = Date.now();
            const cooldownPeriod = 24 * 60 * 60 * 1000;
            if (now - state.lastSpinTimestamp < cooldownPeriod) {
                triggerInGameAlert("Engine Recharging", "Your daily prophetic reward drop is cooling down. Return tomorrow.", "⏳");
                return;
            }

            playInterfaceFeedbackChime('tap');
            document.getElementById('spin-action-trigger').disabled = true;
            state.lastSpinTimestamp = now;
            saveState();

            isWheelActivelySpinning = true;
            let vel = 0.45;
            let decay = 0.993;
            
            function brakeRotationTick() {
                wheelBaseRotation += vel;
                vel *= decay;

                if (vel < 0.002) {
                    isWheelActivelySpinning = false;
                    let rad = wheelBaseRotation % (2 * Math.PI);
                    let targetRad = (2 * Math.PI) - rad;
                    if(targetRad < 0) targetRad += (2 * Math.PI);
                    
                    let sectorArc = (2 * Math.PI) / prizes.length;
                    let adjustedRad = (targetRad - (Math.PI / 2) + (2 * Math.PI)) % (2 * Math.PI);
                    let idx = Math.floor(adjustedRad / sectorArc);
                    let winner = prizes[idx] || prizes[0];

                    winner.action();
                    saveState();

                    triggerInGameAlert(
                        "🎁 Prize Unlocked!", 
                        `The animated needle settled perfectly! Reward item applied to your inventory stack storage cache.`, 
                        winner.icon, 
                        () => {
                            document.getElementById('spin-action-trigger').disabled = false;
                            toggleWheelDropWindow();
                            renderMenuMap();
                        }
                    );
                } else {
                    requestAnimationFrame(brakeRotationTick);
                }
            }
            brakeRotationTick();
        }

        function startArcadePipeline(mode) {

        function compileQuestionsPoolForMode(mode) {
