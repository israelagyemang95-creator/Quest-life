<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Quest: Claymation Horizon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        #bg-overlay { position: fixed; inset: 0; background-color: #070a13; z-index: 0; }
        #bg-tint { position: fixed; inset: 0; background: radial-gradient(circle at center, rgba(20, 25, 40, 0.4) 0%, rgba(3, 5, 12, 0.98) 100%); z-index: 1; }
        .glass-card { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; color: white; }
        
        .btn-choice { width: 100%; text-align: left; padding: 1.1rem 1.4rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.07); background: rgba(255,255,255,0.03); font-weight: 600; color: #f1f5f9; transition: all 0.2s ease; position: relative; }
        
        @keyframes auroraFlow {
            0% { background-position: 0% 50%; filter: hue-rotate(0deg); }
            50% { background-position: 100% 50%; filter: hue-rotate(180deg); }
            100% { background-position: 0% 50%; filter: hue-rotate(360deg); }
        }
        .rainbow-correct { 
            background: linear-gradient(45deg, #ff007f, #7f00ff, #00f0ff, #00ff7f, #ffeb00) !important;
            background-size: 300% 300% !important;
            animation: auroraFlow 4s ease infinite !important;
            border-color: transparent !important;
            color: #ffffff !important;
            font-weight: 900 !important;
            text-shadow: 0 2px 4px rgba(0,0,0,0.7);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4) !important;
        }

        #frost-frame { position: fixed; inset: 0; border: 14px solid rgba(56, 189, 248, 0.45); pointer-events: none; opacity: 0; transition: opacity 0.3s ease; z-index: 40; box-shadow: inset 0 0 80px rgba(14, 165, 233, 0.35); }
        .frost-active { opacity: 1 !important; }
        .snowflake { position: fixed; top: -5%; color: #e0f2fe; pointer-events: none; z-index: 45; animation: fall linear infinite; }
        @keyframes fall {
            0% { top: -5%; transform: translateX(0) rotate(0deg); }
            50% { transform: translateX(30px) rotate(180deg); }
            100% { top: 105%; transform: translateX(-15px) rotate(360deg); }
        }

        /* 📻 DIORAMA STAGE WITH TILT-SHIFT (Inspired by 1000601646.jpg) */
        .viewport-diorama { 
            position: relative; 
            width: 100%; 
            height: 240px; 
            border-radius: 28px; 
            overflow: hidden; 
            border: 2px solid rgba(255,255,255,0.1); 
            perspective: 1000px;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.85), 0 20px 40px rgba(0,0,0,0.5);
            background: #11141d;
        }

        /* Ambient Depth of Field Blur on Background Elements */
        .diorama-backdrop {
            position: absolute;
            inset: 0;
            filter: blur(3px); /* Dynamic blur mimics the camera optics seen in the reference photo */
            transform: scale(1.05);
            z-index: 0;
            transition: background 3s ease-in-out;
        }

        /* Soft Papercraft Style Clouds */
        .puff-cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 99px;
            filter: blur(6px);
            animation: craftDrift 40s linear infinite;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        @keyframes craftDrift { 0% { transform: translateX(-150px); } 100% { transform: translateX(500px); } }

        /* 🪜 THE LADDER / CLIMBING TRACK */
        .ladder-track {
            position: absolute;
            right: 85px;
            top: -10px;
            width: 24px;
            height: 270px;
            z-index: 15;
            background: repeating-linear-gradient(0deg, transparent, transparent 18px, #5c4033 18px, #5c4033 22px);
            border-left: 4px solid #4a3329;
            border-right: 4px solid #4a3329;
            box-shadow: -5px 10px 15px rgba(0,0,0,0.4);
        }

        /* 🏔️ ISOMETRIC CLAY PAPERCRAFT CLIFF */
        .clay-cliff {
            position: absolute;
            right: -40px;
            bottom: -50px;
            width: 170px;
            height: 320px;
            background: #2d3a4f;
            transform: rotateY(-30deg) rotateX(12deg) rotateZ(-2deg);
            transform-style: preserve-3d;
            box-shadow: -20px 20px 40px rgba(0,0,0,0.7);
            z-index: 10;
            border-left: 8px solid #3e506b;
        }

        /* Clay Texture Shingles / Layers Overlay */
        .clay-texture {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(255,255,255,0.07) 1px, transparent 0);
            background-size: 8px 8px;
            opacity: 0.8;
        }

        /* 🚶 SMOOTH CHARACTER ANIMATION SYSTEM */
        .character-node {
            position: absolute;
            z-index: 25;
            transition: bottom 0.9s cubic-bezier(0.4, 0, 0.2, 1), right 0.9s ease;
        }

        /* Cute Rounded Doll / Sprite (Like the character climbing the roof structure in your sample) */
        .clay-doll {
            position: relative;
            width: 28px;
            height: 42px;
        }
        .doll-head {
            position: absolute;
            top: 0; left: 4px;
            width: 20px; height: 20px;
            background: #e2aa7d;
            border-radius: 50%;
            box-shadow: inset -2px -2px 6px rgba(0,0,0,0.15), 0 4px 6px rgba(0,0,0,0.3);
            z-index: 5;
        }
        /* Hair/Cap element mimicking the round head profile */
        .doll-cap {
            position: absolute;
            top: -2px; left: 2px;
            width: 24px; height: 14px;
            background: #b45309;
            border-radius: 12px 12px 0 0;
        }
        .doll-torso {
            position: absolute;
            top: 18px; left: 2px;
            width: 24px; height: 18px;
            background: #de1d44;
            border-radius: 6px 6px 4px 4px;
            box-shadow: 0 4px 5px rgba(0,0,0,0.4);
        }

        /* Interactive Limbs Moving Up Alternately */
        .doll-limb { position: absolute; background: #a16207; border-radius: 4px; transform-origin: top center; }
        .doll-arm-l { top: 20px; left: -2px; width: 4px; height: 12px; }
        .doll-arm-r { top: 20px; left: 26px; width: 4px; height: 12px; }

        /* Smooth Rhythmic Mechanical Climb States */
        @keyframes continuousClimb {
            0%, 100% { transform: translateY(0) scaleX(1); }
            50% { transform: translateY(-5px) scaleX(0.97); }
        }
        .state-climbing {
            animation: continuousClimb 0.5s infinite linear;
            .doll-arm-l { animation: armReach 0.5s infinite alternate ease-in-out; }
            .doll-arm-r { animation: armReach 0.5s infinite alternate-reverse ease-in-out; }
        }
        @keyframes armReach { 0% { transform: rotate(-110deg); } 100% { transform: rotate(10deg); } }

        /* Soft Physics Fall Down Sequence */
        @keyframes floorSlip {
            0% { transform: translateY(0) rotate(0deg); }
            15% { transform: translateY(-12px) rotate(-15deg); }
            100% { transform: translateY(220px) rotate(140deg); opacity: 0; }
        }
        .state-falling { animation: floorSlip 1.2s forwards cubic-bezier(0.3, 0.05, 0.7, 0.1) !important; }

        /* Atmospheric Environmental Overlays */
        .rain-streak { position: absolute; background: rgba(255,255,255,0.15); width: 2px; height: 35px; animation: linearRain 0.5s linear infinite; }
        @keyframes linearRain { 0% { top: -40px; } 100% { top: 250px; } }
        
        #telemetry-box { position: absolute; inset: 0; z-index: 35; pointer-events: none; display: flex; align-items: center; justify-content: center; }
        #shield-frame { position: fixed; inset: 0; border: 12px solid rgba(245, 158, 11, 0.5); pointer-events: none; opacity: 0; transition: opacity 0.3s ease; z-index: 40; }
        .shield-active { opacity: 1 !important; }
        @keyframes pulseAlert { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.06); background: rgba(239, 68, 68, 0.15); } }
        .alarm-on { animation: pulseAlert 0.5s infinite; }
    </style>
</head>
<body class="p-4 min-h-screen flex flex-col items-center justify-start text-white overflow-x-hidden font-sans select-none">
    
    <div id="bg-overlay"></div>
    <div id="bg-tint"></div>

    <!-- FX Context Canvases -->
    <div id="frost-frame"></div>
    <div id="shield-frame"></div>
    <div id="snow-box"></div>

    <!-- HUD Nav Bar -->
    <div class="fixed top-4 left-4 right-4 flex justify-between items-center z-50 max-w-md mx-auto w-full px-2">
        <button onclick="exitToMenu()" id="back-btn" class="hidden bg-slate-900/95 border border-white/10 text-white px-4 py-2 rounded-full font-bold text-xs uppercase tracking-wider shadow-2xl transition-all">
            🚪 Map Hub
        </button>
        <div class="flex gap-2 ml-auto">
            <button onclick="toggleLanguage()" class="bg-amber-600 hover:bg-amber-500 text-white px-4 py-2 rounded-full font-bold text-xs uppercase shadow-md transition-all">
                🌐 <span id="lang-label">English</span>
            </button>
            <div id="gold-container" class="bg-slate-900/95 border border-white/10 px-4 py-2 rounded-full shadow-2xl flex items-center gap-2">
                <span>💰</span>
                <span id="gold-val" class="font-black text-amber-400">500</span>
            </div>
        </div>
    </div>

    <!-- PRIMARY SCREEN REAL ESTATE -->
    <main id="window-canvas" class="w-full max-w-md mt-16 relative z-10 space-y-4 flex flex-col mb-24"></main>

    <!-- INVENTORY HUB -->
    <div id="shop-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div class="glass-card w-full max-w-sm p-6 space-y-4 bg-slate-950/90">
            <div class="flex justify-between items-center border-b border-white/10 pb-3">
                <div class="flex items-center gap-2">
                    <span class="text-xl">🛒</span>
                    <h3 class="text-sm font-black uppercase tracking-wider text-amber-300">Purchase Supplies</h3>
                </div>
                <button onclick="closeShopModal()" class="text-slate-400 hover:text-white font-black text-sm bg-white/5 w-7 h-7 rounded-full flex items-center justify-center">✕</button>
            </div>
            <div id="modal-shop-grid" class="space-y-2 max-h-[360px] overflow-y-auto"></div>
        </div>
    </div>

    <button id="lobby-bag-btn" onclick="openShopModal()" class="fixed bottom-6 right-6 z-40 bg-gradient-to-tr from-amber-600 to-orange-600 border border-white/20 w-14 h-14 rounded-full flex items-center justify-center shadow-2xl text-2xl">
        🎒
    </button>

    <script src="questions.js"></script>
    <script>
        let state = JSON.parse(localStorage.getItem('bqArcadeV6Data')) || {
            gold: 500,
            lang: 'en',
            perks: { freeze: 2, half: 2, skip: 2, shield: 1, elixir: 2 },
            streak: 0
        };

        let currentCampaign = "";
        let levelIndex = 0;
        let activePool = [];
        let bookQuestions = [];
        let questionIndex = 0;
        let activeQuestion = null;
        let timerClockInterval = null;
        let secondsLeft = 0;
        let maxSeconds = 20;
        let isClockFrozen = false;
        let inputBlocked = false;
        let isShieldActive = false;
        
        let activityStep = 1; 
        const maxActivitySteps = 10;
        const weatherTypes = ['Sunny', 'Windy', 'Raining'];

        let audioCtx = null;

        function saveState() {
            localStorage.setItem('bqArcadeV6Data', JSON.stringify(state));
            document.getElementById('gold-val').innerText = state.gold;
        }

        function initAudioEngine() {
            if (audioCtx) return;
            try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
        }

        function playSoundFX(type) {
            initAudioEngine();
            if (!audioCtx || audioCtx.state === 'suspended') return;
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);

                if (type === 'correct') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                    osc.start(); osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); osc.stop(audioCtx.currentTime + 0.3);
                } else if (type === 'wrong') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                    osc.start(); osc.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.5); osc.stop(audioCtx.currentTime + 0.5);
                } else if (type === 'tick') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(700, audioCtx.currentTime); gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.03);
                }
            } catch(e){}
        }

        function triggerHUDMessage(text, TailwindColorClass) {
            const telemetry = document.getElementById('telemetry-box');
            if (!telemetry) return;
            telemetry.innerHTML = `<div class="animate__animated animate__bounceIn text-center text-xs font-black p-3 mx-4 rounded-xl bg-slate-950/95 border ${TailwindColorClass}">${text}</div>`;
            setTimeout(() => { if(telemetry) telemetry.innerHTML = ""; }, 2500);
        }

        function openShopModal() {
            const inventoryItems = [
                { id: 'freeze', name: 'Chrono Freeze', desc: 'Freezes time context.', cost: 50, icon: '❄️' },
                { id: 'half', name: 'Divine 50:50', desc: 'Discards two bad items.', cost: 75, icon: '⚖️' },
                { id: 'skip', name: 'Prophetic Skip', desc: 'Skips node completely.', cost: 100, icon: '🔮' },
                { id: 'shield', name: 'Aegis Shield', desc: 'Blocks sliding falls & deduction.', cost: 60, icon: '🛡️' },
                { id: 'elixir', name: 'Time Elixir', desc: 'Grants +10 seconds.', cost: 40, icon: '🧪' }
            ];

            const grid = document.getElementById('modal-shop-grid'); grid.innerHTML = "";
            inventoryItems.forEach(item => {
                const row = document.createElement('div');
                row.className = "flex items-center justify-between p-3 bg-slate-900/80 rounded-2xl border border-white/5";
                row.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="text-2xl bg-slate-950 p-2 rounded-xl">${item.icon}</span>
                        <div>
                            <h4 class="text-xs font-black text-slate-200">${item.name}</h4>
                            <p class="text-[9px] text-amber-400 font-black">Owned: ${state.perks[item.id] || 0}</p>
                        </div>
                    </div>
                    <button onclick="buyPerk('${item.id}', ${item.cost})" class="bg-amber-600 hover:bg-amber-500 font-bold text-xs px-3 py-1.5 rounded-xl text-white">${item.cost} 💰</button>
                `;
                grid.appendChild(row);
            });
            document.getElementById('shop-modal').classList.remove('hidden');
        }

        function closeShopModal() { document.getElementById('shop-modal').classList.add('hidden'); }

        function buyPerk(id, cost) {
            if (state.gold >= cost) {
                state.gold -= cost; state.perks[id] = (state.perks[id] || 0) + 1;
                saveState(); openShopModal();
            }
        }

        function renderMenuMap() {
            currentCampaign = "";
            document.getElementById('back-btn').classList.add('hidden');
            document.getElementById('lobby-bag-btn').classList.remove('hidden');
            stopSnowingEffect();
            
            const canvas = document.getElementById('window-canvas');
            canvas.innerHTML = `
                <div class="text-center space-y-1 animate__animated animate__fadeInDown">
                    <h1 class="text-4xl font-black bg-clip-text text-transparent bg-gradient-to-r from-yellow-400 via-orange-400 to-red-400">BIBLE QUEST</h1>
                    <p class="text-xs text-slate-500 font-bold tracking-widest uppercase">Select Diorama Horizon</p>
                </div>
                <div class="space-y-2.5 animate__animated animate__fadeInUp">
                    <button onclick="launchCampaign('nt')" class="w-full p-4 glass-card text-left flex justify-between items-center hover:border-amber-500 transition-all">
                        <div><h3 class="text-sm font-black text-amber-300">Phase 1: New Testament</h3><p class="text-[10px] text-slate-400">Gospels & Epistles Letters</p></div>
                        <span class="text-lg">🪜</span>
                    </button>
                    <button onclick="launchCampaign('ot')" class="w-full p-4 glass-card text-left flex justify-between items-center hover:border-orange-500 transition-all">
                        <div><h3 class="text-sm font-black text-orange-300">Phase 2: Old Testament</h3><p class="text-[10px] text-slate-400">Torah & Hebrew Chronicles</p></div>
                        <span class="text-lg">📜</span>
                    </button>
                </div>
            `;
        }

        function launchCampaign(mode) {
            initAudioEngine(); currentCampaign = mode; levelIndex = 0; state.streak = 0; activityStep = 1;
            document.getElementById('back-btn').classList.remove('hidden');
            document.getElementById('lobby-bag-btn').classList.add('hidden');
            
            if (mode === 'nt') activePool = quizDatabase.filter(b => b.group === 'NT');
            else activePool = quizDatabase.filter(b => b.group === 'OT');

            initNewBookTrack();
        }

        function initNewBookTrack() {
            if (levelIndex >= activePool.length) { renderVictoryScreen(); return; }
            const targetBook = activePool[levelIndex];
            bookQuestions = [...targetBook.questions].sort(() => Math.random() - 0.5);
            questionIndex = 0;
            loadQuestionNode();
        }

        function loadQuestionNode() {
            if (questionIndex >= bookQuestions.length) { levelIndex++; initNewBookTrack(); return; }

            inputBlocked = false; isShieldActive = false;
            document.getElementById('shield-frame').className = "";
            if (!isClockFrozen) {
                document.getElementById('frost-frame').className = "";
                stopSnowingEffect();
            }

            const targetBook = activePool[levelIndex];
            activeQuestion = bookQuestions[questionIndex];
            let tier = activeQuestion.subGroup || "Easy"; 

            maxSeconds = tier === "Difficult" ? 10 : tier === "Moderate" ? 15 : 20;
            if (!isClockFrozen) secondsLeft = maxSeconds;

            let tierColorClass = "bg-emerald-500";
            if (tier === "Moderate") tierColorClass = "bg-amber-500";
            else if (tier === "Difficult") tierColorClass = "bg-rose-500";

            let questionText = (state.lang === 'tw' && activeQuestion.q_twi) ? activeQuestion.q_twi : activeQuestion.q;
            let choicesArray = (state.lang === 'tw' && activeQuestion.a_tw) ? activeQuestion.a_tw : activeQuestion.a;
            let currentWeather = weatherTypes[questionIndex % weatherTypes.length];

            const canvas = document.getElementById('window-canvas');
            canvas.innerHTML = `
                <div class="w-full space-y-1">
                    <div class="flex justify-between items-center text-[10px] font-bold text-slate-400 px-1">
                        <span>🌦️ Environment: ${currentWeather}</span>
                        <span class="text-amber-400 font-extrabold tracking-wider">LADDER HEIGHT: ${activityStep}/10</span>
                    </div>
                    
                    <!-- 📻 MINIATURE DIORAMA VIEWPORT -->
                    <div id="stage-3d" class="viewport-diorama">
                        <div id="sky-backdrop" class="diorama-backdrop"></div>
                        <div id="weather-layer" class="absolute inset-0 z-20 pointer-events-none"></div>
                        
                        <!-- Isometric Clay Structures -->
                        <div class="clay-cliff">
                            <div class="clay-texture"></div>
                            <!-- Layered Decorative Steps -->
                            <div class="absolute top-10 left-2 w-8 h-8 bg-[#495d7a] rounded" style="transform: translateZ(10px);"></div>
                            <div class="absolute top-32 left-6 w-6 h-6 bg-[#1f2836] rounded" style="transform: translateZ(20px);"></div>
                        </div>
                        
                        <!-- Smooth Ladder Climbing Structure (Like the side scaffolding in Lumino City) -->
                        <div class="ladder-track"></div>

                        <div id="telemetry-box"></div>

                        <!-- CHARACTER DOLL ARMATURE -->
                        <div id="actor-token" class="character-node state-climbing">
                            <div class="clay-doll">
                                <div class="doll-cap"></div>
                                <div class="doll-head"></div>
                                <div class="doll-torso"></div>
                                <div class="doll-limb doll-arm-l"></div>
                                <div class="doll-limb doll-arm-r"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="glass-card p-4 space-y-3 flex flex-col animate__animated animate__fadeIn">
                    <div class="flex justify-between items-center">
                        <div>
                            <h2 class="text-lg font-black text-slate-100 tracking-wide">${targetBook.name}</h2>
                            <span class="text-[9px] uppercase px-2 py-0.5 rounded font-black bg-slate-950 text-slate-400 mt-1 inline-block">${tier}</span>
                        </div>
                        <div id="clock-wrapper" class="text-2xl font-black tracking-tighter tabular-nums text-amber-400 bg-slate-950/70 px-3 py-1.5 rounded-2xl border border-white/10">
                            ⏰ <span id="clock-digit">${secondsLeft}</span>s
                        </div>
                    </div>
                    <div class="w-full bg-slate-950/60 h-2 rounded-full overflow-hidden p-0.5 border border-white/5">
                        <div id="bar-fill" class="h-full rounded-full ${tierColorClass}" style="width: ${(secondsLeft/maxSeconds)*100}%; transition: width 1s linear;"></div>
                    </div>
                </div>

                <div class="glass-card p-6 min-h-[10px] flex items-center justify-center text-center">
                    <h3 class="text-md font-bold leading-snug text-slate-100">${questionText}</h3>
                </div>

                <div id="choice-matrix" class="space-y-2.5"></div>

                <div class="fixed bottom-0 left-0 right-0 p-3 bg-slate-950/95 border-t border-white/10 z-40 flex justify-center gap-2">
                    <button onclick="triggerInGamePerk('freeze')" class="flex-1 bg-slate-900 border border-sky-500/30 p-2 rounded-xl flex flex-col items-center">
                        <span class="text-base">❄️</span>
                        <span class="text-[9px] text-slate-400 font-bold">Qty: ${state.perks.freeze}</span>
                    </button>
                    <button onclick="triggerInGamePerk('half')" class="flex-1 bg-slate-900 border border-rose-500/30 p-2 rounded-xl flex flex-col items-center">
                        <span class="text-base">⚖️</span>
                        <span class="text-[9px] text-slate-400 font-bold">Qty: ${state.perks.half}</span>
                    </button>
                    <button onclick="triggerInGamePerk('skip')" class="flex-1 bg-slate-900 border border-purple-500/30 p-2 rounded-xl flex flex-col items-center">
                        <span class="text-base">🔮</span>
                        <span class="text-[9px] text-slate-400 font-bold">Qty: ${state.perks.skip}</span>
                    </button>
                    <button onclick="triggerInGamePerk('shield')" class="flex-1 bg-slate-900 border border-amber-500/30 p-2 rounded-xl flex flex-col items-center">
                        <span class="text-base">🛡️</span>
                        <span class="text-[9px] text-slate-400 font-bold">Qty: ${state.perks.shield}</span>
                    </button>
                    <button onclick="triggerInGamePerk('elixir')" class="flex-1 bg-slate-900 border border-emerald-500/30 p-2 rounded-xl flex flex-col items-center">
                        <span class="text-base">🧪</span>
                        <span class="text-[9px] text-slate-400 font-bold">Qty: ${state.perks.elixir}</span>
                    </button>
                </div>
            `;

            updateDioramaAtmosphere(currentWeather);

            const matrix = document.getElementById('choice-matrix');
            choicesArray.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "btn-choice";
                btn.innerText = opt;
                btn.onclick = () => evaluateAnswer(idx, btn);
                matrix.appendChild(btn);
            });

            if (isClockFrozen) {
                const clk = document.getElementById('clock-wrapper');
                if (clk) clk.className = "text-2xl font-black bg-sky-950 text-sky-400 px-3 py-1.5 rounded-2xl border border-sky-400";
            }

            runCountdownLoop();
        }

        // 🎨 CINEMATIC LIGHTING & ATMOSPHERE ENGINE
        function updateDioramaAtmosphere(weather) {
            const backdrop = document.getElementById('sky-backdrop');
            const actor = document.getElementById('actor-token');
            const wLayer = document.getElementById('weather-layer');

            // Soft lighting gradients matching sunset/sunrise transition curves
            if (activityStep <= 3) {
                backdrop.style.background = "linear-gradient(to bottom, #f59e0b, #d97706, #2e1065)"; // Warm Cozy Sunrise
            } else if (activityStep <= 7) {
                backdrop.style.background = "linear-gradient(to bottom, #38bdf8, #bae6fd, #0f172a)"; // Vibrant Clay Daylight
            } else {
                backdrop.style.background = "linear-gradient(to bottom, #4c1d95, #701a75, #030712)"; // Soft Craft Sunset
            }

            // Procedural depth cloud cards
            backdrop.innerHTML = `
                <div class="puff-cloud w-20 h-7 top-4" style="animation-delay: 0s;"></div>
                <div class="puff-cloud w-28 h-9 top-16" style="animation-delay: -10s;"></div>
            `;

            wLayer.innerHTML = "";
            if (weather === 'Raining') {
                for(let i=0; i<12; i++) {
                    const r = document.createElement('div'); r.className = "rain-streak";
                    r.style.left = `${Math.random() * 100}%`; r.style.animationDuration = `${Math.random() * 0.3 + 0.3}s`;
                    wLayer.appendChild(r);
                }
            }

            // Position dolly seamlessly up the ladder track
            let progress = (activityStep - 1) / (maxActivitySteps - 1);
            actor.style.right = "83px";
            actor.style.bottom = `${10 + (progress * 150)}px`;
        }

        function runCountdownLoop() {
            clearInterval(timerClockInterval);
            timerClockInterval = setInterval(() => {
                if (isClockFrozen || inputBlocked) return;
                secondsLeft--;
                
                const digit = document.getElementById('clock-digit'); if (digit) digit.innerText = secondsLeft;
                const fill = document.getElementById('bar-fill'); if (fill) fill.style.width = `${(secondsLeft / maxSeconds) * 100}%`;

                if (secondsLeft <= 2) {
                    playSoundFX('tick');
                    const wrap = document.getElementById('clock-wrapper'); if (wrap) wrap.classList.add('alarm-on');
                }
                if (secondsLeft <= 0) { clearInterval(timerClockInterval); handleFailurePenalty(); }
            }, 1000);
        }

        function triggerInGamePerk(id) {
            if (state.perks[id] <= 0 || inputBlocked) return;
            state.perks[id]--; saveState();

            if (id === 'freeze') {
                isClockFrozen = true;
                document.getElementById('frost-frame').classList.add('frost-active');
                startSnowingEffect();
            } else if (id === 'half') {
                const buttons = document.getElementById('choice-matrix').getElementsByTagName('button');
                let wrongs = []; for(let i=0; i<buttons.length; i++) { if (i !== activeQuestion.correct) wrongs.push(i); }
                wrongs.sort(() => Math.random() - 0.5).slice(0, 2).forEach(idx => {
                    buttons[idx].style.opacity = "0.2"; buttons[idx].style.pointerEvents = "none";
                });
            } else if (id === 'skip') { questionIndex++; } 
            else if (id === 'shield') {
                isShieldActive = true; document.getElementById('shield-frame').classList.add('shield-active');
            } else if (id === 'elixir') { secondsLeft = Math.min(maxSeconds, secondsLeft + 10); }

            loadQuestionNode(); 
        }

        function startSnowingEffect() {
            const box = document.getElementById('snow-box'); box.innerHTML = "";
            for(let i=0; i<20; i++) {
                const snow = document.createElement('div'); snow.className = "snowflake"; snow.innerText = "❄️";
                snow.style.left = `${Math.random() * 100}%`; snow.style.animationDuration = `${Math.random() * 2 + 2}s`;
                box.appendChild(snow);
            }
        }
        function stopSnowingEffect() { document.getElementById('snow-box').innerHTML = ""; }

        function evaluateAnswer(selectedIdx, clickedElement) {
            if (inputBlocked) return; inputBlocked = true; clearInterval(timerClockInterval);

            if (selectedIdx === activeQuestion.correct) {
                clickedElement.className = "btn-choice rainbow-correct";
                playSoundFX('correct');
                
                state.gold += 15; state.streak++; activityStep++; saveState();

                if (activityStep > maxActivitySteps) {
                    activityStep = 1; state.gold += 100; saveState();
                    triggerHUDMessage("👑 HIGHEST PLATFORM REACHED! +100 COINS!", "text-amber-400 border-amber-500 bg-amber-950/90");
                }
                questionIndex++; 
                setTimeout(loadQuestionNode, 1200);
            } else {
                clickedElement.className = "btn-choice bg-rose-600 border-rose-400 text-white animate__animated animate__shakeX";
                playSoundFX('wrong');
                
                // Triggers structural fall animation sequence immediately
                const actor = document.getElementById('actor-token');
                if (actor) actor.className = "character-node state-falling";
                
                setTimeout(handleFailurePenalty, 1100);
            }
        }

        function handleFailurePenalty() {
            clearInterval(timerClockInterval);
            state.streak = 0; isClockFrozen = false;
            activityStep = Math.max(1, activityStep - 2);

            if (isShieldActive) { 
                triggerHUDMessage("🛡️ SHIELD TRIGGERED: POSITION PROTECTED!", "text-amber-500 border-amber-500 bg-slate-900/90");
            } else {
                state.gold = Math.max(0, state.gold - 20); saveState();
                triggerHUDMessage("❌ LOST GRIP! SLID BACKWARD DOWN THE TRACK!", "text-rose-400 border-rose-600 bg-rose-950/90");
            }

            const targetBook = activePool[levelIndex];
            bookQuestions = [...targetBook.questions].sort(() => Math.random() - 0.5);
            questionIndex = 0; 
            setTimeout(loadQuestionNode, 1400);
        }

        function renderVictoryScreen() {
            stopSnowingEffect();
            document.getElementById('window-canvas').innerHTML = `
                <div class="glass-card p-8 text-center space-y-4">
                    <h1 class="text-2xl font-black text-amber-400">🏆 JOURNEY COMPLETE</h1>
                    <button onclick="exitToMenu()" class="w-full bg-amber-600 p-3 rounded-xl font-bold text-xs uppercase">Return to Hub</button>
                </div>
            `;
        }

        function toggleLanguage() {
            state.lang = state.lang === 'en' ? 'tw' : 'en'; saveState();
            document.getElementById('lang-label').innerText = state.lang === 'en' ? "English" : "Twi";
            if (currentCampaign !== "") loadQuestionNode(); else renderMenuMap();
        }

        function exitToMenu() { clearInterval(timerClockInterval); isClockFrozen = false; renderMenuMap(); }
        window.onload = () => { saveState(); renderMenuMap(); };
    </script>
</body>
</html>
