<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Quest 200</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #bg-overlay { position: fixed; inset: 0; background-color: #0f172a; background-size: cover; background-position: center; transition: background-image 1s; z-index: 0; }
        #bg-tint { position: fixed; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0.6), rgba(0,0,0,0.9)); z-index: 1; }
        body { min-height: 100vh; background: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .quiz-card { background: rgba(255, 255, 255, 0.98); border-radius: 24px; color: #1e293b; position: relative; z-index: 10; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); }
        .btn-opt { width: 100%; text-align: left; padding: 1.2rem; border-radius: 16px; border: 2px solid #f1f5f9; background: white; font-weight: 600; transition: all 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .btn-opt:active { transform: scale(0.97); }
        
        #level-up-splash {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; opacity: 0; pointer-events: none; transition: 0.6s;
        }
        #level-up-splash.active { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body class="p-4">
    <div id="bg-overlay"></div>
    <div id="bg-tint"></div>

    <div id="level-up-splash">
        <div class="text-center p-8">
            <div class="text-7xl mb-4">🏆</div>
            <h1 class="text-5xl font-black text-amber-400 uppercase italic">Victory!</h1>
            <p id="next-world-txt" class="text-indigo-200 mt-2 font-bold tracking-widest">ADVANCING TO NEXT CHAPTER</p>
        </div>
    </div>

    <div class="fixed top-4 right-4 z-50">
        <button onclick="toggleAmbient()" id="audio-toggle" class="bg-white/10 backdrop-blur-md border border-white/20 px-4 py-2 rounded-full text-xs font-bold">
            🔇 Angelic Sound: Off
        </button>
    </div>

    <div class="max-w-md mx-auto mt-16 relative z-10 space-y-6">
        <div class="quiz-card p-6">
            <div class="flex justify-between items-center mb-4">
                <span id="world-title" class="text-indigo-600 font-black text-xs uppercase tracking-tighter">Bible Quest</span>
                <span class="bg-amber-100 text-amber-700 px-3 py-1 rounded-full text-xs font-bold">💰 <span id="gold-val">0</span></span>
            </div>
            <div class="w-full bg-slate-200 h-2 rounded-full overflow-hidden">
                <div id="xp-bar" class="bg-indigo-500 h-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <div id="quiz-container"></div>
    </div>

    <script>
        // --- SYNTHETIC AUDIO ENGINE ---
        let ctx = null;
        let ambient = null;
        let isMuted = true;

        function initAudio() { if(!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); }

        function toggleAmbient() {
            initAudio();
            const btn = document.getElementById('audio-toggle');
            if(isMuted) {
                ambient = ctx.createGain();
                const osc = ctx.createOscillator();
                const lfo = ctx.createOscillator();
                const lfoGain = ctx.createGain();

                osc.type = 'triangle';
                osc.frequency.value = 110; // Deep meditative A
                
                lfo.frequency.value = 0.5; // Angelic "wavering" effect
                lfoGain.gain.value = 2;

                lfo.connect(lfoGain);
                lfoGain.connect(osc.frequency);
                osc.connect(ambient);
                ambient.connect(ctx.destination);
                
                ambient.gain.setValueAtTime(0, ctx.currentTime);
                ambient.gain.linearRampToValueAtTime(0.1, ctx.currentTime + 2);
                
                osc.start(); lfo.start();
                btn.innerText = "😇 Angelic Sound: On";
                isMuted = false;
            } else {
                ambient.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.5);
                isMuted = true;
                btn.innerText = "🔇 Angelic Sound: Off";
            }
        }

        function playSound(type) {
            if(!ctx || isMuted) return;
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            const now = ctx.currentTime;
            osc.connect(g); g.connect(ctx.destination);

            if(type === 'correct') {
                osc.frequency.setValueAtTime(523, now); // C5
                osc.frequency.exponentialRampToValueAtTime(1046, now + 0.2); // C6
                g.gain.setValueAtTime(0.1, now);
                g.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(); osc.stop(now + 0.3);
            } else if(type === 'wrong') {
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.linearRampToValueAtTime(50, now + 0.3);
                g.gain.setValueAtTime(0.1, now);
                g.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(); osc.stop(now + 0.3);
            } else { // Victory
                [440, 554, 659, 880].forEach((f, i) => {
                    const o = ctx.createOscillator();
                    const gn = ctx.createGain();
                    o.connect(gn); gn.connect(ctx.destination);
                    o.frequency.value = f;
                    gn.gain.setValueAtTime(0.1, now + (i*0.1));
                    gn.gain.exponentialRampToValueAtTime(0.01, now + 0.5 + (i*0.1));
                    o.start(now + (i*0.1)); o.stop(now + 0.6 + (i*0.1));
                });
            }
        }

        // --- DATABASE (EXPANDABLE TO 200) ---
        const bibleData = [
            {
                lvl: 1, title: "The Beginning", img: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b",
                q: [
                    {q: "Who was the first man?", a: ["Noah","Adam","Moses","Paul"], c: 1},
                    {q: "How many days did God take to create the world?", a: ["7","6","10","3"], c: 1},
                    {q: "Who was Adam's wife?", a: ["Sarah","Ruth","Eve","Esther"], c: 2},
                    {q: "What was the first thing God created?", a: ["Animals","Man","Light","Trees"], c: 2},
                    {q: "Who killed Abel?", a: ["Seth","Cain","Enoch","Lamech"], c: 1}
                ]
            },
            {
                lvl: 2, title: "Noah's Faith", img: "https://images.unsplash.com/photo-1433086966358-54859d0ed716",
                q: [
                    {q: "What did Noah build?", a: ["A Temple","A Wall","An Ark","A Palace"], c: 2},
                    {q: "How many of each clean animal entered the Ark?", a: ["2","7","12","1"], c: 1},
                    {q: "How long did it rain during the flood?", a: ["40 Days","12 Days","1 Year","7 Days"], c: 0},
                    {q: "What bird returned with an olive leaf?", a: ["Raven","Eagle","Dove","Sparrow"], c: 2},
                    {q: "What sign did God give to never flood the earth again?", a: ["A Cloud","A Rainbow","A Star","A Pillar"], c: 1}
                ]
            }
            // Add more levels here to reach 200 questions!
        ];

        let state = JSON.parse(localStorage.getItem('bq200')) || { lvl: 1, idx: 0, gold: 0 };

        function render() {
            const level = bibleData.find(d => d.lvl === state.lvl);
            if(!level) {
                document.getElementById('quiz-container').innerHTML = "<div class='quiz-card p-8 text-center font-bold'>The Quest is Complete! 🏆</div>";
                return;
            }

            document.getElementById('bg-overlay').style.backgroundImage = `url(${level.img})`;
            document.getElementById('world-title').innerText = level.title;
            document.getElementById('gold-val').innerText = state.gold;
            document.getElementById('xp-bar').style.width = (state.idx / level.q.length) * 100 + "%";

            const current = level.q[state.idx];
            let html = `<div class="quiz-card p-6 animate-fade-in">
                <h2 class="text-xl font-bold mb-6">${current.q}</h2>
                <div class="space-y-3">`;
            
            current.a.forEach((opt, i) => {
                html += `<button onclick="check(${i})" class="btn-opt"><span>${opt}</span></button>`;
            });

            html += `</div></div>`;
            document.getElementById('quiz-container').innerHTML = html;
        }

        window.check = function(choice) {
            const level = bibleData.find(d => d.lvl === state.lvl);
            if(choice === level.q[state.idx].c) {
                playSound('correct');
                state.gold += 10;
                state.idx++;
                if(state.idx >= level.q.length) {
                    state.lvl++;
                    state.idx = 0;
                    showVictory();
                }
            } else {
                playSound('wrong');
                alert("Try again, seeker!");
            }
            save();
            render();
        };

        function showVictory() {
            playSound('victory');
            const s = document.getElementById('level-up-splash');
            s.classList.add('active');
            setTimeout(() => s.classList.remove('active'), 3000);
        }

        function save() { localStorage.setItem('bq200', JSON.stringify(state)); }
        render();
    </script>
</body>
</html>
