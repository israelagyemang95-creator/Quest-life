<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body class="bg-slate-900 text-white font-sans p-6">

  <div class="max-w-md mx-auto space-y-6">
    
    <header class="text-center space-y-2">
      <h1 data-i18n="mapHub" class="text-3xl font-bold tracking-wide text-blue-400"></h1>
      <p data-i18n="subtitle" class="text-sm text-slate-400"></p>
    </header>

    <div class="flex justify-center my-4">
      <button class="flex items-center justify-center shadow-2xl text-xl hover:scale-110 active:scale-95 transition-all animate__animated animate__pulse animate__infinite bg-amber-500 p-4 rounded-full cursor-pointer">
        🍓 <span data-i18n="launchWheel" class="ml-2 text-sm font-semibold text-slate-900 hidden"></span>
      </button>
    </div>

    <main class="space-y-4">
      <div class="p-4 bg-slate-800/80 rounded-xl border border-slate-700 backdrop-blur-md">
        <h2 data-i18n="phase1Title" class="text-lg font-bold text-emerald-400"></h2>
        <p data-i18n="phase1Desc" class="text-sm text-slate-300 mt-1"></p>
      </div>

      <div class="p-4 bg-slate-800/80 rounded-xl border border-slate-700 backdrop-blur-md">
        <h2 data-i18n="phase2Title" class="text-lg font-bold text-emerald-400"></h2>
        <p data-i18n="phase2Desc" class="text-sm text-slate-300 mt-1"></p>
      </div>

      <div class="p-4 bg-slate-800/80 rounded-xl border border-slate-700 backdrop-blur-md">
        <h2 data-i18n="phase3Title" class="text-lg font-bold text-emerald-400"></h2>
        <p data-i18n="phase3Desc" class="text-sm text-slate-300 mt-1"></p>
      </div>

      <div class="p-4 bg-slate-800/80 rounded-xl border border-slate-700 backdrop-blur-md">
        <h2 data-i18n="phase4Title" class="text-lg font-bold text-amber-400"></h2>
        <p data-i18n="phase4Desc" class="text-sm text-slate-300 mt-1"></p>
      </div>

      <div class="p-4 bg-slate-800/80 rounded-xl border border-slate-700 backdrop-blur-md">
        <h2 data-i18n="phase5Title" class="text-lg font-bold text-rose-400"></h2>
        <p data-i18n="phase5Desc" class="text-sm text-slate-300 mt-1"></p>
      </div>

      <div class="p-4 bg-slate-800/80 rounded-xl border border-slate-700 backdrop-blur-md">
        <h2 data-i18n="phase6Title" class="text-lg font-bold text-purple-400"></h2>
        <p data-i18n="phase6Desc" class="text-sm text-slate-300 mt-1"></p>
      </div>
    </main>

    <section class="bg-slate-950 p-4 rounded-xl border border-slate-800 space-y-3">
      <h3 data-i18n="viewTasks" class="text-xs font-semibold tracking-wider text-slate-500 uppercase"></h3>
      <div id="tasks-list" class="space-y-2 text-sm">
        </div>
    </section>

  </div>

  <script>
    // System Localization Registry System Database
    const i18nRegistry = {
      en: {
        mapHub: "Map Hub",
        viewTasks: "View Sectors Task Explorer",
        launchWheel: "Launch Prophetic Reward Wheel",
        startSpin: "START PROPHETIC SPIN",
        armoryTitle: "Armory Depot",
        continueBtn: "CONTINUE PROCEEDING",
        subtitle: "Tap a Phase Card to Explore",
        
        phase1Title: "Phase 1: New Testament",
        phase1Desc: "Explore the Gospels and Epistles",
        
        phase2Title: "Phase 2: Old Testament",
        phase2Desc: "Continuous Covenant Law Pools",
        
        phase3Title: "Phase 3: Grand Mixture Pool",
        phase3Desc: "Randomized Across All Scriptural Cards",
        
        phase4Title: "Phase 4: E.G. White Chronicles",
        phase4Desc: "Prophetic Heritage Insight Pools",
        
        phase5Title: "Phase 5: Mastery Blitz Mode",
        phase5Desc: "5-Second Extreme Rapid Fire Speed Clock",
        
        phase6Title: "Phase 6: Adventist Teachings",
        phase6Desc: "The 28 Fundamental Sanctuary & Prophetic Beliefs",
        
        // Fixed target strings
        task1: "Answer {target} questions across any stage",
        task2: "Maintain a win streak of {target}"
      }
    };

    /**
     * Translates standard static UI elements matching data-i18n attributes
     */
    function initStaticLocalization(lang = 'en') {
      const strings = i18nRegistry[lang];
      if (!strings) return;

      document.querySelectorAll('[data-i18n]').forEach(element => {
        const key = element.getAttribute('data-i18n');
        if (strings[key]) {
          element.textContent = strings[key];
        }
      });
    }

    /**
     * Handles dynamic templates containing local variables like {target}
     */
    function getTranslatedTask(taskKey, targetValue, lang = 'en') {
      const template = i18nRegistry[lang]?.[taskKey];
      return template ? template.replace('{target}', targetValue) : '';
    }

    /**
     * Renders tasks dynamically into the task container
     */
    function renderTasks() {
      const container = document.getElementById('tasks-list');
      if (!container) return;

      // Mock data for game states
      const activeTasks = [
        { key: 'task1', target: '10' },
        { key: 'task2', target: '5' }
      ];

      container.innerHTML = activeTasks.map(task => `
        <div class="flex items-center space-x-2 bg-slate-900 p-2 rounded border border-slate-800">
          <input type="checkbox" class="accent-emerald-500 rounded">
          <span>${getTranslatedTask(task.key, task.target, 'en')}</span>
        </div>
      `).join('');
    }

    // Initialize application on window load
    document.addEventListener('DOMContentLoaded', () => {
      initStaticLocalization('en');
      renderTasks();
    });
  </script>
</body>
</html>
