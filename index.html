<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Quest: Arcade Horizon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        #bg-overlay { position: fixed; inset: 0; background-color: #040712; z-index: 0; }
        #bg-tint { position: fixed; inset: 0; background: radial-gradient(circle at center, rgba(15, 23, 42, 0.45) 0%, rgba(2, 4, 10, 0.99) 100%); z-index: 1; }
        .glass-card { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; color: white; }
        
        .btn-choice { width: 100%; text-align: left; padding: 1.1rem 1.4rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.07); background: rgba(255,255,255,0.03); font-weight: 600; color: #f1f5f9; transition: all 0.2s ease; position: relative; }
        
        /* 🌈 LIQUID AURORA CORRECT GLOW PATHWAY */
        @keyframes auroraFlow {
            0% { background-position: 0% 50%; filter: hue-rotate(0deg); }
            50% { background-position: 100% 50%; filter: hue-rotate(180deg); }
            100% { background-position: 0% 50%; filter: hue-rotate(360deg); }
        }
        .rainbow-correct { 
            background: linear-gradient(45deg, #ff007f, #7f00ff, #00f0ff, #00ff7f, #ffeb00) !important;
            background-size: 300% 300% !important;
            animation: auroraFlow 4s ease infinite !important;
            border-color: transparent !important;
            color: #ffffff !important;
            font-weight: 900 !important;
            text-shadow: 0 2px 4px rgba(0,0,0,0.7);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4) !important;
        }

        /* ❄️ FULL-SCREEN DISTRIBUTED FREEZER PHYSICS */
        #frost-frame { position: fixed; inset: 0; border: 14px solid rgba(56, 189, 248, 0.45); pointer-events: none; opacity: 0; transition: opacity 0.3s ease; z-index: 40; box-shadow: inset 0 0 80px rgba(14, 165, 233, 0.35); }
        .frost-active { opacity: 1 !important; }
        .snowflake { position: fixed; top: -5%; color: #e0f2fe; pointer-events: none; z-index: 45; animation: fall linear infinite; filter: drop-shadow(0 0 4px rgba(255,255,255,0.5)); }
        @keyframes fall {
            0% { top: -5%; transform: translateX(0) rotate(0deg); }
            50% { transform: translateX(30px) rotate(180deg); }
            100% { top: 105%; transform: translateX(-15px) rotate(360deg); }
        }

        /* 🏔️ DYNAMIC HIGH-LEVEL 2D ENVIRONMENT VIEWPORT */
        .biome-viewport { position: relative; width: 100%; height: 140px; border-radius: 24px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); background: #090d1a; box-shadow: inset 0 0 30px rgba(0,0,0,0.8); }
        
        /* 🏃 ADVANCED 2D SPRITE STRUCTURAL KINEMATICS */
        .sprite-2d { position: relative; width: 32px; height: 48px; }
        .sprite-head { position: absolute; top: 0; left: 8px; width: 14px; height: 14px; background: #ffdbb5; border-radius: 50%; box-shadow: inset -2px -2px 0 rgba(0,0,0,0.15); }
        .sprite-body { position: absolute; top: 13px; left: 7px; width: 16px; height: 20px; background: #3b82f6; border-radius: 4px; }
        .sprite-limb { position: absolute; background: #334155; transform-origin: top center; border-radius: 3px; }
        
        /* Arm and Leg Layout Mapping */
        .arm-l { top: 14px; left: 4px; width: 5px; height: 15px; background: #2563eb; }
        .arm-r { top: 14px; left: 21px; width: 5px; height: 15px; background: #1d4ed8; }
        .leg-l { top: 32px; left: 8px; width: 6px; height: 16px; background: #1e293b; }
        .leg-r { top: 32px; left: 16px; width: 6px; height: 16px; background: #0f172a; }

        /* 🔄 MULTI-AXIS KINEMATIC MOTION KEYFRAMES */
        @keyframes climbCycle {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            25% { transform: translateY(-4px); .arm-l { transform: rotate(-110deg); } .leg-r { transform: rotate(30deg); } }
            50% { transform: translateY(-2px) rotate(5deg); }
            75% { transform: translateY(-5px); .arm-r { transform: rotate(-110deg); } .leg-l { transform: rotate(30deg); } }
        }
        @keyframes rowCycle {
            0%, 100% { transform: rotate(5deg); }
            50% { transform: translate(-6px, 2px) rotate(-15deg); }
        }
        @keyframes runCycle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* Sub-limb Cyclic Rotation Chains */
        @keyframes armClimbL { 0%, 100% { transform: rotate(40deg); } 50% { transform: rotate(-80deg); } }
        @keyframes armClimbR { 0%, 100% { transform: rotate(-80deg); } 50% { transform: rotate(40deg); } }
        @keyframes legClimbL { 0%, 100% { transform: rotate(-30deg); } 50% { transform: rotate(20deg); } }
        @keyframes legClimbR { 0%, 100% { transform: rotate(20deg); } 50% { transform: rotate(-30deg); } }

        @keyframes armRow { 0%, 100% { transform: rotate(-60deg); } 50% { transform: rotate(40deg); } }
        @keyframes legRow { 0%, 100% { transform: rotate(15deg); } 50% { transform: rotate(-15deg); } }

        @keyframes armRunL { 0%, 100% { transform: rotate(-50deg); } 50% { transform: rotate(60deg); } }
        @keyframes armRunR { 0%, 100% { transform: rotate(60deg); } 50% { transform: rotate(-50deg); } }
        @keyframes legRunL { 0%, 100% { transform: rotate(50deg); } 50% { transform: rotate(-60deg); } }
        @keyframes legRunR { 0%, 100% { transform: rotate(-60deg); } 50% { transform: rotate(50deg); } }

        /* Activating Bone Animation States */
        .animate-climb { animation: climbCycle 0.8s infinite linear; .arm-l { animation: armClimbL 0.8s infinite linear; } .arm-r { animation: armClimbR 0.8s infinite linear; } .leg-l { animation: legClimbL 0.8s infinite linear; } .leg-r { animation: legClimbR 0.8s infinite linear; } }
        .animate-row { animation: rowCycle 1.2s infinite ease-in-out; .arm-l, .arm-r { animation: armRow 1.2s infinite ease-in-out; background: #b45309; } .leg-l, .leg-r { animation: legRow 1.2s infinite ease-in-out; } }
        .animate-run { animation: runCycle 0.5s infinite linear; .arm-l { animation: armRunL 0.5s infinite linear; } .arm-r { animation: armRunR 0.5s infinite linear; } .leg-l { animation: legRunL 0.5s infinite linear; } .leg-r { animation: legRunR 0.5s infinite linear; } }

        /* 🌧️ WEATHER SYSTEMS */
        .rain-drop { position: absolute; background: linear-gradient(transparent, #38bdf8); width: 1.5px; height: 16px; opacity: 0.6; animation: rainFall 0.5s linear infinite; }
        @keyframes rainFall { 0% { top: -20%; } 100% { top: 120%; } }
        .wind-streak { position: absolute; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); height: 2px; width: 80px; animation: windBlow 0.8s linear infinite; }
        @keyframes windBlow { 0% { left: -90px; } 100% { left: 110%; } }
        .sun-ray { position: absolute; inset: 0; background: radial-gradient(circle at top right, rgba(251,191,36,0.15) 0%, transparent 70%); animation: solarPulse 4s ease-in-out infinite; }
        @keyframes solarPulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

        /* 🛑 OVERLAY TELEMETRY NOTIFICATION LAYER (Replaces native alert popups) */
        #telemetry-layer { position: absolute; inset: 0; z-index: 35; pointer-events: none; display: flex; items: center; justify-content: center; font-weight: 900; text-transform: uppercase; text-shadow: 0 3px 6px rgba(0,0,0,0.9); }

        #shield-frame { position: fixed; inset: 0; border: 12px solid rgba(245, 158, 11, 0.5); pointer-events: none; opacity: 0; transition: opacity 0.3s ease; z-index: 40; box-shadow: inset 0 0 60px rgba(245, 158, 11, 0.25); }
        .shield-active { opacity: 1 !important; }
        @keyframes clockPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.06); border-color: #ef4444; color: #ef4444; background: rgba(239, 68, 68, 0.1); } }
        .alarm-on { animation: clockPulse 0.5s infinite; }
    </style>
</head>
<body class="p-4 min-h-screen flex flex-col items-center justify-start text-white overflow-x-hidden font-sans select-none">
    
    <div id="bg-overlay"></div>
    <div id="bg-tint"></div>

    <!-- Global FX Overlays -->
    <div id="frost-frame"></div>
    <div id="shield-frame"></div>
    <div id="snow-box"></div>

    <!-- Navigation Header HUD Row -->
    <div class="fixed top-4 left-4 right-4 flex justify-between items-center z-50 max-w-md mx-auto w-full px-2">
        <button onclick="exitToMenu()" id="back-btn" class="hidden bg-slate-900/95 border border-white/10 text-white px-4 py-2 rounded-full font-bold text-xs uppercase tracking-wider shadow-2xl transition-all">
            🚪 Map Hub
        </button>
        <div class="flex gap-2 ml-auto">
            <button onclick="toggleLanguage()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-full font-bold text-xs uppercase shadow-md transition-all">
                🌐 <span id="lang-label">English</span>
            </button>
            <div id="gold-container" class="bg-slate-900/95 border border-white/10 px-4 py-2 rounded-full shadow-2xl flex items-center gap-2">
                <span>💰</span>
                <span id="gold-val" class="font-black text-amber-400">500</span>
            </div>
        </div>
    </div>

    <!-- MAIN ACTIVE VIEW CANVAS -->
    <main id="window-canvas" class="w-full max-w-md mt-16 relative z-10 space-y-4 flex flex-col mb-24"></main>

    <!-- SHOP LOBBY INVENTORY MODAL SUPPLIES -->
    <div id="shop-modal" class="fixed inset-0 bg-black/85 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div class="glass-card w-full max-w-sm p-6 space-y-4 border-indigo-500/30 bg-slate-950/80">
            <div class="flex justify-between items-center border-b border-white/10 pb-3">
                <div class="flex items-center gap-2">
                    <span class="text-xl">🛒</span>
                    <h3 class="text-sm font-black uppercase tracking-wider text-indigo-300">Purchase Armory Supplies</h3>
                </div>
                <button onclick="closeShopModal()" class="text-slate-400 hover:text-white font-black text-sm bg-white/5 w-7 h-7 rounded-full flex items-center justify-center">✕</button>
            </div>
            <div id="modal-shop-grid" class="space-y-2 max-h-[360px] overflow-y-auto"></div>
        </div>
    </div>

    <!-- LOBBY INVENTORY TRIGGER BAG -->
    <button id="lobby-bag-btn" onclick="openShopModal()" class="fixed bottom-6 right-6 z-40 bg-gradient-to-tr from-indigo-600 to-purple-600 border border-white/20 w-14 h-14 rounded-full flex items-center justify-center shadow-2xl text-2xl animate__animated animate__pulse animate__infinite">
        🎒
    </button>

    <script src="questions.js"></script>
    <script>
        let state = JSON.parse(localStorage.getItem('bqArcadeV6Data')) || {
            gold: 500,
            lang: 'en',
            perks: { freeze: 2, half: 2, skip: 2, shield: 1, elixir: 2 },
            streak: 0
        };

        let currentCampaign = "";
        let levelIndex = 0;
        let activePool = [];
        let bookQuestions = [];
        let questionIndex = 0;
        let activeQuestion = null;
        let timerClockInterval = null;
        let secondsLeft = 0;
        let maxSeconds = 20;
        let isClockFrozen = false;
        let inputBlocked = false;
        let isShieldActive = false;
        
        let activityStep = 1; 
        const maxActivitySteps = 10;
        const weatherTypes = ['Sunny', 'Windy', 'Raining'];
        const activityTypes = ['Mountain Climb', 'River Rowing', 'Desert Marathon'];

        let audioCtx = null;

        function saveState() {
            localStorage.setItem('bqArcadeV6Data', JSON.stringify(state));
            document.getElementById('gold-val').innerText = state.gold;
        }

        function initAudioEngine() {
            if (audioCtx) return;
            try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
        }

        function playSoundFX(type) {
            initAudioEngine();
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);

                if (type === 'correct') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                    osc.start(); osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2);
                    osc.stop(audioCtx.currentTime + 0.35);
                } else if (type === 'wrong') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(130, audioCtx.currentTime); gain.gain.setValueAtTime(0.07, audioCtx.currentTime);
                    osc.start(); osc.frequency.linearRampToValueAtTime(65, audioCtx.currentTime + 0.25); osc.stop(audioCtx.currentTime + 0.3);
                } else if (type === 'perk') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(400, audioCtx.currentTime); gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                    osc.start(); osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.15); osc.stop(audioCtx.currentTime + 0.2);
                } else if (type === 'tick') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(850, audioCtx.currentTime); gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.03);
                } else if (type === 'bonus') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(587.33, audioCtx.currentTime); gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                    osc.start(); osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.1); osc.frequency.setValueAtTime(1174.66, audioCtx.currentTime + 0.2);
                    osc.stop(audioCtx.currentTime + 0.4);
                }
            } catch(e){}
        }

        // Inline HUD Notification Injection Method (Replaces alerts)
        function triggerHUDMessage(text, TailwindColorClass) {
            const telemetry = document.getElementById('telemetry-layer');
            if (!telemetry) return;
            telemetry.innerHTML = `<div class="animate__animated animate__zoomInUp text-center text-sm font-black p-3 rounded-xl bg-slate-950/90 border border-white/10 ${TailwindColorClass}">${text}</div>`;
            setTimeout(() => {
                if(telemetry) telemetry.innerHTML = "";
            }, 3000);
        }

        function openShopModal() {
            playSoundFX('perk');
            const inventoryItems = [
                { id: 'freeze', name: 'Chrono Freeze', desc: 'Stops countdown progression.', cost: 50, icon: '❄️' },
                { id: 'half', name: 'Divine 50:50', desc: 'Discards two incorrect choices.', cost: 75, icon: '⚖️' },
                { id: 'skip', name: 'Prophetic Skip', desc: 'Skips node without penalty risks.', cost: 100, icon: '🔮' },
                { id: 'shield', name: 'Aegis Shield', desc: 'Blocks negative 20 coin deductions.', cost: 60, icon: '🛡️' },
                { id: 'elixir', name: 'Time Elixir', desc: 'Grants +10 seconds onto clock.', cost: 40, icon: '🧪' }
            ];

            const grid = document.getElementById('modal-shop-grid'); grid.innerHTML = "";
            inventoryItems.forEach(item => {
                const row = document.createElement('div');
                row.className = "flex items-center justify-between p-3 bg-slate-900/80 rounded-2xl border border-white/5";
                row.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="text-2xl bg-slate-950 p-2 rounded-xl">${item.icon}</span>
                        <div>
                            <h4 class="text-xs font-black text-slate-200">${item.name}</h4>
                            <p class="text-[9px] text-indigo-400 font-black">Owned: ${state.perks[item.id] || 0}</p>
                        </div>
                    </div>
                    <button onclick="buyPerk('${item.id}', ${item.cost})" class="bg-indigo-600 hover:bg-indigo-500 font-bold text-xs px-3 py-1.5 rounded-xl text-white">${item.cost} 💰</button>
                `;
                grid.appendChild(row);
            });
            document.getElementById('shop-modal').classList.remove('hidden');
        }

        function closeShopModal() { document.getElementById('shop-modal').classList.add('hidden'); }

        function buyPerk(id, cost) {
            if (state.gold >= cost) {
                state.gold -= cost; state.perks[id] = (state.perks[id] || 0) + 1;
                saveState(); openShopModal();
            }
        }

        function renderMenuMap() {
            currentCampaign = "";
            document.getElementById('back-btn').classList.add('hidden');
            document.getElementById('lobby-bag-btn').classList.remove('hidden');
            stopSnowingEffect();
            
            const canvas = document.getElementById('window-canvas');
            canvas.innerHTML = `
                <div class="text-center space-y-1 animate__animated animate__fadeInDown">
                    <h1 class="text-4xl font-black bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400">BIBLE QUEST</h1>
                    <p class="text-xs text-slate-500 font-bold tracking-widest uppercase">Select Campaign Route</p>
                </div>

                <div class="space-y-2.5 animate__animated animate__fadeInUp">
                    <button onclick="launchCampaign('nt')" class="w-full p-4 glass-card text-left flex justify-between items-center hover:border-indigo-500 transition-all">
                        <div><h3 class="text-sm font-black text-indigo-300">Phase 1: New Testament</h3><p class="text-[10px] text-slate-400">Gospels & Epistles Letters</p></div>
                        <span class="text-lg">⚡</span>
                    </button>
                    <button onclick="launchCampaign('ot')" class="w-full p-4 glass-card text-left flex justify-between items-center hover:border-emerald-500 transition-all">
                        <div><h3 class="text-sm font-black text-emerald-300">Phase 2: Old Testament</h3><p class="text-[10px] text-slate-400">Torah, Law & Hebrew Chronicles</p></div>
                        <span class="text-lg">📜</span>
                    </button>
                    <button onclick="launchCampaign('mix')" class="w-full p-4 glass-card text-left flex justify-between items-center hover:border-purple-500 transition-all">
                        <div><h3 class="text-sm font-black text-purple-300">Phase 3: Grand Mixture</h3><p class="text-[10px] text-slate-400">Full Structural Random Mix</p></div>
                        <span class="text-lg">🌀</span>
                    </button>
                    <button onclick="launchCampaign('egw')" class="w-full p-4 glass-card text-left flex justify-between items-center hover:border-amber-400 transition-all">
                        <div><h3 class="text-sm font-black text-amber-300">Phase 4: E.G. White Writings</h3><p class="text-[10px] text-slate-400">Prophetic History Insights</p></div>
                        <span class="text-lg">✒️</span>
                    </button>
                    <button onclick="launchCampaign('master')" class="w-full p-4 glass-card text-left flex justify-between items-center hover:border-rose-500 transition-all">
                        <div><h3 class="text-sm font-black text-rose-400">Phase 5: Mastery Blitz Mode</h3><p class="text-[10px] text-slate-400">Hyper Speed Speedrun: 5-Second Blitz Clock!</p></div>
                        <span class="text-lg">🔥</span>
                    </button>
                </div>
            `;
        }

        function launchCampaign(mode) {
            initAudioEngine(); currentCampaign = mode; levelIndex = 0; state.streak = 0; activityStep = 1;
            document.getElementById('back-btn').classList.remove('hidden');
            document.getElementById('lobby-bag-btn').classList.add('hidden');
            
            if (mode === 'nt') activePool = quizDatabase.filter(b => b.group === 'NT');
            else if (mode === 'ot') activePool = quizDatabase.filter(b => b.group === 'OT');
            else if (mode === 'egw') activePool = quizDatabase.filter(b => b.group === 'EGW');
            else activePool = [...quizDatabase].sort(() => Math.random() - 0.5);

            initNewBookTrack();
        }

        function initNewBookTrack() {
            if (levelIndex >= activePool.length) { renderVictoryScreen(true); return; }
            const targetBook = activePool[levelIndex];
            bookQuestions = [...targetBook.questions].sort(() => Math.random() - 0.5);
            questionIndex = 0;
            loadQuestionNode();
        }

        function loadQuestionNode() {
            if (questionIndex >= bookQuestions.length) { levelIndex++; initNewBookTrack(); return; }

            inputBlocked = false; isShieldActive = false;
            document.getElementById('shield-frame').className = "";
            if (!isClockFrozen) {
                document.getElementById('frost-frame').className = "";
                stopSnowingEffect();
            }

            const targetBook = activePool[levelIndex];
            activeQuestion = bookQuestions[questionIndex];
            let tier = activeQuestion.subGroup || "Easy"; 

            if (currentCampaign === 'master') { maxSeconds = 5; } 
            else { maxSeconds = tier === "Difficult" ? 10 : tier === "Moderate" ? 15 : 20; }
            if (!isClockFrozen) { secondsLeft = maxSeconds; }

            let tierColorClass = "bg-emerald-500";
            if (tier === "Moderate") tierColorClass = "bg-amber-500";
            else if (tier === "Difficult" || currentCampaign === 'master') tierColorClass = "bg-rose-500";

            let questionText = (state.lang === 'tw' && activeQuestion.q_twi) ? activeQuestion.q_twi : activeQuestion.q;
            let choicesArray = (state.lang === 'tw' && activeQuestion.a_tw) ? activeQuestion.a_tw : activeQuestion.a;

            let currentActivity = activityTypes[levelIndex % activityTypes.length];
            let currentWeather = weatherTypes[levelIndex % weatherTypes.length];

            const canvas = document.getElementById('window-canvas');
            canvas.innerHTML = `
                <div class="w-full space-y-1">
                    <div class="flex justify-between items-center text-[10px] font-bold text-slate-400 px-1">
                        <span class="capitalize">☁️ Weather: ${currentWeather}</span>
                        <span class="text-indigo-400 tracking-wider font-extrabold">${currentActivity.toUpperCase()} (Node ${activityStep}/10)</span>
                    </div>
                    
                    <div id="biome-container" class="biome-viewport">
                        <div id="telemetry-layer"></div>
                        <div id="weather-layer" class="absolute inset-0 z-20 pointer-events-none"></div>
                        <div id="vector-bg-layer" class="absolute inset-0 z-0 opacity-30"></div>

                        <!-- 2D SPRITE CONTAINER WITH STRUCTURAL LIMBS -->
                        <div id="actor-token" class="absolute z-30 transition-all duration-500 ease-out" style="left: 0px; bottom: 0px;">
                            <div class="sprite-2d">
                                <div class="sprite-head"></div>
                                <div class="sprite-body"></div>
                                <div class="sprite-limb arm-l"></div>
                                <div class="sprite-limb arm-r"></div>
                                <div class="sprite-limb leg-l"></div>
                                <div class="sprite-limb leg-r"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="glass-card p-4 space-y-3 flex flex-col animate__animated animate__fadeIn">
                    <div class="flex justify-between items-center">
                        <div>
                            <h2 class="text-lg font-black text-slate-100 tracking-wide">${targetBook.name}</h2>
                            <span class="text-[9px] uppercase px-2 py-0.5 rounded font-black bg-slate-950 text-slate-400 mt-1 inline-block">
                                ${currentCampaign === 'master' ? '5s Mastery Blitz' : tier}
                            </span>
                        </div>
                        <div id="clock-wrapper" class="text-2xl font-black tracking-tighter tabular-nums text-amber-400 bg-slate-950/70 px-3 py-1.5 rounded-2xl border border-white/10">
                            ⏰ <span id="clock-digit">${secondsLeft}</span>s
                        </div>
                    </div>
                    <div class="w-full bg-slate-950/60 h-2 rounded-full overflow-hidden p-0.5 border border-white/5">
                        <div id="bar-fill" class="h-full rounded-full ${tierColorClass}" style="width: ${(secondsLeft/maxSeconds)*100}%; transition: width 1s linear;"></div>
                    </div>
                </div>

                <div class="glass-card p-6 min-h-[10px] flex items-center justify-center text-center animate__animated animate__zoomIn">
                    <h3 class="text-md font-bold leading-snug text-slate-100">${questionText}</h3>
                </div>

                <div id="choice-matrix" class="space-y-2.5"></div>

                <div class="fixed bottom-0 left-0 right-0 p-3 bg-slate-950/95 border-t border-white/10 z-40 flex justify-center gap-2">
                    <button onclick="triggerInGamePerk('freeze')" class="flex-1 bg-slate-900 border border-sky-500/30 p-2 rounded-xl flex flex-col items-center">
                        <span class="text-base">❄️</span>
                        <span class="text-[9px] text-slate-400 font-bold">Qty: ${state.perks.freeze}</span>
                    </button>
                    <button onclick="triggerInGamePerk('half')" class="flex-1 bg-slate-900 border border-rose-500/30 p-2 rounded-xl flex flex-col items-center">
                        <span class="text-base">⚖️</span>
                        <span class="text-[9px] text-slate-400 font-bold">Qty: ${state.perks.half}</span>
                    </button>
                    <button onclick="triggerInGamePerk('skip')" class="flex-1 bg-slate-900 border border-purple-500/30 p-2 rounded-xl flex flex-col items-center">
                        <span class="text-base">🔮</span>
                        <span class="text-[9px] text-slate-400 font-bold">Qty: ${state.perks.skip}</span>
                    </button>
                    <button onclick="triggerInGamePerk('shield')" class="flex-1 bg-slate-900 border border-amber-500/30 p-2 rounded-xl flex flex-col items-center">
                        <span class="text-base">🛡️</span>
                        <span class="text-[9px] text-slate-400 font-bold">Qty: ${state.perks.shield}</span>
                    </button>
                    <button onclick="triggerInGamePerk('elixir')" class="flex-1 bg-slate-900 border border-emerald-500/30 p-2 rounded-xl flex flex-col items-center">
                        <span class="text-base">🧪</span>
                        <span class="text-[9px] text-slate-400 font-bold">Qty: ${state.perks.elixir}</span>
                    </button>
                </div>
            `;

            renderBiomeGraphics(currentActivity, currentWeather);

            const matrix = document.getElementById('choice-matrix');
            choicesArray.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "btn-choice animate__animated animate__fadeInUp";
                btn.style.animationDelay = `${idx * 0.02}s`;
                btn.innerText = opt;
                btn.onclick = () => evaluateAnswer(idx, btn);
                matrix.appendChild(btn);
            });

            if (isClockFrozen) {
                const clk = document.getElementById('clock-wrapper');
                if (clk) clk.className = "text-2xl font-black bg-sky-950 text-sky-400 px-3 py-1.5 rounded-2xl border border-sky-400";
            }

            runCountdownLoop();
        }

        // 🎨 HIGH-LEVEL 2D ENVIRONMENT & PARALLAX BACKGROUND GENERATOR
        function renderBiomeGraphics(activity, weather) {
            const wLayer = document.getElementById('weather-layer');
            const bgLayer = document.getElementById('vector-bg-layer');
            const actor = document.getElementById('actor-token');
            const container = document.getElementById('biome-container');

            wLayer.innerHTML = "";
            if (weather === 'Sunny') {
                container.style.background = "linear-gradient(to bottom, #131d35, #080d1a)";
                const sun = document.createElement('div'); sun.className = "sun-ray";
                wLayer.appendChild(sun);
            } else if (weather === 'Windy') {
                container.style.background = "linear-gradient(to bottom, #1a233a, #080d1a)";
                for(let i=0; i<8; i++) {
                    const wind = document.createElement('div'); wind.className = "wind-streak";
                    wind.style.top = `${Math.random() * 85}%`;
                    wind.style.animationDuration = `${Math.random() * 0.5 + 0.5}s`;
                    wind.style.animationDelay = `${Math.random() * 0.4}s`;
                    wLayer.appendChild(wind);
                }
            } else if (weather === 'Raining') {
                container.style.background = "linear-gradient(to bottom, #0e1626, #030712)";
                for(let i=0; i<20; i++) {
                    const drop = document.createElement('div'); drop.className = "rain-drop";
                    drop.style.left = `${Math.random() * 100}%`;
                    drop.style.animationDuration = `${Math.random() * 0.3 + 0.4}s`;
                    drop.style.animationDelay = `${Math.random() * 0.4}s`;
                    wLayer.appendChild(drop);
                }
            }

            let stepPercent = (activityStep - 1) / (maxActivitySteps - 1);
            
            if (activity === 'Mountain Climb') {
                // High-fidelity multi-tier mountain skyline path
                bgLayer.innerHTML = `
                    <svg viewBox="0 0 100 100" preserveAspectRatio="none" style="position: absolute; bottom: 0; width: 100%; height: 120px;">
                        <polygon points="0,100 40,30 70,70 100,20 100,100" fill="#1e293b"/>
                        <polygon points="20,100 55,45 80,80 100,40 100,100" fill="#334155" opacity="0.7"/>
                        <polygon points="40,30 50,45 35,45" fill="#f8fafc"/>
                        <polygon points="100,20 90,35 95,38" fill="#f8fafc"/>
                    </svg>
                `;
                actor.className = "absolute z-30 transition-all duration-500 ease-out animate-climb";
                actor.style.left = `${10 + (stepPercent * 70)}%`;
                actor.style.bottom = `${12 + (stepPercent * 70)}px`;
            } 
            else if (activity === 'River Rowing') {
                // Vector blue water parallax lines
                bgLayer.innerHTML = `
                    <div style="position: absolute; bottom: 0; width: 100%; height: 35px; background: linear-gradient(transparent, #1d4ed8); opacity: 0.4;"></div>
                    <div style="position: absolute; bottom: 15px; width: 130%; height: 4px; background: #38bdf8; opacity: 0.6; border-radius: 2px;"></div>
                    <div style="position: absolute; bottom: 5px; width: 120%; height: 3px; background: #0ea5e9; opacity: 0.5; border-radius: 2px; left: -10px;"></div>
                `;
                actor.className = "absolute z-30 transition-all duration-500 ease-out animate-row";
                actor.style.left = `${5 + (stepPercent * 80)}%`;
                actor.style.bottom = "12px";
            } 
            else if (activity === 'Desert Marathon') {
                // Linear sand dune vectors
                bgLayer.innerHTML = `
                    <svg viewBox="0 0 100 100" preserveAspectRatio="none" style="position: absolute; bottom: 0; width: 100%; height: 50px;">
                        <path d="M0,60 Q25,30 50,70 T100,50 L100,100 L0,100 Z" fill="#1e293b"/>
                        <path d="M0,80 Q35,60 70,85 T100,75 L100,100 L0,100 Z" fill="#0f172a" opacity="0.8"/>
                    </svg>
                `;
                actor.className = "absolute z-30 transition-all duration-500 ease-out animate-run";
                actor.style.left = `${5 + (stepPercent * 85)}%`;
                actor.style.bottom = "4px";
            }
        }

        function runCountdownLoop() {
            clearInterval(timerClockInterval);
            timerClockInterval = setInterval(() => {
                if (isClockFrozen || inputBlocked) return;
                secondsLeft--;
                
                const digit = document.getElementById('clock-digit'); if (digit) digit.innerText = secondsLeft;
                const fill = document.getElementById('bar-fill'); if (fill) fill.style.width = `${(secondsLeft / maxSeconds) * 100}%`;

                if (secondsLeft <= 2) {
                    playSoundFX('tick');
                    const wrap = document.getElementById('clock-wrapper'); if (wrap) wrap.classList.add('alarm-on');
                }
                if (secondsLeft <= 0) { clearInterval(timerClockInterval); handleFailurePenalty(); }
            }, 1000);
        }

        function triggerInGamePerk(id) {
            if (state.perks[id] <= 0 || inputBlocked) return;
            state.perks[id]--; saveState(); playSoundFX('perk');

            if (id === 'freeze') {
                isClockFrozen = true;
                document.getElementById('frost-frame').classList.add('frost-active');
                startSnowingEffect();
            } 
            else if (id === 'half') {
                const buttons = document.getElementById('choice-matrix').getElementsByTagName('button');
                let wrongs = []; for(let i=0; i<buttons.length; i++) { if (i !== activeQuestion.correct) wrongs.push(i); }
                wrongs.sort(() => Math.random() - 0.5).slice(0, 2).forEach(idx => {
                    buttons[idx].classList.add('animate__animated', 'animate__zoomOut');
                    setTimeout(() => { buttons[idx].style.opacity = "0"; buttons[idx].style.pointerEvents = "none"; }, 300);
                });
            } 
            else if (id === 'skip') { questionIndex++; } 
            else if (id === 'shield') {
                isShieldActive = true; document.getElementById('shield-frame').classList.add('shield-active');
            } 
            else if (id === 'elixir') { secondsLeft = Math.min(maxSeconds, secondsLeft + 10); }

            loadQuestionNode(); 
        }

        function startSnowingEffect() {
            const box = document.getElementById('snow-box'); box.innerHTML = "";
            for(let i=0; i<35; i++) {
                const snow = document.createElement('div');
                snow.className = "snowflake"; snow.innerText = "❄️";
                snow.style.left = `${Math.random() * 100}%`; 
                snow.style.animationDuration = `${Math.random() * 2.5 + 2}s`;
                snow.style.animationDelay = `${Math.random() * 1.5}s`;
                snow.style.fontSize = `${Math.random() * 12 + 12}px`;
                box.appendChild(snow);
            }
        }
        function stopSnowingEffect() { document.getElementById('snow-box').innerHTML = ""; }

        function evaluateAnswer(selectedIdx, clickedElement) {
            if (inputBlocked) return; inputBlocked = true; clearInterval(timerClockInterval);

            if (selectedIdx === activeQuestion.correct) {
                clickedElement.className = "btn-choice rainbow-correct shadow-2xl";
                playSoundFX('correct');
                
                state.gold += 15; state.streak++;
                activityStep++;
                saveState();

                if (activityStep > maxActivitySteps) {
                    activityStep = 1; 
                    state.gold += 100;
                    saveState();
                    playSoundFX('bonus');
                    triggerHUDMessage("👑 SUMMIT REACHED! +100 COINS BONUS!", "text-amber-400 border-amber-500");
                }

                questionIndex++; 
                setTimeout(loadQuestionNode, 1400);
            } else {
                clickedElement.className = "btn-choice bg-rose-600 border-rose-400 text-white animate__animated animate__shakeX font-bold shadow-lg";
                playSoundFX('wrong');
                setTimeout(handleFailurePenalty, 1200);
            }
        }

        function handleFailurePenalty() {
            clearInterval(timerClockInterval);
            state.streak = 0; isClockFrozen = false;

            activityStep = Math.max(1, activityStep - 1);

            if (isShieldActive) { 
                triggerHUDMessage("🛡️ AEGIS BLOCKED PENALTY!", "text-amber-500 border-amber-500");
            } 
            else {
                state.gold = Math.max(0, state.gold - 20); saveState();
                const goldHUD = document.getElementById('gold-container');
                if (goldHUD) {
                    goldHUD.classList.add('animate__shakeX', 'bg-red-950/80');
                    setTimeout(() => goldHUD.classList.remove('animate__shakeX', 'bg-red-950/80'), 800);
                }
                triggerHUDMessage("❌ INCORRECT! -20 COINS & SLIPPED BACK", "text-rose-500 border-rose-500");
            }

            const targetBook = activePool[levelIndex];
            bookQuestions = [...targetBook.questions].sort(() => Math.random() - 0.5);
            questionIndex = 0; 
            setTimeout(loadQuestionNode, 2000);
        }

        function renderVictoryScreen(fullCampaignCleared = false) {
            stopSnowingEffect();
            const canvas = document.getElementById('window-canvas');
            canvas.innerHTML = `
                <div class="glass-card p-8 text-center space-y-5 border border-amber-500/20">
                    <h1 class="text-3xl font-black bg-clip-text text-transparent bg-gradient-to-r from-amber-400 to-yellow-200">🏆 ROUTE CLEARED!</h1>
                    <p class="text-xs text-slate-300 font-medium">All active books within this phase journey have been successfully conquered!</p>
                    <button onclick="exitToMenu()" class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 p-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">
                        Return to Map Selection
                    </button>
                </div>
            `;
        }

        function toggleLanguage() {
            state.lang = state.lang === 'en' ? 'tw' : 'en'; saveState();
            document.getElementById('lang-label').innerText = state.lang === 'en' ? "English" : "Twi";
            if (currentCampaign !== "") loadQuestionNode(); else renderMenuMap();
        }

        function exitToMenu() { clearInterval(timerClockInterval); isClockFrozen = false; renderMenuMap(); }
        window.onload = () => { saveState(); renderMenuMap(); };
    </script>
</body>
</html>
