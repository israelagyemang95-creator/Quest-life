<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Quest - Production Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="questions.js"></script>
    <style>
        body { background-color: #05070c; font-family: system-ui, -apple-system, sans-serif; overflow-x: hidden; }
        
        /* 🎭 COMPACT VIEWPORT - LEAVES PLENTY OF ROOM FOR BUTTONS */
        .diorama-container {
            position: relative;
            width: 100%;
            height: 160px;
            background: radial-gradient(circle at center, #1e293b 0%, #0d131a 100%);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
        }
        
        .paper-house-main { position: absolute; bottom: 10px; left: 40%; width: 90px; height: 90px; background: #1e1b18; border: 1px solid #111; z-index: 10; }
        .shingle-roof {
            position: absolute; top: -30px; left: -5px; width: 100px; height: 32px; background-color: #0b5351;
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%); border-bottom: 3px solid #042928;
        }
        .diorama-window-glow { position: absolute; bottom: 15px; left: 20px; width: 20px; height: 26px; background: #f59e0b; border-radius: 3px 3px 0 0; box-shadow: 0 0 15px #d97706; }
        .fg-crafted-tower { position: absolute; bottom: 5px; right: -20px; width: 80px; height: 80px; background: #161920; z-index: 28; }
        .diorama-ladder { position: absolute; left: 49%; bottom: 5px; width: 18px; height: 150px; z-index: 15; background: repeating-linear-gradient(0deg, transparent, transparent 12px, #422006 12px, #422006 15px); border-left: 3px solid #291405; border-right: 3px solid #291405; }

        /* ⛈️ WEATHER OVERLAYS */
        .weather-layer { position: absolute; inset: 0; pointer-events: none; z-index: 25; }
        .rain-drop { position: absolute; background: linear-gradient(transparent, rgba(156, 163, 175, 0.6)); width: 1.5px; height: 20px; transform: rotate(12deg); animation: rainFall linear infinite; }
        @keyframes rainFall { 0% { transform: translateY(-20px) translateX(0) rotate(12deg); } 100% { transform: translateY(170px) translateX(-30px) rotate(12deg); } }
        
        @keyframes lightningStrike { 0%, 93%, 97%, 100% { opacity: 0; } 94%, 96% { opacity: 0.3; background: #ffffff; } }
        .lightning-sheet { position: absolute; inset: 0; z-index: 2; pointer-events: none; opacity: 0; mix-blend-mode: overlay; }
        .lightning-active { animation: lightningStrike 5s infinite; }

        /* 🚶 CLIMBING CHARACTER ARMATURE */
        .actor-puppet-node { 
            position: absolute; 
            left: 48%; 
            z-index: 20; 
            transform: translateX(-50%);
            transition: bottom 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .puppet-body { position: relative; width: 24px; height: 38px; }
        .puppet-head { position: absolute; top: 0; left: 4px; width: 16px; height: 16px; background: #fbcfe8; border-radius: 50%; z-index: 5; }
        .puppet-coat { position: absolute; top: 14px; left: 2px; width: 20px; height: 16px; background: #dc2626; border-radius: 6px 6px 3px 3px; z-index: 3; }
        
        .puppet-limb { position: absolute; background: #78350f; border-radius: 2px; transform-origin: top center; }
        .p-arm-l { top: 16px; left: -1px; width: 3px; height: 10px; }
        .p-arm-r { top: 16px; left: 22px; width: 3px; height: 10px; }
        .p-leg-l { top: 30px; left: 4px; width: 4px; height: 9px; }
        .p-leg-r { top: 30px; left: 16px; width: 4px; height: 9px; }

        @keyframes armSwingLeft { 0% { transform: rotate(-60deg); } 100% { transform: rotate(10deg); } }
        @keyframes armSwingRight { 0% { transform: rotate(10deg); } 100% { transform: rotate(-60deg); } }
        @keyframes legPedalLeft { 0% { transform: scaleY(1); } 100% { transform: scaleY(0.5); } }
        @keyframes legPedalRight { 0% { transform: scaleY(0.5); } 100% { transform: scaleY(1); } }

        .climb-active .p-arm-l { animation: armSwingLeft 0.25s infinite alternate ease-in-out; }
        .climb-active .p-arm-r { animation: armSwingRight 0.25s infinite alternate ease-in-out; }
        .climb-active .p-leg-l { animation: legPedalLeft 0.25s infinite alternate linear; }
        .climb-active .p-leg-r { animation: legPedalRight 0.25s infinite alternate linear; }

        /* HUD PANEL CONTAINER */
        .bubble-bag-container {
            position: fixed;
            bottom: 12px; left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 24px);
            max-width: 416px;
            background: rgba(13, 19, 33, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 6px;
            box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.6);
            z-index: 100;
        }
        .bubble-pod-btn { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 14px; }

        .glass-panel { background: rgba(13, 18, 30, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; }
        .choice-btn { width: 100%; text-align: left; padding: 0.75rem 1.25rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.03); color: #e2e8f0; font-weight: 600; font-size: 15px; transition: all 0.2s ease; }
        .choice-btn:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.15); }
    </style>
</head>
<body class="p-3 min-h-screen flex flex-col items-center justify-start text-white select-none pb-24">

    <audio id="bg-music" loop src="assets/music.mp3"></audio>
    <audio id="sfx-correct" src="assets/correct.mp3"></audio>
    <audio id="sfx-wrong" src="assets/wrong.mp3"></audio>

    <header class="w-full max-w-md flex justify-between items-center mb-2 z-50">
        <button onclick="backToMainMenu()" id="global-hub-btn" class="bg-slate-900 border border-white/10 text-white px-3 py-1.5 rounded-full font-bold text-xs uppercase hidden">
            🚪 <span class="lang-text" data-en="Main Menu" data-tw="Mfitiasee">Main Menu</span>
        </button>
        <div id="spacer-div" class="flex-1"></div>
        <div class="flex gap-1.5 items-center">
            <button onclick="changeLanguage()" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded-full font-bold text-xs uppercase">
                🌐 <span id="lang-indicator">English</span>
            </button>
            <div class="bg-slate-900 border border-white/10 px-3 py-1.5 rounded-full flex items-center gap-1.5">
                <span>💰</span>
                <span id="gold-display" class="font-black text-amber-400">500</span>
            </div>
        </div>
    </header>

    <main id="app-viewport" class="w-full max-w-md space-y-2 flex flex-col relative z-10"></main>

    <div class="bubble-bag-container flex justify-between gap-1.5">
        <button onclick="usePowerUp('freeze')" class="flex-1 bubble-pod-btn p-1 flex flex-col items-center">
            <span>❄️</span><span class="text-[9px] text-slate-400 font-bold">Freeze: <span id="qty-freeze">1</span></span>
        </button>
        <button onclick="usePowerUp('half')" class="flex-1 bubble-pod-btn p-1 flex flex-col items-center">
            <span>⚖️</span><span class="text-[9px] text-slate-400 font-bold">50:50: <span id="qty-half">1</span></span>
        </button>
        <button onclick="usePowerUp('skip')" class="flex-1 bubble-pod-btn p-1 flex flex-col items-center">
            <span>🔮</span><span class="text-[9px] text-slate-400 font-bold">Skip: <span id="qty-skip">1</span></span>
        </button>
        <button onclick="usePowerUp('shield')" class="flex-1 bubble-pod-btn p-1 flex flex-col items-center">
            <span>🛡️</span><span class="text-[9px] text-slate-400 font-bold">Shield: <span id="qty-shield">1</span></span>
        </button>
        <button onclick="usePowerUp('elixir')" class="flex-1 bubble-pod-btn p-1 flex flex-col items-center">
            <span>🧪</span><span class="text-[9px] text-slate-400 font-bold">Elixir: <span id="qty-elixir">1</span></span>
        </button>
    </div>

    <script>
        // Global Local Storage Persistence System
        let appState = JSON.parse(localStorage.getItem('bibleQuestSave')) || {
            gold: 500,
            lang: 'en',
            inventory: { freeze: 1, half: 1, skip: 1, shield: 1, elixir: 1 },
            altitudeStep: 1
        };

        let selectedLevelGroup = "";
        let currentQuestions = [];
        let questionIndex = 0;
        let activeQuestion = null;
        let countdownTimer = null;
        let timeRemaining = 15;
        let isWeatherRainy = false;

        function saveState() {
            localStorage.setItem('bibleQuestSave', JSON.stringify(appState));
            document.getElementById('gold-display').innerText = appState.gold;
            document.getElementById('qty-freeze').innerText = appState.inventory.freeze;
            document.getElementById('qty-half').innerText = appState.inventory.half;
            document.getElementById('qty-skip').innerText = appState.inventory.skip;
            document.getElementById('qty-shield').innerText = appState.inventory.shield;
            document.getElementById('qty-elixir').innerText = appState.inventory.elixir;
            document.getElementById('lang-indicator').innerText = appState.lang === 'en' ? "English" : "Twi";
        }

        // 🏆 DRAW CAMPAIGN ROUTE SELECTOR
        function drawMainMenu() {
            document.getElementById('global-hub-btn').classList.add('hidden');
            document.getElementById('spacer-div').classList.remove('hidden');
            
            const target = document.getElementById('app-viewport');
            target.innerHTML = `
                <div class="text-center space-y-1 py-1 animate__animated animate__fadeInDown">
                    <h1 class="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-purple-400 to-amber-400 tracking-tight">BIBLE QUEST</h1>
                    <p class="text-[10px] text-slate-500 font-bold tracking-widest uppercase" data-en="SELECT STUDY PATHWAY" data-tw="PAW WO AKWANTUO">SELECT STUDY PATHWAY</p>
                </div>
                <div class="space-y-2 pt-1 animate__animated animate__fadeInUp">
                    <button onclick="startLevelSegment('Mastery')" class="w-full p-3.5 glass-panel text-left flex justify-between items-center hover:border-amber-500/40 transition-all">
                        <div>
                            <h3 class="text-sm font-black text-amber-400" data-en="🎓 Old & New Testament Mastery" data-tw="🎓 Kane & Nhyiam Foforo Nimdee">🎓 Old & New Testament Mastery</h3>
                            <p class="text-xs text-slate-400" data-en="Complete canonical coverage" data-tw="Twerɛkron mu nsɛm nyinaa">Complete canonical coverage</p>
                        </div>
                        <span class="text-lg">📜</span>
                    </button>
                    <button onclick="startLevelSegment('Ellen G. White')" class="w-full p-3.5 glass-panel text-left flex justify-between items-center hover:border-purple-500/40 transition-all">
                        <div>
                            <h3 class="text-sm font-black text-purple-400" data-en="✍️ Ellen G. White Prophecy" data-tw="✍️ Ellen G. White Nkomhyɛ">✍️ Ellen G. White Prophecy</h3>
                            <p class="text-xs text-slate-400" data-en="Spirit of Prophecy & Church History" data-tw="Asɔre Abakɔsɛm Nsɛm">Spirit of Prophecy & Church History</p>
                        </div>
                        <span class="text-lg">✨</span>
                    </button>
                </div>
            `;
            updateLanguageUINabels();
            try { document.getElementById('bg-music').play(); } catch(e){}
        }

        // 🔗 CONNECTION ENGINE TO QUESTIONS.JS GLOBAL DATABASE
        function startLevelSegment(groupName) {
            selectedLevelGroup = groupName;
            currentQuestions = [];

            // Read directly from external window.quizDatabase array variables
            let sourcePool = window.quizDatabase || [];

            if (Array.isArray(sourcePool)) {
                sourcePool.forEach(category => {
                    // Match category groups cleanly or group all values under canonical Mastery
                    if (groupName === 'Mastery' || category.group === groupName) {
                        if (Array.isArray(category.questions)) {
                            category.questions.forEach(q => {
                                currentQuestions.push({ ...q, bookName: category.name });
                            });
                        }
                    }
                });
            }

            // Fallback emergency configuration parameters if data object array is empty
            if (currentQuestions.length === 0) {
                currentQuestions = [
                    { q: "Who was the first man created?", a: ["Noah", "Adam", "Abel", "Seth"], q_twi: "Hwan ne onipa a odi kan a wɔbɔɔ no?", a_tw: ["Noa", "Adam", "Abel", "Set"], correct: 1 },
                    { q: "What did the archangel say to the devil when disputing?", a: ["I destroy you", "The Lord rebuke you", "Leave this place"], q_twi: "Asɛm bɛn na ɔbɔfo panyin no ka kyerɛɛ ɔbɔonsam?", a_tw: ["Mesee wo", "Awurade nka wo anim", "Firi ha kɔ"], correct: 1 }
                ];
            }

            questionIndex = 0;
            appState.altitudeStep = 1;
            document.getElementById('global-hub-btn').classList.remove('hidden');
            document.getElementById('spacer-div').classList.add('hidden');
            loadQuestionNode();
        }

        function loadQuestionNode() {
            if (questionIndex >= currentQuestions.length) {
                renderVictoryScreen();
                return;
            }

            activeQuestion = currentQuestions[questionIndex];
            timeRemaining = 15;
            isWeatherRainy = Math.random() > 0.5; // True structural weather variance logic

            let displayPrompt = (appState.lang === 'tw' && activeQuestion.q_twi) ? activeQuestion.q_twi : activeQuestion.q;
            let displayChoices = (appState.lang === 'tw' && activeQuestion.a_tw) ? activeQuestion.a_tw : activeQuestion.a;

            const target = document.getElementById('app-viewport');
            target.innerHTML = `
                <div class="w-full space-y-1.5">
                    <div class="flex justify-between items-center text-[10px] font-bold text-slate-400 px-1 uppercase tracking-wide">
                        <span id="weather-indicator" class="${isWeatherRainy ? 'text-blue-400' : 'text-amber-400'}">
                            ${isWeatherRainy ? '⛈️ Weather: Rainy' : '☀️ Weather: Sunny'}
                        </span>
                        <span class="text-teal-400">LADDER HEIGHT: ${appState.altitudeStep}/10</span>
                    </div>
                    
                    <div class="diorama-container">
                        <div id="lightning-sheet" class="lightning-sheet ${isWeatherRainy ? 'lightning-active' : ''}"></div>
                        <div id="rain-particle-field" class="weather-layer"></div>
                        
                        <div class="paper-house-main"><div class="shingle-roof"></div><div class="diorama-window-glow"></div></div>
                        <div class="diorama-ladder"></div>

                        <div id="puppet-actor" class="actor-puppet-node">
                            <div class="puppet-body">
                                <div class="puppet-head"></div>
                                <div class="puppet-coat"></div>
                                <div class="puppet-limb p-arm-l"></div>
                                <div class="puppet-limb p-arm-r"></div>
                                <div class="puppet-limb p-leg-l"></div>
                                <div class="puppet-limb p-leg-r"></div>
                            </div>
                        </div>
                        <div class="fg-crafted-tower"></div>
                    </div>
                </div>

                <div class="glass-panel px-4 py-2.5 flex justify-between items-center">
                    <div>
                        <h2 class="text-md font-black text-slate-100 tracking-tight">${activeQuestion.bookName || 'Quest'}</h2>
                        <span class="text-[10px] text-slate-400">Question ${questionIndex + 1}/${currentQuestions.length}</span>
                    </div>
                    <div class="text-sm font-bold text-cyan-400 bg-slate-950/60 px-2.5 py-1 rounded-lg border border-white/5 tabular-nums">
                        ⏰ <span id="timer-label">${timeRemaining}</span>s
                    </div>
                </div>

                <div class="glass-panel p-3.5 min-h-[64px] flex items-center justify-center text-center">
                    <h3 id="question-text-field" class="text-sm font-bold text-slate-100 leading-snug">${displayPrompt}</h3>
                </div>

                <div id="answers-box" class="space-y-1.5"></div>
            `;

            updateCharacterPosition();
            renderRainEffect();

            const matrixBox = document.getElementById('answers-box');
            displayChoices.forEach((choice, index) => {
                const btn = document.createElement('button');
                btn.className = "choice-btn animate__animated animate__fadeInUp";
                btn.innerText = choice;
                btn.onclick = () => validateResponse(index, btn);
                matrixBox.appendChild(btn);
            });

            startClock();
        }

        function renderRainEffect() {
            const field = document.getElementById('rain-particle-field');
            if (!field) return;
            field.innerHTML = "";
            if (!isWeatherRainy) return;
            
            for (let i = 0; i < 30; i++) {
                const drop = document.createElement('div');
                drop.className = "rain-drop";
                drop.style.left = `${Math.random() * 110}%`;
                drop.style.top = `${Math.random() * -20}px`;
                drop.style.animationDelay = `${Math.random() * 1s}`;
                drop.style.animationDuration = `${Math.random() * 0.3 + 0.4}s`;
                field.appendChild(drop);
            }
        }

        function updateCharacterPosition() {
            const puppet = document.getElementById('puppet-actor');
            if (!puppet) return;
            let ratio = (appState.altitudeStep - 1) / 9;
            let bottomPixels = 10 + (ratio * 105); // Scales smoothly to fit perfectly inside the custom shorter frame container boundaries
            puppet.style.bottom = `${bottomPixels}px`;
        }

        function startClock() {
            clearInterval(countdownTimer);
            countdownTimer = setInterval(() => {
                timeRemaining--;
                const lbl = document.getElementById('timer-label');
                if (lbl) lbl.innerText = timeRemaining;
                if (timeRemaining <= 0) {
                    clearInterval(countdownTimer);
                    handleFailure();
                }
            }, 1000);
        }

        function validateResponse(selectedIndex, buttonRef) {
            clearInterval(countdownTimer);
            
            if (selectedIndex === activeQuestion.correct) {
                try { document.getElementById('sfx-correct').play(); } catch(e){}
                buttonRef.className = "choice-btn bg-emerald-600 border-emerald-400 text-white font-bold";
                
                const puppet = document.getElementById('puppet-actor');
                if (puppet) puppet.classList.add('climb-active');
                
                appState.altitudeStep = Math.min(10, appState.altitudeStep + 1);
                appState.gold += 15;
                saveState();
                updateCharacterPosition();

                setTimeout(() => {
                    if (puppet) puppet.classList.remove('climb-active');
                    questionIndex++;
                    loadQuestionNode();
                }, 900);
            } else {
                try { document.getElementById('sfx-wrong').play(); } catch(e){}
                buttonRef.className = "choice-btn bg-rose-600 border-rose-400 text-white animate__animated animate__shakeX";
                setTimeout(handleFailure, 800);
            }
        }

        function handleFailure() {
            appState.altitudeStep = Math.max(1, appState.altitudeStep - 1);
            saveState();
            questionIndex = 0; // Loops back to start structural ladder checkpoint segment
            loadQuestionNode();
        }

        function usePowerUp(type) {
            if (appState.inventory[type] <= 0) return;
            appState.inventory[type]--;
            saveState();

            if (type === 'skip') {
                questionIndex++;
                loadQuestionNode();
            } else if (type === 'half') {
                const btns = document.getElementById('answers-box').getElementsByTagName('button');
                let targeted = 0;
                for (let i = 0; i < btns.length; i++) {
                    if (i !== activeQuestion.correct && targeted < 2) {
                        btns[i].style.opacity = "0.15";
                        btns[i].style.pointerEvents = "none";
                        targeted++;
                    }
                }
            } else if (type === 'elixir') {
                timeRemaining += 10;
                const lbl = document.getElementById('timer-label');
                if (lbl) lbl.innerText = timeRemaining;
            }
        }

        function changeLanguage() {
            appState.lang = appState.lang === 'en' ? 'tw' : 'en';
            saveState();
            
            // Check if user is currently inside a quiz segment or on the main dashboard menu view
            if (currentQuestions.length > 0 && activeQuestion) {
                let displayPrompt = (appState.lang === 'tw' && activeQuestion.q_twi) ? activeQuestion.q_twi : activeQuestion.q;
                let displayChoices = (appState.lang === 'tw' && activeQuestion.a_tw) ? activeQuestion.a_tw : activeQuestion.a;
                
                const questionHeader = document.getElementById('question-text-field');
                if (questionHeader) questionHeader.innerText = displayPrompt;
                
                const matrixBox = document.getElementById('answers-box');
                if (matrixBox) {
                    matrixBox.innerHTML = "";
                    displayChoices.forEach((choice, index) => {
                        const btn = document.createElement('button');
                        btn.className = "choice-btn";
                        btn.innerText = choice;
                        btn.onclick = () => validateResponse(index, btn);
                        matrixBox.appendChild(btn);
                    });
                }
                
                const weatherIndicator = document.getElementById('weather-indicator');
                if (weatherIndicator) {
                    weatherIndicator.innerText = isWeatherRainy 
                        ? (appState.lang === 'en' ? '⛈️ Weather: Rainy' : '⛈️ Ewiem: Nsuo tɔ')
                        : (appState.lang === 'en' ? '☀️ Weather: Sunny' : '☀️ Ewiem: Ewia bɔ');
                }
            } else {
                drawMainMenu();
            }
            updateLanguageUINabels();
        }

        function updateLanguageUINabels() {
            document.querySelectorAll('.lang-text').forEach(el => {
                let val = appState.lang === 'tw' ? el.getAttribute('data-tw') : el.getAttribute('data-en');
                if (val) el.innerText = val;
            });
            document.querySelectorAll('[data-en]').forEach(el => {
                if(el.tagName === 'H3' || el.tagName === 'P' || el.tagName === 'H1') {
                    let val = appState.lang === 'tw' ? el.getAttribute('data-tw') : el.getAttribute('data-en');
                    if (val) el.innerText = val;
                }
            });
        }

        function renderVictoryScreen() {
            document.getElementById('app-viewport').innerHTML = `
                <div class="glass-panel p-6 text-center space-y-4 animate__animated animate__zoomIn">
                    <h2 class="text-xl font-black text-amber-400" data-en="🎉 PATHWAY CLEARED!" data-tw="🎉 WƆAWIE AKWANTUO NO!">🎉 PATHWAY CLEARED!</h2>
                    <p class="text-xs text-slate-300" data-en="Excellent work climbing to safety." data-tw="Kɔ so kura gyidi no mu yie.">Excellent work climbing to safety.</p>
                    <button onclick="backToMainMenu()" class="w-full bg-blue-600 hover:bg-blue-500 p-3 rounded-xl font-bold text-xs uppercase tracking-wider">
                        Return to Main Menu
                    </button>
                </div>
            `;
            updateLanguageUINabels();
        }

        function backToMainMenu() {
            clearInterval(countdownTimer);
            currentQuestions = [];
            activeQuestion = null;
            drawMainMenu();
        }

        window.onload = () => {
            saveState();
            drawMainMenu();
        };
    </script>
</body>
</html>
