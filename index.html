<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prophetic Reward Engine</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    /* Custom Keyframes for Animations & Glowing Effects */
    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-6px) scale(1.05); }
    }

    @keyframes wheelGlow {
      0%, 100% { box-shadow: 0 0 20px 2px rgba(59, 130, 246, 0.6), inset 0 0 15px rgba(59, 130, 246, 0.4); }
      50% { box-shadow: 0 0 35px 8px rgba(99, 102, 241, 0.8), inset 0 0 25px rgba(99, 102, 241, 0.6); }
    }

    @keyframes iconGlow {
      0%, 100% { filter: drop-shadow(0 0 4px rgba(251, 191, 36, 0.6)); }
      50% { filter: drop-shadow(0 0 12px rgba(251, 191, 36, 1)); }
    }

    .animate-float {
      animation: float 3s ease-in-out infinite;
    }

    .wheel-glow {
      animation: wheelGlow 4s ease-in-out infinite;
    }

    .icon-glow {
      animation: iconGlow 2.5s ease-in-out infinite;
    }

    /* Hide scrollbar for cleaner look */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-[#05050c] text-slate-200 font-sans min-h-screen flex flex-col items-center justify-between p-4 selection:bg-indigo-500">

  <!-- TOP HEADER HUB -->
  <header class="w-full max-w-md flex justify-between items-center y-4">
    <button id="audioToggle" class="bg-slate-900/80 border border-slate-700/50 backdrop-blur-md px-4 py-2 rounded-full text-xs font-bold tracking-wide flex items-center gap-2 active:scale-95 transition-all text-indigo-400">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
      </svg>
      <span>MUSIC: OFF</span>
    </button>
    <div class="flex gap-2">
      <div class="bg-indigo-950/40 border border-indigo-500/30 px-3 py-1.5 rounded-xl text-xs font-semibold text-blue-300 flex items-center gap-1">
        🌐 EN
      </div>
      <div class="bg-amber-950/40 border border-amber-500/30 px-3 py-1.5 rounded-xl text-xs font-bold text-amber-400 flex items-center gap-1">
        💰 500
      </div>
    </div>
  </header>

  <!-- MAIN CONTAINER (DECLUTTERED INTERFACE) -->
  <main class="w-full max-w-md flex-1 flex flex-col justify-center my-4 space-y-6">
    
    <!-- CONCISE ROUTE PIPELINE VIEWPORT -->
    <div class="bg-slate-900/60 border border-slate-800/80 backdrop-blur-xl rounded-3xl p-4 shadow-2xl">
      <div class="flex justify-between items-center mb-3 px-1">
        <h2 class="text-xs font-bold uppercase tracking-widest text-slate-400">Campaign Pipelines</h2>
        <span class="text-[10px] text-indigo-400 font-medium">Swipe to explore</span>
      </div>
      
      <!-- Scroll container handling the clutter seen in 1000601992.jpg -->
      <div class="space-y-2.5 max-h-[160px] overflow-y-auto no-scrollbar pr-1">
        <div class="p-3 bg-gradient-to-r from-blue-950/40 to-slate-900/40 border border-blue-900/30 rounded-xl flex justify-between items-center">
          <div>
            <h3 class="text-sm font-bold text-blue-400">Phase 1: New Testament</h3>
            <p class="text-[11px] text-slate-400">Explore Gospels & Epistles</p>
          </div>
          <button class="bg-blue-600 hover:bg-blue-500 text-xs font-bold px-4 py-1.5 rounded-lg transition-all">PLAY</button>
        </div>

        <div class="p-3 bg-gradient-to-r from-emerald-950/40 to-slate-900/40 border border-emerald-900/30 rounded-xl flex justify-between items-center">
          <div>
            <h3 class="text-sm font-bold text-emerald-400">Phase 2: Old Testament</h3>
            <p class="text-[11px] text-slate-400">Continuous Covenant Pools</p>
          </div>
          <button class="bg-emerald-600 hover:bg-emerald-500 text-xs font-bold px-4 py-1.5 rounded-lg transition-all">PLAY</button>
        </div>

        <div class="p-3 bg-gradient-to-r from-purple-950/40 to-slate-900/40 border border-purple-900/30 rounded-xl flex justify-between items-center">
          <div>
            <h3 class="text-sm font-bold text-purple-400">Phase 3: Grand Mixture</h3>
            <p class="text-[11px] text-slate-400">Randomized Scriptural Cards</p>
          </div>
          <button class="bg-purple-600 hover:bg-purple-500 text-xs font-bold px-4 py-1.5 rounded-lg transition-all">MIX</button>
        </div>
      </div>
    </div>

    <!-- PROPHETIC REWARD WHEEL DIALOG MODAL -->
    <div class="bg-gradient-to-b from-slate-900 to-[#0b0c16] border border-indigo-900/40 rounded-3xl p-6 relative shadow-3xl">
      
      <!-- Top Engine Header -->
      <div class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-2">
          <span class="text-xl">🎯</span>
          <h1 class="text-sm font-black tracking-wider bg-gradient-to-r from-amber-400 to-orange-500 bg-clip-text text-transparent uppercase">Prophetic Reward Engine</h1>
        </div>
        <button class="text-xs bg-slate-800/80 hover:bg-slate-800 text-slate-400 font-bold px-3 py-1 rounded-md transition-colors">CLOSE</button>
      </div>

      <!-- THE GLOWING WHEEL HUB -->
      <div class="relative w-72 h-72 mx-auto my-4 flex items-center justify-center">
        <!-- Red Selection Pointer -->
        <div class="absolute -top-1 z-30 w-0 h-0 border-l-[14px] border-l-transparent border-r-[14px] border-r-transparent border-t-[18px] border-t-red-600 filter drop-shadow(0 2px 4px rgba(0,0,0,0.5))"></div>
        
        <!-- Glowing Ring Container -->
        <div id="wheelWheel" class="w-full h-full rounded-full border-4 border-indigo-500/80 bg-[#121424] relative overflow-hidden wheel-glow transition-transform duration-[4000ms] ease-[cubic-bezier(0.25,0.1,0.25,1)]">
          
          <!-- Wheel Slices Separation Lines -->
          <div class="absolute inset-0 dividing-lines pointer-events-none opacity-20">
            <div class="absolute top-0 bottom-0 left-1/2 w-[2px] bg-indigo-400 transform -translate-x-1/2"></div>
            <div class="absolute top-0 bottom-0 left-1/2 w-[2px] bg-indigo-400 transform -translate-x-1/2 rotate-60"></div>
            <div class="absolute top-0 bottom-0 left-1/2 w-[2px] bg-indigo-400 transform -translate-x-1/2 rotate-120"></div>
          </div>

          <!-- REWARDS WITH FLOATING AND GLOWING ICONS (NO WRITING) -->
          <!-- Slice 1: 50:50 Core -->
          <div class="absolute top-[18%] left-[42%] transform animate-float icon-glow" style="animation-delay: 0s;">
            <svg class="w-10 h-10 text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
          </div>
          <!-- Slice 2: Skip Ticket -->
          <div class="absolute top-[32%] right-[16%] transform rotate-60 animate-float icon-glow" style="animation-delay: 0.5s;">
            <svg class="w-10 h-10 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"/></svg>
          </div>
          <!-- Slice 3: 50 Coins -->
          <div class="absolute bottom-[28%] right-[18%] transform rotate-120 animate-float icon-glow" style="animation-delay: 1s;">
            <svg class="w-10 h-10 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          </div>
          <!-- Slice 4: Freeze +1 -->
          <div class="absolute bottom-[14%] left-[42%] transform animate-float icon-glow" style="animation-delay: 1.5s;">
            <svg class="w-10 h-10 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
          </div>
          <!-- Slice 5: 100 Coins -->
          <div class="absolute bottom-[28%] left-[16%] transform rotate-240 animate-float icon-glow" style="animation-delay: 2s;">
            <div class="relative">
              <svg class="w-10 h-10 text-yellow-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              <span class="absolute -top-1 -right-1 flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-yellow-500"></span></span>
            </div>
          </div>
          <!-- Slice 6: Shield +1 -->
          <div class="absolute top-[32%] left-[16%] transform rotate-300 animate-float icon-glow" style="animation-delay: 2.5s;">
            <svg class="w-10 h-10 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
          </div>

        </div>

        <!-- Center Glowing Hub Anchor -->
        <div class="absolute w-12 h-12 bg-indigo-600 rounded-full border-4 border-slate-900 shadow-xl flex items-center justify-center z-20">
          <div class="w-3 h-3 bg-white rounded-full animate-ping opacity-75"></div>
        </div>
      </div>

      <!-- Action Button -->
      <button id="spinBtn" class="w-full mt-6 bg-gradient-to-r from-red-800 to-amber-700 hover:from-red-700 hover:to-amber-600 text-white font-extrabold py-3.5 px-6 rounded-2xl tracking-wider text-sm shadow-lg active:scale-98 transition-all uppercase border-t border-red-500/30">
        Start Prophetic Spin
      </button>
    </div>
  </main>

  <!-- BOTTOM UTILITY DOCK -->
  <footer class="w-full max-w-md pb-2 flex justify-around text-slate-500 text-xs border-t border-slate-900/60 pt-3">
    <button class="flex flex-col items-center gap-1 text-indigo-400"><span class="text-lg">🏰</span><span>Arcade</span></button>
    <button class="flex flex-col items-center gap-1 hover:text-slate-300 transition-colors"><span class="text-lg">🎒</span><span>Inventory</span></button>
    <button class="flex flex-col items-center gap-1 hover:text-slate-300 transition-colors"><span class="text-lg">📊</span><span>Analytics</span></button>
  </footer>

  <!-- Web Audio Synthesizer Engine (Eliminates broken external source links) -->
  <script>
    let audioContext = null;
    let musicInterval = null;
    let isPlaying = false;

    const audioToggle = document.getElementById('audioToggle');
    const spinBtn = document.getElementById('spinBtn');
    const wheel = document.getElementById('wheelWheel');

    function initAudio() {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }

    // Dynamic procedural background music generator loop
    function playBackgroundSynthProgression() {
      if (!isPlaying) return;
      
      const now = audioContext.currentTime;
      // Soft atmospheric chord generator (Chilled cosmic ambiance)
      const frequencies = [130.81, 164.81, 196.00, 246.94]; // C3 - E3 - G3 - B3 chord structure
      
      frequencies.forEach((freq, index) => {
        const osc = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, now);
        
        // Soft volume envelope to avoid harsh snapping sounds
        gainNode.gain.setValueAtTime(0, now);
        gainNode.gain.linearRampToValueAtTime(0.02, now + 1 + index * 0.2);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 5);
        
        osc.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        osc.start(now);
        osc.stop(now + 5);
      });
    }

    audioToggle.addEventListener('click', () => {
      if (!audioContext) initAudio();

      if (audioContext.state === 'suspended') {
        audioContext.resume();
      }

      if (!isPlaying) {
        isPlaying = true;
        audioToggle.classList.add('text-emerald-400');
        audioToggle.classList.remove('text-indigo-400');
        audioToggle.querySelector('span').innerText = "MUSIC: ON";
        playBackgroundSynthProgression();
        musicInterval = setInterval(playBackgroundSynthProgression, 4500);
      } else {
        isPlaying = false;
        audioToggle.classList.remove('text-emerald-400');
        audioToggle.classList.add('text-indigo-400');
        audioToggle.querySelector('span').innerText = "MUSIC: OFF";
        clearInterval(musicInterval);
      }
    });

    // Spin Handling Animation
    let currentRotation = 0;
    spinBtn.addEventListener('click', () => {
      spinBtn.disabled = true;
      // Add multiple full turns + random degrees
      const extraDegrees = Math.floor(Math.random() * 360) + 1440; 
      currentRotation += extraDegrees;
      wheel.style.transform = `rotate(${currentRotation}deg)`;
      
      setTimeout(() => {
        spinBtn.disabled = false;
      }, 4000);
    });
  </script>
</body>
</html>
