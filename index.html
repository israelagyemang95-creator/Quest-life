<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prophetic Word Quest Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body {
            background-color: #020617;
            color: #f8fafc;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            overflow-x: hidden;
        }
        /* Custom scrollbar setup for clean presentation */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.6);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.3);
            border-radius: 9999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.5);
        }
    </style>
</head>
<body class="relative min-h-screen flex flex-col justify-between selection:bg-indigo-500/30 selection:text-indigo-200">

    <canvas id="ambient-particle-canvas" class="absolute top-0 left-0 w-full h-full pointer-events-none z-0"></canvas>
    <canvas id="snow-freeze-canvas" class="absolute top-0 left-0 w-full h-full pointer-events-none z-40 opacity-0 transition-opacity duration-700"></canvas>

    <header class="w-full max-w-md mx-auto px-4 pt-4 relative z-10 flex items-center justify-between gap-2 shrink-0">
        <button id="audio-toggle-btn" onclick="toggleGlobalAudioSystem(event)" class="bg-slate-950/95 border border-emerald-500/30 text-emerald-400 px-3 py-1.5 rounded-full font-black text-[10px] uppercase tracking-widest flex items-center gap-1.5 shadow-xl transition-all duration-300 active:scale-95">
            <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
            <span id="audio-label">AMBIANCE: ON</span>
        </button>

        <div class="flex items-center gap-2">
            <button onclick="toggleSystemLocalizationLanguage()" class="bg-slate-950/95 border border-indigo-500/30 text-indigo-400 px-3 py-1.5 rounded-full font-black text-[10px] uppercase tracking-widest flex items-center gap-1.5 shadow-xl active:scale-95 transition-transform">
                <span>🌐</span>
                <span id="lang-label">ENGLISH</span>
            </button>
            <div class="bg-slate-950/95 border border-amber-500/30 text-amber-400 px-3 py-1.5 rounded-full font-black text-[10px] uppercase tracking-widest flex items-center gap-1.5 shadow-xl">
                <span>💰</span>
                <span id="gold-val">500</span>
            </div>
        </div>
    </header>

    <main id="window-canvas" class="w-full max-w-md mx-auto px-4 py-6 relative z-10 flex-1 flex flex-col justify-start overflow-y-auto">
        
        <div class="w-full bg-slate-900/60 backdrop-blur-xl border border-white/5 rounded-2xl p-4 shadow-2xl mb-4 transition-all duration-300">
            <div class="flex items-center justify-between cursor-pointer" onclick="this.parentElement.classList.toggle('max-h-[500px]')">
                <div class="flex items-center gap-2">
                    <span class="text-lg">📋</span>
                    <h3 class="text-sm font-bold tracking-wide text-slate-300" data-i18n="viewTasks">View Sectors Task Explorer</h3>
                </div>
                <span class="text-slate-500 text-xs">▼</span>
            </div>
            </div>

        <div class="w-full bg-slate-900/60 backdrop-blur-xl border border-white/5 rounded-2xl p-4 shadow-2xl transition-all duration-300">
            <div class="flex items-center justify-between cursor-pointer">
                <div class="flex items-center gap-2">
                    <span class="text-lg">🎯</span>
                    <h3 class="text-sm font-bold tracking-wide text-amber-400" data-i18n="launchWheel">Launch Prophetic Reward Wheel</h3>
                </div>
                <span class="text-slate-500 text-xs">▼</span>
            </div>
        </div>

    </main>

    <nav class="w-full max-w-md mx-auto bg-slate-950/90 backdrop-blur-md border-t border-white/5 px-6 py-2 relative z-30 flex justify-between items-center shrink-0 rounded-t-3xl shadow-[0_-10px_30px_rgba(0,0,0,0.8)]">
        <button class="flex flex-col items-center gap-1 text-indigo-400 opacity-100 transition-all">
            <div class="p-2 bg-indigo-500/10 rounded-xl shadow-inner">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            </div>
            <span class="text-[9px] font-black tracking-widest uppercase">Home</span>
        </button>

        <button class="flex flex-col items-center gap-1 text-slate-500 opacity-70 hover:opacity-100 transition-all">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
            <span class="text-[9px] font-bold tracking-widest uppercase">Inbox</span>
        </button>

        <button class="flex flex-col items-center gap-1 text-slate-500 opacity-70 hover:opacity-100 transition-all">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            <span class="text-[9px] font-bold tracking-widest uppercase">Explore</span>
        </button>

        <button class="flex flex-col items-center gap-1 text-slate-500 opacity-70 hover:opacity-100 transition-all">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
            <span class="text-[9px] font-bold tracking-widest uppercase">Copilot</span>
        </button>
    </nav>

    <script>
        // System Localization Registry System Database
        const i18nRegistry = {
            en: {
                mapHub: "Map Hub", viewTasks: "View Sectors Task Explorer", launchWheel: "Launch Prophetic Reward Wheel",
                startSpin: "START PROPHETIC SPIN", armoryTitle: "Armory Depot", continueBtn: "CONTINUE PROCEEDING",
                subtitle: "Tap a Phase Card to Explore", phase1Title: "Phase 1: New Testament", phase1Desc: "Explore the Gospels and Epistles",
                phase2Title: "Phase 2: Old Testament", phase2Desc: "Continuous Covenant Law Pools", phase3Title: "Phase 3: Grand Mixture Pool",
                phase3Desc: "Randomized Across All Scriptural Cards", phase4Title: "Phase 4: E.G. White Chronicles", phase4Desc: "Prophetic Heritage Insight Pools",
                phase5Title: "Phase 5: Mastery Blitz Mode", phase5Desc: "5-Second Extreme Rapid Fire Speed Clock", phase6Title: "Phase 6: Adventist Teachings",
                phase6Desc: "The 28 Fundamental Sanctuary & Prophetic Beliefs", task1: "Answer {target} questions across any stage",
                task2: "Maintain a win streak of {target} choices", task3: "Activate Chrono Freeze {target} times",
                task4: "Survive {target} extreme Mastery Blitz stages", task5: "Acquire {target} gold elements out of standard reward engines"
            },
            tw: {
                mapHub: "Akwankyerɛ Kuw", viewTasks: "Hwɛ Dwumadi Horow Akwankyerɛfo", launchWheel: "Twa Nkyekyem Nkonimdie Afiri No",
                startSpin: "HYƐ AFIRI NO ASE TWA", armoryTitle: "Akode Akorade", continueBtn: "TOA SO KO ANIM",
                subtitle: "Miia Adebisa Kaadi biara so sɛ wubue", phase1Title: "Apaso 1: Apam Foforo", phase1Desc: "Hwehwɛ Nsɛmpa ne Nkyerɛwee no mu",
                phase2Title: "Apaso 2: Apam Dedaw", phase2Desc: "Mmarahyɛ Nhyehyɛe Apam Horow", phase3Title: "Apaso 3: Afrafra Kuw Kɛse",
                phase3Desc: "Wbɛfrafra Kyerɛwnsɛm Kaadi Horow No Nyinaa mu", phase4Title: "Apaso 4: E.G. White Nnwuma", phase4Desc: "Nkɔmhyɛ Nkyerɛkyerɛ ne Nimdeɛ Horow",
                phase5Title: "Apaso 5: Nkɔmhyɛ Ntɛmso Akansi", phase5Desc: "Nnarekodi 5 Ntɛmso Berɛ Horow", phase6Title: "Apaso 6: Adventist Nkyerɛkyerɛ",
                phase6Desc: "Nkyerɛkyerɛ Titiriw 28 ne Kronkronbea Nsɛm", task1: "Bua nsɛmmisa {target} wɔ gyinabea biara",
                task2: "Kura nkonimdie {target} a ɛtoatoa so mpo", task3: "Yɛ Chrono Freeze adwuma {target} mprɛ pii",
                task4: "Tena ase boro {target} Ntɛmso Akansi mu nkonim", task5: "Nya sika kɔkɔɔ {target} fi afiri dwumadi mu"
            }
        };

        // System Configuration Profile Engines
        let state = JSON.parse(localStorage.getItem('revelatorsQuizDataV1')) || {
            gold: 500, lang: 'en',
            perks: { freeze: 3, half: 2, skip: 1, shield: 2 },
            lastSpinTimestamp: 0,
            stats: { currentStreak: 0, freezeUsed: 0, totalCoinsEarned: 500, blitzSurvivals: 0, overallAnswers: 0 },
            activitySetTier: 1,
            activityProgressCounters: [0, 0, 0, 0, 0]
        };

        const prizes = [
            { icon: "💡", color: "#fbbf24", action: () => { state.perks.half += 1; } },
            { icon: "🎫", color: "#3b82f6", action: () => { state.perks.skip += 1; } },
            { icon: "🪙", color: "#f59e0b", action: () => { state.gold += 50; } },
            { icon: "❄️", color: "#22d3ee", action: () => { state.perks.freeze += 1; } },
            { icon: "💰", color: "#eab308", action: () => { state.gold += 100; } },
            { icon: "🛡️", color: "#10b981", action: () => { state.perks.shield += 1; } }
        ];

        let currentCampaignMode = "";
        let campaignActivePool = [];
        let currentActiveQuestion = null;
        let countdownTimerRef = null;
        let secondsRemaining = 0;
        let initialSecondsAllowed = 15;
        let inputInteractionsBlocked = false;
        let isShieldActive = false;
        let isFreezeActive = false;
        
        let audioCtx = null;
        let globalAudioMuted = false;
        let activeBackgroundToneLoop = null;
        let currentBackgroundMoodType = "lobby"; 

        let wheelAnimationId = null;
        let wheelBaseRotation = 0;
        let wheelPulseScaleDelta = 0;
        let isWheelActivelySpinning = false;
        let activePostAlertCallback = null;

        // Snow Freeze Canvas System Engine
        let snowAnimationId = null;
        let snowFlakes = [];

        // FIXED: Robust translation utility with dynamic placeholder injection
        function getString(key, variables = {}) {
            let txt = i18nRegistry[state.lang]?.[key] || i18nRegistry['en']?.[key] || key;
            for (let v in variables) {
                let regex = new RegExp(`\\{${v}\\}`, 'g');
                txt = txt.replace(regex, variables[v]);
            }
            return txt;
        }

        function saveState() {
            localStorage.setItem('revelatorsQuizDataV1', JSON.stringify(state));
            const goldVal = document.getElementById('gold-val');
            const langLabel = document.getElementById('lang-label');
            const audioLabel = document.getElementById('audio-label');

            if (goldVal) goldVal.innerText = state.gold;
            if (langLabel) langLabel.innerText = state.lang === 'en' ? "ENGLISH" : "TWI";
            if (audioLabel) audioLabel.innerText = globalAudioMuted ? "AMBIANCE: OFF" : "AMBIANCE: ON";
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                let key = el.getAttribute('data-i18n');
                el.innerText = getString(key);
            });
        }

        function toggleSystemLocalizationLanguage() {
            state.lang = state.lang === 'en' ? 'tw' : 'en';
            saveState();
        }

        function initStarfieldAmbientLayer() {
            const canvas = document.getElementById('ambient-particle-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let dots = [];
            
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            for(let i=0; i<35; i++) {
                dots.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 2 + 1,
                    vY: Math.random() * 0.3 + 0.1,
                    alpha: Math.random() * 0.4 + 0.1
                });
            }

            function loop() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                dots.forEach(d => {
                    d.y -= d.vY;
                    if(d.y < -10) d.y = canvas.height + 10;
                    ctx.fillStyle = `rgba(129, 140, 248, ${d.alpha})`;
                    ctx.beginPath();
                    ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
                    ctx.fill();
                });
                requestAnimationFrame(loop);
            }
            loop();
        }

        function toggleSnowParticleSystem(activate) {
            const canvas = document.getElementById('snow-freeze-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            if(!activate) {
                canvas.style.opacity = "0";
                if (snowAnimationId) cancelAnimationFrame(snowAnimationId);
                return;
            }

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            canvas.style.opacity = "1";
            snowFlakes = [];

            for(let i=0; i<60; i++) {
                snowFlakes.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 3 + 1,
                    d: Math.random() * 1 + 0.5,
                    density: Math.random() * 20
                });
            }

            function drawSnowFrame() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "rgba(255, 255, 255, 0.75)";
                ctx.beginPath();
                for(let i=0; i<60; i++) {
                    let f = snowFlakes[i];
                    ctx.moveTo(f.x, f.y);
                    ctx.arc(f.x, f.y, f.r, 0, Math.PI*2, true);

                    f.y += f.d;
                    f.x += Math.sin(f.density) * 0.5;

                    if(f.y > canvas.height) {
                        snowFlakes[i] = { x: Math.random() * canvas.width, y: -10, r: f.r, d: f.d, density: f.density };
                    }
                }
                ctx.fill();
                snowAnimationId = requestAnimationFrame(drawSnowFrame);
            }
            drawSnowFrame();
        }

        function initAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                startProceduralAmbianceLoop();
            }
        }

        function startProceduralAmbianceLoop() {
            if (activeBackgroundToneLoop) clearInterval(activeBackgroundToneLoop);
            runMoodSynthesizerTick();
            activeBackgroundToneLoop = setInterval(runMoodSynthesizerTick, currentBackgroundMoodType === 'war' ? 850 : 3500);
        }

        function runMoodSynthesizerTick() {
            if (globalAudioMuted || !audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;

            if (currentBackgroundMoodType === 'war') {
                let drumOsc = audioCtx.createOscillator();
                let drumGain = audioCtx.createGain();
                drumOsc.type = 'triangle';
                drumOsc.frequency.setValueAtTime(58, now);
                drumOsc.frequency.exponentialRampToValueAtTime(0.01, now + 0.45);
                drumGain.gain.setValueAtTime(0.4, now);
                drumGain.gain.exponentialRampToValueAtTime(0.001, now + 0.42);
                drumOsc.connect(drumGain);
                drumGain.connect(audioCtx.destination);
                drumOsc.start(now); drumOsc.stop(now + 0.45);
            } else if (currentBackgroundMoodType === 'holy') {
                let harmonies = [220.00, 277.18, 329.63, 440.00];
                harmonies.forEach((f, index) => {
                    let osc = audioCtx.createOscillator();
                    let gain = audioCtx.createGain();
                    osc.type = 'sine'; osc.frequency.setValueAtTime(f, now);
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(0.02, now + 0.8 + (index * 0.1));
                    gain.gain.exponentialRampToValueAtTime(0.0001, now + 3.2);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(now); osc.stop(now + 3.4);
                });
            } else {
                let ambientFreqs = [146.83, 220.00, 293.66];
                ambientFreqs.forEach((f) => {
                    let osc = audioCtx.createOscillator();
                    let gain = audioCtx.createGain();
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(f, now);
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(0.02, now + 1.2);
                    gain.gain.exponentialRampToValueAtTime(0.0001, now + 3.3);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(now); osc.stop(now + 3.4);
                });
            }
        }

        function switchBackgroundMoodSoundtrack(mood) {
            initAudioContext();
            if (currentBackgroundMoodType === mood) return;
            currentBackgroundMoodType = mood;
            startProceduralAmbianceLoop();
        }

        function toggleGlobalAudioSystem(e) {
            if(e) e.stopPropagation();
            initAudioContext();
            globalAudioMuted = !globalAudioMuted;
            const btn = document.getElementById('audio-toggle-btn');
            if (!btn) return;
            
            if (globalAudioMuted) {
                btn.className = "bg-slate-950/95 border border-white/10 text-slate-500 px-3 py-1.5 rounded-full font-black text-[10px] uppercase tracking-widest flex items-center gap-1.5 shadow-xl";
                btn.innerHTML = `<span class="w-2 h-2 rounded-full bg-slate-600"></span><span id="audio-label">AMBIANCE: OFF</span>`;
            } else {
                btn.className = "bg-slate-950/95 border border-emerald-500/30 text-emerald-400 px-3 py-1.5 rounded-full font-black text-[10px] uppercase tracking-widest flex items-center gap-1.5 shadow-xl";
                btn.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span><span id="audio-label">AMBIANCE: ON</span>`;
                runMoodSynthesizerTick();
            }
            saveState();
        }

        function playInterfaceFeedbackChime(type) {
            if (globalAudioMuted || !audioCtx) return;
            let now = audioCtx.currentTime;
            if (type === 'correct') {
                [523.25, 659.25, 783.99].forEach((f, i) => {
                    let osc = audioCtx.createOscillator();
                    let gain = audioCtx.createGain();
                    osc.frequency.setValueAtTime(f, now + (i * 0.03));
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(now); osc.stop(now + 0.45);
                });
            } else if (type === 'wrong') {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(130, now);
                let f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.setValueAtTime(300, now);
                gain.gain.setValueAtTime(0.15, now); gain.gain.linearRampToValueAtTime(0.001, now + 0.3);
                osc.connect(f); f.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.35);
            }
        }

        // Boot system initializers cleanly on script load
        window.addEventListener('DOMContentLoaded', () => {
            initStarfieldAmbientLayer();
            saveState();
        });
    </script>
</body>
</html>
