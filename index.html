<!-- REFACTORED MASTER CODEBASE -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revelators Pathfinders Quiz Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        body { font-family: 'Rajdhani', sans-serif; background-color: #020617; color: #f8fafc; }
        .heading-font { font-family: 'Orbitron', sans-serif; }
        
        .game-bg-active {
            background-image: url('https://images.unsplash.com/photo-1601004890684-d8cbf643f5f2?auto=format&fit=crop&w=800&q=80');
            background-size: cover; background-position: center;
            background-blend-mode: overlay; background-color: rgba(3, 6, 17, 0.94);
        }

        .glass-card { background: rgba(15, 23, 42, 0.45); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 24px; }
        
        @keyframes auroraFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .rainbow-correct { 
            background: linear-gradient(45deg, #10b981, #2563eb, #8b5cf6, #059669);
            background-size: 300% 300%;
            animation: auroraFlow 3s ease infinite;
            border-color: transparent !important;
            color: #ffffff !important;
        }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen bg-slate-950 flex flex-col">
        <header class="p-4 flex justify-between items-center border-b border-white/5">
            <button onclick="toggleAudio()" class="text-emerald-400 text-[10px] font-bold">AMBIANCE: <span id="audio-status">OFF</span></button>
            <div id="gold-display" class="text-amber-400 font-black text-sm">500 💰</div>
        </header>

        <main id="window-canvas" class="flex-1 p-4"></main>

        <footer class="grid grid-cols-3 p-4 border-t border-white/5 bg-slate-950">
            <button onclick="renderMenu()" class="text-indigo-400"><i class="fa-solid fa-house"></i></button>
            <button onclick="renderTasks()" class="text-slate-500"><i class="fa-solid fa-list-check"></i></button>
            <button onclick="renderCopilot()" class="text-slate-500"><i class="fa-solid fa-robot"></i></button>
        </footer>
    </div>

    <script>
        // State management
        let state = { gold: 500, activeTab: 'home', music: false };

        // RESTORED: Procedural Engine
        function generateQuestions(category) {
            let pool = [];
            for(let i=0; i<50; i++) {
                pool.push({ q: `Question ${i+1} for ${category}`, a: ["A", "B", "C", "D"], correct: 0 });
            }
            return pool;
        }

        function renderMenu() {
            state.activeTab = 'home';
            document.getElementById('window-canvas').innerHTML = `
                <h1 class="text-xl font-black heading-font text-indigo-400">REVELATORS PATHFINDERS</h1>
                <div class="mt-6 space-y-3">
                    <button onclick="startLevel('nt')" class="w-full p-4 glass-card text-left">PHASE 1: NEW TESTAMENT</button>
                    <button onclick="startLevel('ot')" class="w-full p-4 glass-card text-left">PHASE 2: OLD TESTAMENT</button>
                </div>
            `;
        }

        function startLevel(cat) {
            let questions = generateQuestions(cat);
            document.getElementById('app').classList.add('game-bg-active');
            renderQuestion(questions[0], 0, questions);
        }

        function renderQuestion(q, idx, pool) {
            document.getElementById('window-canvas').innerHTML = `
                <div class="p-6 glass-card animate__animated animate__fadeIn">
                    <p class="text-lg font-bold">${q.q}</p>
                    <div class="mt-6 space-y-3">
                        ${q.a.map((ans, i) => `<button onclick="checkAnswer(${i}, ${q.correct}, ${idx}, '${JSON.stringify(pool)}')" class="btn-choice w-full p-3 rounded-xl border border-white/10">${ans}</button>`).join('')}
                    </div>
                </div>
            `;
        }

        function checkAnswer(chosen, correct, idx, poolStr) {
            let pool = JSON.parse(poolStr);
            const buttons = document.querySelectorAll('.btn-choice');
            
            if(chosen === correct) {
                // RESTORED: Rainbow animation
                buttons[chosen].classList.add('rainbow-correct');
                playTone(440, 0.2); // Pleasant melody
                setTimeout(() => { if(idx < 49) renderQuestion(pool[idx+1], idx+1, pool); }, 1000);
            } else {
                // RESTORED: Lively error sound, no irritating buzz
                playTone(150, 0.3, 'triangle'); 
                buttons[chosen].classList.add('bg-red-900');
            }
        }

        // RESTORED: Copilot Forum Functionality
        function renderCopilot() {
            state.activeTab = 'copilot';
            document.getElementById('window-canvas').innerHTML = `
                <h2 class="text-lg font-black text-cyan-400">COPILOT FORUM</h2>
                <div class="mt-4 glass-card p-4">
                    <input type="text" id="copilot-input" class="w-full bg-slate-900 p-2 rounded" placeholder="Transmit query parameters...">
                    <button onclick="processCopilot()" class="mt-2 bg-cyan-600 px-4 py-2 rounded">SEND</button>
                </div>
            `;
        }

        function processCopilot() {
            alert("Query Transmitted: " + document.getElementById('copilot-input').value);
        }

        function playTone(freq, dur, type='sine') {
            if(!state.music) return;
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            osc.type = type; osc.frequency.value = freq;
            osc.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + dur);
        }

        function toggleAudio() {
            state.music = !state.music;
            document.getElementById('audio-status').innerText = state.music ? 'ON' : 'OFF';
        }

        renderMenu();
    </script>
</body>
</html>
