<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuestLife: 100 Levels Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { transition: background 1.2s ease-in-out; min-height: 100vh; font-family: 'Comic Sans MS', sans-serif; overflow-x: hidden; }
        
        /* Fixed Environment Backgrounds */
        .world-jungle { background: linear-gradient(180deg, #064e3b, #065f46); }
        .world-desert { background: linear-gradient(180deg, #78350f, #92400e); }
        .world-cave { background: linear-gradient(180deg, #4c1d95, #1e1b4b); }
        .world-ice { background: linear-gradient(180deg, #1e3a8a, #3b82f6); }
        
        .quest-card { background: rgba(255, 255, 255, 0.95); border-radius: 20px; color: #1e293b; transition: all 0.4s ease; }
        
        /* Floating particles */
        .firefly { position: absolute; width: 4px; height: 4px; background: #fbbf24; border-radius: 50%; animation: drift 5s infinite; pointer-events: none; z-index: 1; }
        @keyframes drift { 0%, 100% { opacity: 0; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-60px) translateX(15px); } }

        /* Dramatic Animation Overlays */
        #level-up-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: flex; flex-col: column; align-items: center; justify-content: center;
            z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
        }
        #level-up-overlay.active { opacity: 1; pointer-events: auto; }
        
        .zoom-text { transform: scale(0.5); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); color: #fbbf24; font-weight: 900; text-shadow: 0 0 20px #f59e0b; }
        #level-up-overlay.active .zoom-text { transform: scale(1); }
    </style>
</head>
<body id="main-body" class="p-4 flex flex-col items-center world-jungle">
    <div id="fx-container"></div>

    <!-- DRAMATIC LEVEL UP OVERLAY -->
    <div id="level-up-overlay">
        <div class="text-center space-y-2">
            <h1 class="zoom-text text-5xl md:text-6xl tracking-wider animate-bounce">LEVEL UP! 🌟</h1>
            <p id="next-world-txt" class="text-white text-lg font-bold tracking-wide opacity-90">Traveling to a new realm...</p>
        </div>
    </div>

    <div id="game-content" class="w-full max-w-md space-y-6 mt-4 relative z-10 transition-all duration-500">
        <!-- STATUS CARD -->
        <div class="quest-card p-6 shadow-2xl text-center border-b-4 border-black/10">
            <h1 id="world-title" class="text-xs font-black uppercase tracking-widest mb-2 text-indigo-600">The Deep Jungle</h1>
            <div class="flex justify-between items-center">
                <div id="lvl-badge" class="w-14 h-14 rounded-full bg-indigo-600 text-white flex items-center justify-center text-2xl font-black shadow-md">1</div>
                <div class="text-right flex items-center space-x-3">
                    <div>
                        <p class="text-2xl font-black text-slate-800">💰 <span id="gold-val">0</span></p>
                        <p class="text-[10px] font-bold text-slate-400">TOTAL GOLD</p>
                    </div>
                    <!-- Small Soft Restart Icon Button -->
                    <button onclick="triggerReset()" class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 hover:bg-rose-100 hover:text-rose-600 active:scale-90 transition-all shadow-sm" title="Restart Game">
                        ↺
                    </button>
                </div>
            </div>
            <div class="mt-4">
                <div class="w-full h-4 bg-slate-200 rounded-full overflow-hidden border-2 border-white">
                    <div id="xp-bar" class="h-full bg-green-500 transition-all duration-500" style="width: 0%"></div>
                </div>
                <p class="text-[10px] font-black mt-1 text-slate-500 uppercase">Next Level: <span id="m-count">0</span> / 5 Missions</p>
            </div>
        </div>

        <!-- MISSIONS CONTAINER -->
        <div id="quest-container" class="space-y-3 text-left"></div>
    </div>

    <script>
        const missionLibrary = [
            { name: "The Deep Jungle", style: "world-jungle", tasks: ["Drink water 🥤", "Eat a fruit 🍎", "5 min stretch 🤸", "Deep breaths 🌬️", "Smile in mirror 😊"] },
            { name: "The Deep Jungle", style: "world-jungle", tasks: ["Eat a vegetable 🥦", "Walk 10 mins 🚶", "No soda today 🚫", "Wash face 🫧", "Stand for 1 hour 🧍"] },
            { name: "Scorched Desert", style: "world-desert", tasks: ["10 Jumping jacks ⚡", "Tidy your room 🧹", "Read 5 pages 📖", "Hug someone 🫂", "Write a goal ✍️"] },
            { name: "Scorched Desert", style: "world-desert", tasks: ["20 Squats 🏋️", "No junk food 🍎", "Drink 2L water 💧", "Power nap 😴", "Learn a new word 🧠"] },
            { name: "Crystal Caves", style: "world-cave", tasks: ["Run for 5 mins 🏃", "Cold water splash 🧊", "Balance on 1 leg 🦵", "Say thank you 🙏", "Check posture 📐"] }
        ];

        let gameData = JSON.parse(localStorage.getItem('megaQuestDataV3')) || {
            lvl: 1, gold: 0, completedCount: 0, currentMissions: []
        };

        function initLevel() {
            if (gameData.currentMissions.length === 0) {
                let currentWorldData = missionLibrary[(gameData.lvl - 1) % missionLibrary.length];
                gameData.currentMissions = currentWorldData.tasks.map(m => ({ text: m, done: false }));
            }
            save();
        }

        function save() {
            localStorage.setItem('megaQuestDataV3', JSON.stringify(gameData));
            updateUI();
        }

        function updateUI() {
            const body = document.getElementById('main-body');
            const title = document.getElementById('world-title');
            let currentWorldData = missionLibrary[(gameData.lvl - 1) % missionLibrary.length];
            
            body.className = "p-4 flex flex-col items-center " + currentWorldData.style;
            title.innerText = currentWorldData.name;

            document.getElementById('lvl-badge').innerText = gameData.lvl;
            document.getElementById('gold-val').innerText = gameData.gold;
            document.getElementById('m-count').innerText = gameData.completedCount;
            document.getElementById('xp-bar').style.width = (gameData.completedCount / 5) * 100 + "%";

            const container = document.getElementById('quest-container');
            container.innerHTML = "";
            
            gameData.currentMissions.forEach((m, i) => {
                const div = document.createElement('div');
                div.className = `quest-card p-4 flex items-center space-x-4 ${m.done ? 'opacity-40 grayscale scale-95' : 'shadow-lg'}`;
                div.innerHTML = `
                    <button onclick="completeTask(${i})" class="w-10 h-10 rounded-xl border-2 border-indigo-100 flex items-center justify-center text-xl transition-all ${m.done ? 'bg-green-500 text-white' : 'bg-white'}">${m.done ? '✓' : ''}</button>
                    <p class="font-bold text-slate-700">${m.text}</p>
                `;
                container.appendChild(div);
            });
        }

        function completeTask(i) {
            if (!gameData.currentMissions[i].done) {
                gameData.currentMissions[i].done = true;
                gameData.completedCount++;
                gameData.gold += 15;

                if (gameData.completedCount >= 5) {
                    gameData.lvl++;
                    gameData.completedCount = 0;
                    gameData.currentMissions = []; 
                    
                    playDramaticLevelUp();
                } else {
                    save();
                }
            }
        }

        function playDramaticLevelUp() {
            const overlay = document.getElementById('level-up-overlay');
            const content = document.getElementById('game-content');
            const nextWorldData = missionLibrary[(gameData.lvl - 1) % missionLibrary.length];
            
            document.getElementById('next-world-txt').innerText = `Entering: ${nextWorldData.name} (Level ${gameData.lvl})`;
            
            // Dramatic entrance sequence
            content.style.opacity = "0";
            content.style.transform = "scale(0.9)";
            overlay.classList.add('active');

            setTimeout(() => {
                // Initialize engine components mid-blackout
                initLevel();
                
                // Dramatic retreat sequence
                setTimeout(() => {
                    overlay.classList.remove('active');
                    content.style.opacity = "1";
                    content.style.transform = "scale(1)";
                }, 1200);
            }, 600);
        }

        function triggerReset() {
            if (confirm("🚨 ARE YOU SURE? This completely clears your Gold, Level, and puts you back at World 1!")) {
                localStorage.removeItem('megaQuestDataV3');
                gameData = { lvl: 1, gold: 0, completedCount: 0, currentMissions: [] };
                initLevel();
            }
        }

        // Particle layout generator
        for(let i=0; i<12; i++){
            let f = document.createElement('div');
            f.className = 'firefly';
            f.style.left = Math.random()*100 + "vw"; f.style.top = Math.random()*100 + "vh";
            f.style.animationDelay = Math.random()*3 + "s";
            document.getElementById('fx-container').appendChild(f);
        }

        initLevel();
    </script>
</body>
</html>
