<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Quest: Ultimate Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        #bg-overlay { position: fixed; inset: 0; background-color: #090d16; background-size: cover; background-position: center; transition: all 1.2s ease; z-index: 0; }
        #bg-tint { position: fixed; inset: 0; background: linear-gradient(180deg, rgba(15, 23, 42, 0.8), rgba(2, 6, 23, 0.98)); z-index: 1; }
        .glass-card { background: rgba(255, 255, 255, 0.06); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; color: white; }
        .btn-choice { width: 100%; text-align: left; padding: 1rem 1.2rem; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); font-weight: 600; color: #e2e8f0; transition: all 0.3s ease; cursor: pointer; }
        .btn-choice:hover { background: rgba(255, 255, 255, 0.15); border-color: #818cf8; transform: scale(1.02); }
        
        @keyframes clockAlarm {
            0% { transform: scale(1) rotate(0deg); color: #f59e0b; }
            25% { transform: scale(1.1) rotate(-10deg); color: #ef4444; }
            50% { transform: scale(1.1) rotate(10deg); color: #ef4444; }
            75% { transform: scale(1.1) rotate(-10deg); color: #ef4444; }
            100% { transform: scale(1) rotate(0deg); color: #ef4444; }
        }
        .alarm-active { animation: clockAlarm 0.4s infinite; }
    </style>
</head>
<body class="p-4 min-h-screen flex flex-col items-center justify-start text-white overflow-x-hidden font-sans selection:bg-indigo-500">
    
    <div id="bg-overlay"></div>
    <div id="bg-tint"></div>
    <audio id="bg-music" loop src="background.mp3"></audio>

    <!-- Top Status Control Bar -->
    <div class="fixed top-4 left-4 right-4 flex justify-between items-center z-50 max-w-md mx-auto w-full px-2">
        <button onclick="exitToMenu()" id="back-btn" class="hidden bg-slate-800/90 backdrop-blur border border-white/10 text-white px-4 py-2 rounded-full font-bold text-xs uppercase shadow-lg">
            🚪 Map Hub
        </button>
        <div class="flex gap-1.5 ml-auto">
            <button onclick="toggleLanguage()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1.5 rounded-full font-bold text-xs uppercase shadow-md">
                🌐 <span id="lang-label">English</span>
            </button>
            <div class="bg-slate-900/90 border border-white/10 px-4 py-1.5 rounded-full shadow-lg flex items-center gap-1.5">
                <span class="text-xs font-bold text-amber-400">💰</span>
                <span id="gold-val" class="font-black text-amber-400">285</span>
            </div>
        </div>
    </div>

    <!-- MAIN APP CANVAS CONTAINER -->
    <main id="window-canvas" class="w-full max-w-md mt-16 relative z-10 space-y-6 flex flex-col"></main>

    <script src="questions.js"></script>
    <script>
        // Core Encapsulated Game Engine Storage State 
        let state = JSON.parse(localStorage.getItem('bqUltimateData')) || {
            gold: 500,
            lang: 'en',
            // TEMPORARY DEVELOPMENT UNLOCK: Giving immediate access to all levels for testing
            unlockedModes: ['nt', 'ot', 'mix', 'egw', 'master'],
            perks: { freeze: 2, half: 2, skip: 1 },
            streak: 0
        };

        // Safety fallback check to ensure all modes are visible during our active dev phase
        ['nt', 'ot', 'mix', 'egw', 'master'].forEach(m => {
            if(!state.unlockedModes.includes(m)) state.unlockedModes.push(m);
        });

        let currentCampaign = "";
        let levelIndex = 0;
        let activePool = [];
        let bookQuestions = [];
        let questionIndex = 0;
        let activeQuestion = null;
        let timerClockInterval = null;
        let secondsLeft = 0;
        let isClockFrozen = false;
        let inputBlocked = false;

        function saveState() {
            localStorage.setItem('bqUltimateData', JSON.stringify(state));
            document.getElementById('gold-val').innerText = state.gold;
        }

        // Render Main Menu with the Built-in Power-Up Marketplace
        function renderMenuMap() {
            currentCampaign = "";
            document.getElementById('back-btn').classList.add('hidden');
            document.getElementById('bg-overlay').style.backgroundImage = "none";
            
            const canvas = document.getElementById('window-canvas');
            canvas.innerHTML = `
                <div class="text-center space-y-1 animate__animated animate__fadeInDown">
                    <h1 class="text-4xl font-black tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400">BIBLE QUEST</h1>
                    <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Development Testing Sandbox</p>
                </div>

                <!-- 🛒 THE POWER-UP MARKETPLACE OVERLAY -->
                <div class="glass-card p-4 space-y-3 border-amber-500/30 bg-amber-950/10">
                    <div class="flex justify-between items-center border-b border-white/10 pb-2">
                        <span class="text-xs font-black text-amber-400 uppercase tracking-wider">🛒 Power-Up Armory Shop</span>
                        <span class="text-[10px] text-slate-400">Tap to buy with coins</span>
                    </div>
                    <div class="grid grid-cols-3 gap-2 text-center">
                        <button onclick="buyPerk('freeze', 50)" class="bg-slate-900/60 p-2.5 rounded-xl border border-white/5 hover:border-sky-400 transition-all">
                            <div class="text-xl">❄️</div>
                            <div class="text-[11px] font-bold mt-1">Freeze</div>
                            <div class="text-[10px] text-amber-400 font-bold">50 💰</div>
                            <div class="text-[10px] text-slate-400 mt-1 bg-slate-950 rounded py-0.5">Own: ${state.perks.freeze}</div>
                        </button>
                        <button onclick="buyPerk('half', 75)" class="bg-slate-900/60 p-2.5 rounded-xl border border-white/5 hover:border-rose-400 transition-all">
                            <div class="text-xl">⚖️</div>
                            <div class="text-[11px] font-bold mt-1">50:50</div>
                            <div class="text-[10px] text-amber-400 font-bold">75 💰</div>
                            <div class="text-[10px] text-slate-400 mt-1 bg-slate-950 rounded py-0.5">Own: ${state.perks.half}</div>
                        </button>
                        <button onclick="buyPerk('skip', 100)" class="bg-slate-900/60 p-2.5 rounded-xl border border-white/5 hover:border-purple-400 transition-all">
                            <div class="text-xl">🔮</div>
                            <div class="text-[11px] font-bold mt-1">Skip</div>
                            <div class="text-[10px] text-amber-400 font-bold">100 💰</div>
                            <div class="text-[10px] text-slate-400 mt-1 bg-slate-950 rounded py-0.5">Own: ${state.perks.skip}</div>
                        </button>
                    </div>
                </div>

                <div class="space-y-2.5 max-h-[320px] overflow-y-auto pr-1 animate__animated animate__fadeInUp">
                    <button onclick="launchCampaign('nt')" class="w-full p-4 glass-card text-left flex justify-between items-center hover:border-indigo-500 transition-all">
                        <div><h3 class="text-md font-black text-indigo-300">Phase 1: New Testament</h3><p class="text-[11px] text-slate-400">Gospels & Letters</p></div>
                        <span class="text-xl">⚡</span>
                    </button>
                    <button onclick="launchCampaign('ot')" class="w-full p-4 glass-card text-left flex justify-between items-center hover:border-emerald-500 transition-all">
                        <div><h3 class="text-md font-black text-emerald-300">Phase 2: Old Testament</h3><p class="text-[11px] text-slate-400">Law & Hebrew History</p></div>
                        <span class="text-xl">📜</span>
                    </button>
                    <button onclick="launchCampaign('mix')" class="w-full p-4 glass-card text-left flex justify-between items-center hover:border-purple-500 transition-all">
                        <div><h3 class="text-md font-black text-purple-300">Phase 3: Grand Mixture</h3><p class="text-[11px] text-slate-400">Full Randomized Journey</p></div>
                        <span class="text-xl">🌀</span>
                    </button>
                    <button onclick="launchCampaign('egw')" class="w-full p-4 glass-card text-left flex justify-between items-center hover:border-amber-400 transition-all">
                        <div><h3 class="text-md font-black text-amber-300">Phase 4: E.G. White Writings <span class="text-xs text-emerald-400 font-normal ml-2">(DEV UNLOCKED)</span></h3><p class="text-[11px] text-slate-400">Prophetic History Insights</p></div>
                        <span class="text-xl">✒️</span>
                    </button>
                    <button onclick="launchCampaign('master')" class="w-full p-4 glass-card text-left flex justify-between items-center hover:border-red-500 transition-all">
                        <div><h3 class="text-md font-black text-red-400">Phase 5: Mastery Mode <span class="text-xs text-emerald-400 font-normal ml-2">(DEV UNLOCKED)</span></h3><p class="text-[11px] text-slate-400">Hyper Mode: 5-Second Speed Clock!</p></div>
                        <span class="text-xl">🔥</span>
                    </button>
                </div>
            `;
        }

        // Shop Purchase Logic Handler
        function buyPerk(perkName, cost) {
            if (state.gold >= cost) {
                state.gold -= cost;
                state.perks[perkName]++;
                saveState();
                renderMenuMap();
                triggerBeepTone(587.33, 0.15); // Happy ding sound
            } else {
                alert("Not enough coins! Keep playing to earn enough balance.");
            }
        }

        function launchCampaign(mode) {
            currentCampaign = mode;
            levelIndex = 0;
            state.streak = 0;
            document.getElementById('back-btn').classList.remove('hidden');
            
            if (mode === 'nt') activePool = quizDatabase.filter(b => b.group === 'NT');
            else if (mode === 'ot') activePool = quizDatabase.filter(b => b.group === 'OT');
            else if (mode === 'egw') activePool = quizDatabase.filter(b => b.group === 'EGW');
            else activePool = [...quizDatabase].sort(() => Math.random() - 0.5);

            initNewBookTrack();
        }

        // Setup a Book Node and Shuffle Its Subgroup Questions
        function initNewBookTrack() {
            if (levelIndex >= activePool.length) {
                renderVictoryScreen();
                return;
            }
            
            // Fetch and clone the full question sheet for this book
            const targetBook = activePool[levelIndex];
            bookQuestions = [...targetBook.questions].sort(() => Math.random() - 0.5);
            questionIndex = 0;

            loadQuestionNode();
        }

        function loadQuestionNode() {
            if (questionIndex >= bookQuestions.length) {
                // Book cleared completely -> advance to next book in path
                levelIndex++;
                initNewBookTrack();
                return;
            }

            inputBlocked = false;
            isClockFrozen = false;
            const targetBook = activePool[levelIndex];
            document.getElementById('bg-overlay').style.backgroundImage = `url('${targetBook.bg}')`;

            activeQuestion = bookQuestions[questionIndex];
            
            // Calculate tier hierarchy configuration and set dynamic step-up speed values
            let difficultyTier = activeQuestion.subGroup || "Easy"; 
            
            if (currentCampaign === 'master') {
                secondsLeft = 5;
            } else {
                if (difficultyTier === "Difficult") secondsLeft = 10;
                else if (difficultyTier === "Moderate") secondsLeft = 15;
                else secondsLeft = 20; // Default Easy Mode Timer Setup
            }

            const canvas = document.getElementById('window-canvas');
            canvas.innerHTML = `
                <div class="glass-card p-4 flex justify-between items-center animate__animated animate__fadeIn">
                    <div>
                        <h2 class="text-xl font-black text-indigo-300 tracking-wide">${targetBook.name}</h2>
                        <div class="flex gap-2 mt-1">
                            <span class="text-[9px] uppercase px-2 py-0.5 rounded bg-slate-900 font-bold text-slate-400">Book ${levelIndex + 1}/${activePool.length}</span>
                            <span class="text-[9px] uppercase px-2 py-0.5 rounded font-black ${difficultyTier==='Difficult'?'bg-red-900/60 text-red-300':difficultyTier==='Moderate'?'bg-amber-900/60 text-amber-300':'bg-emerald-900/60 text-emerald-300'}">${difficultyTier} Tier</span>
                        </div>
                    </div>
                    
                    <div class="flex flex-col items-center">
                        <div id="clock-wrapper" class="text-2xl font-black tracking-tighter tabular-nums text-amber-400 bg-slate-950/40 px-3 py-1 rounded-xl border border-white/10 transition-all">
                            ⏰ <span id="clock-digit">${secondsLeft}</span>s
                        </div>
                    </div>
                </div>

                <div class="glass-card p-6 min-h-[130px] flex items-center justify-center text-center animate__animated animate__zoomIn">
                    <h3 class="text-lg font-bold leading-snug">
                        ${state.lang === 'en' ? activeQuestion.q : (activeQuestion.q_twi || activeQuestion.q)}
                    </h3>
                </div>

                <div id="choice-matrix" class="space-y-2"></div>

                <!-- 🔮 ADVANCED PERK SYSTEM ROW HUD -->
                <div class="grid grid-cols-3 gap-2 mt-1 text-xs">
                    <button onclick="triggerFreezePerk()" class="bg-sky-950/60 border border-sky-500/20 p-2.5 rounded-xl flex flex-col items-center justify-center gap-0.5 hover:bg-sky-900/40 transition-all">
                        <span>❄️ Freeze</span><span class="text-[10px] text-sky-400 font-bold">Qty: ${state.perks.freeze}</span>
                    </button>
                    <button onclick="triggerHalfPerk()" class="bg-rose-950/60 border border-rose-500/20 p-2.5 rounded-xl flex flex-col items-center justify-center gap-0.5 hover:bg-rose-900/40 transition-all">
                        <span>⚖️ 50:50</span><span class="text-[10px] text-rose-400 font-bold">Qty: ${state.perks.half}</span>
                    </button>
                    <button onclick="triggerSkipPerk()" class="bg-purple-950/60 border border-purple-500/20 p-2.5 rounded-xl flex flex-col items-center justify-center gap-0.5 hover:bg-purple-900/40 transition-all">
                        <span>🔮 Skip Card</span><span class="text-[10px] text-purple-400 font-bold">Qty: ${state.perks.skip}</span>
                    </button>
                </div>
            `;

            const matrix = document.getElementById('choice-matrix');
            activeQuestion.a.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "btn-choice animate__animated animate__fadeInUp";
                btn.style.animationDelay = `${idx * 0.05}s`;
                btn.innerText = opt;
                btn.onclick = () => evaluateAnswer(idx, btn);
                matrix.appendChild(btn);
            });

            runCountdownLoop();
        }

        function runCountdownLoop() {
            clearInterval(timerClockInterval);
            const digit = document.getElementById('clock-digit');
            const wrapper = document.getElementById('clock-wrapper');

            timerClockInterval = setInterval(() => {
                if (isClockFrozen || inputBlocked) return;
                secondsLeft--;
                digit.innerText = secondsLeft;

                if (secondsLeft <= 4) {
                    wrapper.className = "text-2xl font-black tracking-tighter tabular-nums bg-slate-950/40 px-3 py-1 rounded-xl border alarm-active";
                    triggerBeepTone(880, 0.08); 
                }

                if (secondsLeft <= 0) {
                    clearInterval(timerClockInterval);
                    wrapper.className = wrapper.className.replace("alarm-active", "");
                    handleFailurePenalty();
                }
            }, 1000);
        }

        function triggerBeepTone(freq, dur) {
            try {
                let ctx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = ctx.createOscillator();
                let gain = ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(0.04, ctx.currentTime);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + dur);
            } catch(e){}
        }

        function evaluateAnswer(selectedIdx, clickedElement) {
            if (inputBlocked) return;
            inputBlocked = true;
            clearInterval(timerClockInterval);

            if (selectedIdx === activeQuestion.correct) {
                clickedElement.className = "btn-choice bg-emerald-600/80 border-emerald-400 text-white animate__animated animate__pulse font-black";
                
                let addedGold = currentCampaign === 'master' ? 40 : 15;
                state.gold += addedGold;
                state.streak++;

                // Award organic drop perks on streaks
                if (state.streak % 5 === 0) state.perks.freeze++;
                if (state.streak % 8 === 0) state.perks.half++;

                questionIndex++;
                saveState();
                setTimeout(loadQuestionNode, 1200);
            } else {
                clickedElement.className = "btn-choice bg-rose-600/80 border-rose-400 text-white animate__animated animate__shakeX font-black";
                setTimeout(handleFailurePenalty, 1000);
            }
        }

        // 🚨 CRITICAL -20 COIN DEDUCTION AND COMPLETELY SHUFFLE POOL ON ERROR
        function handleFailurePenalty() {
            clearInterval(timerClockInterval);
            state.streak = 0;
            state.gold = Math.max(0, state.gold - 20); // Drops wallet by 20 coins safely
            saveState();

            alert("❌ Incorrect! 20 Coins deducted. The book pool has reshuffled!");
            
            // Reshuffle the current book's question sheet entirely
            const targetBook = activePool[levelIndex];
            bookQuestions = [...targetBook.questions].sort(() => Math.random() - 0.5);
            questionIndex = 0; 
            
            loadQuestionNode();
        }

        function triggerFreezePerk() {
            if (isClockFrozen || state.perks.freeze <= 0 || inputBlocked) return;
            state.perks.freeze--;
            isClockFrozen = true;
            saveState();
            loadQuestionNode();
        }

        function triggerHalfPerk() {
            if (state.perks.half <= 0 || inputBlocked) return;
            state.perks.half--;
            saveState();
            
            const matrix = document.getElementById('choice-matrix');
            const buttons = matrix.getElementsByTagName('button');
            let wrongIndices = [];
            for(let i=0; i<buttons.length; i++) {
                if (i !== activeQuestion.correct) wrongIndices.push(i);
            }
            wrongIndices.sort(() => Math.random() - 0.5);
            wrongIndices.slice(0, 2).forEach(idx => {
                buttons[idx].style.opacity = "0";
                buttons[idx].style.pointerEvents = "none";
            });
        }

        function triggerSkipPerk() {
            if (state.perks.skip <= 0 || inputBlocked) return;
            state.perks.skip--;
            saveState();
            questionIndex++; // Passes forward over current entry index position smoothly
            loadQuestionNode();
        }

        function renderVictoryScreen() {
            const canvas = document.getElementById('window-canvas');
            canvas.innerHTML = `
                <div class="glass-card p-8 text-center space-y-6 animate__animated animate__backInDown">
                    <h1 class="text-3xl font-black text-amber-400">🏆 MISSION ACCOMPLISHED</h1>
                    <p class="text-xs text-slate-300">You conquered this path. Keep farming coins to secure top standing scores!</p>
                    <div class="bg-slate-950/50 p-4 rounded-2xl border border-white/5">
                        <p class="text-3xl font-black text-amber-400">💰 ${state.gold}</p>
                    </div>
                    <button onclick="exitToMenu()" class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 p-4 rounded-xl font-black text-xs uppercase tracking-wider">
                        Return to Map Selection
                    </button>
                </div>
            `;
        }

        function toggleLanguage() {
            state.lang = state.lang === 'en' ? 'tw' : 'en';
            saveState();
            document.getElementById('lang-label').innerText = state.lang === 'en' ? "English" : "Twi";
            if (currentCampaign !== "") loadQuestionNode();
            else renderMenuMap();
        }

        function exitToMenu() {
            clearInterval(timerClockInterval);
            renderMenuMap();
        }

        window.onload = () => {
            saveState();
            renderMenuMap();
            document.body.addEventListener('click', () => {
                document.getElementById('bg-music').play().catch(()=>{});
            }, { once: true });
        };
    </script>
</body>
</html>
