<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Quest Blitz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #bg-overlay { position: fixed; inset: 0; background-color: #0f172a; background-size: cover; background-position: center; transition: background-image 1s ease-in-out; z-index: 0; }
        #bg-tint { position: fixed; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0.5), rgba(0,0,0,0.8)); z-index: 1; }
        body { min-height: 100vh; background: #0f172a; color: white; font-family: sans-serif; overflow-x: hidden; }
        .quiz-card { background: rgba(255, 255, 255, 0.95); border-radius: 20px; color: #1e293b; position: relative; z-index: 10; }
        .btn-opt { width: 100%; text-align: left; padding: 1rem; border-radius: 12px; border: 1px solid #e2e8f0; background: white; font-weight: bold; transition: all 0.2s; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .btn-opt:hover { background: #f8fafc; border-color: #cbd5e1; }
        .timer-danger { color: #ef4444 !important; animation: vibrate 0.2s linear infinite; }
        @keyframes vibrate { 0%, 100% { transform: translate(0); } 20% { transform: translate(-2px, 2px); } 40% { transform: translate(-2px, -2px); } 60% { transform: translate(2px, 2px); } 80% { transform: translate(2px, -2px); } }
        
        /* LEVEL UP SPLASH */
        #level-up-splash { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: all 0.5s ease-in-out; }
        #level-up-splash.active { opacity: 1; pointer-events: auto; }
        .scale-up { transform: scale(0.7); transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        #level-up-splash.active .scale-up { transform: scale(1); }

        /* FIREFLIES ANIMATION */
        .firefly { position: absolute; background: rgba(250, 204, 21, 0.8); border-radius: 50%; pointer-events: none; filter: blur(1px); box-shadow: 0 0 10px rgba(250, 204, 21, 1); animation: drift linear infinite, flash ease-in-out infinite; z-index: 5; }
        @keyframes flash { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
        @keyframes drift { 0% { transform: translateY(105vh) translateX(0); } 100% { transform: translateY(-10vh) translateX(100px); } }

        /* CELEBRATION PARTICLES */
        .confetti { position: fixed; width: 10px; height: 10px; border-radius: 2px; pointer-events: none; z-index: 80; animation: burst 0.8s ease-out forwards; }
        @keyframes burst {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) rotate(var(--r)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body class="p-4 flex flex-col items-center">
    <div id="bg-overlay"></div>
    <div id="bg-tint"></div>

    <!-- FIREFLY CONTAINER -->
    <div id="fireflies-layer" class="fixed inset-0 pointer-events-none overflow-hidden select-none"></div>

    <!-- AUDIO ELEMENTS -->
    <audio id="bg-music" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

    <!-- DRAMATIC LEVEL UP MODAL -->
    <div id="level-up-splash">
        <div class="scale-up bg-gradient-to-b from-amber-400 via-orange-500 to-yellow-600 p-8 rounded-3xl text-center shadow-2xl max-w-sm w-11/12 border-4 border-white">
            <div class="text-7xl mb-2 drop-shadow-lg">👑 ✨ 👑</div>
            <h1 class="text-4xl font-black text-white uppercase tracking-wider drop-shadow-md">Book Cleared!</h1>
            <p class="text-white font-bold mt-2 text-lg">Scripture Mastery Growing!</p>
            <div class="mt-4 bg-white/20 py-2 px-4 rounded-full text-white inline-block font-black text-sm uppercase tracking-widest" id="next-world-txt">
                Advancing to Next Book...
            </div>
        </div>
    </div>

    <!-- HUD MENU -->
    <div class="fixed top-4 left-4 right-4 flex justify-between z-50">
        <button onclick="toggleLanguage()" class="bg-indigo-600 text-white px-4 py-2 rounded-full font-bold shadow-lg text-sm border border-white/20">
            🌐 <span id="lang-label">English</span>
        </button>
        <button onclick="toggleMusic()" id="music-btn" class="bg-slate-900/80 backdrop-blur p-3 h-11 w-11 rounded-full text-lg border border-white/10 flex items-center justify-center shadow-lg active:scale-95 transition-all">🔇</button>
    </div>

    <!-- MAIN GAME BOARD -->
    <div id="game-content" class="w-full max-w-md space-y-6 mt-16 relative z-10">
        <div class="quiz-card p-6 shadow-2xl">
            <h1 id="world-title" class="text-xs font-black uppercase tracking-widest mb-3 text-indigo-600 text-center">LOADING BLITZ...</h1>
            <div class="flex justify-between items-center mb-4">
                <div id="lvl-badge" class="px-3 py-1 rounded-full bg-indigo-600 text-white flex items-center justify-center font-black text-xs shadow-md uppercase tracking-wider">Book 1</div>
                <div class="flex flex-col items-center">
                    <span id="timer-clock" class="text-3xl font-black text-slate-700">10</span>
                </div>
                <div class="text-right">
                    <p class="text-xl font-black text-slate-800">💰 <span id="gold-val">0</span></p>
                </div>
            </div>
            <div class="w-full h-1.5 bg-slate-200 rounded-full overflow-hidden">
                <div id="xp-bar" class="h-full bg-green-500 transition-all duration-500" style="width: 0%"></div>
            </div>
            <div class="text-center text-[10px] text-slate-400 mt-2 font-bold tracking-wider" id="q-counter-txt">Progress: 0 / 20</div>
        </div>

        <!-- CONTAINER WHERE QUESTIONS REDIRECT -->
        <div id="quiz-container" class="space-y-4"></div>
        
        <!-- SKIP BUTTON -->
        <button id="skip-btn" onclick="skipLevel()" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 rounded-xl shadow-lg transition-all active:scale-95 border-b-4 border-amber-700 flex justify-center items-center gap-2">
            Skip Current Book (Cost: 💰100) ⏭️
        </button>

        <button onclick="triggerReset()" class="w-full text-center text-xs text-white/30 mt-10 uppercase tracking-widest block bg-slate-900/40 py-2 rounded-xl border border-white/5 tracking-wider">Tap Here to Hard Reset Data</button>
    </div>

    <script>
        // BIBLE BOOKS DATA SYSTEM (20 Moderate/Difficult questions structured per book)
        const quizDatabase = [
            {
                level: 1,
                name: "Genesis (Moderate)",
                bgImage: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1000",
                timerDuration: 10,
                questions: [
                    { q: "Who was the first man?", q_twi: "Hwan ne onipa a odi kan?", a: ["Noah", "Adam", "Seth", "Abel"], a_twi: ["Noa", "Adam", "Set", "Abel"], correct: 1 },
                    { q: "What was the first thing God created?", q_twi: "Dɛn ne adeɛ a Onyankopɔn bɔɔ no mfiaseɛ?", a: ["Animals", "Light", "Humans", "Trees"], a_twi: ["Mmoa", "Hann", "Nnipa", "Nnua"], correct: 1 },
                    { q: "Who built the Ark?", q_twi: "Hwan na ɔyɛɛ Adaka no?", a: ["Moses", "Abraham", "Noah", "David"], a_twi: ["Mose", "Abraham", "Noa", "Dawid"], correct: 2 },
                    { q: "Who was Adam's wife?", q_twi: "Hwan ne Adam yere?", a: ["Sarah", "Eve", "Ruth", "Esther"], a_twi: ["Sara", "Hawa", "Rut", "Ester"], correct: 1 },
                    { q: "Which brother killed Abel?", q_twi: "Onua bɛn na okum Abel?", a: ["Seth", "Cain", "Jacob", "Esau"], a_twi: ["Set", "Kain", "Yakobo", "Esau"], correct: 1 },
                    { q: "How many days did God take to create the world?", q_twi: "Nna dodoɔ sɛn na Onyankopɔn de bɔɔ wiase?", a: ["6", "7", "10", "40"], a_twi: ["6", "7", "10", "40"], correct: 0 },
                    { q: "What did God do on the 7th day?", q_twi: "Dɛn na Onyankopɔn yɛɛ no da a ɛtɔ so nson?", a: ["Created Sun", "He rested", "Created Rain", "He sang"], a_twi: ["Ɔbɔɔ awia", "Ɔhomee", "Ɔtɔɔ nsuo", "Ɔtoo dwom"], correct: 1 },
                    { q: "What fruit did Eve eat?", q_twi: "Aba bɛn na Hawa die?", a: ["Banana", "Forbidden Fruit", "Grape", "Orange"], a_twi: ["Kwadu", "Aba a wɔabra", "Bobe", "Akutu"], correct: 1 },
                    { q: "Who was the oldest man in the Bible?", q_twi: "Hwan ne onipa a ɔkyɛɛ paa wɔ Bible mu?", a: ["Enoch", "Methuselah", "Noah", "Adam"], a_twi: ["Enok", "Metusela", "Noa", "Adam"], correct: 1 },
                    { q: "What was the sign of God's promise to Noah?", q_twi: "Dɛn ne Onyankopɔn bɔhyɛ sɛnkyerɛnne kyerɛɛ Noa?", a: ["Fire", "A Rainbow", "A Star", "A Dove"], a_twi: ["Ogya", "Nyankontɔn", "Nsoroma", "Aburuburo"], correct: 1 },
                    { q: "Who is known as the Father of many nations?", q_twi: "Hwan na wɔfrɛ no aman dodoɔ agya?", a: ["Isaac", "Jacob", "Abraham", "Lot"], a_twi: ["Isak", "Yakobo", "Abraham", "Lot"], correct: 2 },
                    { q: "Who was Abraham's wife?", q_twi: "Hwan ne Abraham yere?", a: ["Hagar", "Sarah", "Rebekah", "Leah"], a_twi: ["Hagar", "Sara", "Rebeka", "Lea"], correct: 1 },
                    { q: "Who was Abraham's son of promise?", q_twi: "Hwan ne Abraham bɔhyɛ ba no?", a: ["Ishmael", "Isaac", "Esau", "Joseph"], a_twi: ["Ismael", "Isak", "Esau", "Yosef"], correct: 1 },
                    { q: "What did Jacob dream about reaching to heaven?", q_twi: "Dɛn na Yakobo soo daeɛ sɛ ɛkɔ soro?", a: ["A Bridge", "A Ladder", "A Mountain", "A Tree"], a_twi: ["Kodoɔ", "Atwerɛ", "Bepo", "Dua"], correct: 1 },
                    { q: "Who was Jacob's twin brother?", q_twi: "Hwan ne Yakobo nta nua?", a: ["Joseph", "Esau", "Levi", "Benjamin"], a_twi: ["Yosef", "Esau", "Levi", "Benyamin"], correct: 1 },
                    { q: "How many sons did Jacob have?", q_twi: "Mma mmarima dodoɔ sɛn na Yakobo woo wɔn?", a: ["10", "12", "7", "3"], a_twi: ["10", "12", "7", "3"], correct: 1 },
                    { q: "Which son of Jacob was sold into slavery?", q_twi: "Yakobo ba bɛn na wɔtɔnn no nkoasuo mu?", a: ["Reuben", "Judah", "Joseph", "Dan"], a_twi: ["Ruben", "Yuda", "Yosef", "Dan"], correct: 2 },
                    { q: "What special gift did Jacob give Joseph?", q_twi: "Akyɛdeɛ titiri bɛn na Yakobo de maa Yosef?", a: ["A Sword", "A Coat of many colors", "Gold", "A Horse"], a_twi: ["Afena", "Atadeɛ amamuo", "Sika", "Ponko"], correct: 1 },
                    { q: "Who interpreted Pharaoh's dreams?", q_twi: "Hwan na ɔkyerɛɛ Farao daeɛ ase?", a: ["Moses", "Joseph", "Daniel", "Aaron"], a_twi: ["Mose", "Yosef", "Daniel", "Aaron"], correct: 1 },
                    { q: "Where did the Israelites live in Egypt?", q_twi: "Ɛhe na Israelfoɔ no tɛnee wɔ Misraim?", a: ["Cairo", "Goshen", "Sinai", "Alexandria"], a_twi: ["Cairo", "Gosen", "Sinai", "Alexandria"], correct: 1 }
                ]
            },
            {
                level: 2,
                name: "Revelation (Very Difficult)",
                bgImage: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=1000",
                timerDuration: 5, // Dropped to 5 seconds for high levels
                questions: [
                    { q: "To how many churches did John write his apocalyptic letters?", q_twi: "Nkyerɛwee a ɛfa awieiɛ ho no, Yohane kyerɛw kɔmaa asafo dodoɔ sɛn?", a: ["3", "7", "12", "24"], a_twi: ["3", "7", "12", "24"], correct: 1 },
                    { q: "What island was John on when he received the Revelation?", q_twi: "Supɔ bɛn na na Yohane wɔ so bere a onyaa Nyanikyerɛ no?", a: ["Malta", "Cyprus", "Patmos", "Crete"], a_twi: ["Malta", "Cyprus", "Patmos", "Crete"], correct: 2 },
                    { q: "What color horse represents Death in the Four Horsemen?", q_twi: "Apɔnkɔ baanan no mu no, ponko kɔla bɛn na ogyina hɔ ma Owu?", a: ["White", "Red", "Black", "Pale/Greenish-Gray"], a_twi: ["Fitaa", "Kɔkɔɔ", "Tuntum", "Nsonso/Afasebiri"], correct: 3 },
                    { q: "How many elders sit around the throne of God?", q_twi: "Mpanimfoɔ dodoɔ sɛn na wɔte Onyankopɔn ahengua no ho?", a: ["12", "24", "70", "144"], a_twi: ["12", "24", "70", "144"], correct: 1 },
                    { q: "Who is worthy to open the scroll sealed with seven seals?", q_twi: "Hwan na ɔfata sɛ obue nhoma a wɔde nkyerɛwee nson asɔ ano no?", a: ["The Lion of Judah", "Michael", "Gabriel", "John"], a_twi: ["Yuda mu Gyata", "Michael", "Gabriel", "Yohane"], correct: 0 },
                    { q: "What falls from heaven when the third angel blows his trumpet?", q_twi: "Dɛn na ɛfi soro tɔ bere a ɔbɔfoɔ a ɔtɔ so mmeansa hyɛn ne totorobento no?", a: ["Hail", "Fire", "Wormwood Star", "Locusts"], a_twi: ["Asukɔtwea", "Ogya", "Nsoroma Nnwerɛba", "Mfondum"], correct: 2 },
                    { q: "What is the numeric mark of the Beast?", q_twi: "Abowa no nnyinasoɔ nɔma ne sɛn?", a: ["777", "666", "999", "144"], a_twi: ["777", "666", "999", "144"], correct: 1 },
                    { q: "How many thousands from each tribe of Israel are sealed?", q_twi: "Israel mmusuakuo biara mu no, nnipa mpem dodoɔ sɛn na wɔsɔɔ wɔn ano?", a: ["10", "12", "144", "7"], a_twi: ["10", "12", "144", "7"], correct: 1 },
                    { q: "What structure does not exist in the New Jerusalem?", q_twi: "Adan titiri bɛn na onni Yerusalem Foforo no mu?", a: ["A Wall", "A Gate", "A Temple", "A Street"], a_twi: ["Afasuo", "Aboboano", "Asɔrefie", "Abɔnten"], correct: 2 },
                    { q: "Who bound the dragon for a thousand years?", q_twi: "Hwan na ɔkyekyeree ɔtweaseɛmpon no mfeɛ mpem baako?", a: ["An Angel", "Jesus", "Moses", "Michael"], a_twi: ["Ɔbɔfoɔ bi", "Yesu", "Mose", "Michael"], correct: 0 },
                    { q: "What is the final place of punishment for the devil called?", q_twi: "Asotweɔ baabi a ɛdi akyiri ma ɔbɔonsam no deɛn na wɔfrɛ hɔ?", a: ["Hades", "The Lake of Fire", "The Pit", "Tartarus"], a_twi: ["Asaman", "Ogya Tanoɔ", "Amena Tuntum", "Tartarus"], correct: 1 },
                    { q: "Which archangel fought against the dragon in heaven?", q_twi: "Ɔbɔfoɔ panin bɛn na ɔne ɔtweaseɛmpon no koom wɔ soro?", a: ["Gabriel", "Uriel", "Michael", "Raphael"], a_twi: ["Gabriel", "Uriel", "Michael", "Raphael"], correct: 2 },
                    { q: "How many foundations does the wall of New Jerusalem have?", q_twi: "Yerusalem Foforo afasuo no wɔ nnyinasoɔ dodoɔ sɛn?", a: ["7", "12", "24", "4"], a_twi: ["7", "12", "24", "4"], correct: 1 },
                    { q: "Out of whose mouth comes a sharp sword to smite nations?", q_twi: "Hwan anofafa mu na afena a ano yɛ nnam fi ba sɛ ɔde bɛbɔ amanaman?", a: ["The Word of God", "The Beast", "The False Prophet", "John"], a_twi: ["Onyankopɔn Asɛm", "Abowa no", "Atoro Profeto", "Yohane"], correct: 0 },
                    { q: "What are the foundations of the New Jerusalem wall adorned with?", q_twi: "Dɛn na wɔde asiesie Yerusalem Foforo afasuo nnyinasoɔ no?", a: ["Gold", "Precious Stones", "Pearls", "Silver"], a_twi: ["Sika Kɔkɔɔ", "Aboɔ a ɛsom bo", "Nwoba Aba", "Dwɛtɛ"], correct: 1 },
                    { q: "What are the twelve gates of New Jerusalem made of?", q_twi: "Yerusalem Foforo pon panyin dumien no, dɛn na wɔde yɛɛ?", a: ["Diamond", "Gold", "Single Pearls", "Jasper"], a_twi: ["Diamant", "Sika", "Nwoba Aba koro", "Yispi"], correct: 2 },
                    { q: "What river flows from the throne of God?", q_twi: "Asuogya bɛn na ɛfi Onyankopɔn ahengua no mu ba?", a: ["Jordan", "Euphrates", "River of Life", "Gihon"], a_twi: ["Yordan", "Eufrate", "Nkwa Nsuo", "Gihon"], correct: 2 },
                    { q: "How many fruits does the Tree of Life yield each year?", q_twi: "Nkwa Dua no sow aba ahorow dodoɔ sɛn afe biara?", a: ["1", "4", "7", "12"], a_twi: ["1", "4", "7", "12"], correct: 3 },
                    { q: "What is the city or bride of the Lamb explicitly named?", q_twi: "Oguammaa no yere anaa kuropɔn no, dɛn yɛ ne din pa ara?", a: ["Zion", "Babylon", "The New Jerusalem", "Eden"], a_twi: ["Sion", "Babilon", "Yerusalem Foforo", "Eden"], correct: 2 },
                    { q: "What book is anyone cursed for adding or removing words from?", q_twi: "Nhoma bɛn na sɛ obi de nsɛm bɛka ho anaa eyi mu a, nnome ba ne so?", a: ["Genesis", "Psalms", "This Book of Prophecy", "Daniel"], a_twi: ["Genesis", "Dwom", "Nkɔmhyɛ Nhoma yi", "Daniel"], correct: 2 }
                ]
            }
        ];

        let gameData = JSON.parse(localStorage.getItem('bibleQuizRPGData')) || {
            lvl: 1, gold: 100, currentQuestionIndex: 0, lang: 'en', music: false
        };

        let activePool = [];
        let timerInterval = null;
        let timeLeft = 10;
        let isProcessing = false;

        function spawnFireflies() {
            const container = document.getElementById('fireflies-layer');
            container.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const fly = document.createElement('div');
                fly.className = 'firefly';
                const size = Math.random() * 4 + 2;
                fly.style.width = size + 'px';
                fly.style.height = size + 'px';
                fly.style.left = Math.random() * 100 + 'vw';
                fly.style.animationDuration = (Math.random() * 8 + 6) + 's';
                fly.style.animationDelay = (Math.random() * -10) + 's';
                container.appendChild(fly);
            }
        }

        function celebrate(e) {
            const rect = e.getBoundingClientRect();
            const startX = rect.left + rect.width / 2;
            const startY = rect.top + rect.height / 2;

            for(let i=0; i<30; i++) {
                const particle = document.createElement('div');
                particle.className = 'confetti';
                
                const colors = ['#f59e0b', '#10b981', '#3b82f6', '#ec4899', '#8b5cf6', '#22c55e'];
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 120 + 60;
                const x = Math.cos(angle) * velocity;
                const y = Math.sin(angle) * velocity;
                
                particle.style.left = startX + 'px';
                particle.style.top = startY + 'px';
                particle.style.setProperty('--x', `${x}px`);
                particle.style.setProperty('--y', `${y}px`);
                particle.style.setProperty('--r', `${Math.random() * 360}deg`);
                
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 800);
            }
        }

        function renderUI() {
            isProcessing = false;
            let currentBookData = quizDatabase.find(l => l.level === gameData.lvl) || quizDatabase[quizDatabase.length - 1];
            
            if (activePool.length === 0) {
                // Shuffle current book's set of 20 questions
                activePool = [...currentBookData.questions].sort(() => Math.random() - 0.5);
                gameData.currentQuestionIndex = 0;
            }

            document.getElementById('bg-overlay').style.backgroundImage = `url('${currentBookData.bgImage}')`;
            document.getElementById('world-title').innerText = currentBookData.name;
            document.getElementById('lvl-badge').innerText = `Book ${gameData.lvl}`;
            document.getElementById('gold-val').innerText = gameData.gold;
            document.getElementById('lang-label').innerText = (gameData.lang === 'en') ? "English" : "Twi";
            
            // Progress Calculation for 20 questions
            const progress = (gameData.currentQuestionIndex / 20) * 100;
            document.getElementById('xp-bar').style.width = progress + "%";
            document.getElementById('q-counter-txt').innerText = `Progress: ${gameData.currentQuestionIndex} / 20`;

            renderQuestion();
            startTimer(currentBookData.timerDuration);
        }

        function renderQuestion() {
            const qObj = activePool[gameData.currentQuestionIndex];
            const container = document.getElementById('quiz-container');
            
            const txt = (gameData.lang === 'en') ? qObj.q : (qObj.q_twi || qObj.q);
            const opts = (gameData.lang === 'en') ? qObj.a : (qObj.a_twi || qObj.a);

            container.innerHTML = `
                <div class="quiz-card p-6 shadow-xl">
                    <h2 class="text-xl font-bold text-slate-800 mb-6">${txt}</h2>
                    <div class="space-y-3" id="opt-box"></div>
                </div>
            `;

            opts.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "btn-opt";
                btn.innerHTML = `<span>${opt}</span>`;
                btn.onclick = () => handleAnswer(idx, qObj.correct, btn);
                document.getElementById('opt-box').appendChild(btn);
            });
        }

        function startTimer(duration) {
            clearInterval(timerInterval);
            timeLeft = duration;
            const clock = document.getElementById('timer-clock');
            clock.classList.remove('timer-danger');
            clock.innerText = timeLeft;

            timerInterval = setInterval(() => {
                timeLeft--;
                clock.innerText = timeLeft;
                if (timeLeft <= 2) clock.classList.add('timer-danger');
                if (timeLeft <= 0) handleTimeout();
            }, 1000);
        }

        function handleTimeout() {
            clearInterval(timerInterval);
            gameData.gold = Math.max(0, gameData.gold - 20); 
            activePool.sort(() => Math.random() - 0.5);
            gameData.currentQuestionIndex = 0; 
            save();
            renderUI();
        }

        function handleAnswer(choice, correct, btn) {
            if (isProcessing) return;
            isProcessing = true;
            clearInterval(timerInterval);

            if (choice === correct) {
                celebrate(btn);
                btn.style.background = "#dcfce7";
                btn.style.borderColor = "#22c55e";
                gameData.gold += 20;
                gameData.currentQuestionIndex++;

                if (gameData.currentQuestionIndex >= 20) {
                    if (gameData.lvl < quizDatabase.length) {
                        gameData.lvl++;
                    } else {
                        alert("Incredible! You have mastered all available Books of the Bible!");
                    }
                    gameData.currentQuestionIndex = 0;
                    activePool = [];
                    save();
                    setTimeout(showLevelUp, 600);
                } else {
                    save();
                    setTimeout(renderUI, 800);
                }
            } else {
                btn.style.background = "#fee2e2";
                btn.style.borderColor = "#ef4444";
                gameData.gold = Math.max(0, gameData.gold - 20); 
                
                activePool.sort(() => Math.random() - 0.5);
                gameData.currentQuestionIndex = 0;
                
                save();
                setTimeout(() => { isProcessing = false; renderUI(); }, 800);
            }
        }

        function skipLevel() {
            if (gameData.gold >= 100) {
                gameData.gold -= 100;
                if (gameData.lvl < quizDatabase.length) {
                    gameData.lvl++;
                } else {
                    alert("You are reading the final book!");
                    return;
                }
                gameData.currentQuestionIndex = 0;
                activePool = [];
                save();
                showLevelUp();
            } else {
                alert("You need 100 coins to bypass this Book!");
            }
        }

        function showLevelUp() {
            const splash = document.getElementById('level-up-splash');
            let nextLevelData = quizDatabase.find(l => l.level === gameData.lvl);
            
            document.getElementById('next-world-txt').innerText = nextLevelData ? `Entering: ${nextLevelData.name}` : "Mastery Attained!";
            splash.classList.add('active');
            
            setTimeout(() => {
                splash.classList.remove('active');
                renderUI();
            }, 2500);
        }

        function save() { localStorage.setItem('bibleQuizRPGData', JSON.stringify(gameData)); }
        function toggleLanguage() { gameData.lang = (gameData.lang === 'en') ? 'tw' : 'en'; save(); renderUI(); }
        
        function toggleMusic() {
            const music = document.getElementById('bg-music');
            const btn = document.getElementById('music-btn');
            gameData.music = !gameData.music;
            if (gameData.music) {
                music.play().catch(e => console.log("Audio awaiting input"));
                btn.innerText = "🔊";
            } else {
                music.pause();
                btn.innerText = "🔇";
            }
            save();
        }

        function triggerReset() { localStorage.clear(); activePool = []; location.reload(); }

        window.onload = () => {
            spawnFireflies();
            renderUI();
        };
    </script>
</body>
</html>
