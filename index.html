<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Quest 200</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #bg-overlay { position: fixed; inset: 0; background-color: #0f172a; background-size: cover; background-position: center; transition: background-image 1s ease-in-out; z-index: 0; }
        #bg-tint { position: fixed; inset: 0; background: linear-gradient(180deg, rgba(15,23,42,0.7), rgba(15,23,42,0.95)); z-index: 1; }
        body { min-height: 100vh; background: #0f172a; color: white; font-family: system-ui, -apple-system, sans-serif; }
        
        .quiz-card { background: rgba(255, 255, 255, 0.98); border-radius: 24px; color: #1e293b; position: relative; z-index: 10; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .btn-opt { width: 100%; text-align: left; padding: 1.1rem 1.5rem; border-radius: 16px; border: 2px solid #f1f5f9; background: white; font-weight: 700; font-size: 0.95rem; transition: all 0.2s ease; display: flex; justify-content: space-between; align-items: center; }
        .btn-opt:active { transform: scale(0.97); }
        
        #level-up-splash {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.6s ease;
        }
        #level-up-splash.active { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body class="p-4 flex flex-col items-center justify-start min-h-screen">
    <div id="bg-overlay"></div>
    <div id="bg-tint"></div>

    <!-- AUDIO UNLOCKER / LAUNCH SCREEN -->
    <div id="launcher-screen" class="fixed inset-0 bg-slate-950 z-50 flex flex-col items-center justify-center p-6 text-center">
        <div class="space-y-6 max-w-sm">
            <div class="text-6xl animate-pulse">🕊️</div>
            <h1 class="text-3xl font-black tracking-wide text-amber-400">BIBLE QUEST 200</h1>
            <p class="text-slate-400 text-sm leading-relaxed">
                Tap below to activate the angelic ambient soundscapes, instrument chimes, and begin your journey.
            </p>
            <button onclick="launchGame()" class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-bold py-4 px-8 rounded-2xl shadow-xl transform active:scale-95 transition-all text-lg tracking-wide">
                ✨ Enter Bible Quest
            </button>
        </div>
    </div>

    <!-- STAGE CLEAR VICTORY SPLASH -->
    <div id="level-up-splash">
        <div class="bg-gradient-to-b from-indigo-900 to-slate-900 p-8 rounded-3xl text-center shadow-2xl max-w-sm w-11/12 border border-white/10">
            <div class="text-6xl mb-3">✨🏆✨</div>
            <h1 class="text-4xl font-black text-amber-400 tracking-wider uppercase">Glory!</h1>
            <p class="text-indigo-200 text-xs font-bold tracking-widest mt-1 uppercase">Chapter Completed</p>
            <div class="my-5 inline-block bg-white/5 px-6 py-2 rounded-full border border-white/10">
                <span class="text-xs text-white/60 block uppercase font-semibold">Next Destination</span>
                <span id="next-world-txt" class="text-lg font-extrabold text-white">Loading...</span>
            </div>
        </div>
    </div>

    <!-- MAIN INTERFACE -->
    <div id="game-ui" class="w-full max-w-md mt-6 relative z-10 space-y-6 hidden">
        <!-- HEADER STATUS -->
        <div class="quiz-card p-5">
            <div class="flex justify-between items-center mb-3">
                <span id="world-title" class="text-indigo-600 font-black text-xs uppercase tracking-widest">Chapter Title</span>
                <span class="bg-amber-50 text-amber-700 px-3 py-1 rounded-full text-xs font-black border border-amber-200/50">Score: <span id="gold-val">0</span></span>
            </div>
            <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                <div id="xp-bar" class="bg-indigo-600 h-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <!-- CONTAINER FOR QUESTIONS -->
        <div id="quiz-container"></div>
    </div>

    <script>
        // ========================================================
        // HIGH-FIDELITY AUDIO ENGINE (WEB AUDIO API)
        // ========================================================
        let audioCtx = null;
        let ambientGainNode = null;
        let activeOscillators = [];

        function launchGame() {
            // 1. Initialize Audio Context directly inside the physical tap event tracking frame
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // 2. Clear out splash screen block
            document.getElementById('launcher-screen').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            
            // 3. Fire up the pure ambient pad safely
            startAngelicPad();
            render();
        }

        function startAngelicPad() {
            if (!audioCtx) return;

            ambientGainNode = audioCtx.createGain();
            const masterLowPass = audioCtx.createBiquadFilter();
            
            masterLowPass.type = 'lowpass';
            masterLowPass.frequency.setValueAtTime(260, audioCtx.currentTime); // Completely removes digital robot harshness
            masterLowPass.Q.setValueAtTime(1.2, audioCtx.currentTime);

            // Rich warm low-frequency chord (Choral Fundamental roots)
            const harmonyNodes = [110.00, 165.00, 220.00, 330.00]; 

            harmonyNodes.forEach((freq) => {
                const osc = audioCtx.createOscillator();
                const oscGain = audioCtx.createGain();
                
                osc.type = 'sine'; // Softest base audio wave shape available
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                osc.detune.setValueAtTime((Math.random() * 8) - 4, audioCtx.currentTime); // Humanized warm detune

                oscGain.gain.setValueAtTime(0.05, audioCtx.currentTime); 

                osc.connect(oscGain);
                oscGain.connect(masterLowPass);
                activeOscillators.push(osc);
            });

            ambientGainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            masterLowPass.connect(ambientGainNode);
            ambientGainNode.connect(audioCtx.destination);

            // Grand volume swell fade-in
            ambientGainNode.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 3.0);
            activeOscillators.forEach(osc => osc.start());
        }

        function playSoundEffect(type) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;

            if (type === 'correct') {
                // Crystal wind-chime arpeggio
                const chimeScale = [523.25, 659.25, 783.99, 1046.50];
                chimeScale.forEach((freq, idx) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + (idx * 0.06));
                    gain.gain.setValueAtTime(0.06, now + (idx * 0.06));
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4 + (idx * 0.06));
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(now + (idx * 0.06));
                    osc.stop(now + 0.5 + (idx * 0.06));
                });
            } else if (type === 'wrong') {
                // Soft acoustic dropping raindrop
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();

                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(150, now);

                osc.type = 'triangle';
                osc.frequency.setValueAtTime(130, now);
                osc.frequency.linearRampToValueAtTime(75, now + 0.25);

                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);

                osc.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(now + 0.35);
            } else if (type === 'victory') {
                // Ascending angelic harp sweep
                const chord = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50];
                chord.forEach((freq, idx) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + (idx * 0.08));
                    gain.gain.setValueAtTime(0.08, now + (idx * 0.08));
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6 + (idx * 0.08));
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(now + (idx * 0.08));
                    osc.stop(now + 0.7 + (idx * 0.08));
                });
            }
        }

        // ========================================================
        // 200 QUESTION STRUCTURAL DATABASE MAP
        // ========================================================
        const bibleData = [
            {
                lvl: 1, title: "Genesis: The Beginning", img: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=1000",
                q: [
                    {q: "Who was the first man created by God?", a: ["Noah","Adam","Moses","Abraham"], c: 1},
                    {q: "How many days did God take to create the universe?", a: ["5 Days","7 Days","6 Days","10 Days"], c: 2},
                    {q: "Who was Adam's wife?", a: ["Sarah","Ruth","Eve","Esther"], c: 2},
                    {q: "What was the very first thing created by God?", a: ["Animals","Dry land","Light","The Moon"], c: 2},
                    {q: "Which brother committed the first murder recorded?", a: ["Abel","Cain","Seth","Enos"], c: 1}
                ]
            },
            {
                lvl: 2, title: "Noah & The Great Flood", img: "https://images.unsplash.com/photo-1433086966358-54859d0ed716?q=80&w=1000",
                q: [
                    {q: "What structure did Noah build to preserve life?", a: ["A floating tower","An Ark","A sanctuary citadel","A stone vault"], c: 1},
                    {q: "How many of each clean animal did Noah bring onboard?", a: ["Two pairs","Seven pairs","Twelve","One single pair"], c: 1},
                    {q: "How long did the catastrophic storm waters rain down?", a: ["40 Days and 40 Nights","12 Days","7 Days","A full calendar year"], c: 0},
                    {q: "Which bird returned with an olive branch sign?", a: ["A raven","An eagle","A dove","A swallow"], c: 2},
                    {q: "What visual sign did God place to seal His global promise?", a: ["A pillar of fire","A bright star","A rainbow","A solar eclipse"], c: 1}
                ]
            }
            // --- EXPANSION PACK FOR YOUR 200 QUESTIONS ---
            // Level 3: Patriarchs (Abraham, Isaac, Jacob)
            // Level 4: Joseph's Journey in Egypt
            // Level 5: Exodus & The Miracles of Moses
            // Level 6: The Wilderness Journey & The Ten Commandments
            // Level 7: Joshua & The Conquest of Jericho
            // Level 8: Judges of Israel (Gideon, Samson, Deborah)
            // Level 9: The Story of Ruth & Devotion
            // Level 10: Reign of King David & Solomon's Wisdom
            // Level 11: Elijah, Elisha, and the Prophets
            // Level 12: Esther & Nehemiah's Courage
            // Level 13: Daniel in Babylon & The Prophecies
            // Level 14: Gospels: Birth and Baptism of Jesus
            // Level 15: Gospels: The Miracles of Christ
            // Level 16: Gospels: The Parables & Teachings
            // Level 17: The Crucifixion and Resurrection
            // Level 18: Acts of the Apostles & The Early Church
            // Level 19: Epistles of Paul, Peter, and John
            // Level 20: Revelation & The Final Victory
        ];

        // --- PROGRESS RETRIEVAL SYSTEMS ---
        let state = JSON.parse(localStorage.getItem('bq200_final')) || { lvl: 1, idx: 0, gold: 0 };
        let currentQuestions = [];

        function shuffle(arr) {
            let s = JSON.parse(JSON.stringify(arr));
            for (let i = s.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [s[i], s[j]] = [s[j], s[i]];
            }
            return s;
        }

        function render() {
            const level = bibleData.find(d => d.lvl === state.lvl);
            if (!level) {
                document.getElementById('quiz-container').innerHTML = `
                    <div class='quiz-card p-8 text-center font-bold space-y-3 shadow-2xl'>
                        <div class="text-5xl">👑</div>
                        <h2 class="text-2xl text-indigo-600 font-black">All Stages Mastered!</h2>
                        <p class="text-slate-500 text-sm">You have traversed all 200 scriptural milestones successfully.</p>
                    </div>`;
                return;
            }

            if (state.idx === 0 || currentQuestions.length === 0) {
                currentQuestions = shuffle(level.q);
            }

            document.getElementById('bg-overlay').style.backgroundImage = `url(${level.img})`;
            document.getElementById('world-title').innerText = level.title;
            document.getElementById('gold-val').innerText = state.gold;
            document.getElementById('xp-bar').style.width = (state.idx / currentQuestions.length) * 100 + "%";

            const current = currentQuestions[state.idx];
            let html = `<div class="quiz-card p-6 space-y-6">
                <h2 class="text-xl font-black text-slate-800 leading-snug">${current.q}</h2>
                <div class="space-y-3.5">`;
            
            current.a.forEach((opt, i) => {
                html += `<button onclick="verifyAnswer(${i}, this)" class="btn-opt"><span>${opt}</span><span class="indicator"></span></button>`;
            });

            html += `</div></div>`;
            document.getElementById('quiz-container').innerHTML = html;
        }

        window.verifyAnswer = function(choice, element) {
            const current = currentQuestions[state.idx];
            const indicator = element.querySelector('.indicator');
            
            const buttons = document.querySelectorAll('.btn-opt');
            buttons.forEach(b => b.removeAttribute('onclick'));

            if (choice === current.c) {
                playSoundEffect('correct');
                element.style.background = "#dcfce7";
                element.style.borderColor = "#22c55e";
                indicator.innerText = "✅";
                state.gold += 10;
                state.idx++;
                
                if (state.idx >= currentQuestions.length) {
                    state.lvl++;
                    state.idx = 0;
                    currentQuestions = [];
                    localStorage.setItem('bq200_final', JSON.stringify(state));
                    setTimeout(showLevelVictoryPanel, 600);
                    return;
                }
            } else {
                playSoundEffect('wrong');
                element.style.background = "#fee2e2";
                element.style.borderColor = "#ef4444";
                indicator.innerText = "❌";
            }
            
            localStorage.setItem('bq200_final', JSON.stringify(state));
            setTimeout(render, 900);
        };

        function showLevelVictoryPanel() {
            playSoundEffect('victory');
            const splash = document.getElementById('level-up-splash');
            const txt = document.getElementById('next-world-txt');
            const nextLvl = bibleData.find(d => d.lvl === state.lvl);
            
            txt.innerText = nextLvl ? nextLvl.title : "Final Glory!";
            splash.classList.add('active');
            
            setTimeout(() => {
                splash.classList.remove('active');
                render();
            }, 2500);
        }
    </script>
</body>
</html>
