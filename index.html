<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest - Interactive Challenge Portal</title>
    <!-- Tailwind CSS for modern responsive UI styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Chart.js for rendering performance/level metrics if needed -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col justify-between">

    <!-- TOP HEADER / BRANDING -->
    <header class="bg-slate-800 border-b border-slate-700 p-4 shadow-md">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider text-emerald-400">QUEST PORTAL</h1>
            <div class="flex items-center gap-6 text-sm font-semibold">
                <span id="level-display" class="bg-slate-700 px-3 py-1.5 rounded-lg border border-slate-600">Level: 1 / 100</span>
                <span id="coin-display" class="bg-amber-500/10 text-amber-400 border border-amber-500/30 px-3 py-1.5 rounded-lg flex items-center gap-1.5">
                    🪙 <span id="coin-count">100</span> Coins
                </span>
            </div>
        </div>
    </header>

    <!-- MAIN GAME DISPLAY CONTAINER -->
    <main class="flex-grow flex items-center justify-center p-4">
        <div class="bg-slate-800 border border-slate-700 rounded-2xl shadow-2xl p-6 w-full max-w-lg md:p-8 transform transition-all">
            
            <!-- Question Content Box -->
            <div class="mb-8">
                <div class="text-xs font-bold tracking-widest text-slate-400 uppercase mb-2">Current Challenge</div>
                <h2 id="question-text" class="text-lg md:text-xl font-medium text-white leading-relaxed">
                    Loading your application quest parameters...
                </h2>
            </div>

            <!-- Option Selectors Grid -->
            <div id="options-container" class="grid grid-cols-1 gap-3.5">
                <!-- Buttons will be rendered here dynamically -->
            </div>

            <!-- Visual Progress Meter Bar -->
            <div class="mt-8 border-t border-slate-700/60 pt-5">
                <div class="flex justify-between text-xs text-slate-400 mb-1.5">
                    <span>Campaign Progress</span>
                    <span id="progress-percent">1%</span>
                </div>
                <div class="w-full bg-slate-700 rounded-full h-2 overflow-hidden">
                    <div id="progress-bar" class="bg-emerald-500 h-full transition-all duration-300" style="width: 1%"></div>
                </div>
            </div>

        </div>
    </main>

    <!-- FOOTER STATS / SYSTEM STATUS -->
    <footer class="bg-slate-950 text-slate-500 text-xs text-center py-3 border-t border-slate-800">
        Engine Operational • Stakes: +20 Correct / -20 Incorrect • Multi-Language Support Enabled
    </footer>

    <!-- BACKGROUND AUDIO SYSTEM HOOK -->
    <audio id="bg-music" loop>
        <source src="your-audio-file.mp3" type="audio/mpeg">
    </audio>

    <!-- CORE ENGINE JAVASCRIPT LOGIC -->
    <script>
        // 1. Game State Engine Values
        let gameState = {
            currentLevel: 1,
            coins: 100, 
            pointsPerCorrectAnswer: 20,
            pointsDeductedPerWrongAnswer: 20,
            maxLevels: 100
        };

        // 2. 100-Level Database Structure Shell
        // Fill the empty slots following the template format below
        const quizQuestions = {
            1: { question: "What is 10 + 10?", options: ["10", "20", "30"], answer: "20" },
            2: { question: "Which layout system uses directional flexbox flows?", options: ["Grid Layout", "Flexbox Engine", "Block Wrapper"], answer: "Flexbox Engine" },
            3: { question: "What value is 5 multiplied by 5?", options: ["20", "25", "30"], answer: "25" },
            4: { question: "Which CSS helper class adds spacing inside an element in Tailwind?", options: ["m-4", "p-4", "w-4"], answer: "p-4" },
            5: { question: "What tag element embeds local JavaScript source components?", options: ["<script>", "<link>", "<code-box>"], answer: "<script>" },
            
            // Loop array wrapper blueprint for levels 6 to 100:
            // 6: { question: "Your Question?", options: ["Opt1", "Opt2", "Opt3"], answer: "Opt1" },
        };

        // Fill remaining missing levels dynamically to prevent code crash if database is empty
        for (let i = 6; i <= 100; i++) {
            if (!quizQuestions[i]) {
                quizQuestions[i] = {
                    question: `Automated Quest Challenge Parameter - Level ${i}: Select the matching prototype value.`,
                    options: [`Option System Alpha`, `Target Answer Level ${i}`, `Option System Omega`],
                    answer: `Target Answer Level ${i}`
                };
            }
        }

        // 3. App Initialization Hooks
        document.addEventListener("DOMContentLoaded", () => {
            initAudioRestrictions();
            loadLevel(gameState.currentLevel);
            updateUI();
        });

        // Safely bypasses mobile browser background auto-play lock policies
        function initAudioRestrictions() {
            const music = document.getElementById('bg-music');
            if (music) {
                document.body.addEventListener('click', () => {
                    if (music.paused) {
                        music.play().catch(err => console.log("Audio pipeline awaiting interface click:", err));
                    }
                }, { once: true });
            }
        }

        function restartBackgroundMusic() {
            const music = document.getElementById('bg-music');
            if (music) {
                music.currentTime = 0;
                music.play().catch(err => console.log("Audio asset reset retry error:", err));
            }
        }

        // 4. Content Level Rendering Engine
        function loadLevel(levelNumber) {
            const questionData = quizQuestions[levelNumber];
            const questionEl = document.getElementById('question-text');
            const optionsContainer = document.getElementById('options-container');

            if (!questionData || !questionEl || !optionsContainer) return;

            // Set screen text state
            questionEl.innerText = questionData.question;
            optionsContainer.innerHTML = '';

            // Generate clean responsive Tailwind button options 
            questionData.options.forEach(option => {
                const btn = document.createElement('button');
                btn.innerText = option;
                btn.className = "w-full text-left bg-slate-700/50 hover:bg-slate-700 text-slate-200 hover:text-white border border-slate-600/60 hover:border-slate-500 p-4 rounded-xl font-medium transition-all duration-200 cursor-pointer active:scale-[0.99] focus:outline-none focus:ring-2 focus:ring-emerald-500/50";
                btn.onclick = () => checkAnswer(option, questionData.answer);
                optionsContainer.appendChild(btn);
            });
        }

        // 5. Game Mechanic Rules Evaluation
        function checkAnswer(selectedOption, correctOption) {
            if (selectedOption === correctOption) {
                // Correct answer flow (+20 Coins)
                gameState.coins += gameState.pointsPerCorrectAnswer;
                
                if (gameState.currentLevel < gameState.maxLevels) {
                    gameState.currentLevel++;
                    loadLevel(gameState.currentLevel);
                } else {
                    alert("Campaign Victory! You completed all 100 levels successfully!");
                }
            } else {
                // Incorrect answer flow (-20 Coins)
                gameState.coins -= gameState.pointsDeductedPerWrongAnswer;
                
                // Hard reset if coins hit 0 or go below
                if (gameState.coins <= 0) {
                    alert("Game Over! Your coins hit 0. Resetting campaign back to Level 1.");
                    gameState.currentLevel = 1;
                    gameState.coins = 100; // Reset back to baseline starting balance
                    
                    restartBackgroundMusic(); // Instantly fixes dropped audio tracks
                    loadLevel(gameState.currentLevel);
                }
            }
            updateUI();
        }

        // 6. State View Updates
        function updateUI() {
            const levelDisplay = document.getElementById('level-display');
            const coinCount = document.getElementById('coin-count');
            const progressBar = document.getElementById('progress-bar');
            const progressPercent = document.getElementById('progress-percent');

            // Sync visual text nodes
            if (levelDisplay) levelDisplay.innerText = `Level: ${gameState.currentLevel} / ${gameState.maxLevels}`;
            if (coinCount) coinCount.innerText = gameState.coins;
            
            // Sync progressive dashboard calculation bars
            const percentage = Math.round((gameState.currentLevel / gameState.maxLevels) * 100);
            if (progressBar) progressBar.style.width = `${percentage}%`;
            if (progressPercent) progressPercent.innerText = `${percentage}%`;
        }
    </script>
</body>
</html>
