<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prophetic Quest Terminal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            overflow-x: hidden;
        }
        .heading-font {
            font-family: 'Orbitron', sans-serif;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .glass-modal {
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #020617;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e1b4b;
            border-radius: 999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #312e81;
        }
    </style>
</head>
<body class="relative min-h-screen selection:bg-indigo-500 selection:text-white">

    <!-- Global Sound Reference Element -->
    <div id="audio-pool-container" class="hidden"></div>

    <!-- Active Ambient Canvas Engine Background -->

    <!-- MAIN INTERACTIVE WRAPPER -->

            <!-- Ambiance Tone Switcher Toggle Toggle Button Trigger -->
            <button onclick="toggleAudioAmbiance()" id="ambiance-toggle-btn" class="flex items-center gap-2 px-3 py-1.5 rounded-full border border-emerald-500/30 bg-emerald-950/30 text-emerald-400 text-xs font-black tracking-wider shadow-[0_0_15px_rgba(16,185,129,0.1)] transition-all active:scale-95">
                <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                <span>AMBIANCE: ON</span>
            </button>

            <div class="flex items-center gap-3">
                <!-- Internationalization Dynamic Control Language Interface Menu Switcher Button Selector -->

                    <span id="active-language-label" class="uppercase">ENGLISH</span>
                </button>

                <!-- Core App Inventory Points Balance Ledger Counter Indicator Tracker Display -->

                    <i class="fa-solid fa-coins text-xs animate-spin-slow"></i>
                    <span id="player-gold-display">500</span>
                </div>
            </div>
        </header>

        <!-- APP CONTENT ROOT WINDOW GRID STAGE CORE DISPLAY LAYOUT BOX PORT CONTAINER -->
        <main id="window-canvas" class="flex-1 p-4 space-y-4 overflow-y-auto pb-24">
            <!-- Dynamic Content gets injected here via renderMenuMap() -->
        </main>

        <!-- APP FOOTER ACCESSIBILITY CONTROL BUTTON REGISTRY DOCK NAVIGATION TAB BAR STRIP PANEL -->

            <button onclick="switchContextTerminalWindow('home')" class="flex flex-col items-center justify-center py-2 text-indigo-400 rounded-xl transition-all active:scale-95 hover:bg-slate-900/50">
                <i class="fa-solid fa-house text-lg"></i>
                <span class="text-[10px] font-bold tracking-wide mt-1 uppercase">Home</span>
            </button>
            <button onclick="switchContextTerminalWindow('tasks')" class="flex flex-col items-center justify-center py-2 text-slate-400 rounded-xl transition-all active:scale-95 hover:bg-slate-900/50">
                <i class="fa-solid fa-list-check text-lg"></i>
                <span class="text-[10px] font-bold tracking-wide mt-1 uppercase">Tasks</span>
            </button>
            <button onclick="switchContextTerminalWindow('wheel')" class="flex flex-col items-center justify-center py-2 text-slate-400 rounded-xl transition-all active:scale-95 hover:bg-slate-900/50">
                <i class="fa-solid fa-circle-radiation text-lg"></i>

            </button>
            <button onclick="switchContextTerminalWindow('copilot')" class="flex flex-col items-center justify-center py-2 text-slate-400 rounded-xl transition-all active:scale-95 hover:bg-slate-900/50">
                <i class="fa-solid fa-robot text-lg"></i>
                <span class="text-[10px] font-bold tracking-wide mt-1 uppercase">Copilot</span>
            </button>
        </footer>

    </div>

        // Prophetic Reward Master Spin Configuration Registry Matrix Array
        const wheelSegments = [
            { icon: "💰", color: "#1e1b4b", action: () => { state.gold += 50; } },
            { icon: "🛡️", color: "#312e81", action: () => { state.perks.shield += 1; } },

        let currentCampaignMode = "";
        let campaignActivePool = [];
        let currentActiveQuestion = null;
        let countdownTimerRef = null;
        let secondsRemaining = 0;
        let initialSecondsAllowed = 15;
        let inputInteractionsBlocked = false;
        let isShieldActive = false;
        let isFreezeActive = false;

        let audioCtx = null;
        let globalAudioMuted = false;
        let activeBackgroundToneLoop = null;
        let currentBackgroundMoodType = "lobby";

        let wheelAnimationId = null;
        let wheelBaseRotation = 0;
        let wheelPulseScaleDelta = 0;
        let isWheelActivelySpinning = false;
        let activePostAlertCallback = null;

        // Snow Freeze Canvas System Engine Variables
        let snowAnimationId = null;
        let snowFlakes = [];

        function getString(key, variables = {}) {
            let txt = i18nRegistry[state.lang][key] || i18nRegistry['en'][key] || key;
            for (let v in variables) {
                txt = txt.replace(`{${v}}`, variables[v]);
            }
            return txt;
        }

        // --- ALL CORE TERMINAL INTERFACE RENDERING HUB ---
        function renderMenuMap() {
            const canvasNode = document.getElementById('window-canvas');
            if (state.activeTab !== 'home') return;

            canvasNode.innerHTML = `
                <div class="space-y-1 animate__animated animate__fadeIn">
                    <h1 class="text-2xl font-black tracking-wider heading-font text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 uppercase" data-i18n="mapHub">${getString('mapHub')}</h1>
                    <p class="text-xs text-slate-400 font-medium tracking-wide uppercase" data-i18n="subtitle">${getString('subtitle')}</p>
                </div>

                <!-- Navigation Quick Actions Sector Links Matrix Grid -->
                <div class="grid grid-cols-2 gap-2 animate__animated animate__fadeIn">
                    <button onclick="switchContextTerminalWindow('tasks')" class="p-3 rounded-2xl glass-card text-left border border-indigo-500/20 hover:border-indigo-500/40 transition-all flex items-center gap-3 group active:scale-95">
                        <div class="w-8 h-8 rounded-xl bg-indigo-950/80 border border-indigo-500/40 flex items-center justify-center text-indigo-400 shadow-md group-hover:scale-110 transition-transform">

                        </div>
                        <div>

                        <div class="w-8 h-8 rounded-xl bg-amber-950/80 border border-amber-500/40 flex items-center justify-center text-amber-400 shadow-md group-hover:scale-110 transition-transform">
                            <i class="fa-solid fa-circle-radiation text-xs animate-spin-slow"></i>
                        </div>
                        <div>
                            <p class="text-xs font-black text-amber-200 uppercase tracking-wide" data-i18n="launchWheel">${getString('launchWheel')}</p>

                        <h3 class="text-base font-black text-indigo-400 uppercase tracking-wide group-hover:text-indigo-300 transition-colors" data-i18n="phase1Title">${getString('phase1Title')}</h3>
                        <p class="text-xs text-slate-400 mt-1 font-medium" data-i18n="phase1Desc">${getString('phase1Desc')}</p>
                    </div>

                    <!-- Phase 2 Layout Block -->

                        <div class="absolute inset-y-0 left-0 w-1 bg-purple-500"></div>
                        <h3 class="text-base font-black text-purple-400 uppercase tracking-wide group-hover:text-purple-300 transition-colors" data-i18n="phase2Title">${getString('phase2Title')}</h3>
                        <p class="text-xs text-slate-400 mt-1 font-medium" data-i18n="phase2Desc">${getString('phase2Desc')}</p>

                    <div onclick="startArcadePipeline(event, 'mix')" class="level-card-interactive w-full p-5 glass-card text-left cursor-pointer relative group overflow-hidden transition-all duration-300 hover:scale-[1.01]">

                        <h3 class="text-base font-black text-pink-400 uppercase tracking-wide group-hover:text-pink-300 transition-colors" data-i18n="phase3Title">${getString('phase3Title')}</h3>

                            <div class="flex items-center justify-between">
                                <h3 class="text-base font-black text-red-500 uppercase tracking-wide group-hover:text-red-400 transition-colors" data-i18n="phase5Title">${getString('phase5Title')}</h3>
                                <span class="text-[9px] font-black text-red-400 bg-red-950/80 border border-red-500/40 px-2 py-0.5 rounded-full animate-pulse tracking-wider">WAR ZONE</span>
                            </div>
                            <p class="text-xs text-red-300/70 mt-1 font-medium" data-i18n="phase5Desc">${getString('phase5Desc')}</p>

                        <div onclick="requestSegmentVaultUnlock(event, 'mastery', 500, 'Phase 5: Mastery Blitz Mode')" class="w-full p-5 glass-card border border-red-500/20 bg-slate-950/40 text-left cursor-pointer relative group flex justify-between items-center opacity-75 hover:opacity-100 transition-opacity">

                            <div>
                                <h3 class="text-sm font-black text-indigo-500/70 uppercase tracking-wide">🔒 PHASE 6: ADVENTIST TEACHINGS</h3>
                                <p class="text-[11px] text-slate-500 mt-0.5">Sanctuary frameworks and theological milestones</p>
                            </div>
                            <span class="bg-indigo-600/20 border border-indigo-500/40 px-3 py-1.5 rounded-xl font-black text-xs text-indigo-400 tracking-wider shrink-0">1500 💰</span>
                        </div>
                    `}

                </div>

                <div class="glass-card p-4 rounded-3xl border border-slate-900 space-y-3">
                    <div class="flex items-center justify-between border-b border-slate-900 pb-2">
                        <div class="flex items-center gap-2">
                            <i class="fa-solid fa-shield-halved text-indigo-400 text-sm"></i>
                            <h4 class="text-sm font-black tracking-wider uppercase text-slate-200" data-i18n="armoryTitle">${getString('armoryTitle')}</h4>
                        </div>
                        <span class="text-[10px] font-bold bg-indigo-950 text-indigo-300 border border-indigo-500/20 px-2 py-0.5 rounded-md uppercase tracking-widest">Store Equipment</span>
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <div class="p-3 rounded-2xl bg-slate-950/40 border border-slate-900 flex flex-col justify-between items-start gap-3 relative overflow-hidden group">

                                <span class="text-2xl group-hover:animate-bounce">🛡️</span>
                                <span class="text-xs font-black px-2 py-0.5 bg-indigo-950 border border-indigo-500/30 text-indigo-400 rounded-lg">Owned: ${state.perks.shield}</span>
                            </div>

                            </button>
                        </div>
                    </div>

        function renderTasksExplorer() {
            const canvasNode = document.getElementById('window-canvas');
            if (state.activeTab !== 'tasks') return;

            let systemTaskRows = "";
            state.dailyTasks.forEach(t => {
                let currentPercentage = Math.min(100, Math.floor((t.progress / t.target) * 100));
                systemTaskRows += `
                    <div class="p-4 rounded-2xl glass-card border border-slate-900 relative overflow-hidden flex flex-col gap-3 ${t.completed ? 'opacity-60' : ''}">

        // --- WHEEL RENDERING GRAPHICS CONTROLLER FUNCTIONS ---
        function drawWheelGraphicsOnPort() {
            const canvas = document.getElementById('wheel-canvas-render-port');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const numSegs = wheelSegments.length;
            const radiusArc = canvas.width / 2;
            const segmentAngleSize = (2 * Math.PI) / numSegs;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < numSegs; i++) {
                let currentAngleOffset = i * segmentAngleSize;
                ctx.beginPath();
                ctx.fillStyle = wheelSegments[i].color;
                ctx.moveTo(radiusArc, radiusArc);
                ctx.arc(radiusArc, radiusArc, radiusArc - 4, currentAngleOffset, currentAngleOffset + segmentAngleSize);
                ctx.closePath();
                ctx.fill();

                // Add inner dividing lines accents borders
                ctx.lineWidth = 1.5;
                ctx.strokeStyle = "rgba(255,255,255,0.04)";
                ctx.stroke();

                // Render functional graphics icons within geometric spatial coordinates
                ctx.save();
                ctx.fillStyle = "#ffffff";
                ctx.font = "16px Arial";
                ctx.translate(radiusArc, radiusArc);
                ctx.rotate(currentAngleOffset + segmentAngleSize / 2);
                ctx.fillText(wheelSegments[i].icon, radiusArc / 1.6, 6);
                ctx.restore();
            }
        }

        function triggerWheelSpinExecutionSequence() {

                return;

            state.gold -= 50;

            isWheelActivelySpinning = true;
            inputInteractionsBlocked = true;

            const targetCanvasElement = document.getElementById('wheel-canvas-render-port');
            const randomlySelectedSegmentIndex = Math.floor(Math.random() * wheelSegments.length);
            
            // Calculations for terminal rotations targeting exact radial slices
            const anglePerSegment = 360 / wheelSegments.length;
            const reverseOffsetAngleTarget = 360 - (randomlySelectedSegmentIndex * anglePerSegment + anglePerSegment / 2);
            const totalDegreesRotationTarget = 1440 + reverseOffsetAngleTarget; 

            if (targetCanvasElement) {
                targetCanvasElement.style.transition = "transform 4000ms cubic-bezier(0.1, 0.8, 0.1, 1)";
                targetCanvasElement.style.transform = `rotate(${totalDegreesRotationTarget}deg)`;
                
                // Play rhythmic rolling structural clicking ticks audios during deceleration
                let internalTickTrack = 0;
                let tickTimerRef = setInterval(() => {
                    internalTickTrack += 45;
                    if (internalTickTrack < totalDegreesRotationTarget) {
                        triggerAudioFeedbackTone(400 + (internalTickTrack % 100), 0.01, 'sine');
                    } else {
                        clearInterval(tickTimerRef);
                    }
                }, 90);
            }

            setTimeout(() => {
                // Execute state transformation logic matches targeting
                wheelSegments[randomlySelectedSegmentIndex].action();
                document.getElementById('player-gold-display').innerText = state.gold;

                triggerAudioFeedbackTone(587.33, 0.15, 'sine');
                setTimeout(() => { triggerAudioFeedbackTone(880, 0.3, 'sine'); }, 120);

                displayGlobalAlertOverlay(
                    "DRAW RECONCILED", 
                    `The processing hub matrix generated allocation index adjustments tracking reward sector item: ${wheelSegments[randomlySelectedSegmentIndex].icon}`, 
                    () => {
                        isWheelActivelySpinning = false;
                        inputInteractionsBlocked = false;

            initiateBackgroundMoodAmbianceTrackEngine();
        }

        function triggerAudioFeedbackTone(frequencyHz, durationSec, typeWaveformStr = 'sine') {
            if (!audioCtx || globalAudioMuted) return;
            try {
                let oscNode = audioCtx.createOscillator();
                let gainNode = audioCtx.createGain();

                oscNode.type = typeWaveformStr;
                oscNode.frequency.setValueAtTime(frequencyHz, audioCtx.currentTime);

                gainNode.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + durationSec);

                oscNode.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscNode.start();
                oscNode.stop(audioCtx.currentTime + durationSec);
            } catch (err) {
                console.warn("Audio node routing exception caught safely: ", err);
            }
        }

        function initiateBackgroundMoodAmbianceTrackEngine() {
            if (!audioCtx || globalAudioMuted) return;
            try {
                if (activeBackgroundToneLoop) {
                    activeBackgroundToneLoop.stop();
                    activeBackgroundToneLoop = null;
                }

                let carrierOsc = audioCtx.createOscillator();
                let modulatorOsc = audioCtx.createOscillator();
                let modulationGain = audioCtx.createGain();
                let mainFilter = audioCtx.createBiquadFilter();
                let outputVolumeGain = audioCtx.createGain();

                // Low baseline structural dark drones
                carrierOsc.type = 'triangle';
                carrierOsc.frequency.setValueAtTime(55, audioCtx.currentTime);

                modulatorOsc.type = 'sine';
                modulatorOsc.frequency.setValueAtTime(0.25, audioCtx.currentTime); // Low speed modulation tracking parameters
                modulationGain.gain.setValueAtTime(4, audioCtx.currentTime);

                mainFilter.type = 'lowpass';
                mainFilter.frequency.setValueAtTime(180, audioCtx.currentTime);

                outputVolumeGain.gain.setValueAtTime(0.04, audioCtx.currentTime);

                // Modulator connections routing path maps
                modulatorOsc.connect(modulationGain);
                modulationGain.connect(carrierOsc.frequency);

                carrierOsc.connect(mainFilter);
                mainFilter.connect(outputVolumeGain);
                outputVolumeGain.connect(audioCtx.destination);

                carrierOsc.start();
                modulatorOsc.start();

                activeBackgroundToneLoop = carrierOsc;
            } catch (err) {
                console.error("Ambiance sound initialization bypassed runtime block: ", err);
            }
        }

        function toggleAudioAmbiance() {
            const targetBtn = document.getElementById('ambiance-toggle-btn');
            
            if (!audioCtx) {
                initializeAudioInfrastructureEngine();
                globalAudioMuted = false;
                if (targetBtn) {
                    targetBtn.className = "flex items-center gap-2 px-3 py-1.5 rounded-full border border-emerald-500/30 bg-emerald-950/30 text-emerald-400 text-xs font-black tracking-wider shadow-[0_0_15px_rgba(16,185,129,0.1)] transition-all active:scale-95";
                    targetBtn.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span><span>AMBIANCE: ON</span>`;
                }
                return;
            }

            globalAudioMuted = !globalAudioMuted;

            if (globalAudioMuted) {
                if (activeBackgroundToneLoop) {
                    try { activeBackgroundToneLoop.stop(); } catch(e){}
                    activeBackgroundToneLoop = null;
                }
                if (targetBtn) {
                    targetBtn.className = "flex items-center gap-2 px-3 py-1.5 rounded-full border border-slate-700 bg-slate-900/40 text-slate-400 text-xs font-black tracking-wider transition-all active:scale-95";
                    targetBtn.innerHTML = `<span class="w-2 h-2 rounded-full bg-slate-500"></span><span>AMBIANCE: MUTED</span>`;
                }
            } else {
                initiateBackgroundMoodAmbianceTrackEngine();
                if (targetBtn) {
                    targetBtn.className = "flex items-center gap-2 px-3 py-1.5 rounded-full border border-emerald-500/30 bg-emerald-950/30 text-emerald-400 text-xs font-black tracking-wider shadow-[0_0_15px_rgba(16,185,129,0.1)] transition-all active:scale-95";
                    targetBtn.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span><span>AMBIANCE: ON</span>`;
                }
            }
        }

        // --- CHRONO FREEZE CANVAS PARTICLE SYSTEM ENGINE ---
        function initiateSnowFlakeCanvasBackgroundAnimationEngine() {
            const canvas = document.getElementById('snow-freeze-canvas');
            if (!canvas) return;

            canvas.className = "fixed inset-0 pointer-events-none z-0"; // Force layout mapping visibility conversion
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const ctx = canvas.getContext('2d');
            snowFlakes = [];

            for (let i = 0; i < 45; i++) {
                snowFlakes.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 2.5 + 1,
                    d: Math.random() * 20 + 5,
                    v: Math.random() * 0.5 + 0.2
                });
            }

            if (snowAnimationId) cancelAnimationFrame(snowAnimationId);
            executeSnowParticleTickFrame(ctx, canvas);
        }

        function executeSnowParticleTickFrame(ctx, canvas) {
            if (!isFreezeActive) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                canvas.className = "fixed inset-0 pointer-events-none z-0 invisible";
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(14, 165, 233, 0.15)";
            ctx.beginPath();

            for (let i = 0; i < snowFlakes.length; i++) {
                let f = snowFlakes[i];
                ctx.moveTo(f.x, f.y);
                ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2, true);

                // Update displacement parameters
                f.y += f.v;
                f.x += Math.sin(f.y / 30) * 0.2;

                if (f.y > canvas.height) {
                    snowFlakes[i] = { x: Math.random() * canvas.width, y: 0, r: f.r, d: f.d, v: f.v };
                }
            }
            ctx.fill();
            snowAnimationId = requestAnimationFrame(() => { executeSnowParticleTickFrame(ctx, canvas); });
        }

        // --- LIFECYCLE PARSING ENTRY BOOTSTRAP INITIALIZATION STAGE ---
        window.addEventListener('DOMContentLoaded', () => {
            renderMenuMap();
        });
    </script>
