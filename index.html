<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Quest: Ultimate Arcade Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { 
            background-color: #050811; 
            font-family: system-ui, -apple-system, sans-serif; 
            overflow-x: hidden;
            background-image: radial-gradient(circle at center, rgba(16, 23, 42, 0.4) 0%, rgba(2, 6, 23, 0.98) 100%);
        }
        
        .game-bg-active {
            background-image: url('https://images.unsplash.com/photo-1601004890684-d8cbf643f5f2?auto=format&fit=crop&w=800&q=80') !important;
            background-size: cover !important;
            background-position: center !important;
            background-blend-mode: overlay !important;
            background-color: rgba(5, 8, 20, 0.85) !important;
        }

        .glass-card { background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; color: white; }
        
        .btn-choice { width: 100%; text-align: left; padding: 1.1rem 1.4rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.07); background: rgba(15, 23, 42, 0.8); font-weight: 600; color: #f1f5f9; transition: all 0.2s ease; position: relative; }
        .btn-choice:hover { background: rgba(30, 41, 59, 0.9); border-color: rgba(255, 255, 255, 0.2); transform: translateY(-1px); }
        
        @keyframes auroraFlow {
            0% { background-position: 0% 50%; filter: hue-rotate(0deg); }
            50% { background-position: 100% 50%; filter: hue-rotate(180deg); }
            100% { background-position: 0% 50%; filter: hue-rotate(360deg); }
        }
        .rainbow-correct { 
            background: linear-gradient(45deg, #10b981, #059669, #34d399, #047857) !important;
            background-size: 300% 300% !important;
            animation: auroraFlow 4s ease infinite !important;
            border-color: transparent !important;
            color: #ffffff !important;
            font-weight: 900 !important;
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.6) !important;
        }

        .completed-glow { box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); border-color: rgba(16, 185, 129, 0.6); }

        #frost-frame { position: fixed; inset: 0; border: 14px solid rgba(56, 189, 248, 0.45); pointer-events: none; opacity: 0; transition: opacity 0.3s ease; z-index: 40; box-shadow: inset 0 0 80px rgba(14, 165, 233, 0.35); }
        .frost-active { opacity: 1 !important; }
        
        #shield-frame { position: fixed; inset: 0; border: 12px solid rgba(245, 158, 11, 0.5); pointer-events: none; opacity: 0; transition: opacity 0.3s ease; z-index: 40; box-shadow: inset 0 0 60px rgba(245, 158, 11, 0.25); }
        .shield-active { opacity: 1 !important; }

        /* Spin Wheel Graphic Elements */
        .wheel-container { position: relative; width: 220px; height: 220px; margin: 0 auto; }
        .wheel-canvas { width: 100%; height: 100%; border-radius: 50%; border: 6px solid #312e81; background: conic-gradient(#1e1b4b 0deg 60deg, #312e81 60deg 120deg, #4338ca 120deg 180deg, #1e1b4b 180deg 240deg, #312e81 240deg 300deg, #4338ca 300deg 360deg); transition: transform 4s cubic-bezier(0.1, 0.8, 0.3, 1); }
        .wheel-pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 20px solid #ef4444; z-index: 10; }
    </style>
</head>
<body class="p-4 min-h-screen flex flex-col items-center justify-start text-white select-none">

    <div id="frost-frame"></div>
    <div id="shield-frame"></div>

    <!-- Top Navigation HUD -->
    <div class="fixed top-4 left-4 right-4 flex justify-between items-center z-50 max-w-md mx-auto w-full px-2">
        <button onclick="exitToMenu()" id="back-btn" class="hidden bg-slate-900/95 border border-white/10 text-white px-4 py-2 rounded-full font-bold text-xs uppercase tracking-wider shadow-2xl transition-all">
            🚪 Map Hub
        </button>
        <div class="flex gap-2 ml-auto">
            <button onclick="toggleLanguage()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-full font-bold text-xs uppercase shadow-md transition-all">
                🌐 <span id="lang-label">English</span>
            </button>
            <div id="gold-container" class="bg-slate-900/95 border border-white/10 px-4 py-2 rounded-full shadow-2xl flex items-center gap-2">
                <span>💰</span>
                <span id="gold-val" class="font-black text-amber-400">500</span>
            </div>
        </div>
    </div>

    <!-- Main Canvas Frame -->
    <main id="window-canvas" class="w-full max-w-md mt-16 relative z-10 space-y-5 flex flex-col mb-28"></main>

    <!-- Item Shop -->
    <div id="shop-modal" class="fixed inset-0 bg-black/85 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div class="glass-card w-full max-w-sm p-6 space-y-4 border-indigo-500/30 bg-slate-950/80">
            <div class="flex justify-between items-center border-b border-white/10 pb-3">
                <div class="flex items-center gap-2">
                    <span>🛒</span>
                    <h3 class="text-sm font-black uppercase tracking-wider text-indigo-300">Armory Depot Shop</h3>
                </div>
                <button onclick="closeShopModal()" class="text-slate-400 text-sm bg-white/5 w-7 h-7 rounded-full">✕</button>
            </div>
            <div id="modal-shop-grid" class="space-y-2"></div>
        </div>
    </div>

    <!-- Floating Bag Button -->
    <button id="lobby-bag-btn" onclick="openShopModal()" class="fixed bottom-6 right-6 z-40 bg-gradient-to-tr from-indigo-600 to-purple-600 border border-white/20 w-14 h-14 rounded-full flex items-center justify-center shadow-2xl text-2xl transition-all">
        🎒
    </button>

    <script>
        // Expanded Game Database with Phase 6: Adventist Doctrines Included
        window.quizDatabase = [
            { name: "Matthew", group: "NT", questions: [{ q: "Who was chosen to be the earthly mother of Jesus?", a: ["Elizabeth", "Mary", "Martha", "Salome"], correct: 1 }] },
            { name: "Mark", group: "NT", questions: [{ q: "Which prophet did Mark quote at the beginning of his Gospel?", a: ["Isaiah", "Jeremiah", "Ezekiel", "Daniel"], correct: 0 }] },
            { name: "Luke", group: "NT", questions: [{ q: "What was the professional occupation of Luke?", a: ["Tax Collector", "Physician", "Fisherman", "Tentmaker"], correct: 1 }] },
            { name: "John", group: "NT", questions: [{ q: "Complete the text: 'In the beginning was the...'", a: ["Light", "Spirit", "Word", "Kingdom"], correct: 2 }] },
            { name: "Genesis", group: "OT", questions: [{ q: "What was the name of the garden home created for mankind's initial placement?", a: ["Gethsemane", "Eden", "Sinai", "Ararat"], correct: 1 }] },
            { name: "Exodus", group: "OT", questions: [{ q: "Out of what burning anomaly element did God speak to Moses?", a: ["Cloud", "Bush", "Rock", "Whirlwind"], correct: 1 }] },
            { name: "EGW Writings", group: "EGW", questions: [{ q: "Which E.G. White book traces the cosmic history of conflict between Christ and Satan?", a: ["Steps to Christ", "The Great Controversy", "Education", "Ministry of Healing"], correct: 1 }] },
            { name: "Adventist Sanctuary", group: "SDA", questions: [{ q: "In what year did the prophetic cleansing of the heavenly sanctuary begin, fulfilling the 2300 days?", a: ["1798", "1844", "1888", "1931"], correct: 1 }] },
            { name: "Fundamental Beliefs", group: "SDA", questions: [{ q: "Which day is recognized as the biblical Sabbath according to Adventist Fundamental Beliefs?", a: ["First Day (Sunday)", "Sixth Day (Friday)", "Seventh Day (Saturday)", "Any chosen rest day"], correct: 2 }] },
            { name: "State of the Dead", group: "SDA", questions: [{ q: "How does the Bible describe the condition of death according to Adventist doctrine?", a: ["An immediate purgatory", "A state of unconscious sleep", "Disembodied spirit wandering", "Immediate ascent to eternal torment"], correct: 1 }] }
        ];

        // State Machine Tracking Active Achievements & Stats
        let state = JSON.parse(localStorage.getItem('bqArcadeV9Data')) || {
            gold: 500, lang: 'en',
            perks: { freeze: 3, half: 2, skip: 1, shield: 2 },
            lastSpinTimestamp: 0,
            activitiesAccordOpen: false,
            // Trackable Gameplay Stats for Achievements
            stats: { currentStreak: 0, freezeUsed: 0, totalCoinsEarned: 500, blitzSurvivals: 0 },
            completedActivities: {}
        };

        // Static Level Task Definitions Based on Gameplay Actions
        const activityDefinitions = [
            { id: "act_streak", text: "Answer 5 questions in a row without an error", check: () => state.stats.currentStreak >= 5, payout: 50 },
            { id: "act_freeze", text: "Deploy the Chrono Freeze utility 10 times", check: () => state.stats.freezeUsed >= 10, payout: 40 },
            { id: "act_banker", text: "Amass a continuous wallet balance of 1000 total coins", check: () => state.gold >= 1000, payout: 100 },
            { id: "act_blitz", text: "Survive 3 Mastery Blitz fast-paced questions", check: () => state.stats.blitzSurvivals >= 3, payout: 60 }
        ];

        let currentCampaignMode = "";
        let campaignActivePool = [];
        let currentActiveQuestion = null;
        let countdownTimerRef = null;
        let secondsRemaining = 0;
        let inputInteractionsBlocked = false;
        let isShieldActive = false;
        let audioContextInstance = null;

        function saveState() {
            localStorage.setItem('bqArcadeV9Data', JSON.stringify(state));
            document.getElementById('gold-val').innerText = state.gold;
            document.getElementById('lang-label').innerText = state.lang === 'en' ? "English" : "Twi";
        }

        function initAudioEngine() {
            if (!audioContextInstance) audioContextInstance = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playChimeAudio(type) {
            initAudioEngine();
            if (!audioContextInstance) return;
            let now = audioContextInstance.currentTime;
            let osc = audioContextInstance.createOscillator();
            let gain = audioContextInstance.createGain();
            osc.connect(gain); gain.connect(audioContextInstance.destination);
            
            if(type === 'correct') {
                osc.frequency.setValueAtTime(523.25, now); osc.start(now); osc.stop(now + 0.15);
            } else if(type === 'wrong') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(150, now); osc.start(now); osc.stop(now + 0.25);
            } else {
                osc.frequency.setValueAtTime(440, now); osc.start(now); osc.stop(now + 0.08);
            }
        }

        function openShopModal() {
            const items = [
                { id: 'freeze', name: 'Chrono Freeze', cost: 50, icon: '❄️' },
                { id: 'half', name: 'Divine 50:50', cost: 75, icon: '⚖️' },
                { id: 'skip', name: 'Prophetic Skip', cost: 100, icon: '🔮' },
                { id: 'shield', name: 'Aegis Shield', cost: 60, icon: '🛡️' }
            ];
            const grid = document.getElementById('modal-shop-grid'); grid.innerHTML = "";
            items.forEach(item => {
                const row = document.createElement('div');
                row.className = "flex items-center justify-between p-3 bg-slate-900 rounded-xl border border-white/5";
                row.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="text-xl bg-slate-950 p-2 rounded-lg">${item.icon}</span>
                        <div>
                            <h4 class="text-xs font-black text-slate-200">${item.name}</h4>
                            <p class="text-[9px] text-indigo-400 font-bold">Stock: ${state.perks[item.id] || 0}</p>
                        </div>
                    </div>
                    <button onclick="buyPerk('${item.id}', ${item.cost})" class="bg-indigo-600 hover:bg-indigo-500 font-bold text-xs px-3 py-1.5 rounded-lg text-white">${item.cost} 💰</button>
                `;
                grid.appendChild(row);
            });
            document.getElementById('shop-modal').classList.remove('hidden');
        }
        function closeShopModal() { document.getElementById('shop-modal').classList.add('hidden'); }

        function buyPerk(id, cost) {
            if (state.gold >= cost) {
                state.gold -= cost; state.perks[id] = (state.perks[id] || 0) + 1;
                saveState(); playChimeAudio('tap'); openShopModal();
            } else { alert("Insufficient coins."); }
        }

        // Main App Navigation Menu Screen
        function renderMenuMap() {
            currentCampaignMode = "";
            document.body.classList.remove('game-bg-active');
            document.getElementById('back-btn').classList.add('hidden');
            document.getElementById('lobby-bag-btn').classList.remove('hidden');
            
            const canvas = document.getElementById('window-canvas');
            canvas.innerHTML = `
                <div class="text-center space-y-1 py-2">
                    <h1 class="text-3xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-400">BIBLE QUEST</h1>
                    <p class="text-[10px] text-slate-500 font-bold tracking-widest uppercase">Select Campaign Route Pipeline</p>
                </div>

                <!-- DAILY SPIN WHEEL INTERACTIVE OBJECT -->
                <div class="glass-card p-4 text-center space-y-3 border-amber-500/20 bg-slate-900/40">
                    <h3 class="text-xs font-black uppercase text-amber-400 tracking-wider">🎯 Daily Prophetic Prize Wheel</h3>
                    <div class="wheel-container">
                        <div class="wheel-pointer"></div>
                        <div id="spin-wheel-graphics" class="wheel-canvas"></div>
                    </div>
                    <button onclick="executeDailyWheelSpin()" id="spin-trigger-btn" class="w-full bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-400 hover:to-orange-400 text-slate-950 font-black text-xs py-2.5 rounded-xl shadow-lg transition-all">
                        SPIN WHEEL (FREE DAILY)
                    </button>
                </div>
                
                <!-- LEVELS MATRIX NAVIGATION LINKS -->
                <div class="space-y-2">
                    <button onclick="startArcadePipeline('nt')" class="w-full p-3.5 glass-card text-left flex justify-between items-center hover:border-blue-500 transition-all">
                        <div><h3 class="text-xs font-black text-blue-300">Phase 1: New Testament Arcade</h3></div>
                        <span class="text-[10px] bg-blue-950 px-2 py-1 rounded text-blue-400 font-bold">⚡ PLAY</span>
                    </button>
                    <button onclick="startArcadePipeline('ot')" class="w-full p-3.5 glass-card text-left flex justify-between items-center hover:border-emerald-500 transition-all">
                        <div><h3 class="text-xs font-black text-emerald-300">Phase 2: Old Testament Arcade</h3></div>
                        <span class="text-[10px] bg-emerald-950 px-2 py-1 rounded text-emerald-400 font-bold">📜 PLAY</span>
                    </button>
                    <button onclick="startArcadePipeline('mix')" class="w-full p-3.5 glass-card text-left flex justify-between items-center hover:border-purple-500 transition-all">
                        <div><h3 class="text-xs font-black text-purple-300">Phase 3: Grand Mixture Pool</h3></div>
                        <span class="text-[10px] bg-purple-950 px-2 py-1 rounded text-purple-400 font-bold">🌀 PLAY</span>
                    </button>
                    <button onclick="startArcadePipeline('egw')" class="w-full p-3.5 glass-card text-left flex justify-between items-center hover:border-amber-400 transition-all">
                        <div><h3 class="text-xs font-black text-amber-300">Phase 4: E.G. White Chronicles</h3></div>
                        <span class="text-[10px] bg-amber-950 px-2 py-1 rounded text-amber-400 font-bold">✒️ PLAY</span>
                    </button>
                    <button onclick="startArcadePipeline('mastery')" class="w-full p-3.5 glass-card text-left flex justify-between items-center border border-red-500/30 bg-red-950/20">
                        <div><h3 class="text-xs font-black text-red-400">Phase 5: Mastery Blitz Mode (5s)</h3></div>
                        <span class="text-[10px] bg-red-950 px-2 py-1 rounded text-red-400 font-bold">🔥 BLITZ</span>
                    </button>
                    <button onclick="startArcadePipeline('sda')" class="w-full p-3.5 glass-card text-left flex justify-between items-center border border-indigo-500/40 bg-indigo-950/20 hover:border-indigo-400 transition-all">
                        <div>
                            <h3 class="text-xs font-black text-indigo-400">Phase 6: Adventist Teachings & Doctrines</h3>
                            <p class="text-[9px] text-slate-400">The 28 Fundamental Sanctuary & Prophetic Beliefs</p>
                        </div>
                        <span class="text-[10px] bg-indigo-900 px-2 py-1 rounded text-indigo-300 font-bold">🕊️ STUDY</span>
                    </button>
                </div>

                <!-- ACCORDION ACTIVITIES REGISTRY SECTION -->
                <div class="pt-2">
                    <button onclick="toggleActivitiesAccordion()" class="w-full p-3 glass-card bg-slate-900/90 border border-purple-500/30 flex justify-between items-center font-bold text-xs text-purple-300">
                        <span>📋 View Sectors Task Explorer (Achievements)</span>
                        <span id="accord-arrow">${state.activitiesAccordOpen ? '▲' : '▼'}</span>
                    </button>
                    <div id="activities-accord-body" class="${state.activitiesAccordOpen ? '' : 'hidden'} mt-2 space-y-2"></div>
                </div>
            `;
            if(state.activitiesAccordOpen) renderAccordionContents();
        }

        function toggleActivitiesAccordion() {
            state.activitiesAccordOpen = !state.activitiesAccordOpen;
            saveState();
            renderMenuMap();
        }

        function renderAccordionContents() {
            const container = document.getElementById('activities-accord-body'); if(!container) return;
            container.innerHTML = "";
            
            activityDefinitions.forEach(act => {
                let isCompleted = state.completedActivities[act.id];
                let systemConditionMet = act.check();
                
                if(systemConditionMet && !isCompleted) {
                    // Auto-mark completed when checked if criteria met
                    state.completedActivities[act.id] = true;
                    isCompleted = true;
                    saveState();
                }

                let statusBadge = `<span class="text-[9px] text-slate-500 uppercase font-black">In Progress</span>`;
                let cardGlow = "bg-slate-900/80 border border-white/5";

                if(isCompleted) {
                    statusBadge = `<span class="text-[9px] text-emerald-400 font-black uppercase">✓ Completed (+${act.payout} 💰 awarded)</span>`;
                    cardGlow = "completed-glow bg-emerald-950/20 border border-emerald-500/30";
                }

                const block = document.createElement('div');
                block.className = `p-3 rounded-xl flex items-center justify-between ${cardGlow}`;
                block.innerHTML = `
                    <div class="pr-2">
                        <p class="text-xs font-bold text-slate-200">${act.text}</p>
                        <p class="text-[9px] text-amber-400 mt-0.5">Value Payout: ${act.payout} Coins</p>
                    </div>
                    <div class="shrink-0">${statusBadge}</div>
                `;
                container.appendChild(block);
            });
        }

        // Daily Spin Wheel Mechanical Core Logic Routine
        function executeDailyWheelSpin() {
            const now = Date.now();
            const oneDayMs = 24 * 60 * 60 * 1000;
            if(now - state.lastSpinTimestamp < oneDayMs) {
                alert("The dynamic reward matrix is recharging. Please return tomorrow for your next prophetic spin.");
                return;
            }

            playChimeAudio('tap');
            const wheel = document.getElementById('spin-wheel-graphics');
            const randomDegrees = Math.floor(Math.random() * 360) + 1440; // Spining at least 4 full circles
            wheel.style.transform = `rotate(${randomDegrees}deg)`;
            
            document.getElementById('spin-trigger-btn').disabled = true;
            state.lastSpinTimestamp = now;

            setTimeout(() => {
                const prizePool = [
                    { name: "50 Bonus Coins", effect: () => { state.gold += 50; } },
                    { name: "Chrono Freeze Pack", effect: () => { state.perks.freeze += 1; } },
                    { name: "100 Mega Coins", effect: () => { state.gold += 100; } },
                    { name: "Aegis Shield Guard", effect: () => { state.perks.shield += 1; } },
                    { name: "Divine 50:50 Core", effect: () => { state.perks.half += 1; } },
                    { name: "Prophetic Skip Ticket", effect: () => { state.perks.skip += 1; } }
                ];
                
                const sectorWon = Math.floor(((randomDegrees % 360)) / 60);
                const award = prizePool[sectorWon] || prizePool[0];
                
                award.effect();
                alert(`Prize Wheel Manifested: ${award.name}!`);
                saveState();
                renderMenuMap();
            }, 4100);
        }

        function startArcadePipeline(mode) {
            playChimeAudio('tap');
            currentCampaignMode = mode;
            document.getElementById('back-btn').classList.remove('hidden');
            compileQuestionsPoolForMode(mode);
            launchNextActiveQuestionEngine();
        }

        function compileQuestionsPoolForMode(mode) {
            campaignActivePool = [];
            let targetGroup = "";
            if (mode === 'nt') targetGroup = "NT";
            else if (mode === 'ot') targetGroup = "OT";
            else if (mode === 'egw') targetGroup = "EGW";
            else if (mode === 'sda') targetGroup = "SDA";

            if(targetGroup) {
                campaignActivePool = window.quizDatabase.filter(q => q.group === targetGroup);
            } else {
                campaignActivePool = [...window.quizDatabase];
            }
            if(campaignActivePool.length === 0) campaignActivePool = [...window.quizDatabase];
        }

        function launchNextActiveQuestionEngine() {
            // HIDE RED BACKPACK POPUP ON QUESTIONS PAGE
            document.getElementById('lobby-bag-btn').classList.add('hidden');
            document.body.classList.add('game-bg-active');
            inputInteractionsBlocked = false; isShieldActive = false;
            document.getElementById('shield-frame').className = "";
            document.getElementById('frost-frame').className = "";

            // Evaluate live achievements dynamically
            activityDefinitions.forEach(act => {
                if(act.check() && !state.completedActivities[act.id]) {
                    state.completedActivities[act.id] = true;
                    state.gold += act.payout;
                    saveState();
                }
            });

            // Draw a completely random node from the runtime campaign index structure
            const activeNode = campaignActivePool[Math.floor(Math.random() * campaignActivePool.length)];
            currentActiveQuestion = activeNode.questions[Math.floor(Math.random() * activeNode.questions.length)];
            currentActiveQuestion._sourceBookContext = activeNode.name;

            secondsRemaining = (currentCampaignMode === 'mastery') ? 5 : 15;

            const canvas = document.getElementById('window-canvas');
            canvas.innerHTML = `
                <div class="glass-card p-4 space-y-3 flex flex-col bg-slate-900/90 shadow-2xl animate__animated animate__fadeIn">
                    <div class="flex justify-between items-center">
                        <div>
                            <h2 class="text-xs font-black text-indigo-400 uppercase tracking-wider">${currentActiveQuestion._sourceBookContext}</h2>
                            <div class="text-[10px] font-bold text-slate-400 mt-0.5">Continuous Active Shuffle Loop</div>
                        </div>
                        <div id="clock-wrapper" class="text-xl font-black tracking-tighter tabular-nums text-amber-400 bg-slate-950/70 px-2.5 py-1 rounded-2xl border border-white/10">
                            ⏰ <span id="clock-digit">${secondsRemaining}</span>s
                        </div>
                    </div>
                </div>

                <div class="glass-card p-6 min-h-[95px] flex items-center justify-center text-center animate__animated animate__zoomIn bg-slate-900/95 shadow-xl">
                    <h3 class="text-sm font-bold leading-snug text-slate-100">${currentActiveQuestion.q}</h3>
                </div>

                <div id="choice-matrix" class="space-y-2.5"></div>

                <!-- In-Game Bottom Actions Utility Ribbon Grid -->
                <div class="fixed bottom-0 left-0 right-0 p-3 bg-slate-950/95 border-t border-white/10 z-40 flex justify-center gap-2">
                    <button onclick="applyInGameUtility('freeze')" class="flex-1 bg-slate-900 border border-sky-500/30 p-2 rounded-xl flex flex-col items-center"><span>❄️</span><span class="text-[9px] text-slate-400 font-bold">Qty: ${state.perks.freeze}</span></button>
                    <button onclick="applyInGameUtility('half')" class="flex-1 bg-slate-900 border border-rose-500/30 p-2 rounded-xl flex flex-col items-center"><span>⚖️</span><span class="text-[9px] text-slate-400 font-bold">Qty: ${state.perks.half}</span></button>
                    <button onclick="applyInGameUtility('skip')" class="flex-1 bg-slate-900 border border-purple-500/30 p-2 rounded-xl flex flex-col items-center"><span>🔮</span><span class="text-[9px] text-slate-400 font-bold">Qty: ${state.perks.skip}</span></button>
                    <button onclick="applyInGameUtility('shield')" class="flex-1 bg-slate-900 border border-amber-500/30 p-2 rounded-xl flex flex-col items-center"><span>🛡️</span><span class="text-[9px] text-slate-400 font-bold">Qty: ${state.perks.shield}</span></button>
                </div>
            `;

            const matrix = document.getElementById('choice-matrix');
            currentActiveQuestion.a.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "btn-choice bg-slate-900/90 text-xs";
                btn.innerText = opt;
                btn.onclick = () => challengeAnswerSubmitted(idx, btn);
                matrix.appendChild(btn);
            });

            beginCountdownTicker();
        }

        function beginCountdownTicker() {
            clearInterval(countdownTimerRef);
            countdownTimerRef = setInterval(() => {
                if(inputInteractionsBlocked) return;
                secondsRemaining--;
                const elem = document.getElementById('clock-digit'); if(elem) elem.innerText = secondsRemaining;
                
                if(secondsRemaining <= 0) {
                    clearInterval(countdownTimerRef);
                    executeFailureSequence();
                }
            }, 1000);
        }

        function challengeAnswerSubmitted(index, clickTarget) {
            if (inputInteractionsBlocked) return;
            inputInteractionsBlocked = true;
            clearInterval(countdownTimerRef);

            if (index === currentActiveQuestion.correct) {
                clickTarget.className = "btn-choice rainbow-correct text-white text-xs shadow-2xl";
                playChimeAudio('correct');
                
                state.stats.currentStreak++;
                state.gold += 15;
                if(currentCampaignMode === 'mastery') state.stats.blitzSurvivals++;
                saveState();

                setTimeout(() => { launchNextActiveQuestionEngine(); }, 1200);
            } else {
                clickTarget.className = "btn-choice bg-rose-600 border-rose-400 text-white text-xs animate__animated animate__shakeX font-bold shadow-lg";
                playChimeAudio('wrong');
                state.stats.currentStreak = 0; // Break win streak metrics instantly
                saveState();
                setTimeout(executeFailureSequence, 1200);
            }
        }

        // Deduct 20 Coins and Shuffle Instantly, Trigger Game Over only at Zero
        function executeFailureSequence() {
            clearInterval(countdownTimerRef);
            
            if(!isShieldActive) {
                state.gold = Math.max(0, state.gold - 20);
                saveState();
            }

            if(state.gold <= 0) {
                alert("🚨 Wallet Depleted! Your coin balance has hit zero. Returning to tactical map hub.");
                exitToMenu();
            } else {
                alert(`⚠️ Incorrect! 20 coins deducted. Shuffling immediately to next card.`);
                launchNextActiveQuestionEngine();
            }
        }

        function applyInGameUtility(type) {
            if (state.perks[type] <= 0 || inputInteractionsBlocked) return;
            state.perks[type]--; 
            if(type === 'freeze') state.stats.freezeUsed++;
            saveState(); 
            playChimeAudio('perk');

            if (type === 'freeze') {
                clearInterval(countdownTimerRef);
                document.getElementById('frost-frame').classList.add('frost-active');
            } else if (type === 'half') {
                const elements = document.getElementById('choice-matrix').getElementsByTagName('button');
                let removed = 0;
                for(let i=0; i<elements.length; i++) {
                    if(i !== currentActiveQuestion.correct && removed < 2) {
                        elements[i].style.opacity = "0.15";
                        elements[i].disabled = true;
                        removed++;
                    }
                }
            } else if (type === 'skip') {
                clearInterval(countdownTimerRef);
                launchNextActiveQuestionEngine();
            } else if (type === 'shield') {
                isShieldActive = true;
                document.getElementById('shield-frame').classList.add('shield-active');
            }
        }

        function toggleLanguage() { playChimeAudio('tap'); state.lang = state.lang === 'en' ? 'tw' : 'en'; saveState(); renderMenuMap(); }
        function exitToMenu() { playChimeAudio('tap'); clearInterval(countdownTimerRef); renderMenuMap(); }
        
        window.onload = () => { saveState(); renderMenuMap(); };
    </script>
</body>
</html>
