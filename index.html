<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuestLife - Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-4 flex justify-center">

    <div class="w-full max-w-md space-y-6">
        <div class="glass-card rounded-2xl p-5 shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center space-x-3">
                    <div id="lvl-badge" class="w-12 h-12 rounded-full border-2 border-cyan-400 flex items-center justify-center font-bold text-cyan-400">Lvl 1</div>
                    <h2 class="font-bold">Player One</h2>
                </div>
                <div class="text-yellow-400 font-bold">🪙 <span id="gold-val">125</span> GP</div>
            </div>

            <div class="space-y-3">
                <div>
                    <div class="flex justify-between text-xs mb-1"><span>❤️ Health</span><span id="hp-txt">80/100</span></div>
                    <div class="w-full h-2 bg-slate-800 rounded-full"><div id="hp-bar" class="h-full bg-rose-500 rounded-full transition-all" style="width: 80%"></div></div>
                </div>
                <div>
                    <div class="flex justify-between text-xs mb-1"><span>✨ Experience</span><span id="xp-txt">45%</span></div>
                    <div class="w-full h-2 bg-slate-800 rounded-full"><div id="xp-bar" class="h-full bg-emerald-500 rounded-full transition-all" style="width: 45%"></div></div>
                </div>
            </div>
        </div>

        <div id="quest-container" class="space-y-3">
            <div class="glass-card rounded-xl p-4 flex items-center justify-between border-l-4 border-emerald-500">
                <div class="flex items-center space-x-3">
                    <input type="checkbox" onclick="completeTask(this, 5, 2)" class="w-5 h-5">
                    <p class="text-sm">Drink 2L of water</p>
                </div>
                <span class="text-xs text-emerald-400">Easy</span>
            </div>
        </div>

        <div class="glass-card rounded-xl p-3 flex space-x-2">
            <input type="text" id="task-input" placeholder="New quest..." class="w-full bg-transparent border-none focus:outline-none text-sm">
            <button onclick="addNewQuest()" class="bg-cyan-600 px-4 py-2 rounded-lg font-bold text-sm">Add</button>
        </div>
    </div>

    <script>
        // CORE DATA
        let stats = { lvl: 1, xp: 45, gold: 125, hp: 80 };

        // UPDATE SCREEN FUNCTION
        function refreshUI() {
            document.getElementById('lvl-badge').innerText = "Lvl " + stats.lvl;
            document.getElementById('gold-val').innerText = stats.gold;
            document.getElementById('xp-txt').innerText = stats.xp + "%";
            document.getElementById('xp-bar').style.width = stats.xp + "%";
            document.getElementById('hp-txt').innerText = stats.hp + "/100";
            document.getElementById('hp-bar').style.width = stats.hp + "%";
        }

        // TASK COMPLETION LOGIC
        function completeTask(el, xpGain, goldGain) {
            if(el.checked) {
                stats.xp += xpGain;
                stats.gold += goldGain;
                el.parentElement.parentElement.style.opacity = "0.5";
                el.disabled = true;

                if(stats.xp >= 100) {
                    stats.lvl++;
                    stats.xp -= 100;
                    alert("🎉 LEVEL UP TO " + stats.lvl + "!");
                }
                refreshUI();
            }
        }

        // ADD NEW QUEST LOGIC
        function addNewQuest() {
            let val = document.getElementById('task-input').value;
            if(val) {
                let div = document.createElement('div');
                div.className = "glass-card rounded-xl p-4 flex items-center justify-between border-l-4 border-amber-500";
                div.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <input type="checkbox" onclick="completeTask(this, 15, 8)" class="w-5 h-5">
                        <p class="text-sm">${val}</p>
                    </div>
                    <span class="text-xs text-amber-400">Medium</span>`;
                document.getElementById('quest-container').appendChild(div);
                document.getElementById('task-input').value = "";
            }
        }
    </script>
</body>
</html>
