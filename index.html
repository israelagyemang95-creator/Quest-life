<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Quest: Ultimate Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        #bg-overlay { position: fixed; inset: 0; background-color: #090d16; background-size: cover; background-position: center; transition: all 1.2s ease; z-index: 0; }
        #bg-tint { position: fixed; inset: 0; background: linear-gradient(180deg, rgba(15, 23, 42, 0.8), rgba(2, 6, 23, 0.98)); z-index: 1; }
        .glass-card { background: rgba(255, 255, 255, 0.06); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; color: white; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .btn-choice { width: 100%; text-align: left; padding: 1.1rem 1.4rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04); font-weight: 600; color: #f1f5f9; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; position: relative; overflow: hidden; }
        .btn-choice:hover { background: rgba(255, 255, 255, 0.12); border-color: #6366f1; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.15); }
        
        @keyframes clockAlarm {
            0% { transform: scale(1) rotate(0deg); color: #f59e0b; }
            25% { transform: scale(1.08) rotate(-6deg); color: #ef4444; }
            50% { transform: scale(1.08) rotate(6deg); color: #ef4444; }
            75% { transform: scale(1.08) rotate(-6deg); color: #ef4444; }
            100% { transform: scale(1) rotate(0deg); color: #ef4444; }
        }
        .alarm-active { animation: clockAlarm 0.4s infinite; border-color: #ef4444 !important; background: rgba(239, 68, 68, 0.1) !important; }
        .progress-bar-fill { transition: width 1s linear, background-color 0.5s ease; }
    </style>
</head>
<body class="p-4 min-h-screen flex flex-col items-center justify-start text-white overflow-x-hidden font-sans selection:bg-indigo-500 select-none">
    
    <div id="bg-overlay"></div>
    <div id="bg-tint"></div>
    <audio id="bg-music" loop src="background.mp3"></audio>

    <div class="fixed top-4 left-4 right-4 flex justify-between items-center z-50 max-w-md mx-auto w-full px-2">
        <button onclick="exitToMenu()" id="back-btn" class="hidden bg-slate-900/90 backdrop-blur border border-white/10 text-white px-4 py-2 rounded-full font-bold text-xs uppercase tracking-wider shadow-xl transition-all hover:bg-slate-800">
            🚪 Map Hub
        </button>
        <div class="flex gap-2 ml-auto">
            <button onclick="toggleLanguage()" class="bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-500 hover:to-indigo-600 text-white px-4 py-2 rounded-full font-bold text-xs uppercase shadow-md transition-all">
                🌐 <span id="lang-label">English</span>
            </button>
            <div id="gold-container" class="bg-slate-900/90 border border-white/10 px-4 py-2 rounded-full shadow-xl flex items-center gap-2 animate__animated">
                <span class="text-sm">💰</span>
                <span id="gold-val" class="font-black text-amber-400">500</span>
            </div>
        </div>
    </div>

    <main id="window-canvas" class="w-full max-w-md mt-16 relative z-10 space-y-5 flex flex-col"></main>

    <script src="questions.js"></script>
    <script>
        let state = JSON.parse(localStorage.getItem('bqUltimateData')) || {
            gold: 500,
            lang: 'en',
            unlockedModes: ['nt', 'ot', 'mix', 'egw', 'master'],
            perks: { freeze: 2, half: 2, skip: 2 },
            streak: 0
        };

        // Emergency Fallback Integrity Check
        if (!state.perks) state.perks = { freeze: 2, half: 2, skip: 2 };
        ['freeze', 'half', 'skip'].forEach(p => { if(state.perks[p] === undefined || isNaN(state.perks[p])) state.perks[p] = 2; });

        let currentCampaign = "";
        let levelIndex = 0;
        let activePool = [];
        let bookQuestions = [];
        let questionIndex = 0;
        let activeQuestion = null;
        let timerClockInterval = null;
        let secondsLeft = 0;
        let maxSeconds = 20;
        let isClockFrozen = false;
        let inputBlocked = false;

        function saveState() {
            localStorage.setItem('bqUltimateData', JSON.stringify(state));
            document.getElementById('gold-val').innerText = state.gold;
        }

        // Beautiful Game Sound FX Engine (Synthesized Browser Audio Context)
        function playSoundFX(type) {
            try {
                let ctx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = ctx.createOscillator();
                let gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'correct') {
                    // Success Melodic Chime Arpeggio
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
                    gain.gain.setValueAtTime(0.05, ctx.currentTime);
                    osc.start();
                    osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1); // E5
                    osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.2); // G5
                    osc.stop(ctx.currentTime + 0.35);
                } else if (type === 'wrong') {
                    // Harsh Bass Failure Buzz
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(130.81, ctx.currentTime); // C3
                    gain.gain.setValueAtTime(0.08, ctx.currentTime);
                    osc.start();
                    osc.frequency.linearRampToValueAtTime(80.00, ctx.currentTime + 0.3);
                    osc.stop(ctx.currentTime + 0.35);
                } else if (type === 'tick') {
                    // Subtle clock countdown tick
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(880, ctx.currentTime);
                    gain.gain.setValueAtTime(0.02, ctx.currentTime);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.05);
                } else if (type === 'shop') {
                    // Crisp coins purchase jingle
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(987.77, ctx.currentTime); // B5
                    gain.gain.setValueAtTime(0.04, ctx.currentTime);
                    osc.start();
                    osc.frequency.setValueAtTime(1318.51, ctx.currentTime + 0.08); // E6
                    osc.stop(ctx.currentTime + 0.22);
                }
            } catch(e) { console.log("Audio contextual block intercept:", e); }
        }

        function renderMenuMap() {
            currentCampaign = "";
            document.getElementById('back-btn').classList.add('hidden');
            document.getElementById('bg-overlay').style.backgroundImage = "none";
            
            const canvas = document.getElementById('window-canvas');
            canvas.innerHTML = `
                <div class="text-center space-y-1 animate__animated animate__fadeInDown">
                    <h1 class="text-4xl font-black tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 drop-shadow">BIBLE QUEST</h1>
                    <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Select Your Campaign Route</p>
                </div>

                <div class="glass-card p-4 space-y-3 border-indigo-500/20 bg-slate-900/40 animate__animated animate__fadeIn">
                    <div class="flex justify-between items-center border-b border-white/10 pb-2">
                        <span class="text-xs font-black text-indigo-300 uppercase tracking-wider flex items-center gap-1.5">🛒 Power-Up Armory Shop</span>
                        <span class="text-[10px] text-slate-400 font-medium">Tap to buy items</span>
                    </div>
                    <div class="grid grid-cols-3 gap-2 text-center">
                        <button onclick="buyPerk('freeze', 50)" class="bg-slate-950/40 p-2.5 rounded-2xl border border-white/5 hover:border-sky-400 transition-all flex flex-col items-center">
                            <span class="text-xl">❄️</span>
                            <span class="text-[11px] font-bold mt-1">Freeze</span>
                            <span class="text-[10px] text-amber-400 font-bold">50 💰</span>
                            <span class="text-[9px] text-slate-400 mt-1 px-2 py-0.5 bg-slate-950 rounded-full w-full">Stock: ${state.perks.freeze}</span>
                        </button>
                        <button onclick="buyPerk('half', 75)" class="bg-slate-950/40 p-2.5 rounded-2xl border border-white/5 hover:border-rose-400 transition-all flex flex-col items-center">
                            <span class="text-xl">⚖️</span>
                            <span class="text-[11px] font-bold mt-1">50:50</span>
                            <span class="text-[10px] text-amber-400 font-bold">75 💰</span>
                            <span class="text-[9px] text-slate-400 mt-1 px-2 py-0.5 bg-slate-950 rounded-full w-full">Stock: ${state.perks.half}</span>
                        </button>
                        <button onclick="buyPerk('skip', 100)" class="bg-slate-950/40 p-2.5 rounded-2xl border border-white/5 hover:border-purple-400 transition-all flex flex-col items-center">
                            <span class="text-xl">🔮</span>
                            <span class="text-[11px] font-bold mt-1">Skip</span>
                            <span class="text-[10px] text-amber-400 font-bold">100 💰</span>
                            <span class="text-[9px] text-slate-400 mt-1 px-2 py-0.5 bg-slate-950 rounded-full w-full">Stock: ${state.perks.skip}</span>
                        </button>
                    </div>
                </div>

                <div class="space-y-3 max-h-[340px] overflow-y-auto pr-1 animate__animated animate__fadeInUp">
                    <button onclick="launchCampaign('nt')" class="w-full p-4 glass-card text-left flex justify-between items-center hover:border-indigo-500 transition-all">
                        <div><h3 class="text-md font-black text-indigo-300">Phase 1: New Testament</h3><p class="text-[11px] text-slate-400">Gospels & Letters</p></div>
                        <span class="text-xl">⚡</span>
                    </button>
                    <button onclick="launchCampaign('ot')" class="w-full p-4 glass-card text-left flex justify-between items-center hover:border-emerald-500 transition-all">
                        <div><h3 class="text-md font-black text-emerald-300">Phase 2: Old Testament</h3><p class="text-[11px] text-slate-400">Law & Hebrew History</p></div>
                        <span class="text-xl">📜</span>
                    </button>
                    <button onclick="launchCampaign('mix')" class="w-full p-4 glass-card text-left flex justify-between items-center hover:border-purple-500 transition-all">
                        <div><h3 class="text-md font-black text-purple-300">Phase 3: Grand Mixture</h3><p class="text-[11px] text-slate-400">Full Randomized Journey</p></div>
                        <span class="text-xl">🌀</span>
                    </button>
                    <button onclick="launchCampaign('egw')" class="w-full p-4 glass-card text-left flex justify-between items-center hover:border-amber-400 transition-all">
                        <div><h3 class="text-md font-black text-amber-300">Phase 4: E.G. White Writings <span class="text-[10px] text-emerald-400 bg-emerald-950 px-1.5 py-0.5 rounded font-bold ml-1">DEV</span></h3><p class="text-[11px] text-slate-400">Prophetic History Insights</p></div>
                        <span class="text-xl">✒️</span>
                    </button>
                    <button onclick="launchCampaign('master')" class="w-full p-4 glass-card text-left flex justify-between items-center hover:border-red-500 transition-all">
                        <div><h3 class="text-md font-black text-red-400">Phase 5: Mastery Mode <span class="text-[10px] text-emerald-400 bg-emerald-950 px-1.5 py-0.5 rounded font-bold ml-1">DEV</span></h3><p class="text-[11px] text-slate-400">Hyper Speed: 5-Second Blitz Clock!</p></div>
                        <span class="text-xl">🔥</span>
                    </button>
                </div>
            `;
        }

        function buyPerk(perkName, cost) {
            if (state.gold >= cost) {
                state.gold -= cost;
                state.perks[perkName]++;
                saveState();
                playSoundFX('shop');
                renderMenuMap();
            } else {
                alert("Not enough coins! Play campaigns to earn rewards.");
            }
        }

        function launchCampaign(mode) {
            currentCampaign = mode;
            levelIndex = 0;
            state.streak = 0;
            document.getElementById('back-btn').classList.remove('hidden');
            
            if (mode === 'nt') activePool = quizDatabase.filter(b => b.group === 'NT');
            else if (mode === 'ot') activePool = quizDatabase.filter(b => b.group === 'OT');
            else if (mode === 'egw') activePool = quizDatabase.filter(b => b.group === 'EGW');
            else activePool = [...quizDatabase].sort(() => Math.random() - 0.5);

            initNewBookTrack();
        }

        function initNewBookTrack() {
            if (levelIndex >= activePool.length) {
                renderVictoryScreen();
                return;
            }
            const targetBook = activePool[levelIndex];
            bookQuestions = [...targetBook.questions].sort(() => Math.random() - 0.5);
            questionIndex = 0;
            loadQuestionNode();
        }

        function loadQuestionNode() {
            if (questionIndex >= bookQuestions.length) {
                levelIndex++;
                initNewBookTrack();
                return;
            }

            inputBlocked = false;
            isClockFrozen = false;
            const targetBook = activePool[levelIndex];
            document.getElementById('bg-overlay').style.backgroundImage = `url('${targetBook.bg}')`;

            activeQuestion = bookQuestions[questionIndex];
            let tier = activeQuestion.subGroup || "Easy"; 

            // Calculate Dynamic Speed Configuration Values
            if (currentCampaign === 'master') {
                maxSeconds = 5;
            } else {
                maxSeconds = tier === "Difficult" ? 10 : tier === "Moderate" ? 15 : 20;
            }
            secondsLeft = maxSeconds;

            // Determine Difficulty Color Coding Theme
            let tierColorClass = "bg-emerald-500";
            let tierTextClass = "text-emerald-300 bg-emerald-950/60 border border-emerald-500/20";
            if (tier === "Moderate") {
                tierColorClass = "bg-amber-500";
                tierTextClass = "text-amber-300 bg-amber-950/60 border border-amber-500/20";
            } else if (tier === "Difficult" || currentCampaign === 'master') {
                tierColorClass = "bg-rose-500";
                tierTextClass = "text-rose-400 bg-rose-950/60 border border-rose-500/20";
            }

            const canvas = document.getElementById('window-canvas');
            canvas.innerHTML = `
                <div class="glass-card p-4 space-y-3 animate__animated animate__fadeIn flex flex-col">
                    <div class="flex justify-between items-center">
                        <div>
                            <h2 class="text-xl font-black text-slate-100 tracking-wide">${targetBook.name}</h2>
                            <div class="flex gap-1.5 mt-1">
                                <span class="text-[9px] uppercase px-2 py-0.5 rounded bg-slate-950 font-bold text-slate-400">Book ${levelIndex + 1}/${activePool.length}</span>
                                <span class="text-[9px] uppercase px-2 py-0.5 rounded font-black ${tierTextClass}">${currentCampaign==='master'?'Mastery':tier}</span>
                            </div>
                        </div>
                        <div id="clock-wrapper" class="text-2xl font-black tracking-tighter tabular-nums text-amber-400 bg-slate-950/50 px-3 py-1.5 rounded-2xl border border-white/10 transition-all">
                            ⏰ <span id="clock-digit">${secondsLeft}</span>s
                        </div>
                    </div>
                    
                    <div class="w-full bg-slate-950/60 h-2 rounded-full overflow-hidden p-0.5 border border-white/5">
                        <div id="bar-fill" class="h-full rounded-full ${tierColorClass} progress-bar-fill" style="width: 100%"></div>
                    </div>
                </div>

                <div class="glass-card p-6 min-h-[120px] flex items-center justify-center text-center animate__animated animate__zoomIn shadow-2xl relative border-t border-white/10">
                    <h3 class="text-lg font-bold leading-snug tracking-wide text-slate-100">
                        ${state.lang === 'en' ? activeQuestion.q : (activeQuestion.q_twi || activeQuestion.q)}
                    </h3>
                </div>

                <div id="choice-matrix" class="space-y-2.5"></div>

                <div class="grid grid-cols-3 gap-2 mt-1 text-xs font-bold">
                    <button onclick="triggerFreezePerk()" class="bg-slate-900/60 border border-sky-500/20 p-2.5 rounded-2xl flex flex-col items-center justify-center gap-0.5 hover:bg-sky-950/40 transition-all text-sky-300">
                        <span>❄️ Freeze</span><span class="text-[10px] text-slate-400 font-medium">Own: ${state.perks.freeze}</span>
                    </button>
                    <button onclick="triggerHalfPerk()" class="bg-slate-900/60 border border-rose-500/20 p-2.5 rounded-2xl flex flex-col items-center justify-center gap-0.5 hover:bg-rose-950/40 transition-all text-rose-300">
                        <span>⚖️ 50:50</span><span class="text-[10px] text-slate-400 font-medium">Own: ${state.perks.half}</span>
                    </button>
                    <button onclick="triggerSkipPerk()" class="bg-slate-900/60 border border-purple-500/20 p-2.5 rounded-2xl flex flex-col items-center justify-center gap-0.5 hover:bg-purple-950/40 transition-all text-purple-300">
                        <span>🔮 Skip Question</span><span class="text-[10px] text-slate-400 font-medium">Own: ${state.perks.skip}</span>
                    </button>
                </div>
            `;

            const matrix = document.getElementById('choice-matrix');
            activeQuestion.a.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "btn-choice animate__animated animate__fadeInUp";
                btn.style.animationDelay = `${idx * 0.04}s`;
                btn.innerText = opt;
                btn.onclick = () => evaluateAnswer(idx, btn);
                matrix.appendChild(btn);
            });

            runCountdownLoop();
        }

        function runCountdownLoop() {
            clearInterval(timerClockInterval);
            const digit = document.getElementById('clock-digit');
            const wrapper = document.getElementById('clock-wrapper');
            const fill = document.getElementById('bar-fill');

            timerClockInterval = setInterval(() => {
                if (isClockFrozen || inputBlocked) return;
                secondsLeft--;
                digit.innerText = secondsLeft;

                // Animate progress bar fill smoothly shrinking
                let pct = (secondsLeft / maxSeconds) * 100;
                if (fill) fill.style.width = `${pct}%`;

                if (secondsLeft <= 4) {
                    if(wrapper) wrapper.className = "text-2xl font-black tracking-tighter tabular-nums px-3 py-1.5 rounded-2xl border alarm-active";
                    playSoundFX('tick'); 
                }

                if (secondsLeft <= 0) {
                    clearInterval(timerClockInterval);
                    handleFailurePenalty();
                }
            }, 1000);
        }

        function evaluateAnswer(selectedIdx, clickedElement) {
            if (inputBlocked) return;
            inputBlocked = true;
            clearInterval(timerClockInterval);

            if (selectedIdx === activeQuestion.correct) {
                clickedElement.className = "btn-choice bg-gradient-to-r from-emerald-600 to-teal-600 border-emerald-400 text-white animate__animated animate__pulse font-black shadow-lg shadow-emerald-900/30";
                playSoundFX('correct');
                
                let addedGold = currentCampaign === 'master' ? 40 : 15;
                state.gold += addedGold;
                state.streak++;

                let note = "";
                if (state.streak % 5 === 0) { state.perks.freeze++; note = " ❄️ Bonus Freeze Added!"; }
                if (state.streak % 8 === 0) { state.perks.half++; note = " ⚖️ Bonus 50:50 Added!"; }

                const floatNotify = document.createElement('div');
                floatNotify.className = "text-center text-sm font-black text-emerald-400 animate__animated animate__bounceIn mt-2 drop-shadow";
                floatNotify.innerText = `Correct! +${addedGold} Coins${note}`;
                document.getElementById('window-canvas').appendChild(floatNotify);

                questionIndex++;
                saveState();
                setTimeout(loadQuestionNode, 1300);
            } else {
                clickedElement.className = "btn-choice bg-gradient-to-r from-rose-600 to-red-700 border-rose-400 text-white animate__animated animate__shakeX font-black shadow-lg shadow-rose-900/40";
                playSoundFX('wrong');
                setTimeout(handleFailurePenalty, 1100);
            }
        }

        function handleFailurePenalty() {
            clearInterval(timerClockInterval);
            state.streak = 0;
            state.gold = Math.max(0, state.gold - 20); 
            saveState();

            // 🚨 JUICY FEEDBACK: Shake the Gold Counter HUD box in Red
            const goldHUD = document.getElementById('gold-container');
            if (goldHUD) {
                goldHUD.classList.add('animate__shakeX', 'border-red-500', 'bg-red-950/80');
                setTimeout(() => {
                    goldHUD.classList.remove('animate__shakeX', 'border-red-500', 'bg-red-950/80');
                }, 1000);
            }

            alert("❌ Incorrect! 20 Coins deducted. Book shuffled!");
            
            const targetBook = activePool[levelIndex];
            bookQuestions = [...targetBook.questions].sort(() => Math.random() - 0.5);
            questionIndex = 0; 
            loadQuestionNode();
        }

        function triggerFreezePerk() {
            if (isClockFrozen || state.perks.freeze <= 0 || inputBlocked) return;
            state.perks.freeze--;
            isClockFrozen = true;
            saveState();
            playSoundFX('shop');
            
            const clk = document.getElementById('clock-wrapper');
            if (clk) {
                clk.style.borderColor = "#0ea5e9";
                clk.style.color = "#38bdf8";
                clk.innerHTML = "❄️ FROZEN";
            }
        }

        function triggerHalfPerk() {
            if (state.perks.half <= 0 || inputBlocked) return;
            state.perks.half--;
            saveState();
            playSoundFX('shop');
            
            const matrix = document.getElementById('choice-matrix');
            const buttons = matrix.getElementsByTagName('button');
            let wrongIndices = [];
            for(let i=0; i<buttons.length; i++) {
                if (i !== activeQuestion.correct) wrongIndices.push(i);
            }
            wrongIndices.sort(() => Math.random() - 0.5).slice(0, 2).forEach(idx => {
                buttons[idx].classList.add('animate__animated', 'animate__fadeOutDown');
                setTimeout(() => {
                    buttons[idx].style.opacity = "0";
                    buttons[idx].style.pointerEvents = "none";
                }, 400);
            });
        }

        function triggerSkipPerk() {
            if (state.perks.skip <= 0 || inputBlocked) return;
            state.perks.skip--;
            saveState();
            playSoundFX('shop');
            questionIndex++; 
            loadQuestionNode();
        }

        function renderVictoryScreen() {
            const canvas = document.getElementById('window-canvas');
            canvas.innerHTML = `
                <div class="glass-card p-8 text-center space-y-6 animate__animated animate__backInDown border border-amber-500/30">
                    <h1 class="text-4xl font-black bg-clip-text text-transparent bg-gradient-to-r from-amber-400 to-yellow-200">🏆 ROUTE CLEARED</h1>
                    <p class="text-xs text-slate-300 tracking-wide leading-relaxed">Splendid! You successfully mastered this campaign path line route option completely.</p>
                    <div class="bg-slate-950/60 p-4 rounded-2xl border border-white/5 shadow-inner">
                        <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Saved Coin Balance Balance</p>
                        <p class="text-3xl font-black text-amber-400 mt-1">💰 ${state.gold}</p>
                    </div>
                    <button onclick="exitToMenu()" class="w-full bg-gradient-to-r from-indigo-500 via-purple-600 to-pink-600 p-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:opacity-90 shadow-xl transition-all">
                        Return to Map Selection
                    </button>
                </div>
            `;
        }

        function toggleLanguage() {
            state.lang = state.lang === 'en' ? 'tw' : 'en';
            saveState();
            document.getElementById('lang-label').innerText = state.lang === 'en' ? "English" : "Twi";
            if (currentCampaign !== "") loadQuestionNode();
            else renderMenuMap();
        }

        function exitToMenu() {
            clearInterval(timerClockInterval);
            renderMenuMap();
        }

        window.onload = () => {
            saveState();
            renderMenuMap();
            document.body.addEventListener('click', () => {
                document.getElementById('bg-music').play().catch(()=>{});
            }, { once: true });
        };
    </script>
</body>
</html>
