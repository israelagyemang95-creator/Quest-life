<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Quest: 100 Levels</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #bg-overlay {
            position: fixed; inset: 0;
            background-color: #1e1b4b; /* Safe fallback color */
            background-size: cover; background-position: center;
            transition: background-image 1s ease-in-out;
            z-index: 0;
        }
        #bg-tint {
            position: fixed; inset: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.5), rgba(0,0,0,0.8));
            z-index: 1;
        }
        body { min-height: 100vh; font-family: sans-serif; overflow-x: hidden; }
        .quiz-card { background: rgba(255, 255, 255, 0.95); border-radius: 20px; color: #1e293b; z-index: 10; position: relative; }
        
        #level-up-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; align-items: center; justify-content: center;
            z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.5s;
        }
        #level-up-overlay.active { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">
    <div id="bg-overlay"></div>
    <div id="bg-tint"></div>

    <div id="level-up-overlay">
        <div class="text-center text-white">
            <h1 class="text-5xl font-black text-amber-400 animate-bounce">LEVEL UP!</h1>
            <p id="next-world-txt" class="text-xl mt-2 font-bold"></p>
        </div>
    </div>

    <div id="game-content" class="w-full max-w-md space-y-6 mt-4 relative z-10">
        <div class="quiz-card p-6 shadow-2xl">
            <h1 id="world-title" class="text-xs font-black uppercase tracking-widest mb-2 text-indigo-600 text-center">Loading...</h1>
            <div class="flex justify-between items-center">
                <div id="lvl-badge" class="w-12 h-12 rounded-full bg-indigo-600 text-white flex items-center justify-center text-xl font-black shadow-md">1</div>
                <div class="text-right">
                    <p class="text-2xl font-black text-slate-800">💰 <span id="gold-val">100</span></p>
                    <p class="text-[10px] font-bold text-slate-400">GOLD BALANCE</p>
                </div>
            </div>
            <div class="mt-4">
                <div class="w-full h-3 bg-slate-200 rounded-full overflow-hidden">
                    <div id="xp-bar" class="h-full bg-green-500 transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div id="quiz-container" class="space-y-4"></div>
        
        <button onclick="triggerReset()" class="w-full text-center text-xs text-white/50 hover:text-white mt-10">
            Reset Game Progress
        </button>
    </div>

    <script src="questions.js"></script>
    <script>
        let gameData = JSON.parse(localStorage.getItem('bibleQuizRPGData')) || {
            lvl: 1, gold: 100, currentQuestionIndex: 0
        };

        function getCurrentLevelData() {
            return quizDatabase.find(l => l.level === gameData.lvl) || quizDatabase[0];
        }

        function updateUI() {
            const levelData = getCurrentLevelData();
            const bgOverlay = document.getElementById('bg-overlay');
            
            // OPTION C FIX: Direct application with cache-busting
            if (levelData.bgImage) {
                bgOverlay.style.backgroundImage = `url('${levelData.bgImage}')`;
            }

            document.getElementById('world-title').innerText = levelData.name;
            document.getElementById('lvl-badge').innerText = gameData.lvl;
            document.getElementById('gold-val').innerText = gameData.gold;
            
            const qList = levelData.questions;
            const pct = (gameData.currentQuestionIndex / qList.length) * 100;
            document.getElementById('xp-bar').style.width = pct + "%";

            const container = document.getElementById('quiz-container');
            container.innerHTML = "";

            if (gameData.currentQuestionIndex < qList.length) {
                const qObj = qList[gameData.currentQuestionIndex];
                let qCard = document.createElement('div');
                qCard.className = "quiz-card p-6 shadow-xl space-y-4";
                qCard.innerHTML = `
                    <h2 class="text-xl font-bold text-slate-800">${qObj.q}</h2>
                    <div id="options-box" class="space-y-2"></div>
                `;
                container.appendChild(qCard);

                qObj.a.forEach((option, idx) => {
                    let btn = document.createElement('button');
                    btn.className = "w-full text-left p-4 rounded-xl border border-slate-200 hover:bg-indigo-50 font-bold transition-all bg-white shadow-sm";
                    btn.innerText = option;
                    btn.onclick = () => checkAnswer(idx, qObj.correct, btn);
                    document.getElementById('options-box').appendChild(btn);
                });
            }
        }

        function checkAnswer(chosen, correct, btn) {
            if (chosen === correct) {
                btn.classList.add('bg-green-100', 'border-green-500');
                gameData.gold += 20;
                gameData.currentQuestionIndex++;
                
                const levelData = getCurrentLevelData();
                if (gameData.currentQuestionIndex >= levelData.questions.length) {
                    gameData.lvl++;
                    gameData.currentQuestionIndex = 0;
                    showLevelUp();
                } else {
                    setTimeout(saveAndRefresh, 600);
                }
