<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Quest: Arcade Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { 
            background-color: #050811; 
            font-family: system-ui, -apple-system, sans-serif; 
            overflow-x: hidden;
            background-image: radial-gradient(circle at center, rgba(16, 23, 42, 0.4) 0%, rgba(2, 6, 23, 0.98) 100%);
        }
        
        .game-bg-active {
            background-image: url('https://images.unsplash.com/photo-1601004890684-d8cbf643f5f2?auto=format&fit=crop&w=800&q=80') !important;
            background-size: cover !important;
            background-position: center !important;
            background-blend-mode: overlay !important;
            background-color: rgba(5, 8, 20, 0.85) !important;
        }

        .glass-card { background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; color: white; }
        
        .btn-choice { width: 100%; text-align: left; padding: 1.1rem 1.4rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.07); background: rgba(15, 23, 42, 0.8); font-weight: 600; color: #f1f5f9; transition: all 0.2s ease; position: relative; }
        .btn-choice:hover { background: rgba(30, 41, 59, 0.9); border-color: rgba(255, 255, 255, 0.2); transform: translateY(-1px); }
        
        @keyframes auroraFlow {
            0% { background-position: 0% 50%; filter: hue-rotate(0deg); }
            50% { background-position: 100% 50%; filter: hue-rotate(180deg); }
            100% { background-position: 0% 50%; filter: hue-rotate(360deg); }
        }
        .rainbow-correct { 
            background: linear-gradient(45deg, #ff007f, #7f00ff, #00f0ff, #00ff7f, #ffeb00) !important;
            background-size: 300% 300% !important;
            animation: auroraFlow 4s ease infinite, pulse 0.4s infinite !important;
            border-color: transparent !important;
            color: #ffffff !important;
            font-weight: 900 !important;
            text-shadow: 0 2px 6px rgba(0,0,0,0.7);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.5) !important;
        }

        /* Task Completion Glow Animation */
        @keyframes glowingPulse {
            0% { box-shadow: 0 0 5px rgba(34, 197, 94, 0.2); border-color: rgba(34, 197, 94, 0.4); }
            50% { box-shadow: 0 0 20px rgba(234, 179, 8, 0.6); border-color: rgba(234, 179, 8, 0.8); background: rgba(20, 83, 45, 0.4); }
            100% { box-shadow: 0 0 5px rgba(34, 197, 94, 0.2); border-color: rgba(34, 197, 94, 0.4); }
        }
        .completed-glow {
            animation: glowingPulse 2s infinite ease-in-out;
        }

        #frost-frame { position: fixed; inset: 0; border: 14px solid rgba(56, 189, 248, 0.45); pointer-events: none; opacity: 0; transition: opacity 0.3s ease; z-index: 40; box-shadow: inset 0 0 80px rgba(14, 165, 233, 0.35); }
        .frost-active { opacity: 1 !important; }
        
        .snowflake { position: fixed; top: -5%; color: #e0f2fe; pointer-events: none; z-index: 45; animation: fall linear infinite; filter: drop-shadow(0 0 4px rgba(255,255,255,0.6)); }
        @keyframes fall {
            0% { top: -5%; transform: translateX(0) rotate(0deg); }
            50% { transform: translateX(35px) rotate(180deg); }
            100% { top: 105%; transform: translateX(-20px) rotate(360deg); }
        }

        #shield-frame { position: fixed; inset: 0; border: 12px solid rgba(245, 158, 11, 0.5); pointer-events: none; opacity: 0; transition: opacity 0.3s ease; z-index: 40; box-shadow: inset 0 0 60px rgba(245, 158, 11, 0.25); }
        .shield-active { opacity: 1 !important; }
        @keyframes clockPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.06); border-color: #ef4444; color: #ef4444; background: rgba(239, 68, 68, 0.1); } }
        .alarm-on { animation: clockPulse 0.5s infinite; }
    </style>
</head>
<body class="p-4 min-h-screen flex flex-col items-center justify-start text-white select-none">

    <div id="frost-frame"></div>
    <div id="shield-frame"></div>
    <div id="snow-box"></div>

    <!-- Clean Top Navigation HUD Bar -->
    <div class="fixed top-4 left-4 right-4 flex justify-between items-center z-50 max-w-md mx-auto w-full px-2">
        <button onclick="exitToMenu()" id="back-btn" class="hidden bg-slate-900/95 border border-white/10 text-white px-4 py-2 rounded-full font-bold text-xs uppercase tracking-wider shadow-2xl transition-all">
            🚪 Map Hub
        </button>
        <button onclick="viewPhaseSectors()" id="phase-sectors-btn" class="hidden bg-gradient-to-r from-purple-600 to-indigo-600 border border-white/10 text-white px-4 py-2 rounded-full font-bold text-xs uppercase tracking-wider shadow-2xl transition-all">
            📋 Sector View
        </button>
        <div class="flex gap-2 ml-auto">
            <button onclick="toggleLanguage()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-full font-bold text-xs uppercase shadow-md transition-all">
                🌐 <span id="lang-label">English</span>
            </button>
            <div id="gold-container" class="bg-slate-900/95 border border-white/10 px-4 py-2 rounded-full shadow-2xl flex items-center gap-2">
                <span>💰</span>
                <span id="gold-val" class="font-black text-amber-400">0</span>
            </div>
        </div>
    </div>

    <!-- MAIN ACTIVE WINDOW CANVAS -->
    <main id="window-canvas" class="w-full max-w-md mt-16 relative z-10 space-y-4 flex flex-col mb-24"></main>

    <!-- SHOP MODAL PANEL -->
    <div id="shop-modal" class="fixed inset-0 bg-black/85 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div class="glass-card w-full max-w-sm p-6 space-y-4 border-indigo-500/30 bg-slate-950/80 animate__animated animate__zoomIn">
            <div class="flex justify-between items-center border-b border-white/10 pb-3">
                <div class="flex items-center gap-2">
                    <span class="text-xl">🛒</span>
                    <h3 class="text-sm font-black uppercase tracking-wider text-indigo-300">Purchase Armory Supplies</h3>
                </div>
                <button onclick="closeShopModal()" class="text-slate-400 hover:text-white font-black text-sm bg-white/5 w-7 h-7 rounded-full flex items-center justify-center">✕</button>
            </div>
            <div id="modal-shop-grid" class="space-y-2 max-h-[360px] overflow-y-auto"></div>
        </div>
    </div>

    <!-- INVENTORY TRIGGER BAG BUTTON -->
    <button id="lobby-bag-btn" onclick="openShopModal()" class="fixed bottom-6 right-6 z-40 bg-gradient-to-tr from-indigo-600 to-purple-600 border border-white/20 w-14 h-14 rounded-full flex items-center justify-center shadow-2xl text-2xl">
        🎒
    </button>

    <script src="questions.js"></script>
    <script>
        // Fallback Database
        if (typeof window.quizDatabase === 'undefined' || !Array.isArray(window.quizDatabase)) {
            window.quizDatabase = [
                {
                    name: "Gospels & Acts",
                    group: "NT",
                    questions: [
                        { q: "Where was Jesus born?", a: ["Nazareth", "Bethlehem", "Jerusalem", "Capernaum"], q_twi: "Hehefa na wɔwoo Yesu?", a_tw: ["Nasaret", "Betlehem", "Yerusalem", "Kapernaum"], correct: 1, subGroup: "Easy" },
                        { q: "Who built the ark?", a: ["Moses", "Noah", "Abraham", "David"], q_twi: "Hwan na ɔyɛɛ adaka no?", a_tw: ["Mose", "Noa", "Abraham", "David"], correct: 1, subGroup: "Easy" }
                    ]
                }
            ];
        }

        let state = JSON.parse(localStorage.getItem('bqArcadeV6Data_Updated')) || {
            gold: 500,
            lang: 'en',
            perks: { freeze: 2, half: 2, skip: 2, shield: 1, elixir: 2 },
            clearedQuestions: [], // Tracks answered question texts permanently
            claimedRewards: {},   // Maps campaignMode_activityIndex -> true/false
            completedActivities: {} // Maps campaignMode_activityIndex -> true/false
        };

        let currentCampaign = "";
        let currentSelectedActivityIdx = null;
        const TOTAL_ACTIVITIES_PER_PHASE = 20;
        
        let campaignQuestionsPool = [];
        let activeQuestion = null;

        let timerClockInterval = null;
        let secondsLeft = 0;
        let maxSeconds = 20;
        let isClockFrozen = false;
        let inputBlocked = false;
        let isShieldActive = false;
        let audioCtx = null;

        function saveState() {
            localStorage.setItem('bqArcadeV6Data_Updated', JSON.stringify(state));
            if(document.getElementById('gold-val')) document.getElementById('gold-val').innerText = state.gold;
            if(document.getElementById('lang-label')) document.getElementById('lang-label').innerText = state.lang === 'en' ? "English" : "Twi";
        }

        function initAudioEngine() {
            if (audioCtx) return;
            try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
        }

        function playSoundFX(type) {
            initAudioEngine();
            if (!audioCtx) return;
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);

                if (type === 'correct') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                    osc.start(); osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.08); osc.stop(audioCtx.currentTime + 0.3);
                } else if (type === 'wrong') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(140, audioCtx.currentTime); gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.25);
                } else if (type === 'perk') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(400, audioCtx.currentTime); gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.15);
                }
            } catch(e){}
        }

        function openShopModal() {
            playSoundFX('perk');
            const items = [
                { id: 'freeze', name: 'Chrono Freeze', desc: 'Stops countdown progression.', cost: 50, icon: '❄️' },
                { id: 'half', name: 'Divine 50:50', desc: 'Discards two incorrect choices.', cost: 75, icon: '⚖️' },
                { id: 'skip', name: 'Prophetic Skip', desc: 'Skips node without penalty risks.', cost: 100, icon: '🔮' },
                { id: 'shield', name: 'Aegis Shield', desc: 'Blocks negative coin deductions.', cost: 60, icon: '🛡️' },
                { id: 'elixir', name: 'Time Elixir', desc: 'Grants +10 seconds onto clock.', cost: 40, icon: '🧪' }
            ];
            const grid = document.getElementById('modal-shop-grid'); if(!grid) return;
            grid.innerHTML = "";
            items.forEach(item => {
                const row = document.createElement('div');
                row.className = "flex items-center justify-between p-3 bg-slate-900/80 rounded-2xl border border-white/5";
                row.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="text-2xl bg-slate-950 p-2 rounded-xl">${item.icon}</span>
                        <div>
                            <h4 class="text-xs font-black text-slate-200">${item.name}</h4>
                            <p class="text-[9px] text-indigo-400 font-black">Owned: ${state.perks[item.id] || 0}</p>
                        </div>
                    </div>
                    <button onclick="buyPerk('${item.id}', ${item.cost})" class="bg-indigo-600 hover:bg-indigo-500 font-bold text-xs px-3 py-1.5 rounded-xl text-white">${item.cost} 💰</button>
                `;
                grid.appendChild(row);
            });
            document.getElementById('shop-modal').classList.remove('hidden');
        }
        function closeShopModal() { document.getElementById('shop-modal').classList.add('hidden'); }

        function buyPerk(id, cost) {
            if (state.gold >= cost) {
                state.gold -= cost; state.perks[id] = (state.perks[id] || 0) + 1;
                saveState(); openShopModal();
            } else { alert("Insufficient coin funds!"); }
        }

        function renderMenuMap() {
            currentCampaign = "";
            document.body.classList.remove('game-bg-active');
            if(document.getElementById('back-btn')) document.getElementById('back-btn').classList.add('hidden');
            if(document.getElementById('phase-sectors-btn')) document.getElementById('phase-sectors-btn').classList.add('hidden');
            stopSnowingEffect();
            
            const canvas = document.getElementById('window-canvas'); if(!canvas) return;
            let heading = state.lang === 'tw' ? "TWERƐKRON KANEA" : "BIBLE QUEST";
            let subheading = state.lang === 'tw' ? "Yiyi Ɔfasa a Wopɛ sɛ Wosua" : "Select Campaign Route";

            canvas.innerHTML = `
                <div class="text-center space-y-1 py-4 animate__animated animate__fadeInDown">
                    <h1 class="text-4xl font-black bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400">${heading}</h1>
                    <p class="text-xs text-slate-500 font-bold tracking-widest uppercase">${subheading}</p>
                </div>
                <div class="space-y-2.5 animate__animated animate__fadeInUp">
                    <button onclick="launchCampaign('nt')" class="w-full p-4 glass-card text-left flex justify-between items-center hover:border-indigo-500 transition-all">
                        <div>
                            <h3 class="text-sm font-black text-indigo-300">Phase 1: New Testament</h3>
                            <p class="text-[10px] text-slate-400">Gospels & Epistles Letters</p>
                        </div>
                        <span class="text-lg">⚡</span>
                    </button>
                    <button onclick="launchCampaign('ot')" class="w-full p-4 glass-card text-left flex justify-between items-center hover:border-emerald-500 transition-all">
                        <div>
                            <h3 class="text-sm font-black text-emerald-300">Phase 2: Old Testament</h3>
                            <p class="text-[10px] text-slate-400">Torah, Law & History Chronicles</p>
                        </div>
                        <span class="text-lg">📜</span>
                    </button>
                    <button onclick="launchCampaign('mix')" class="w-full p-4 glass-card text-left flex justify-between items-center hover:border-purple-500 transition-all">
                        <div>
                            <h3 class="text-sm font-black text-purple-300">Phase 3: Grand Mixture</h3>
                            <p class="text-[10px] text-slate-400">Full Structural Random Pool Mix</p>
                        </div>
                        <span class="text-lg">🌀</span>
                    </button>
                    <button onclick="launchCampaign('egw')" class="w-full p-4 glass-card text-left flex justify-between items-center hover:border-amber-400 transition-all">
                        <div>
                            <h3 class="text-sm font-black text-amber-300">Phase 4: E.G. White Writings</h3>
                            <p class="text-[10px] text-slate-400">Prophetic History Insights</p>
                        </div>
                        <span class="text-lg">✒️</span>
                    </button>
                </div>
            `;
        }

        function launchCampaign(mode) {
            initAudioEngine();
            currentCampaign = mode;
            
            if(document.getElementById('back-btn')) document.getElementById('back-btn').classList.remove('hidden');
            if(document.getElementById('phase-sectors-btn')) document.getElementById('phase-sectors-btn').classList.add('hidden');

            let matchedBooks = [];
            if (mode === 'nt') matchedBooks = window.quizDatabase.filter(b => b.group === 'NT');
            else if (mode === 'ot') matchedBooks = window.quizDatabase.filter(b => b.group === 'OT');
            else if (mode === 'egw') matchedBooks = window.quizDatabase.filter(b => b.group === 'EGW');
            else matchedBooks = window.quizDatabase;

            if(matchedBooks.length === 0) matchedBooks = window.quizDatabase;

            campaignQuestionsPool = [];
            matchedBooks.forEach(b => {
                if(b.questions && Array.isArray(b.questions)) {
                    b.questions.forEach(q => {
                        q._bookName = b.name; 
                        campaignQuestionsPool.push(q);
                    });
                }
            });

            viewPhaseSectors();
        }

        // Independent Dedicated Activity Selection Screen Layout
        function viewPhaseSectors() {
            clearInterval(timerClockInterval);
            document.body.classList.remove('game-bg-active');
            if(document.getElementById('phase-sectors-btn')) document.getElementById('phase-sectors-btn').classList.add('hidden');
            
            const canvas = document.getElementById('window-canvas'); if(!canvas) return;

            let totalCompleted = 0;
            for(let i = 1; i <= TOTAL_ACTIVITIES_PER_PHASE; i++) {
                if(state.completedActivities[`${currentCampaign}_${i}`]) totalCompleted++;
            }
            let completionPct = Math.round((totalCompleted / TOTAL_ACTIVITIES_PER_PHASE) * 100);

            let sectorTitle = `Sectors Explorer: ${currentCampaign.toUpperCase()}`;

            let htmlString = `
                <div class="glass-card p-4 space-y-2.5 bg-slate-950/90 border border-purple-500/30 animate__animated animate__fadeIn flex flex-col">
                    <div class="flex justify-between items-center">
                        <h2 class="text-base font-black text-purple-400 uppercase tracking-wider">${sectorTitle}</h2>
                        <span class="text-xs text-slate-400 font-bold">${totalCompleted}/20 Completed</span>
                    </div>
                    <div class="w-full bg-slate-900 h-3 rounded-full overflow-hidden p-0.5 border border-white/5">
                        <div class="h-full rounded-full bg-gradient-to-r from-purple-500 via-indigo-500 to-emerald-400 transition-all duration-500" style="width: ${completionPct}%;"></div>
                    </div>
                </div>
                <div class="space-y-2.5 max-h-[60vh] overflow-y-auto pr-1 animate__animated animate__fadeInUp">
            `;

            for(let i = 1; i <= TOTAL_ACTIVITIES_PER_PHASE; i++) {
                let diff = "Easy"; let rewardCoins = 15;
                if(i >= 7 && i <= 14) { diff = "Moderate"; rewardCoins = 25; }
                else if(i >= 15) { diff = "Difficult"; rewardCoins = 40; }

                let key = `${currentCampaign}_${i}`;
                let isDone = state.completedActivities[key];
                let isClaimed = state.claimedRewards[key];

                let cardStyle = "bg-slate-900/90 border-l-4 border-indigo-500";
                let actionBtn = `<button onclick="startActivityNode(${i}, '${diff}')" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-xs px-3 py-1.5 rounded-xl">START</button>`;

                if (isDone) {
                    if (isClaimed) {
                        cardStyle = "bg-slate-950/50 opacity-60 border-l-4 border-slate-600";
                        actionBtn = `<span class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Claimed ✓</span>`;
                    } else {
                        // Glowing status state indicating reward claim availability
                        cardStyle = "completed-glow bg-emerald-950/80 border border-emerald-500";
                        actionBtn = `<button onclick="claimActivityReward(${i}, ${rewardCoins})" class="bg-gradient-to-r from-amber-500 to-yellow-400 hover:from-amber-400 hover:to-yellow-300 text-slate-950 font-black text-xs px-3 py-1.5 rounded-xl animate__animated animate__pulse animate__infinite">🎁 CLAIM</button>`;
                    }
                }

                // Generates dynamic, meaningful descriptive metadata context instead of generic placeholders
                let contextSubject = campaignQuestionsPool[i % campaignQuestionsPool.length]?._bookName || "Scripture Quest Study";

                htmlString += `
                    <div class="p-3.5 rounded-2xl flex items-center justify-between border border-white/5 ${cardStyle}">
                        <div>
                            <div class="font-black text-slate-200 text-xs flex items-center gap-2">
                                <span>Task ${i}: ${contextSubject}</span>
                                <span class="text-[8px] uppercase tracking-tight px-1.5 py-0.5 rounded bg-slate-950 text-purple-400 font-bold">${diff}</span>
                            </div>
                            <p class="text-[9px] text-slate-400 font-medium mt-0.5">Value Valuation: <span class="text-amber-400 font-bold">${rewardCoins} 💰</span></p>
                        </div>
                        <div>${actionBtn}</div>
                    </div>
                `;
            }

            htmlString += `</div>`;
            canvas.innerHTML = htmlString;
        }

        function claimActivityReward(nodeIdx, rewardValue) {
            let key = `${currentCampaign}_${nodeIdx}`;
            state.claimedRewards[key] = true;
            state.gold += rewardValue;
            playSoundFX('correct');
            saveState();
            viewPhaseSectors();
        }

        function startActivityNode(nodeIdx, difficultyTier) {
            currentSelectedActivityIdx = nodeIdx;
            if(document.getElementById('phase-sectors-btn')) document.getElementById('phase-sectors-btn').classList.remove('hidden');
            document.body.classList.add('game-bg-active');
            
            inputBlocked = false; isShieldActive = false;
            if(document.getElementById('shield-frame')) document.getElementById('shield-frame').className = "";
            if(!isClockFrozen) if(document.getElementById('frost-frame')) document.getElementById('frost-frame').className = "";

            // Filtering registry loops to ensure complete elimination of repeating matches
            let availablePool = campaignQuestionsPool.filter(q => !state.clearedQuestions.includes(q.q));
            if (availablePool.length === 0) { 
                state.clearedQuestions = []; 
                saveState();
                availablePool = campaignQuestionsPool; 
            }

            let subFiltered = availablePool.filter(q => (q.subGroup || "Easy") === difficultyTier);
            if (subFiltered.length === 0) subFiltered = availablePool;

            activeQuestion = subFiltered[Math.floor(Math.random() * subFiltered.length)];

            maxSeconds = difficultyTier === "Difficult" ? 10 : difficultyTier === "Moderate" ? 15 : 20;
            if (!isClockFrozen) secondsLeft = maxSeconds;

            let questionText = (state.lang === 'tw' && activeQuestion.q_twi) ? activeQuestion.q_twi : activeQuestion.q;
            let choicesArray = (state.lang === 'tw' && activeQuestion.a_tw) ? activeQuestion.a_tw : activeQuestion.a;

            const canvas = document.getElementById('window-canvas'); if(!canvas) return;

            canvas.innerHTML = `
                <div class="glass-card p-4 space-y-3 flex flex-col bg-slate-900/90 shadow-2xl animate__animated animate__fadeIn">
                    <div class="flex justify-between items-center">
                        <div>
                            <h2 class="text-sm font-black text-indigo-400 uppercase tracking-wider">${activeQuestion._bookName || "Bible Quest"}</h2>
                            <div class="text-xs font-bold text-slate-300 mt-0.5">Task Sector Activity ${nodeIdx}</div>
                        </div>
                        <div id="clock-wrapper" class="text-2xl font-black tracking-tighter tabular-nums text-amber-400 bg-slate-950/70 px-3 py-1.5 rounded-2xl border border-white/10">
                            ⏰ <span id="clock-digit">${secondsLeft}</span>s
                        </div>
                    </div>
                </div>

                <div class="glass-card p-6 min-h-[80px] flex items-center justify-center text-center animate__animated animate__zoomIn bg-slate-900/95 border border-indigo-500/20 shadow-xl">
                    <h3 class="text-base font-bold leading-snug text-slate-100">${questionText}</h3>
                </div>

                <div id="choice-matrix" class="space-y-2.5"></div>

                <!-- HOTBAR SYSTEM -->
                <div class="fixed bottom-0 left-0 right-0 p-3 bg-slate-950/95 border-t border-white/10 z-40 flex justify-center gap-2">
                    <button onclick="triggerInGamePerk('freeze')" class="flex-1 bg-slate-900 border border-sky-500/30 p-2 rounded-xl flex flex-col items-center"><span>❄️</span><span class="text-[9px] text-slate-400 font-bold">Qty: ${state.perks.freeze}</span></button>
                    <button onclick="triggerInGamePerk('half')" class="flex-1 bg-slate-900 border border-rose-500/30 p-2 rounded-xl flex flex-col items-center"><span>⚖️</span><span class="text-[9px] text-slate-400 font-bold">Qty: ${state.perks.half}</span></button>
                    <button onclick="triggerInGamePerk('skip')" class="flex-1 bg-slate-900 border border-purple-500/30 p-2 rounded-xl flex flex-col items-center"><span>🔮</span><span class="text-[9px] text-slate-400 font-bold">Qty: ${state.perks.skip}</span></button>
                    <button onclick="triggerInGamePerk('shield')" class="flex-1 bg-slate-900 border border-amber-500/30 p-2 rounded-xl flex flex-col items-center"><span>🛡️</span><span class="text-[9px] text-slate-400 font-bold">Qty: ${state.perks.shield}</span></button>
                </div>
            `;

            const matrix = document.getElementById('choice-matrix');
            if(matrix && choicesArray) {
                choicesArray.forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.className = "btn-choice bg-slate-900/90";
                    btn.innerText = opt;
                    btn.onclick = () => evaluateAnswer(idx, btn);
                    matrix.appendChild(btn);
                });
            }

            runCountdownLoop();
        }

        function runCountdownLoop() {
            clearInterval(timerClockInterval);
            timerClockInterval = setInterval(() => {
                if (isClockFrozen || inputBlocked) return;
                secondsLeft--;
                const digit = document.getElementById('clock-digit'); if (digit) digit.innerText = secondsLeft;
                if (secondsLeft <= 0) { clearInterval(timerClockInterval); handleFailurePenalty(); }
            }, 1000);
        }

        function evaluateAnswer(selectedIdx, clickedElement) {
            if (inputBlocked) return; inputBlocked = true; clearInterval(timerClockInterval);

            if (selectedIdx === activeQuestion.correct) {
                clickedElement.className = "btn-choice rainbow-correct shadow-2xl";
                playSoundFX('correct');
                
                state.clearedQuestions.push(activeQuestion.q);
                state.completedActivities[`${currentCampaign}_${currentSelectedActivityIdx}`] = true;
                saveState();

                setTimeout(() => {
                    alert("Activity Complete! Return to the Sector Dashboard to claim your loot reward.");
                    viewPhaseSectors();
                }, 1400);
            } else {
                clickedElement.className = "btn-choice bg-rose-600 border-rose-400 text-white animate__animated animate__shakeX font-bold shadow-lg";
                playSoundFX('wrong');
                setTimeout(handleFailurePenalty, 1200);
            }
        }

        function handleFailurePenalty() {
            clearInterval(timerClockInterval);
            isClockFrozen = false;
            if (!isShieldActive) {
                state.gold = Math.max(0, state.gold - 20); 
                saveState();
            }
            alert("Incorrect setup window response framework reset.");
            viewPhaseSectors();
        }

        function triggerInGamePerk(id) {
            if (state.perks[id] <= 0 || inputBlocked) return;
            state.perks[id]--; saveState(); playSoundFX('perk');

            if (id === 'freeze') {
                isClockFrozen = true;
                if(document.getElementById('frost-frame')) document.getElementById('frost-frame').classList.add('frost-active');
            } else if (id === 'half') {
                const buttons = document.getElementById('choice-matrix').getElementsByTagName('button');
                let wrongs = []; for(let i=0; i<buttons.length; i++) { if (i !== activeQuestion.correct) wrongs.push(i); }
                wrongs.forEach(idx => { if(buttons[idx]) buttons[idx].style.opacity = "0.2"; });
            } else if (id === 'skip') {
                state.completedActivities[`${currentCampaign}_${currentSelectedActivityIdx}`] = true;
                saveState();
                viewPhaseSectors();
            } else if (id === 'shield') {
                isShieldActive = true;
                if(document.getElementById('shield-frame')) document.getElementById('shield-frame').classList.add('shield-active');
            }
        }

        function stopSnowingEffect() { const box = document.getElementById('snow-box'); if(box) box.innerHTML = ""; }
        function toggleLanguage() { state.lang = state.lang === 'en' ? 'tw' : 'en'; saveState(); if(currentCampaign !== "") viewPhaseSectors(); else renderMenuMap(); }
        function exitToMenu() { clearInterval(timerClockInterval); isClockFrozen = false; renderMenuMap(); }
        
        window.onload = () => { saveState(); renderMenuMap(); };
    </script>
</body>
</html>
