<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Quest Blitz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #bg-overlay { position: fixed; inset: 0; background-color: #0f172a; background-size: cover; background-position: center; transition: background-image 1s ease-in-out; z-index: 0; }
        #bg-tint { position: fixed; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0.5), rgba(0,0,0,0.8)); z-index: 1; }
        body { min-height: 100vh; background: #0f172a; color: white; font-family: sans-serif; overflow-x: hidden; }
        .quiz-card { background: rgba(255, 255, 255, 0.95); border-radius: 20px; color: #1e293b; position: relative; z-index: 10; }
        .btn-opt { width: 100%; text-align: left; padding: 1rem; border-radius: 12px; border: 1px solid #e2e8f0; background: white; font-weight: bold; transition: all 0.2s; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .btn-opt:hover { background: #f8fafc; border-color: #cbd5e1; }
        .timer-danger { color: #ef4444 !important; animation: vibrate 0.2s linear infinite; }
        @keyframes vibrate { 0%, 100% { transform: translate(0); } 20% { transform: translate(-2px, 2px); } 40% { transform: translate(-2px, -2px); } 60% { transform: translate(2px, 2px); } 80% { transform: translate(2px, -2px); } }
        
        /* LEVEL UP SPLASH */
        #level-up-splash { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: all 0.5s ease-in-out; }
        #level-up-splash.active { opacity: 1; pointer-events: auto; }
        .scale-up { transform: scale(0.7); transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        #level-up-splash.active .scale-up { transform: scale(1); }

        /* FIREFLIES ANIMATION */
        .firefly { position: absolute; background: rgba(250, 204, 21, 0.8); border-radius: 50%; pointer-events: none; filter: blur(1px); box-shadow: 0 0 10px rgba(250, 204, 21, 1); animation: drift linear infinite, flash ease-in-out infinite; z-index: 5; }
        @keyframes flash { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
        @keyframes drift { 0% { transform: translateY(105vh) translateX(0); } 100% { transform: translateY(-10vh) translateX(100px); } }

        /* CELEBRATION PARTICLES */
        .confetti { position: fixed; width: 10px; height: 10px; border-radius: 2px; pointer-events: none; z-index: 80; animation: burst 0.8s ease-out forwards; }
        @keyframes burst {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) rotate(var(--r)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body class="p-4 flex flex-col items-center">
    <div id="bg-overlay"></div>
    <div id="bg-tint"></div>

    <!-- FIREFLY CONTAINER -->
    <div id="fireflies-layer" class="fixed inset-0 pointer-events-none overflow-hidden select-none"></div>

    <!-- AUDIO ELEMENTS -->
    <audio id="bg-music" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

    <!-- DRAMATIC LEVEL UP MODAL -->
    <div id="level-up-splash">
        <div class="scale-up bg-gradient-to-b from-amber-400 via-orange-500 to-yellow-600 p-8 rounded-3xl text-center shadow-2xl max-w-sm w-11/12 border-4 border-white">
            <div class="text-7xl mb-2 drop-shadow-lg">👑 ✨ 👑</div>
            <h1 class="text-5xl font-black text-white uppercase tracking-wider drop-shadow-md">Level Up!</h1>
            <p class="text-white font-bold mt-2 text-lg">Glory Unlocked!</p>
            <div class="mt-4 bg-white/20 py-2 px-4 rounded-full text-white inline-block font-black text-sm uppercase tracking-widest" id="next-world-txt">
                Advancing Quest...
            </div>
        </div>
    </div>

    <!-- HUD MENU -->
    <div class="fixed top-4 left-4 right-4 flex justify-between z-50">
        <button onclick="toggleLanguage()" class="bg-indigo-600 text-white px-4 py-2 rounded-full font-bold shadow-lg text-sm border border-white/20">
            🌐 <span id="lang-label">English</span>
        </button>
        <button onclick="toggleMusic()" id="music-btn" class="bg-slate-900/80 backdrop-blur p-3 h-11 w-11 rounded-full text-lg border border-white/10 flex items-center justify-center shadow-lg active:scale-95 transition-all">🔇</button>
    </div>

    <!-- MAIN GAME BOARD -->
    <div id="game-content" class="w-full max-w-md space-y-6 mt-16 relative z-10">
        <div class="quiz-card p-6 shadow-2xl">
            <h1 id="world-title" class="text-xs font-black uppercase tracking-widest mb-3 text-indigo-600 text-center">LOADING BLITZ...</h1>
            <div class="flex justify-between items-center mb-4">
                <div id="lvl-badge" class="w-10 h-10 rounded-full bg-indigo-600 text-white flex items-center justify-center font-black shadow-md">1</div>
                <div class="flex flex-col items-center">
                    <span id="timer-clock" class="text-3xl font-black text-slate-700">10</span>
                </div>
                <div class="text-right">
                    <p class="text-xl font-black text-slate-800">💰 <span id="gold-val">0</span></p>
                </div>
            </div>
            <div class="w-full h-1.5 bg-slate-200 rounded-full overflow-hidden">
                <div id="xp-bar" class="h-full bg-green-500 transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <!-- CONTAINER WHERE QUESTIONS REDIRECT -->
        <div id="quiz-container" class="space-y-4"></div>
        
        <!-- SKIP BUTTON -->
        <button id="skip-btn" onclick="skipLevel()" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 rounded-xl shadow-lg transition-all active:scale-95 border-b-4 border-amber-700 flex justify-center items-center gap-2">
            Skip Level (Cost: 💰100) ⏭️
        </button>

        <button onclick="triggerReset()" class="w-full text-center text-xs text-white/30 mt-10 uppercase tracking-widest block bg-slate-900/40 py-2 rounded-xl border border-white/5 tracking-wider">Tap Here to Hard Reset Data</button>
    </div>

    <script>
        // MASTER BIBLE QUIZ DATABASE (15 Levels Template Placeholder Layout)
        const quizDatabase = [];
        const baseThemes = [
            { name: "Genesis: The Early Earth", img: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1000" },
            { name: "The Patriarchs", img: "https://images.unsplash.com/photo-1507842217343-583bb7270b66?q=80&w=1000" },
            { name: "Exodus & Deliverance", img: "https://images.unsplash.com/photo-1518495973542-4542c06a5843?q=80&w=1000" },
            { name: "The Wilderness", img: "https://images.unsplash.com/photo-1509316975850-ff9c5deb0cd9?q=80&w=1000" },
            { name: "Judges & Ruth", img: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=1000" },
            { name: "Kingdom of David", img: "https://images.unsplash.com/photo-1469474968028-56623f02e42e?q=80&w=1000" },
            { name: "Proverbs & Wisdom", img: "https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?q=80&w=1000" },
            { name: "The Major Prophets", img: "https://images.unsplash.com/photo-1502082553048-f009c37129b9?q=80&w=1000" },
            { name: "The Gospels: Life of Jesus", img: "https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?q=80&w=1000" },
            { name: "Miracles of Christ", img: "https://images.unsplash.com/photo-1475924156734-496f6cac6ec1?q=80&w=1000" },
            { name: "Parables of Grace", img: "https://images.unsplash.com/photo-1433832597046-4f10e10ac764?q=80&w=1000" },
            { name: "Acts of the Apostles", img: "https://images.unsplash.com/photo-1500627869374-13cd993b1115?q=80&w=1000" },
            { name: "Epistles & Letters", img: "https://images.unsplash.com/photo-1425913397330-cf8af2ff40a1?q=80&w=1000" },
            { name: "Armor of God", img: "https://images.unsplash.com/photo-1418065460487-3e41a6c84dc5?q=80&w=1000" },
            { name: "Revelation: The Ultimate Victory", img: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=1000" }
        ];

        // Seed 15 Levels dynamically
        for(let i=1; i<=15; i++) {
            let theme = baseThemes[i-1];
            quizDatabase.push({
                level: i,
                name: theme.name,
                bgImage: theme.img,
                questions: [
                    { q: `Level ${i}: Is the Bible divided into Old and New Testaments?`, q_twi: `Level ${i}: Wɔakyɛ Bible mu Ayɛ no Apam Dedaw ne Apam Foforo?`, a: ["Yes", "No", "Maybe", "Never"], a_twi: ["Aane", "Dabi", "Ebia", "Da"], correct: 0 },
                    { q: `Level ${i}: Did God declare everything He created "Good"?`, q_twi: `Level ${i}: Onyankopɔn kaa sɛ ade biara a ɔbɔɔ yɛ "Pa"?`, a: ["No", "Yes", "Some", "None"], a_twi: ["Dabi", "Aane", "Ebi", "Hwee"], correct: 1 }
                ]
            });
        }

        let gameData = JSON.parse(localStorage.getItem('bibleQuizRPGData')) || {
            lvl: 1, gold: 100, currentQuestionIndex: 0, lang: 'en', music: false
        };

        let activePool = [];
        let timerInterval = null;
        let timeLeft = 10;
        let isProcessing = false;

        function spawnFireflies() {
            const container = document.getElementById('fireflies-layer');
            container.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const fly = document.createElement('div');
                fly.className = 'firefly';
                const size = Math.random() * 4 + 2;
                fly.style.width = size + 'px';
                fly.style.height = size + 'px';
                fly.style.left = Math.random() * 100 + 'vw';
                fly.style.animationDuration = (Math.random() * 8 + 6) + 's';
                fly.style.animationDelay = (Math.random() * -10) + 's';
                container.appendChild(fly);
            }
        }

        function celebrate(e) {
            const rect = e.getBoundingClientRect();
            const startX = rect.left + rect.width / 2;
            const startY = rect.top + rect.height / 2;

            for(let i=0; i<30; i++) {
                const particle = document.createElement('div');
                particle.className = 'confetti';
                
                const colors = ['#f59e0b', '#10b981', '#3b82f6', '#ec4899', '#8b5cf6', '#22c55e'];
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 120 + 60;
                const x = Math.cos(angle) * velocity;
                const y = Math.sin(angle) * velocity;
                
                particle.style.left = startX + 'px';
                particle.style.top = startY + 'px';
                particle.style.setProperty('--x', `${x}px`);
                particle.style.setProperty('----y', `${y}px`); // Fallback
                particle.style.setProperty('--y', `${y}px`);
                particle.style.setProperty('--r', `${Math.random() * 360}deg`);
                
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 800);
            }
        }

        function renderUI() {
            isProcessing = false;
            let levelData = quizDatabase.find(l => l.level === gameData.lvl) || quizDatabase[quizDatabase.length - 1];
            
            if (activePool.length === 0) {
                activePool = [...levelData.questions].sort(() => Math.random() - 0.5);
                gameData.currentQuestionIndex = 0;
            }

            document.getElementById('bg-overlay').style.backgroundImage = `url('${levelData.bgImage}')`;
            document.getElementById('world-title').innerText = levelData.name;
            document.getElementById('lvl-badge').innerText = gameData.lvl;
            document.getElementById('gold-val').innerText = gameData.gold;
            document.getElementById('lang-label').innerText = (gameData.lang === 'en') ? "English" : "Twi";
            
            const progress = (gameData.currentQuestionIndex / activePool.length) * 100;
            document.getElementById('xp-bar').style.width = progress + "%";

            renderQuestion();
            startTimer();
        }

        function renderQuestion() {
            const qObj = activePool[gameData.currentQuestionIndex];
            const container = document.getElementById('quiz-container');
            
            const txt = (gameData.lang === 'en') ? qObj.q : (qObj.q_twi || qObj.q);
            const opts = (gameData.lang === 'en') ? qObj.a : (qObj.a_twi || qObj.a);

            container.innerHTML = `
                <div class="quiz-card p-6 shadow-xl">
                    <h2 class="text-xl font-bold text-slate-800 mb-6">${txt}</h2>
                    <div class="space-y-3" id="opt-box"></div>
                </div>
            `;

            opts.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "btn-opt";
                btn.innerHTML = `<span>${opt}</span>`;
                btn.onclick = () => handleAnswer(idx, qObj.correct, btn);
                document.getElementById('opt-box').appendChild(btn);
            });
        }

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = 10;
            const clock = document.getElementById('timer-clock');
            clock.classList.remove('timer-danger');
            clock.innerText = timeLeft;

            timerInterval = setInterval(() => {
                timeLeft--;
                clock.innerText = timeLeft;
                if (timeLeft <= 3) clock.classList.add('timer-danger');
                if (timeLeft <= 0) handleTimeout();
            }, 1000);
        }

        function handleTimeout() {
            clearInterval(timerInterval);
            gameData.gold = Math.max(0, gameData.gold - 20); 
            activePool.sort(() => Math.random() - 0.5);
            gameData.currentQuestionIndex = 0; 
            save();
            renderUI();
        }

        function handleAnswer(choice, correct, btn) {
            if (isProcessing) return;
            isProcessing = true;
            clearInterval(timerInterval);

            if (choice === correct) {
                celebrate(btn);
                btn.style.background = "#dcfce7";
                btn.style.borderColor = "#22c55e";
                gameData.gold += 20;
                gameData.currentQuestionIndex++;

                if (gameData.currentQuestionIndex >= activePool.length) {
                    if (gameData.lvl < quizDatabase.length) {
                        gameData.lvl++;
                    } else {
                        alert("Incredible! You have finished all 15 stages!");
                    }
                    gameData.currentQuestionIndex = 0;
                    activePool = [];
                    save();
                    setTimeout(showLevelUp, 600);
                } else {
                    save();
                    setTimeout(renderUI, 800);
                }
            } else {
                btn.style.background = "#fee2e2";
                btn.style.borderColor = "#ef4444";
                gameData.gold = Math.max(0, gameData.gold - 20); 
                
                activePool.sort(() => Math.random() - 0.5);
                gameData.currentQuestionIndex = 0;
                
                save();
                setTimeout(() => { isProcessing = false; renderUI(); }, 800);
            }
        }

        function skipLevel() {
            if (gameData.gold >= 100) {
                gameData.gold -= 100;
                if (gameData.lvl < quizDatabase.length) {
                    gameData.lvl++;
                } else {
                    alert("You are at maximum level!");
                    return;
                }
                gameData.currentQuestionIndex = 0;
                activePool = [];
                save();
                showLevelUp();
            } else {
                alert("You need 100 coins to bypass this level!");
            }
        }

        function showLevelUp() {
            const splash = document.getElementById('level-up-splash');
            let nextLevelData = quizDatabase.find(l => l.level === gameData.lvl);
            
            document.getElementById('next-world-txt').innerText = nextLevelData ? `Entering: ${nextLevelData.name}` : "Quest Complete!";
            splash.classList.add('active');
            
            setTimeout(() => {
                splash.classList.remove('active');
                renderUI();
            }, 2500);
        }

        function save() { localStorage.setItem('bibleQuizRPGData', JSON.stringify(gameData)); }
        function toggleLanguage() { gameData.lang = (gameData.lang === 'en') ? 'tw' : 'en'; save(); renderUI(); }
        
        function toggleMusic() {
            const music = document.getElementById('bg-music');
            const btn = document.getElementById('music-btn');
            gameData.music = !gameData.music;
            if (gameData.music) {
                music.play().catch(e => console.log("Audio waiting for input"));
                btn.innerText = "🔊";
            } else {
                music.pause();
                btn.innerText = "🔇";
            }
            save();
        }

        function triggerReset() { localStorage.clear(); activePool = []; location.reload(); }

        window.onload = () => {
            spawnFireflies();
            renderUI();
        };
    </script>
</body>
</html>
