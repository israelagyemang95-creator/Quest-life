<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Quest: Craftsman Horizon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { background-color: #05070c; font-family: system-ui, -apple-system, sans-serif; overflow-x: hidden; }
        
        /* 🎭 ADVANCED CRAFTSMAN DIORAMA VIEWPORT (Directly inspired by Lumino City) */
        .diorama-container {
            position: relative;
            width: 100%;
            height: 260px;
            background: radial-gradient(circle at center, #2a3a4a 0%, #0d131a 100%);
            border-radius: 24px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 0 40px rgba(0,0,0,0.9), 0 12px 32px rgba(0,0,0,0.6);
        }

        /* 👁️ OPTICAL LENS CAMERA BLURS (Tilt-Shift Effects) */
        .lens-blur-background {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, #1e293b, transparent 70%);
            filter: blur(5px);
            z-index: 1;
            pointer-events: none;
        }

        .lens-blur-foreground {
            position: absolute;
            left: 0; right: 0; bottom: 0;
            height: 45px;
            background: linear-gradient(to top, rgba(13, 19, 26, 0.95), transparent);
            filter: blur(4px);
            z-index: 30;
            pointer-events: none;
            transform: scale(1.05);
        }

        /* 🏠 CRAFTED PAPER HOUSES & ARCHITECTURE */
        .paper-house-main {
            position: absolute;
            bottom: 20px;
            left: 45%;
            width: 130px;
            height: 150px;
            background: #1e1b18;
            border: 1px solid #111;
            z-index: 10;
            box-shadow: -15px 10px 30px rgba(0,0,0,0.6);
        }

        /* The iconic textured shingle roof structure */
        .shingle-roof {
            position: absolute;
            top: -55px;
            left: -5px;
            width: 140px;
            height: 56px;
            background-color: #0b5351;
            /* Creates the organic miniature shingle pattern seen in your screenshot */
            background-image: 
                radial-gradient(circle at 50% 0%, transparent 50%, rgba(0,0,0,0.4) 55%, transparent 60%),
                repeating-linear-gradient(90deg, transparent, transparent 12px, rgba(0,0,0,0.2) 12px, rgba(0,0,0,0.2) 14px);
            background-size: 14px 10px;
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
            border-bottom: 4px solid #042928;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
        }

        /* Interior warm glow window card */
        .diorama-window-glow {
            position: absolute;
            bottom: 25px;
            left: 30px;
            width: 34px;
            height: 42px;
            background: #f59e0b;
            border-radius: 4px 4px 0 0;
            box-shadow: 0 0 20px #d97706, inset 0 2px 4px rgba(255,255,255,0.6);
            border: 2px solid #2e1a05;
        }

        /* Secondary foreground structural tower */
        .fg-crafted-tower {
            position: absolute;
            bottom: 10px;
            right: -20px;
            width: 100px;
            height: 120px;
            background: #161920;
            z-index: 28; /* Sits slightly forward for parallax depth */
            box-shadow: -10px 5px 25px rgba(0,0,0,0.7);
            border-left: 3px solid rgba(255,255,255,0.03);
        }

        .fg-tower-roof {
            position: absolute;
            top: -40px;
            left: 0;
            width: 100px;
            height: 42px;
            background: #451a03;
            background-image: radial-gradient(rgba(0,0,0,0.3) 15%, transparent 20%);
            background-size: 8px 8px;
            clip-path: polygon(25% 0%, 75% 0%, 100% 100%, 0% 100%);
            border-bottom: 3px solid #1c0b02;
        }

        /* 🪜 PHYSICAL CLIMBING LADDER TRACK */
        .diorama-ladder {
            position: absolute;
            left: 49%;
            bottom: 15px;
            width: 22px;
            height: 235px;
            z-index: 15; /* Perfectly layered between houses to look nested */
            background: repeating-linear-gradient(0deg, transparent, transparent 15px, #422006 15px, #422006 19px);
            border-left: 4px solid #291405;
            border-right: 4px solid #291405;
            filter: drop-shadow(-4px 4px 5px rgba(0,0,0,0.5));
        }

        /* 🚶 PHYSICAL CHARACTER ARMATURE & CLIMB physics */
        .actor-puppet-node {
            position: absolute;
            left: 48%;
            z-index: 20; /* Sandwiched nicely between background and foreground houses */
            transition: bottom 0.85s cubic-bezier(0.25, 1, 0.5, 1);
            transform: translateX(-50%);
        }

        .puppet-body {
            position: relative;
            width: 32px;
            height: 44px;
        }

        /* Round craft-head */
        .puppet-head {
            position: absolute;
            top: 0; left: 6px;
            width: 20px; height: 20px;
            background: #fbcfe8;
            border-radius: 50%;
            box-shadow: inset -3px -3px 6px rgba(0,0,0,0.2), 0 3px 5px rgba(0,0,0,0.3);
            z-index: 5;
        }

        .puppet-hair {
            position: absolute;
            top: -2px; left: 3px;
            width: 26px; height: 12px;
            background: #b45309;
            border-radius: 12px 12px 0 0;
        }

        /* Torso poncho coat structure */
        .puppet-coat {
            position: absolute;
            top: 18px; left: 2px;
            width: 28px; height: 20px;
            background: #dc2626;
            border-radius: 8px 8px 4px 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
        }

        /* Procedural Arm/Leg Appendages moving fluidly */
        .puppet-limb { position: absolute; background: #78350f; border-radius: 3px; transform-origin: top center; }
        .p-arm-l { top: 20px; left: -2px; width: 4px; height: 13px; }
        .p-arm-r { top: 20px; left: 30px; width: 4px; height: 13px; }

        /* Smooth Alternate Rhythmic Climbing Movement Cycles */
        @keyframes rhythmicClimb {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
        .climb-active {
            animation: rhythmicClimb 0.4s infinite linear;
            .p-arm-l { animation: limbSwing 0.4s infinite alternate ease-in-out; }
            .p-arm-r { animation: limbSwing 0.4s infinite alternate-reverse ease-in-out; }
        }
        @keyframes limbSwing { 0% { transform: rotate(-95deg); } 100% { transform: rotate(25deg); } }

        /* Falling Mechanics when slipping */
        @keyframes structuralSlip {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            30% { transform: translateY(-10px) rotate(-20deg); }
            100% { transform: translateY(200px) rotate(90deg); opacity: 0; }
        }
        .climb-falling { animation: structuralSlip 1.1s forwards cubic-bezier(0.3, 0, 0.6, 0.15) !important; }

        /* Core Global UI Components */
        .glass-panel { background: rgba(13, 18, 30, 0.75); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; }
        .choice-btn { width: 100%; text-align: left; padding: 1rem 1.25rem; border-radius: 16px; border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.03); color: #e2e8f0; font-weight: 600; transition: all 0.2s ease; }
        .choice-btn:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.15); }
        
        @keyframes dynamicCorrect {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .correct-aurora {
            background: linear-gradient(45deg, #059669, #10b981, #06b6d4, #059669) !important;
            background-size: 200% 200% !important;
            animation: dynamicCorrect 3s linear infinite !important;
            border-color: transparent !important;
            color: #fff !important;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        #freeze-overlay { position: fixed; inset: 0; border: 12px solid rgba(56, 189, 248, 0.4); pointer-events: none; opacity: 0; transition: opacity 0.3s ease; z-index: 45; box-shadow: inset 0 0 60px rgba(14, 165, 233, 0.3); }
        .freeze-active { opacity: 1 !important; }
        .flake { position: absolute; color: #bae6fd; font-size: 12px; pointer-events: none; opacity: 0.7; animation: fallSmooth linear infinite; }
        @keyframes fallSmooth { 0% { transform: translateY(-20px) rotate(0deg); } 100% { transform: translateY(280px) rotate(360deg); } }
    </style>
</head>
<body class="p-4 min-h-screen flex flex-col items-center justify-start text-white select-none">

    <div id="freeze-overlay"></div>

    <header class="w-full max-w-md flex justify-between items-center mb-4 z-50">
        <button onclick="backToHub()" id="hub-nav-btn" class="hidden bg-slate-900/90 border border-white/10 text-white px-4 py-1.5 rounded-full font-bold text-xs uppercase tracking-wider transition-all">
            🚪 Map Hub
        </button>
        <div class="flex gap-2 ml-auto">
            <button onclick="changeLanguage()" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded-full font-bold text-xs uppercase shadow-md transition-all">
                🌐 <span id="lang-indicator">English</span>
            </button>
            <div class="bg-slate-900/90 border border-white/10 px-4 py-1.5 rounded-full flex items-center gap-2 shadow-xl">
                <span>💰</span>
                <span id="gold-display" class="font-black text-amber-400">340</span>
            </div>
        </div>
    </header>

    <main id="app-viewport" class="w-full max-w-md space-y-4 flex flex-col mb-24 relative z-10"></main>

    <div class="fixed bottom-0 left-0 right-0 p-3 bg-slate-950/95 border-t border-white/10 z-40 flex justify-center gap-2">
        <button onclick="usePowerUp('freeze')" class="flex-1 bg-slate-900 border border-sky-500/20 p-2 rounded-xl flex flex-col items-center">
            <span class="text-base">❄️</span>
            <span class="text-[9px] text-slate-400 font-bold">Freeze: <span id="qty-freeze">1</span></span>
        </button>
        <button onclick="usePowerUp('half')" class="flex-1 bg-slate-900 border border-emerald-500/20 p-2 rounded-xl flex flex-col items-center">
            <span class="text-base">⚖️</span>
            <span class="text-[9px] text-slate-400 font-bold">50:50: <span id="qty-half">0</span></span>
        </button>
        <button onclick="usePowerUp('skip')" class="flex-1 bg-slate-900 border border-purple-500/20 p-2 rounded-xl flex flex-col items-center">
            <span class="text-base">🔮</span>
            <span class="text-[9px] text-slate-400 font-bold">Skip: <span id="qty-skip">0</span></span>
        </button>
        <button onclick="usePowerUp('shield')" class="flex-1 bg-slate-900 border border-amber-500/20 p-2 rounded-xl flex flex-col items-center">
            <span class="text-base">🛡️</span>
            <span class="text-[9px] text-slate-400 font-bold">Shield: <span id="qty-shield">0</span></span>
        </button>
        <button onclick="usePowerUp('elixir')" class="flex-1 bg-slate-900 border border-teal-500/20 p-2 rounded-xl flex flex-col items-center">
            <span class="text-base">🧪</span>
            <span class="text-[9px] text-slate-400 font-bold">Elixir: <span id="qty-elixir">1</span></span>
        </button>
    </div>

    <script>
        const quizDatabase = [
            {
                name: "Genesis",
                group: "OT",
                questions: [
                    { q: "Who was the first man created?", q_twi: "Hwan na odikan bɔɔ no te sã onipa?", a: ["Noah", "Adam", "Abel", "Seth"], a_tw: ["Noa", "Adam", "Abel", "Set"], correct: 1, subGroup: "Easy" }
                ]
            },
            {
                name: "Jude",
                group: "NT",
                questions: [
                    { q: "What did the archangel say to the devil when disputing?", q_twi: "Dɛn na ɔbɔfo panyin no ka kyerɛɛ ɔbɔonsam?", a: ["I destroy you", "The Lord rebuke you", "Leave this place"], a_tw: ["Mesee wo", "Awurade bɔ wo so nka", "Firi ha kɔ"], correct: 1, subGroup: "Easy" }
                ]
            }
        ];

        let appState = JSON.parse(localStorage.getItem('bqCraftsmanV2')) || {
            gold: 340,
            lang: 'en',
            inventory: { freeze: 1, half: 0, skip: 0, shield: 0, elixir: 1 },
            altitudeStep: 1
        };

        let currentActivePool = [];
        let currentBookIndex = 0;
        let currentQuestionList = [];
        let questionCursor = 0;
        let activeQuestionObj = null;
        let countdownTimer = null;
        let timeRemaining = 11;
        let clockFrozen = false;
        let interactionLocked = false;
        let shieldActiveThisNode = false;

        function saveAppState() {
            localStorage.setItem('bqCraftsmanV2', JSON.stringify(appState));
            document.getElementById('gold-display').innerText = appState.gold;
            document.getElementById('qty-freeze').innerText = appState.inventory.freeze;
            document.getElementById('qty-half').innerText = appState.inventory.half;
            document.getElementById('qty-skip').innerText = appState.inventory.skip;
            document.getElementById('qty-shield').innerText = appState.inventory.shield;
            document.getElementById('qty-elixir').innerText = appState.inventory.elixir;
        }

        function drawMainMenu() {
            document.getElementById('hub-nav-btn').classList.add('hidden');
            const targetElement = document.getElementById('app-viewport');
            targetElement.innerHTML = `
                <div class="text-center space-y-1 animate__animated animate__fadeInDown">
                    <h1 class="text-4xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-teal-400 to-emerald-400">BIBLE QUEST</h1>
                    <p class="text-xs text-slate-500 font-bold tracking-widest uppercase">Development Testing Sandbox</p>
                </div>
                <div class="space-y-3 pt-4 animate__animated animate__fadeInUp">
                    <button onclick="startCampaign('NT')" class="w-full p-5 glass-panel text-left flex justify-between items-center hover:border-teal-500/40 transition-all">
                        <div><h3 class="text-base font-black text-teal-400">Phase 1: New Testament</h3><p class="text-xs text-slate-400">Gospels & Letters Journey</p></div>
                        <span class="text-xl">🪜</span>
                    </button>
                    <button onclick="startCampaign('OT')" class="w-full p-5 glass-panel text-left flex justify-between items-center hover:border-amber-500/40 transition-all">
                        <div><h3 class="text-base font-black text-amber-400">Phase 2: Old Testament</h3><p class="text-xs text-slate-400">Law & Hebrew History Chronicles</p></div>
                        <span class="text-xl">📜</span>
                    </button>
                </div>
            `;
        }

        function startCampaign(group) {
            currentActivePool = quizDatabase.filter(b => b.group === group);
            currentBookIndex = 0;
            appState.altitudeStep = 1;
            document.getElementById('hub-nav-btn').classList.remove('hidden');
            setupBookTrack();
        }

        function setupBookTrack() {
            if (currentBookIndex >= currentActivePool.length) {
                renderEndGame();
                return;
            }
            currentQuestionList = [...currentActivePool[currentBookIndex].questions];
            questionCursor = 0;
            presentQuestionNode();
        }

        function presentQuestionNode() {
            if (questionCursor >= currentQuestionList.length) {
                currentBookIndex++;
                setupBookTrack();
                return;
            }

            interactionLocked = false;
            shieldActiveThisNode = false;
            if (!clockFrozen) {
                document.getElementById('freeze-overlay').className = "";
            }

            const currentBook = currentActivePool[currentBookIndex];
            activeQuestionObj = currentQuestionList[questionCursor];
            
            timeRemaining = 11;
            
            let displayedPrompt = (appState.lang === 'tw' && activeQuestionObj.q_twi) ? activeQuestionObj.q_twi : activeQuestionObj.q;
            let optionsSet = (appState.lang === 'tw' && activeQuestionObj.a_tw) ? activeQuestionObj.a_tw : activeQuestionObj.a;

            const targetElement = document.getElementById('app-viewport');
            targetElement.innerHTML = `
                <div class="w-full space-y-1">
                    <div class="flex justify-between items-center text-[11px] font-bold text-slate-400 px-1">
                        <span>☁️ Weather: Sunny</span>
                        <span class="text-teal-400 font-extrabold tracking-wider uppercase text-xs">LADDER HEIGHT: ${appState.altitudeStep}/10</span>
                    </div>
                    
                    <div class="diorama-container">
                        <div class="lens-blur-background"></div>
                        <div id="snow-container" class="absolute inset-0 z-10 pointer-events-none"></div>
                        
                        <div class="paper-house-main">
                            <div class="shingle-roof"></div>
                            <div class="diorama-window-glow"></div>
                        </div>
                        
                        <div class="diorama-ladder"></div>

                        <div id="puppet-actor" class="actor-puppet-node climb-active">
                            <div class="puppet-body">
                                <div class="puppet-hair"></div>
                                <div class="puppet-head"></div>
                                <div class="puppet-coat"></div>
                                <div class="puppet-limb p-arm-l"></div>
                                <div class="puppet-limb p-arm-r"></div>
                            </div>
                        </div>

                        <div class="fg-crafted-tower">
                            <div class="fg-tower-roof"></div>
                        </div>

                        <div class="lens-blur-foreground"></div>
                        <div id="hud-notification-box" class="absolute inset-0 z-40 pointer-events-none flex items-center justify-center"></div>
                    </div>
                </div>

                <div class="glass-panel p-4 flex justify-between items-center animate__animated animate__fadeIn">
                    <div>
                        <h2 class="text-xl font-black text-slate-100 tracking-wide">${currentBook.name}</h2>
                        <span class="text-[10px] uppercase px-2 py-0.5 rounded font-black bg-slate-950 text-slate-400 mt-1 inline-block">${activeQuestionObj.subGroup}</span>
                    </div>
                    <div id="clock-capsule" class="text-2xl font-black tracking-tighter tabular-nums text-cyan-400 bg-slate-950/80 px-4 py-2 rounded-2xl border border-white/5">
                        ⏰ <span id="time-digit">${timeRemaining}</span>s
                    </div>
                </div>

                <div class="glass-panel p-6 min-h-[90px] flex items-center justify-center text-center">
                    <h3 class="text-md font-bold leading-snug text-slate-100">${displayedPrompt}</h3>
                </div>

                <div id="matrix-wrapper" class="space-y-2.5"></div>
            `;

            // Frame Character Vertical Ladder Positioning on Render Loop
            syncCharacterHeight();

            if (clockFrozen) {
                const capsule = document.getElementById('clock-capsule');
                if (capsule) capsule.className = "text-2xl font-black bg-sky-950 text-sky-400 px-4 py-2 rounded-2xl border border-sky-400 shadow-lg";
                triggerSnowfallParticles();
            }

            const matrixContainer = document.getElementById('matrix-wrapper');
            optionsSet.forEach((choiceText, index) => {
                const actionButton = document.createElement('button');
                actionButton.className = "choice-btn";
                actionButton.innerText = choiceText;
                actionButton.onclick = () => verifySelection(index, actionButton);
                matrixContainer.appendChild(actionButton);
            });

            beginTimerInterval();
        }

        function syncCharacterHeight() {
            const puppet = document.getElementById('puppet-actor');
            if (!puppet) return;
            let ratio = (appState.altitudeStep - 1) / 9;
            // Translates into natural climb ranges relative to house windows and roofs
            let targetBottomPixels = 20 + (ratio * 165); 
            puppet.style.bottom = `${targetBottomPixels}px`;
        }

        function beginTimerInterval() {
            clearInterval(countdownTimer);
            countdownTimer = setInterval(() => {
                if (clockFrozen || interactionLocked) return;
                timeRemaining--;

                const textDigit = document.getElementById('time-digit');
                if (textDigit) textDigit.innerText = timeRemaining;

                if (timeRemaining <= 0) {
                    clearInterval(countdownTimer);
                    applyFailureSequence();
                }
            }, 1000);
        }

        function verifySelection(userChoiceIdx, elementRef) {
            if (interactionLocked) return;
            interactionLocked = true;
            clearInterval(countdownTimer);

            if (userChoiceIdx === activeQuestionObj.correct) {
                elementRef.className = "choice-btn correct-aurora";
                appState.gold += 15;
                appState.altitudeStep = Math.min(10, appState.altitudeStep + 1);
                saveAppState();

                questionCursor++;
                setTimeout(presentQuestionNode, 1300);
            } else {
                elementRef.className = "choice-btn bg-rose-600 border-rose-400 text-white animate__animated animate__shakeX";
                
                // Immediately transition character puppet into mechanical climbing drop state
                const puppet = document.getElementById('puppet-actor');
                if (puppet) puppet.className = "actor-puppet-node climb-falling";

                setTimeout(applyFailureSequence, 1000);
            }
        }

        function applyFailureSequence() {
            clearInterval(countdownTimer);
            clockFrozen = false;

            if (shieldActiveThisNode) {
                popDioramaMessage("🛡️ SHIELD DEFLECTED THE DROP!", "text-amber-400 border-amber-500 bg-slate-900");
            } else {
                appState.altitudeStep = Math.max(1, appState.altitudeStep - 1);
                appState.gold = Math.max(0, appState.gold - 20);
                saveAppState();
                popDioramaMessage("❌ LOST HOLD! SLID DOWN LADDER FRAME", "text-rose-400 border-rose-900 bg-slate-950");
            }

            // Reload fresh configuration variants on current book matrix track
            const currentBook = currentActivePool[currentBookIndex];
            currentQuestionList = [...currentBook.questions];
            questionCursor = 0;

            setTimeout(presentQuestionNode, 1400);
        }

        function usePowerUp(id) {
            if (appState.inventory[id] <= 0 || interactionLocked) return;
            appState.inventory[id]--;
            saveAppState();

            if (id === 'freeze') {
                clockFrozen = true;
                const overlay = document.getElementById('freeze-overlay');
                if (overlay) overlay.classList.add('freeze-active');
                triggerSnowfallParticles();
                const capsule = document.getElementById('clock-capsule');
                if (capsule) capsule.className = "text-2xl font-black bg-sky-950 text-sky-400 px-4 py-2 rounded-2xl border border-sky-400";
            } else if (id === 'half') {
                const choiceButtons = document.getElementById('matrix-wrapper').getElementsByTagName('button');
                let targetIndices = [];
                for (let i = 0; i < choiceButtons.length; i++) {
                    if (i !== activeQuestionObj.correct) targetIndices.push(i);
                }
                targetIndices.sort(() => Math.random() - 0.5).slice(0, 2).forEach(idx => {
                    choiceButtons[idx].style.opacity = "0.2";
                    choiceButtons[idx].style.pointerEvents = "none";
                });
            } else if (id === 'skip') {
                questionCursor++;
                presentQuestionNode();
            } else if (id === 'shield') {
                shieldActiveThisNode = true;
                popDioramaMessage("🛡️ SHIELD DEPLOYED FOR THIS NODE", "text-amber-400 border-amber-500 bg-slate-950");
            } else if (id === 'elixir') {
                timeRemaining = Math.min(20, timeRemaining + 10);
                const textDigit = document.getElementById('time-digit');
                if (textDigit) textDigit.innerText = timeRemaining;
            }
        }

        function triggerSnowfallParticles() {
            const snowContainer = document.getElementById('snow-container');
            if (!snowContainer || snowContainer.children.length > 0) return;
            for (let i = 0; i < 15; i++) {
                const flake = document.createElement('div');
                flake.className = "flake";
                flake.innerText = "❄️";
                flake.style.left = `${Math.random() * 100}%`;
                flake.style.animationDelay = `${Math.random() * 2}s`;
                flake.style.animationDuration = `${Math.random() * 2 + 1.5}s`;
                snowContainer.appendChild(flake);
            }
        }

        function popDioramaMessage(msgText, borderTailwindClass) {
            const box = document.getElementById('hud-notification-box');
            if (!box) return;
            box.innerHTML = `
                <div class="animate__animated animate__bounceIn text-center text-[11px] font-black p-3 mx-4 rounded-xl border shadow-2xl ${borderTailwindClass}">
                    ${msgText}
                </div>
            `;
            setTimeout(() => { if (box) box.innerHTML = ""; }, 2200);
        }

        function renderEndGame() {
            document.getElementById('app-viewport').innerHTML = `
                <div class="glass-panel p-8 text-center space-y-4">
                    <h1 class="text-2xl font-black text-amber-400">🏆 DIORAMA MASTERED</h1>
                    <p class="text-xs text-slate-300">All available books within this route cleared successfully.</p>
                    <button onclick="backToHub()" class="w-full bg-gradient-to-r from-blue-600 to-teal-600 p-3 rounded-xl font-bold text-xs uppercase shadow-md">Return to Hub</button>
                </div>
            `;
        }

        function changeLanguage() {
            appState.lang = appState.lang === 'en' ? 'tw' : 'en';
            saveAppState();
            document.getElementById('lang-indicator').innerText = appState.lang === 'en' ? "English" : "Twi";
            if (currentActivePool.length > 0) presentQuestionNode(); else drawMainMenu();
        }

        function backToHub() {
            clearInterval(countdownTimer);
            clockFrozen = false;
            currentActivePool = [];
            drawMainMenu();
        }

        window.onload = () => {
            saveAppState();
            drawMainMenu();
        };
    </script>
</body>
</html>
