    <style>
        body { 
            background-color: #030611; 
            font-family: system-ui, -apple-system, sans-serif; 
            overflow-x: hidden;
            position: relative;
        }

        #ambient-particle-canvas, #snow-freeze-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }
        #ambient-particle-canvas { opacity: 0.5; z-index: 1; }
        #snow-freeze-canvas { z-index: 45; opacity: 0; transition: opacity 0.4s ease; }
        
        .game-bg-active {
            background-image: url('https://images.unsplash.com/photo-1601004890684-d8cbf643f5f2?auto=format&fit=crop&w=800&q=80') !important;
            background-size: cover !important;
            background-position: center !important;
            background-blend-mode: overlay !important;
            background-color: rgba(3, 6, 17, 0.92) !important;
        }

        .glass-card { 
            background: rgba(13, 18, 35, 0.75); 
            backdrop-filter: blur(24px); 
            -webkit-backdrop-filter: blur(24px); 
            border: 1px solid rgba(255, 255, 255, 0.06); 
            border-radius: 24px; 
            color: white; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .level-card-interactive {
            background: rgba(15, 23, 42, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        .level-card-interactive:hover {
            transform: translateY(-4px) scale(1.02);
            background: rgba(23, 37, 84, 0.45);
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.25);
        }
        
        .btn-choice { 
            width: 100%; 
            text-align: left; 
            padding: 1.1rem 1.4rem; 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.07); 
            background: rgba(13, 18, 35, 0.85); 
            font-weight: 600; 
            color: #f1f5f9; 
            transition: all 0.2s ease; 
        }
        .btn-choice:hover { 
            background: rgba(37, 99, 235, 0.15); 
            border-color: rgba(37, 99, 235, 0.4); 
            transform: translateY(-1px); 
        }
        
        @keyframes titleShimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .shimmer-title {
            background: linear-gradient(45deg, #38bdf8, #818cf8, #f472b6, #34d399, #38bdf8);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: titleShimmer 6s linear infinite;
        }

        @keyframes auroraFlow {
            0% { background-position: 0% 50%; filter: hue-rotate(0deg); }
            50% { background-position: 100% 50%; filter: hue-rotate(180deg); }
            100% { background-position: 0% 50%; filter: hue-rotate(360deg); }
        }
        .rainbow-correct { 
            background: linear-gradient(45deg, #10b981, #2563eb, #8b5cf6, #059669) !important;
            background-size: 300% 300% !important;
            animation: auroraFlow 4s ease infinite !important;
            border-color: transparent !important;
            color: #ffffff !important;
            font-weight: 900 !important;
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.6) !important;
        }

        .completed-glow { box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); border-color: rgba(16, 185, 129, 0.6); }

        #frost-frame { position: fixed; inset: 0; border: 14px solid rgba(56, 189, 248, 0.55); pointer-events: none; opacity: 0; transition: opacity 0.3s ease; z-index: 40; box-shadow: inset 0 0 90px rgba(14, 165, 233, 0.45); }
        .frost-active { opacity: 1 !important; }
        
        #shield-frame { position: fixed; inset: 0; border: 12px solid rgba(245, 158, 11, 0.5); pointer-events: none; opacity: 0; transition: opacity 0.3s ease; z-index: 40; box-shadow: inset 0 0 60px rgba(245, 158, 11, 0.25); }
        .shield-active { opacity: 1 !important; }

        .wheel-container { position: relative; width: 260px; height: 260px; margin: 0 auto; filter: drop-shadow(0 0 25px rgba(99, 102, 241, 0.35)); }
        #wheel-canvas { width: 100%; height: 100%; border-radius: 50%; border: 6px solid #4f46e5; transition: transform 4s cubic-bezier(0.1, 0.8, 0.25, 1); background: #0f172a; }
        .wheel-pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 14px solid transparent; border-right: 14px solid transparent; border-top: 22px solid #ef4444; z-index: 30; filter: drop-shadow(0 3px 5px rgba(0,0,0,0.4)); }

        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        #timer-progress-bar {
            height: 6px;
            width: 100%;
            background-color: #10b981;
            border-radius: 3px;

        function initStarfieldAmbientLayer() {
            const canvas = document.getElementById('ambient-particle-canvas');
            const ctx = canvas.getContext('2d');
            let dots = [];
            
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            for(let i=0; i<35; i++) {
                dots.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 2 + 1,
                    vY: Math.random() * 0.3 + 0.1,
                    alpha: Math.random() * 0.4 + 0.1
                });
            }

            function loop() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                dots.forEach(d => {
                    d.y -= d.vY;
                    if(d.y < -10) d.y = canvas.height + 10;
                    ctx.fillStyle = `rgba(129, 140, 248, ${d.alpha})`;
                    ctx.beginPath();
                    ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
                    ctx.fill();
                });
                requestAnimationFrame(loop);
            }
            loop();
        }

        function toggleSnowParticleSystem(activate) {
            const canvas = document.getElementById('snow-freeze-canvas');
            const ctx = canvas.getContext('2d');
            
            if(!activate) {
                canvas.style.opacity = "0";
                cancelAnimationFrame(snowAnimationId);
                return;
            }

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            canvas.style.opacity = "1";
            snowFlakes = [];

            for(let i=0; i<60; i++) {
                snowFlakes.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 3 + 1,
                    d: Math.random() * 1 + 0.5,
                    density: Math.random() * 20
                });
            }

            function drawSnowFrame() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "rgba(255, 255, 255, 0.75)";
                ctx.beginPath();
                for(let i=0; i<60; i++) {
                    let f = snowFlakes[i];
                    ctx.moveTo(f.x, f.y);
                    ctx.arc(f.x, f.y, f.r, 0, Math.PI*2, true);

                    f.y += f.d;
                    f.x += Math.sin(f.density) * 0.5;

                    if(f.y > canvas.height) {
                        snowFlakes[i] = { x: Math.random() * canvas.width, y: -10, r: f.r, d: f.d, density: f.density };
                    }
                }
                ctx.fill();
                snowAnimationId = requestAnimationFrame(drawSnowFrame);
            }
            drawSnowFrame();
        }

        function runMoodSynthesizerTick() {

                drumOsc.frequency.exponentialRampToValueAtTime(0.01, now + 0.45);
                drumGain.gain.setValueAtTime(0.4, now);
                drumGain.gain.exponentialRampToValueAtTime(0.001, now + 0.42);
                drumOsc.connect(drumGain);
                drumGain.connect(audioCtx.destination);
                drumOsc.start(now); drumOsc.stop(now + 0.45);
            } else if (currentBackgroundMoodType === 'holy') {
                let harmonies = [220.00, 277.18, 329.63, 440.00];
                harmonies.forEach((f, index) => {
                    let osc = audioCtx.createOscillator();
                    let gain = audioCtx.createGain();
                    osc.type = 'sine'; osc.frequency.setValueAtTime(f, now);
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(0.02, now + 0.8 + (index * 0.1));
                    gain.gain.exponentialRampToValueAtTime(0.0001, now + 3.2);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(now); osc.stop(now + 3.4);

            } else {
                let ambientFreqs = [146.83, 220.00, 293.66];
