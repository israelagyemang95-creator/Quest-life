<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Quest - Arcade Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="questions.js"></script>
    <style>
        body { 
            background-color: #05070c; 
            font-family: system-ui, -apple-system, sans-serif; 
            overflow-x: hidden; 
        }
        
        /* 🎭 COMPACT VIEWPORT - ACCESSIBLE CARD CLEARANCE BOUNDS */
        .diorama-container {
            position: relative;
            width: 100%;
            height: 155px;
            background: radial-gradient(circle at center, #1e293b 0%, #0d131a 100%);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
        }
        
        .paper-house-main { position: absolute; bottom: 10px; left: 40%; width: 90px; height: 90px; background: #1e1b18; border: 1px solid #111; z-index: 10; }
        .shingle-roof {
            position: absolute; top: -30px; left: -5px; width: 100px; height: 32px; background-color: #0b5351;
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%); border-bottom: 3px solid #042928;
        }
        .diorama-window-glow { position: absolute; bottom: 15px; left: 20px; width: 20px; height: 26px; background: #f59e0b; border-radius: 3px 3px 0 0; box-shadow: 0 0 15px #d97706; }
        .fg-crafted-tower { position: absolute; bottom: 5px; right: -20px; width: 80px; height: 80px; background: #161920; z-index: 28; }
        .diorama-ladder { position: absolute; left: 49%; bottom: 5px; width: 18px; height: 145px; z-index: 15; background: repeating-linear-gradient(0deg, transparent, transparent 12px, #422006 12px, #422006 15px); border-left: 3px solid #291405; border-right: 3px solid #291405; }

        /* ⛈️ DYNAMIC WEATHER SHEET ENGINE */
        .weather-layer { position: absolute; inset: 0; pointer-events: none; z-index: 25; }
        .rain-drop { position: absolute; background: linear-gradient(transparent, rgba(156, 163, 175, 0.6)); width: 1.5px; height: 20px; transform: rotate(12deg); animation: rainFall linear infinite; }
        @keyframes rainFall { 0% { transform: translateY(-20px) translateX(0) rotate(12deg); } 100% { transform: translateY(170px) translateX(-30px) rotate(12deg); } }
        
        @keyframes lightningStrike { 0%, 93%, 97%, 100% { opacity: 0; } 94%, 96% { opacity: 0.35; background: #ffffff; } }
        .lightning-sheet { position: absolute; inset: 0; z-index: 2; pointer-events: none; opacity: 0; mix-blend-mode: overlay; }
        .lightning-active { animation: lightningStrike 5s infinite; }

        /* 🚶 RUNTIME MECHANICAL CHARACTER CLIMBER */
        .actor-puppet-node { 
            position: absolute; left: 48%; z-index: 20; transform: translateX(-50%);
            transition: bottom 0.75s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .puppet-body { position: relative; width: 24px; height: 38px; }
        .puppet-head { position: absolute; top: 0; left: 4px; width: 16px; height: 16px; background: #fbcfe8; border-radius: 50%; z-index: 5; }
        .puppet-coat { position: absolute; top: 14px; left: 2px; width: 20px; height: 16px; background: #dc2626; border-radius: 6px 6px 3px 3px; z-index: 3; }
        
        .puppet-limb { position: absolute; background: #78350f; border-radius: 2px; transform-origin: top center; }
        .p-arm-l { top: 16px; left: -1px; width: 3px; height: 10px; }
        .p-arm-r { top: 16px; left: 22px; width: 3px; height: 10px; }
        .p-leg-l { top: 30px; left: 4px; width: 4px; height: 9px; }
        .p-leg-r { top: 30px; left: 16px; width: 4px; height: 9px; }

        .climb-active .p-arm-l { animation: armSwingLeft 0.25s infinite alternate ease-in-out; }
        .climb-active .p-arm-r { animation: armSwingRight 0.25s infinite alternate ease-in-out; }
        .climb-active .p-leg-l { animation: legPedalLeft 0.25s infinite alternate linear; }
        .climb-active .p-leg-r { animation: legPedalRight 0.25s infinite alternate linear; }

        @keyframes armSwingLeft { 0% { transform: rotate(-60deg); } 100% { transform: rotate(10deg); } }
        @keyframes armSwingRight { 0% { transform: rotate(10deg); } 100% { transform: rotate(-60deg); } }
        @keyframes legPedalLeft { 0% { transform: scaleY(1); } 100% { transform: scaleY(0.5); } }
        @keyframes legPedalRight { 0% { transform: scaleY(0.5); } 100% { transform: scaleY(1); } }

        /* 🎈 TRANSLUCENT FLOATING HOVER ACTION CONTAINER */
        .bubble-bag-container {
            position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 24px); max-width: 416px;
            background: rgba(13, 19, 33, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 20px; padding: 6px;
            box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.6); z-index: 100;
            transition: all 0.3s ease-in-out;
        }
        .bubble-pod-btn { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 14px; }

        .glass-panel { background: rgba(13, 18, 30, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; }
        
        /* 🌄 QUESTION BACKGROUND GRAPHICS FRAMEWORKS */
        .quiz-background-card {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .quiz-overlay-shade {
            background: linear-gradient(180deg, rgba(10, 15, 30, 0.65) 0%, rgba(6, 8, 16, 0.95) 100%);
            width: 100%;
            height: 100%;
            padding: 1.25rem;
        }

        .choice-btn { width: 100%; text-align: left; padding: 0.75rem 1.25rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.03); color: #e2e8f0; font-weight: 600; font-size: 15px; }
        .choice-btn:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.15); }
    </style>
</head>
<body class="p-3 min-h-screen flex flex-col items-center justify-start text-white select-none pb-24">

    <header class="w-full max-w-md flex justify-between items-center mb-2 z-50">
        <button onclick="backToMainMenu()" id="global-hub-btn" class="bg-slate-900 border border-white/10 text-white px-3 py-1.5 rounded-full font-bold text-xs uppercase hidden">
            🚪 Main Menu
        </button>
        <div id="spacer-div" class="flex-1"></div>
        <div class="flex gap-1.5 items-center">
            <button onclick="changeLanguage()" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded-full font-bold text-xs uppercase">
                🌐 <span id="lang-indicator">English</span>
            </button>
            <div class="bg-slate-900 border border-white/10 px-3 py-1.5 rounded-full flex items-center gap-1.5 shadow-xl">
                <span>💰</span>
                <span id="gold-display" class="font-black text-amber-400">500</span>
            </div>
        </div>
    </header>

    <main id="app-viewport" class="w-full max-w-md space-y-2 flex flex-col relative z-10"></main>

    <div id="powerups-footer-bar" class="bubble-bag-container hidden flex justify-between gap-1.5">
        <button onclick="usePowerUp('freeze')" class="flex-1 bubble-pod-btn p-1 flex flex-col items-center">
            <span>❄️</span><span class="text-[9px] text-slate-400 font-bold">Freeze: <span id="qty-freeze">1</span></span>
        </button>
        <button onclick="usePowerUp('half')" class="flex-1 bubble-pod-btn p-1 flex flex-col items-center">
            <span>⚖️</span><span class="text-[9px] text-slate-400 font-bold">50:50: <span id="qty-half">1</span></span>
        </button>
        <button onclick="usePowerUp('skip')" class="flex-1 bubble-pod-btn p-1 flex flex-col items-center">
            <span>🔮</span><span class="text-[9px] text-slate-400 font-bold">Skip: <span id="qty-skip">1</span></span>
        </button>
        <button onclick="usePowerUp('shield')" class="flex-1 bubble-pod-btn p-1 flex flex-col items-center">
            <span>🛡️</span><span class="text-[9px] text-slate-400 font-bold">Shield: <span id="qty-shield">1</span></span>
        </button>
        <button onclick="usePowerUp('elixir')" class="flex-1 bubble-pod-btn p-1 flex flex-col items-center">
            <span>🧪</span><span class="text-[9px] text-slate-400 font-bold">Elixir: <span id="qty-elixir">1</span></span>
        </button>
    </div>

    <script>
        // Global Fallback Variable Initialization to completely prevent crash loops
        if (typeof window.quizDatabase === 'undefined') {
            window.quizDatabase = [];
        }

        let appState = JSON.parse(localStorage.getItem('bibleQuestSave')) || {
            gold: 500,
            lang: 'en',
            inventory: { freeze: 2, half: 2, skip: 1, shield: 1, elixir: 2 },
            altitudeStep: 1,
            achievements: { answersCorrect: 0, fastAnswers: 0 }
        };

        let selectedLevelGroup = "";
        let currentQuestions = [];
        let questionIndex = 0;
        let activeQuestion = null;
        let countdownTimer = null;
        let timeRemaining = 15;
        let isWeatherRainy = false;
        let bookObjectivesCleared = 0;
        const totalObjectivesNeeded = 10;

        function saveState() {
            localStorage.setItem('bibleQuestSave', JSON.stringify(appState));
            if(document.getElementById('gold-display')) document.getElementById('gold-display').innerText = appState.gold;
            if(document.getElementById('qty-freeze')) document.getElementById('qty-freeze').innerText = appState.inventory.freeze;
            if(document.getElementById('qty-half')) document.getElementById('qty-half').innerText = appState.inventory.half;
            if(document.getElementById('qty-skip')) document.getElementById('qty-skip').innerText = appState.inventory.skip;
            if(document.getElementById('qty-shield')) document.getElementById('qty-shield').innerText = appState.inventory.shield;
            if(document.getElementById('qty-elixir')) document.getElementById('qty-elixir').innerText = appState.inventory.elixir;
            if(document.getElementById('lang-indicator')) document.getElementById('lang-indicator').innerText = appState.lang === 'en' ? "English" : "Twi";
        }

        function drawMainMenu() {
            if(document.getElementById('global-hub-btn')) document.getElementById('global-hub-btn').classList.add('hidden');
            if(document.getElementById('spacer-div')) document.getElementById('spacer-div').classList.remove('hidden');
            
            // Explicitly hide powerups tray from menu
            const bar = document.getElementById('powerups-footer-bar');
            if (bar) {
                bar.classList.add('hidden');
                bar.classList.remove('flex');
            }

            const target = document.getElementById('app-viewport');
            if (!target) return;
            
            target.innerHTML = `
                <div class="glass-panel p-3 border-amber-500/30 bg-amber-950/20 space-y-2 mb-1 animate__animated animate__fadeInDown">
                    <div class="flex justify-between items-center text-[11px] font-black tracking-wider text-amber-300">
                        <span>🎯 DAILY ACTIVE QUESTS</span>
                        <span class="text-[9px] bg-amber-500/20 px-1.5 py-0.5 rounded text-white">REWARDS ACTIVE</span>
                    </div>
                    <div class="space-y-1.5 text-[10px]">
                        <div class="flex justify-between items-center bg-black/30 p-1.5 rounded-lg border border-white/5">
                            <span>Answer 5 Biblical Questions Correctly</span>
                            <span class="font-extrabold text-amber-400">${appState.achievements.answersCorrect}/5</span>
                        </div>
                        <div class="flex justify-between items-center bg-black/30 p-1.5 rounded-lg border border-white/5">
                            <span>Speedrun Clearance: Solve under 5 seconds</span>
                            <span class="font-extrabold text-amber-400">${appState.achievements.fastAnswers}/1</span>
                        </div>
                    </div>
                </div>

                <div class="text-center space-y-0.5 py-1">
                    <h1 class="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 tracking-tight">BIBLE QUEST</h1>
                    <p class="text-[9px] text-slate-500 font-bold tracking-widest uppercase">Select Active Study Pathway</p>
                </div>

                <div class="space-y-2 pt-1 animate__animated animate__fadeInUp">
                    <button onclick="startLevelSegment('NT')" class="w-full p-3.5 glass-panel text-left flex justify-between items-center hover:border-indigo-500/40 transition-all">
                        <div><h3 class="text-sm font-black text-indigo-300">Phase 1: New Testament Journey</h3><p class="text-xs text-slate-400">Gospels, Letters & Revelation Epistles</p></div>
                        <span class="text-lg">⚡</span>
                    </button>
                    <button onclick="startLevelSegment('OT')" class="w-full p-3.5 glass-panel text-left flex justify-between items-center hover:border-emerald-500/40 transition-all">
                        <div><h3 class="text-sm font-black text-emerald-300">Phase 2: Old Testament Chronicles</h3><p class="text-xs text-slate-400">Torah, Historical Kings & Major Prophets</p></div>
                        <span class="text-lg">📜</span>
                    </button>
                    <button onclick="startLevelSegment('EGW')" class="w-full p-3.5 glass-panel text-left flex justify-between items-center hover:border-amber-500/40 transition-all">
                        <div><h3 class="text-sm font-black text-amber-300">Phase 4: Ellen G. White Prophecies</h3><p class="text-xs text-slate-400">Conflict of the Ages Church Chronicles</p></div>
                        <span class="text-lg">✒️</span>
                    </button>
                    <button onclick="startLevelSegment('Mastery')" class="w-full p-3.5 glass-panel text-left flex justify-between items-center hover:border-rose-500/40 transition-all">
                        <div><h3 class="text-sm font-black text-rose-400">Phase 5: Master Blitz Strategy</h3><p class="text-xs text-slate-400">Hyper Speed randomized speedrun mix</p></div>
                        <span class="text-lg">🔥</span>
                    </button>
                </div>
            `;
        }

        function startLevelSegment(groupName) {
            selectedLevelGroup = groupName;
            currentQuestions = [];

            // Safe parsing matrix check loop
            let sourcePool = window.quizDatabase || [];
            if (sourcePool && sourcePool.length > 0) {
                sourcePool.forEach(category => {
                    if (groupName === 'Mastery' || category.group === groupName) {
                        if (category.questions && Array.isArray(category.questions)) {
                            category.questions.forEach(q => {
                                currentQuestions.push({ ...q, bookName: category.name || 'Bible Database' });
                            });
                        }
                    }
                });
            }

            // Fallback content safety injector
            if (currentQuestions.length === 0) {
                currentQuestions = [
                    { q: "Where was Jesus born?", a: ["Nazareth", "Bethlehem", "Jerusalem", "Capernaum"], q_twi: "Hehefa na wɔwoo Yesu?", a_tw: ["Nasaret", "Betlehem", "Yerusalem", "Kapernaum"], correct: 1, subGroup: "Easy", bookName: "New Testament Archive" },
                    { q: "Who was the first man created?", a: ["Noah", "Adam", "Abel", "Seth"], q_twi: "Hwan ne onipa a odi kan a wɔbɔɔ no?", a_tw: ["Noa", "Adam", "Abel", "Set"], correct: 1, subGroup: "Easy", bookName: "Old Testament Archive" }
                ];
            }

            questionIndex = 0;
            bookObjectivesCleared = 0;
            if(document.getElementById('global-hub-btn')) document.getElementById('global-hub-btn').classList.remove('hidden');
            if(document.getElementById('spacer-div')) document.getElementById('spacer-div').classList.add('hidden');
            
            // Flex design trigger for game rounds scene views
            const bar = document.getElementById('powerups-footer-bar');
            if (bar) {
                bar.classList.remove('hidden');
                bar.classList.add('flex');
            }

            loadQuestionNode();
        }

        function loadQuestionNode() {
            if (questionIndex >= currentQuestions.length || bookObjectivesCleared >= totalObjectivesNeeded) {
                renderVictoryScreen();
                return;
            }

            activeQuestion = currentQuestions[questionIndex];
            timeRemaining = selectedLevelGroup === 'Mastery' ? 5 : 15;
            isWeatherRainy = Math.random() > 0.5;

            let displayPrompt = (appState.lang === 'tw' && activeQuestion.q_twi) ? activeQuestion.q_twi : activeQuestion.q;
            let displayChoices = (appState.lang === 'tw' && activeQuestion.a_tw) ? activeQuestion.a_tw : activeQuestion.a;

            // Restored beautiful dynamic graphical backdrops
            let graphicPanelImage = "https://images.unsplash.com/photo-1543324564-7032d16eb630?q=80&w=600&auto=format&fit=crop"; 
            if (selectedLevelGroup === 'NT') {
                graphicPanelImage = "https://images.unsplash.com/photo-1438211331416-0ee898ec0130?q=80&w=600&auto=format&fit=crop";
            } else if (selectedLevelGroup === 'OT') {
                graphicPanelImage = "https://images.unsplash.com/photo-1447069387593-a5de0862481e?q=80&w=600&auto=format&fit=crop";
            } else if (selectedLevelGroup === 'EGW') {
                graphicPanelImage = "https://images.unsplash.com/photo-1457369804613-52c61a468e7d?q=80&w=600&auto=format&fit=crop";
            }

            const target = document.getElementById('app-viewport');
            if(!target) return;

            target.innerHTML = `
                <div class="w-full space-y-1">
                    <div class="flex justify-between items-center text-[10px] font-bold text-slate-400 px-1 uppercase tracking-wide">
                        <span class="${isWeatherRainy ? 'text-blue-400' : 'text-amber-400'}">
                            ${isWeatherRainy ? '⛈️ Weather: Rainy' : '☀️ Weather: Sunny'}
                        </span>
                        <span class="text-teal-400 font-extrabold">OBJECTIVES METER: ${bookObjectivesCleared}/${totalObjectivesNeeded}</span>
                    </div>
                    
                    <div class="diorama-container">
                        <div id="lightning-sheet" class="lightning-sheet ${isWeatherRainy ? 'lightning-active' : ''}"></div>
                        <div id="rain-particle-field" class="weather-layer"></div>
                        
                        <div class="paper-house-main"><div class="shingle-roof"></div><div class="diorama-window-glow"></div></div>
                        <div class="diorama-ladder"></div>

                        <div id="puppet-actor" class="actor-puppet-node">
                            <div class="puppet-body">
                                <div class="puppet-head"></div>
                                <div class="puppet-coat"></div>
                                <div class="puppet-limb p-arm-l"></div>
                                <div class="puppet-limb p-arm-r"></div>
                                <div class="puppet-limb p-leg-l"></div>
                                <div class="puppet-limb p-leg-r"></div>
                            </div>
                        </div>
                        <div class="fg-crafted-tower"></div>
                    </div>
                </div>

                <div class="quiz-background-card text-white shadow-2xl animate__animated animate__fadeIn" style="background-image: url('${graphicPanelImage}');">
                    <div class="quiz-overlay-shade space-y-4">
                        <div class="flex justify-between items-center border-b border-white/10 pb-2">
                            <div>
                                <h2 class="text-md font-black text-amber-300 tracking-tight">${activeQuestion.bookName || 'Quest Pathway'}</h2>
                                <span class="text-[9px] uppercase px-1.5 py-0.5 rounded font-black bg-black text-indigo-300 inline-block mt-0.5">${activeQuestion.subGroup || 'Easy'}</span>
                            </div>
                            <div class="text-sm font-bold text-cyan-400 bg-slate-950/80 px-2.5 py-1 rounded-lg border border-white/20 tabular-nums">
                                ⏰ <span id="timer-label">${timeRemaining}</span>s
                            </div>
                        </div>

                        <div class="min-h-[72px] flex items-center justify-center text-center">
                            <h3 class="text-base font-extrabold text-white leading-snug drop-shadow-[0_2px_4px_rgba(0,0,0,0.9)]">${displayPrompt}</h3>
                        </div>
                    </div>
                </div>

                <div id="answers-box" class="space-y-1.5 pt-1"></div>
            `;

            updateCharacterPosition();
            renderRainEffect();

            const matrixBox = document.getElementById('answers-box');
            if (matrixBox && displayChoices && Array.isArray(displayChoices)) {
                displayChoices.forEach((choice, index) => {
                    const btn = document.createElement('button');
                    btn.className = "choice-btn animate__animated animate__fadeInUp";
                    btn.innerText = choice;
                    btn.onclick = () => validateResponse(index, btn);
                    matrixBox.appendChild(btn);
                });
            }

            startClock();
        }

        function renderRainEffect() {
            const field = document.getElementById('rain-particle-field');
            if (!field || !isWeatherRainy) return;
            field.innerHTML = "";
            for (let i = 0; i < 25; i++) {
                const drop = document.createElement('div');
                drop.className = "rain-drop";
                drop.style.left = `${Math.random() * 110}%`;
                drop.style.top = `${Math.random() * -20}px`;
                drop.style.animationDuration = `${Math.random() * 0.3 + 0.4}s`;
                field.appendChild(drop);
            }
        }

        function updateCharacterPosition() {
            const puppet = document.getElementById('puppet-actor');
            if (!puppet) return;
            let ratio = bookObjectivesCleared / totalObjectivesNeeded;
            puppet.style.bottom = `${10 + (ratio * 100)}px`;
        }

        function startClock() {
            clearInterval(countdownTimer);
            countdownTimer = setInterval(() => {
                timeRemaining--;
                const lbl = document.getElementById('timer-label');
                if (lbl) lbl.innerText = timeRemaining;
                if (timeRemaining <= 0) {
                    clearInterval(countdownTimer);
                    handleFailure();
                }
            }, 1000);
        }

        function validateResponse(selectedIndex, buttonRef) {
            clearInterval(countdownTimer);
            
            if (selectedIndex === activeQuestion.correct) {
                buttonRef.className = "choice-btn bg-emerald-600 border-emerald-400 text-white font-bold";
                
                appState.achievements.answersCorrect++;
                if (timeRemaining >= 10) {
                    appState.achievements.fastAnswers = Math.min(1, appState.achievements.fastAnswers + 1);
                }

                if (appState.achievements.answersCorrect === 5) {
                    appState.gold += 50;
                    alert("🎯 Achievement Complete: Cleared 5 correct responses! Reward: +50 Coins 💰");
                }

                const puppet = document.getElementById('puppet-actor');
                if (puppet) puppet.classList.add('climb-active');
                
                bookObjectivesCleared = Math.min(totalObjectivesNeeded, bookObjectivesCleared + 1);
                appState.gold += 15;
                saveState();
                updateCharacterPosition();

                setTimeout(() => {
                    if (puppet) puppet.classList.remove('climb-active');
                    questionIndex++;
                    loadQuestionNode();
                }, 850);
            } else {
                buttonRef.className = "choice-btn bg-rose-600 border-rose-400 text-white animate__animated animate__shakeX";
                setTimeout(handleFailure, 800);
            }
        }

        function handleFailure() {
            bookObjectivesCleared = Math.max(0, bookObjectivesCleared - 1);
            appState.gold = Math.max(0, appState.gold - 20);
            saveState();
            
            questionIndex = 0;
            currentQuestions.sort(() => Math.random() - 0.5);
            loadQuestionNode();
        }

        function usePowerUp(type) {
            if (appState.inventory[type] <= 0) return;
            appState.inventory[type]--;
            saveState();

            if (type === 'skip') {
                questionIndex++;
                loadQuestionNode();
            } else if (type === 'half') {
                const btns = document.getElementById('answers-box').getElementsByTagName('button');
                let targeted = 0;
                for (let i = 0; i < btns.length; i++) {
                    if (i !== activeQuestion.correct && targeted < 2) {
                        btns[i].style.opacity = "0.15";
                        btns[i].style.pointerEvents = "none";
                        targeted++;
                    }
                }
            } else if (type === 'elixir') {
                timeRemaining += 10;
                const lbl = document.getElementById('timer-label');
                if (lbl) lbl.innerText = timeRemaining;
            }
        }

        function changeLanguage() {
            appState.lang = appState.lang === 'en' ? 'tw' : 'en';
            saveState();
            if (currentQuestions.length > 0 && activeQuestion) loadQuestionNode(); else drawMainMenu();
        }

        function renderVictoryScreen() {
            document.getElementById('app-viewport').innerHTML = `
                <div class="glass-panel p-6 text-center space-y-4">
                    <h2 class="text-xl font-black text-amber-400">🎉 PATHWAY MASTERED!</h2>
                    <p class="text-xs text-slate-300">Outstanding strategy profile. All 10 book objective parameters met successfully.</p>
                    <button onclick="backToMainMenu()" class="w-full bg-indigo-600 p-3 rounded-xl font-bold text-xs uppercase tracking-wider">
                        Return to Hub
                    </button>
                </div>
            `;
        }

        function backToMainMenu() {
            clearInterval(countdownTimer);
            currentQuestions = [];
            drawMainMenu();
        }

        // Instant initialization runner
        saveState();
        drawMainMenu();
    </script>
</body>
</html>
