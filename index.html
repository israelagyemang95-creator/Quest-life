<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Quest Blitz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #bg-overlay { position: fixed; inset: 0; background-color: #0f172a; z-index: 0; }
        #bg-tint { position: fixed; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0.5), rgba(0,0,0,0.8)); z-index: 1; }
        body { min-height: 100vh; color: white; font-family: sans-serif; overflow-x: hidden; position: relative; }
        .quiz-card { background: rgba(255, 255, 255, 0.95); border-radius: 20px; color: #1e293b; position: relative; z-index: 10; width: 90%; max-width: 400px; }
        .btn-opt { width: 100%; text-align: left; padding: 1rem; border-radius: 12px; border: 1px solid #e2e8f0; background: white; font-weight: bold; transition: all 0.2s; margin-bottom: 0.5rem; color: #1e293b; }
        .btn-opt:active { transform: scale(0.98); background: #f8fafc; }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">
    <div id="bg-overlay"></div>
    <div id="bg-tint"></div>

    <div class="relative z-10 w-full max-w-md flex justify-between mb-4 px-2 font-bold text-lg">
        <div id="level-display">Level: 1</div>
        <div id="coin-display">💰 100</div>
    </div>

    <div class="quiz-card p-6 shadow-2xl">
        <h2 id="question-text" class="text-xl font-bold text-center mb-6">Initializing Quest...</h2>
        <div id="options-container"></div>
    </div>

    <button onclick="resetGame()" class="relative z-10 mt-8 text-xs uppercase tracking-widest opacity-50">Reset Progress</button>

    <script>
        // Database directly in the file to prevent "File Not Found" errors
        const quizDatabase = {
            1: {
                question: "Who was the first man created?",
                options: ["Noah", "Adam", "Moses"],
                answer: "Adam"
            },
            2: {
                question: "What is 5 x 5?",
                options: ["20", "25", "30"],
                answer: "25"
            },
            3: {
                question: "Which layout tool uses flexbox?",
                options: ["Grid", "Flex", "Float"],
                answer: "Flex"
            }
        };

        let gameState = {
            currentLevel: 1,
            coins: 100,
            penalty: 20
        };

        function init() {
            // Load saved progress if it exists
            const saved = localStorage.getItem('questState');
            if (saved) gameState = JSON.parse(saved);
            renderLevel();
        }

        function renderLevel() {
            const data = quizDatabase[gameState.currentLevel];
            const qText = document.getElementById('question-text');
            const optCont = document.getElementById('options-container');
            
            document.getElementById('level-display').innerText = `Level: ${gameState.currentLevel}`;
            document.getElementById('coin-display').innerText = `💰 ${gameState.coins}`;

            if (!data) {
                qText.innerText = "🎉 Mo! W’asua biribiara awie!"; // Victory message
                optCont.innerHTML = "";
                return;
            }

            qText.innerText = data.question;
            optCont.innerHTML = "";

            data.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "btn-opt";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, data.answer);
                optCont.appendChild(btn);
            });
        }

        function checkAnswer(selected, correct) {
            if (selected === correct) {
                gameState.currentLevel++;
                gameState.coins += 10;
                saveAndRefresh();
            } else {
                gameState.coins -= gameState.penalty;
                if (gameState.coins <= 0) {
                    alert("Game Over! Restarting...");
                    resetGame();
                } else {
                    alert("Wrong! Try again.");
                    saveAndRefresh();
                }
            }
        }

        function saveAndRefresh() {
            localStorage.setItem('questState', JSON.stringify(gameState));
            renderLevel();
        }

        function resetGame() {
            localStorage.removeItem('questState');
            gameState = { currentLevel: 1, coins: 100, penalty: 20 };
            renderLevel();
        }

        init();
    </script>
</body>
</html>
