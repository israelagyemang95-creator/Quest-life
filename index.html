<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revelators Pathfinders Quiz Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            overflow-x: hidden;
            user-select: none;
        }
        .heading-font { font-family: 'Orbitron', sans-serif; }
        
        #ambient-particle-canvas, #snow-freeze-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }
        #snow-freeze-canvas { z-index: 45; opacity: 0; transition: opacity 0.4s ease; }
        
        .game-bg-active {
            background-image: url('https://images.unsplash.com/photo-1601004890684-d8cbf643f5f2?auto=format&fit=crop&w=800&q=80') !important;
            background-size: cover !important;
            background-position: center !important;
            background-blend-mode: overlay !important;
            background-color: rgba(3, 6, 17, 0.94) !important;
        }

        .glass-card { 
            background: rgba(15, 23, 42, 0.45); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.06); 
            border-radius: 24px; 
            color: white; 
        }

        .glass-modal {
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .level-card-interactive {
            background: rgba(15, 23, 42, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        .level-card-interactive:hover {
            transform: translateY(-4px) scale(1.02);
            background: rgba(23, 37, 84, 0.45);
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.25);
        }
        
        .btn-choice { 
            width: 100%; 
            text-align: left; 
            padding: 1.1rem 1.4rem; 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.07); 
            background: rgba(13, 18, 35, 0.85); 
            font-weight: 600; 
            transition: all 0.2s ease; 
        }
        .btn-choice:hover { 
            background: rgba(37, 99, 235, 0.15); 
            border-color: rgba(37, 99, 235, 0.4); 
            transform: translateY(-1px); 
        }

        @keyframes auroraFlow {
            0% { background-position: 0% 50%; filter: hue-rotate(0deg); }
            50% { background-position: 100% 50%; filter: hue-rotate(180deg); }
            100% { background-position: 0% 50%; filter: hue-rotate(360deg); }
        }
        .rainbow-correct { 
            background: linear-gradient(45deg, #10b981, #2563eb, #8b5cf6, #059669) !important;
            background-size: 300% 300% !important;
            animation: auroraFlow 4s ease infinite !important;
            border-color: transparent !important;
            color: #ffffff !important;
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.6) !important;
        }

        @keyframes coinShock {
            0%, 100% { transform: scale(1); }
            20%, 60% { transform: scale(0.85) rotate(-6deg); filter: drop-shadow(0 0 15px #ef4444); }
            40%, 80% { transform: scale(1.15) rotate(6deg); filter: drop-shadow(0 0 25px #ef4444); }
        }
        .vibrate-error-bag { animation: coinShock 0.5s ease-in-out; border-color: #ef4444 !important; background-color: rgba(153, 27, 27, 0.4) !important;}
        .vibrate-error-bag span { color: #ef4444 !important; }

        @keyframes huffmanPulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.08); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        .perk-flash-freeze { animation: huffmanPulse 0.6s ease-out; border-color: #38bdf8 !important; box-shadow: 0 0 30px #0ea5e9 !important; }
        .perk-flash-half { animation: huffmanPulse 0.6s ease-out; border-color: #f43f5e !important; box-shadow: 0 0 30px #e11d48 !important; }
        .perk-flash-skip { animation: huffmanPulse 0.6s ease-out; border-color: #a855f7 !important; box-shadow: 0 0 30px #9333ea !important; }
        .perk-flash-shield { animation: huffmanPulse 0.6s ease-out; border-color: #f59e0b !important; box-shadow: 0 0 30px #d97706 !important; }

        #frost-frame { position: fixed; inset: 0; border: 14px solid rgba(56, 189, 248, 0.45); pointer-events: none; opacity: 0; transition: opacity 0.3s ease; z-index: 40; box-shadow: inset 0 0 80px rgba(14, 165, 233, 0.35); }
        .frost-active { opacity: 1 !important; }
        
        #shield-frame { position: fixed; inset: 0; border: 12px solid rgba(245, 158, 11, 0.5); pointer-events: none; opacity: 0; transition: opacity 0.3s ease; z-index: 40; box-shadow: inset 0 0 60px rgba(245, 158, 11, 0.25); }
        .shield-active { opacity: 1 !important; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e1b4b; border-radius: 999px; }
    </style>
</head>
<body class="relative min-h-screen">

    <canvas id="ambient-particle-canvas"></canvas>
    <canvas id="snow-freeze-canvas"></canvas>
    <div id="frost-frame"></div>
    <div id="shield-frame"></div>

    <div class="relative min-h-screen z-10 flex flex-col justify-between max-w-md mx-auto bg-slate-950 border-x border-slate-900 shadow-2xl">
        
        <header class="p-4 flex items-center justify-between border-b border-indigo-950/40 bg-slate-950/60 sticky top-0 z-40 backdrop-blur-md">
            <button onclick="toggleAudioAmbiance()" id="ambiance-toggle-btn" class="flex items-center gap-2 px-3 py-1.5 rounded-full border border-
