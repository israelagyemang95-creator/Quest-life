<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revelators Pathfinders Quiz Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            overflow-x: hidden;
            user-select: none;
            transition: background 0.5s ease;
        }
        .heading-font { font-family: 'Orbitron', sans-serif; }
        
        /* Interactive Background Applied During Gameplay */
        body.game-bg-active {
            background-image: url('https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-blend-mode: overlay;
            background-color: rgba(2, 6, 23, 0.88);
        }

        /* Particle Canvases */
        #ambient-particle-canvas, #snow-freeze-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }
        #ambient-particle-canvas { opacity: 0.4; }
        #snow-freeze-canvas { z-index: 45; opacity: 0; transition: opacity 0.3s ease; }
        
        /* UI Components */
        .glass-card { 
            background: rgba(15, 23, 42, 0.65); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 20px; 
            color: white; 
        }

        .level-card-interactive {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        .level-card-interactive:hover {
            transform: translateY(-3px) scale(1.01);
            background: rgba(30, 41, 59, 0.8);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.4);
        }
        
        .btn-choice { 
            width: 100%; 
            text-align: left; 
            padding: 1.25rem 1.5rem; 
            border-radius: 16px; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(15, 23, 42, 0.85); 
            font-weight: 700; 
            transition: all 0.2s ease; 
        }
        .btn-choice:hover { 
            background: rgba(49, 46, 129, 0.4); 
            border-color: rgba(99, 102, 241, 0.5); 
            transform: translateY(-2px); 
        }

        /* Fluid Animation States */
        @keyframes auroraFlow {
            0% { background-position: 0% 50%; filter: hue-rotate(0deg); }
            50% { background-position: 100% 50%; filter: hue-rotate(180deg); }
            100% { background-position: 0% 50%; filter: hue-rotate(360deg); }
        }
        .rainbow-correct { 
            background: linear-gradient(45deg, #10b981, #3b82f6, #8b5cf6, #10b981) !important;
            background-size: 300% 300% !important;
            animation: auroraFlow 3s ease infinite !important;
            border-color: transparent !important;
            color: #ffffff !important;
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.6) !important;
            transform: scale(1.02);
        }

        /* Penalty Vibration Hook */
        @keyframes coinShock {
            0%, 100% { transform: scale(1) translateX(0); }
            20% { transform: scale(1.1) translateX(-4px) rotate(-3deg); filter: drop-shadow(0 0 20px #ef4444); }
            40% { transform: scale(1.1) translateX(4px) rotate(3deg); filter: drop-shadow(0 0 20px #ef4444); }
            60% { transform: scale(1.1) translateX(-4px) rotate(-3deg); filter: drop-shadow(0 0 20px #ef4444); }
            80% { transform: scale(1.1) translateX(4px) rotate(3deg); filter: drop-shadow(0 0 20px #ef4444); }
        }
        .vibrate-error-bag { 
            animation: coinShock 0.4s ease-in-out; 
            border-color: #ef4444 !important; 
            background-color: rgba(153, 27, 27, 0.6) !important;
            color: #fca5a5 !important;
        }

        /* Dramatic Power-up FX */
        @keyframes dramaticPulse {
            0% { transform: scale(1); box-shadow: 0 0 0px transparent; }
            50% { transform: scale(1.1); box-shadow: 0 0 40px currentColor; }
            100% { transform: scale(1); box-shadow: 0 0 0px transparent; }
        }
        .perk-active-fx { animation: dramaticPulse 0.5s ease-out; border-color: currentColor !important; }

        /* Frame overlays for Perks */
        #frost-frame { position: fixed; inset: 0; border: 16px solid rgba(56, 189, 248, 0.5); pointer-events: none; opacity: 0; transition: opacity 0.3s ease; z-index: 40; box-shadow: inset 0 0 100px rgba(14, 165, 233, 0.4); }
        .frost-active { opacity: 1 !important; }
        
        #shield-frame { position: fixed; inset: 0; border: 12px solid rgba(245, 158, 11, 0.6); pointer-events: none; opacity: 0; transition: opacity 0.3s ease; z-index: 40; box-shadow: inset 0 0 80px rgba(245, 158, 11, 0.3); }
        .shield-active { opacity: 1 !important; }

        /* Scrollbars */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <canvas id="ambient-particle-canvas"></canvas>
    <canvas id="snow-freeze-canvas"></canvas>
    <div id="frost-frame"></div>
    <div id="shield-frame"></div>

    <div class="relative min-h-screen z-10 flex flex-col max-w-md mx-auto bg-slate-950/40 border-x border-slate-900 shadow-2xl overflow-hidden">
        
        <header class="px-5 py-4 flex items-center justify-between border-b border-slate-800 bg-slate-950/80 backdrop-blur-xl sticky top-0 z-50">
            <button onclick="toggleAudioAmbiance()" id="ambiance-toggle-btn" class="flex items-center gap-2 px-3 py-1.5 rounded-full border border-emerald-500/30 bg-emerald-950/40 text-emerald-400 text-xs font-black tracking-widest transition-all active:scale-95">
                <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                <span id="audio-label">ON</span>
            </button>

            <div class="flex items-center gap-3">
                <button onclick="toggleAppLanguageSelector()" class="px-3 py-1.5 rounded-xl bg-indigo-950/60 border border-indigo-500/30 text-indigo-300 font-bold text-xs shadow-md active:scale-95 transition-all">
                    <i class="fa-solid fa-globe mr-1"></i> <span id="active-language-label">EN</span>
                </button>
                <div id="gold-container" class="flex items-center gap-2 px-4 py-1.5 rounded-xl bg-slate-900 border border-amber-500/40 text-amber-400 font-black text-sm transition-all duration-200 shadow-inner">
                    <i class="fa-solid fa-coins text-xs"></i>
                    <span id="player-gold-display">500</span>
                </div>
            </div>
        </header>

        <main id="window-canvas" class="flex-1 p-5 overflow-y-auto pb-28"></main>

        <footer class="absolute bottom-0 left-0 right-0 bg-slate-950/90 backdrop-blur-xl border-t border-slate-800 grid grid-cols-3 p-3 gap-2 z-50">
            <button onclick="switchContextTerminalWindow('home')" id="nav-home" class="flex flex-col items-center justify-center py-2 text-indigo-400 bg-indigo-950/30 rounded-xl transition-all active:scale-95">
                <i class="fa-solid fa-house text-lg"></i><span class="text-[10px] font-bold mt-1.5 uppercase">Home</span>
            </button>
            <button onclick="switchContextTerminalWindow('tasks')" id="nav-tasks" class="flex flex-col items-center justify-center py-2 text-slate-500 hover:text-slate-300 rounded-xl transition-all active:scale-95 hover:bg-slate-900">
                <i class="fa-solid fa-list-check text-lg"></i><span class="text-[10px] font-bold mt-1.5 uppercase">Tasks</span>
            </button>
            <button onclick="switchContextTerminalWindow('copilot')" id="nav-copilot" class="flex flex-col items-center justify-center py-2 text-slate-500 hover:text-slate-300 rounded-xl transition-all active:scale-95 hover:bg-slate-900">
                <i class="fa-solid fa-robot text-lg"></i><span class="text-[10px] font-bold mt-1.5 uppercase">Copilot</span>
            </button>
        </footer>
    </div>

    <div id="game-alert-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="glass-modal w-full max-w-xs p-6 text-center space-y-5 rounded-3xl animate__animated animate__zoomIn animate__faster border border-indigo-500/30 shadow-2xl">
            <div id="alert-icon" class="text-5xl drop-shadow-[0_0_15px_rgba(255,255,255,0.3)]">⚠️</div>
            <div class="space-y-1">
                <h3 id="alert-title" class="text-sm font-black heading-font text-indigo-300 uppercase tracking-widest">Notice</h3>
                <p id="alert-msg" class="text-xs text-slate-300 font-medium leading-relaxed"></p>
            </div>
            <button onclick="dismissSystemModal(event)" class="w-full py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white font-black text-xs tracking-widest uppercase active:scale-95 transition-all shadow-lg">
                CONTINUE
            </button>
        </div>
    </div>

    <div id="shop-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md z-[100] hidden flex items-center justify-center p-4">
        <div class="glass-modal w-full max-w-sm p-6 space-y-4 rounded-3xl animate__animated animate__fadeInUp animate__faster border border-slate-700 shadow-2xl">
            <div class="flex justify-between items-center border-b border-slate-700 pb-4">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-indigo-950 border border-indigo-500/50 flex items-center justify-center text-indigo-400"><i class="fa-solid fa-shield-halved"></i></div>
                    <h3 class="text-sm font-black uppercase tracking-widest text-slate-100">Armory Depot</h3>
                </div>
                <button onclick="closeShopModal()" class="w-8 h-8 rounded-full bg-slate-800 text-slate-400 hover:text-white hover:bg-slate-700 transition-all flex items-center justify-center"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="modal-shop-grid" class="space-y-3"></div>
        </div>
    </div>

    <button id="lobby-bag-btn" onclick="openShopModal(event)" class="fixed bottom-24 right-6 z-40 bg-gradient-to-br from-indigo-500 to-purple-600 border border-white/20 w-14 h-14 rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(99,102,241,0.5)] text-xl hover:scale-110 active:scale-95 transition-all animate__animated animate__pulse animate__infinite">
        🎒
    </button>

    <script>
        // --- 1. LOCALIZATION REGISTRY ---
        const i18nRegistry = {
            en: {
                mapHub: "Quest Modules", 
                subtitle: "Select a scriptural sector to explore", 
                phase1Title: "Phase 1: New Testament", phase1Desc: "The Gospels and Epistles",
                phase2Title: "Phase 2: Old Testament", phase2Desc: "Covenants and Prophets", 
                phase3Title: "Phase 3: Grand Mixture", phase3Desc: "Randomized Scriptural Challenge", 
                phase4Title: "Phase 4: E.G. White", phase4Desc: "Prophetic Heritage & Insights",
                phase5Title: "Phase 5: Mastery Blitz", phase5Desc: "High Speed Fire Arena", 
                phase6Title: "Phase 6: SDA Teachings", phase6Desc: "The 28 Fundamental Beliefs", 
                lockedEGW: "Requires 1000 Gold to unlock",
                lockedBlitz: "Requires 500 Gold to unlock",
                lockedSDA: "Requires 1500 Gold to unlock"
            },
            tw: {
                mapHub: "Akwankyerɛ Kuw", 
                subtitle: "Miia Adebisa Kaadi biara so sɛ wubue", 
                phase1Title: "Apaso 1: Apam Foforo", phase1Desc: "Nsɛmpa ne Nkyerɛwee no",
                phase2Title: "Apaso 2: Apam Dedaw", phase2Desc: "Mmarahyɛ ne Adiyifo", 
                phase3Title: "Apaso 3: Afrafra Kɛse", phase3Desc: "Kyerɛwnsɛm Nyinaa Nsɛm", 
                phase4Title: "Apaso 4: E.G. White", phase4Desc: "Nkɔmhyɛ Nkyerɛkyerɛ",
                phase5Title: "Apaso 5: Nkɔmhyɛ Ntɛmso", phase5Desc: "Nnarekodi Ntɛmso Berɛ", 
                phase6Title: "Apaso 6: SDA Nkyerɛkyerɛ", phase6Desc: "Nkyerɛkyerɛ Titiriw 28 No", 
                lockedEGW: "Hia Sika Kɔkɔɔ 1000 de abue",
                lockedBlitz: "Hia Sika Kɔkɔɔ 500 de abue",
                lockedSDA: "Hia Sika Kɔkɔɔ 1500 de abue"
            }
        };

        function getString(key) {
            return i18nRegistry[state.lang][key] || i18nRegistry['en'][key] || key;
        }

        // --- 2. EXACT 50-QUESTION PER BOOK GENERATOR ---
        function generateProceduralDatabaseItems() {
            // Foundational Seeds
            const seeds = [
                { id: "nt", group: "NT", q: "Who was chosen to be the earthly mother of Jesus Christ?", a: ["Elizabeth", "Mary", "Martha", "Salome"], correct: 1 },
                { id: "nt", group: "NT", q: "Where was Jesus Christ born historically?", a: ["Nazareth", "Jerusalem", "Bethlehem", "Capernaum"], correct: 2 },
                { id: "nt", group: "NT", q: "What was the professional trade of Luke?", a: ["Tax Collector", "Physician", "Fisherman", "Tentmaker"], correct: 1 },
                
                { id: "ot", group: "OT", q: "How many days did God take to create the universe?", a: ["5 Days", "6 Days", "7 Days", "10 Days"], correct: 1 },
                { id: "ot", group: "OT", q: "Who led the Israelites out of Egypt?", a: ["Abraham", "Moses", "Joshua", "David"], correct: 1 },
                { id: "ot", group: "OT", q: "What was the first plague poured upon Egypt?", a: ["Frogs", "Lice", "Blood", "Locusts"], correct: 2 },
                
                { id: "mix", group: "MIX", q: "Which book is the longest in the Bible?", a: ["Genesis", "Psalms", "Isaiah", "Jeremiah"], correct: 1 },
                
                { id: "egw", group: "EGW", q: "Which work traces the cosmic metanarrative between Christ and Satan?", a: ["Steps to Christ", "The Great Controversy", "Education", "Ministry of Healing"], correct: 1 },
                { id: "egw", group: "EGW", q: "Which book focuses heavily on daily salvation devotional steps?", a: ["Steps to Christ", "Desire of Ages", "Patriarchs", "Prophets"], correct: 0 },
                
                { id: "mastery", group: "MASTERY", q: "In what year did the Millerite great disappointment take place?", a: ["1798", "1843", "1844", "1850"], correct: 2 },
                
                { id: "sda", group: "SDA", q: "Which day is recognized as the biblical Sabbath?", a: ["First Day", "Sixth Day", "Seventh Day", "Any Day"], correct: 2 },
                { id: "sda", group: "SDA", q: "How many fundamental beliefs does the church hold?", a: ["22", "27", "28", "30"], correct: 2 }
            ];

            const modules = ["nt", "ot", "mix", "egw", "mastery", "sda"];
            let compiledData = [];

            modules.forEach(cat => {
                let templates = seeds.filter(b => b.id === cat);
                if(templates.length === 0) templates = seeds.filter(b => b.id === 'nt'); 
                
                let categoryQuestions = [];
                // STRICTLY LOOP EXACTLY 50 TIMES PER BOOK
                for(let i = 1; i <= 50; i++) {
                    let t = templates[(i - 1) % templates.length];
                    
                    // Assign Dynamic Timer Difficulties evenly across the 50 items
                    let diff = "easy"; // 20s
                    if (i % 2 === 0) diff = "moderate"; // 15s
                    if (i % 5 === 0) diff = "hard"; // 10s
                    if (cat === "mastery") diff = "blitz"; // 5s

                    categoryQuestions.push({
                        q: `${t.q} [Sector Node ${i}/50]`, // Ensures UI visibly changes for every single question
                        a: [...t.a],
                        correct: t.correct,
                        difficulty: diff
                    });
                }
                
                compiledData.push({
                    id: cat,
                    name: cat.toUpperCase(),
                    group: cat.toUpperCase(),
                    questions: categoryQuestions
                });
            });
            return compiledData;
        }

        window.quizDatabase = generateProceduralDatabaseItems();

        // --- 3. STATE MANAGEMENT ---
        let state = JSON.parse(localStorage.getItem('revelatorsMasterStateV3')) || {
            gold: 750, 
            lang: 'en', 
            activeTab: 'home',
            perks: { freeze: 3, half: 2, shield: 2 },
            unlockedBooks: { nt: true, ot: true, mix: true, egw: false, mastery: false, sda: false },
            stats: { currentStreak: 0, overallAnswers: 0 },
            tasks: [
                { id: "t1", type: "answer", target: 15, progress: 0, reward: 150, done: false },
                { id: "t2", type: "streak", target: 5, progress: 0, reward: 200, done: false }
            ]
        };

        let currentCampaignMode = "";
        let campaignActivePool = [];
        let currentActiveQuestion = null;
        let countdownTimerRef = null;
        let secondsRemaining = 0;
        let initialSecondsAllowed = 15;
        let inputInteractionsBlocked = false;
        let isShieldActive = false;
        let isFreezeActive = false;
        
        let audioCtx = null;
        let globalAudioMuted = false;
        let activeBackgroundToneLoop = null;
        let activePostAlertCallback = null;
        let snowAnimationId = null;
        let snowFlakesArray = [];

        function saveState() {
            localStorage.setItem('revelatorsMasterStateV3', JSON.stringify(state));
            const goldVal = document.getElementById('player-gold-display');
            const langLabel = document.getElementById('active-language-label');
            
            if (goldVal) goldVal.innerText = `${state.gold}`;
            if (langLabel) langLabel.innerText = state.lang === 'en' ? "EN" : "TW";
            
            // Re-bind data-i18n on state save to update translations live
            document.querySelectorAll('[data-i18n]').forEach(el => {
                let key = el.getAttribute('data-i18n');
                el.innerText = getString(key);
            });
        }

        // --- 4. RENDER: HOME MENU (No Template Literal Breaking) ---
        function renderMenuMap() {
            if (state.activeTab !== 'home') return;
            document.getElementById('lobby-bag-btn').classList.remove('hidden');
            document.body.classList.remove('game-bg-active');
            toggleSnowSystemPipeline(false);
            switchBackgroundMoodSoundtrack('lobby');

            let htmlString = `
                <div class="space-y-1 animate__animated animate__fadeInDown">
                    <h1 class="text-3xl font-black tracking-wider heading-font text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400 uppercase leading-tight">REVELATORS PATHFINDERS</h1>
                    <p class="text-[10px] text-slate-400 font-bold tracking-widest uppercase" data-i18n="subtitle">${getString('subtitle')}</p>
                </div>
                <div class="space-y-3 pt-4">
            `;

            // Standard Unlocked Books
            htmlString += buildPhaseCard('nt', 'phase1Title', 'phase1Desc', 'bg-indigo-500');
            htmlString += buildPhaseCard('ot', 'phase2Title', 'phase2Desc', 'bg-emerald-500');
            htmlString += buildPhaseCard('mix', 'phase3Title', 'phase3Desc', 'bg-pink-500');

            // Locked/Unlocked Book EGW
            if (state.unlockedBooks.egw) {
                htmlString += buildPhaseCard('egw', 'phase4Title', 'phase4Desc', 'bg-amber-500');
            } else {
                htmlString += buildLockedCard('egw', 'phase4Title', 'lockedEGW', 1000);
            }

            // Locked/Unlocked Book MASTERY
            if (state.unlockedBooks.mastery) {
                htmlString += buildPhaseCard('mastery', 'phase5Title', 'phase5Desc', 'bg-red-600', true);
            } else {
                htmlString += buildLockedCard('mastery', 'phase5Title', 'lockedBlitz', 500);
            }

            // Locked/Unlocked Book SDA
            if (state.unlockedBooks.sda) {
                htmlString += buildPhaseCard('sda', 'phase6Title', 'phase6Desc', 'bg-cyan-500');
            } else {
                htmlString += buildLockedCard('sda', 'phase6Title', 'lockedSDA', 1500);
            }

            htmlString += `</div>`;
            document.getElementById('window-canvas').innerHTML = htmlString;
        }

        // HTML Builders to protect against IDE parsing errors
        function buildPhaseCard(id, titleKey, descKey, colorClass, isBlitz = false) {
            let extra = isBlitz ? `<span class="text-[8px] font-black text-white bg-red-600 px-2 py-0.5 rounded animate-pulse absolute top-4 right-4">WAR ZONE</span>` : '';
            return `
                <div onclick="startArcadePipeline('${id}')" class="level-card-interactive w-full p-5 glass-card text-left cursor-pointer relative overflow-hidden flex items-center group ${isBlitz ? 'border-red-500/30' : ''}">
                    <div class="absolute inset-y-0 left-0 w-1.5 ${colorClass}"></div>
                    <div class="pl-3 w-full">
                        <h3 class="text-sm font-black uppercase tracking-wide text-white" data-i18n="${titleKey}">${getString(titleKey)}</h3>
                        <p class="text-[10px] text-slate-400 font-medium mt-0.5" data-i18n="${descKey}">${getString(descKey)}</p>
                    </div>
                    ${extra}
                </div>
            `;
        }

        function buildLockedCard(id, titleKey, descKey, cost) {
            return `
                <div onclick="requestVaultUnlock('${id}', ${cost}, '${getString(titleKey)}')" class="w-full p-4 glass-card border border-slate-700 bg-slate-900/40 text-left cursor-pointer relative flex justify-between items-center hover:bg-slate-800 transition-all">
                    <div>
                        <h3 class="text-xs font-black text-slate-400 uppercase tracking-wide"><i class="fa-solid fa-lock mr-1"></i> <span data-i18n="${titleKey}">${getString(titleKey)}</span></h3>
                        <p class="text-[9px] text-slate-500 mt-1" data-i18n="${descKey}">${getString(descKey)}</p>
                    </div>
                    <span class="bg-amber-950/40 border border-amber-500/30 px-3 py-1.5 rounded-lg font-black text-[10px] text-amber-400 tracking-wider">${cost} 💰</span>
                </div>
            `;
        }

        // --- 5. RENDER: TASKS & COPILOT ---
        function renderTasksExplorer() {
            if (state.activeTab !== 'tasks') return;
            document.getElementById('lobby-bag-btn').classList.add('hidden');
            let htmlString = `
                <div class="space-y-1 animate__animated animate__fadeIn">
                    <h1 class="text-2xl font-black tracking-wider heading-font text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 uppercase">Sector Tasks</h1>
                    <p class="text-[10px] text-slate-400 font-bold tracking-widest uppercase">Secure daily gold ledger balances</p>
                </div>
                <div class="space-y-3 pt-4 animate__animated animate__fadeInUp">
            `;
            
            state.tasks.forEach(t => {
                let pct = Math.min(100, Math.floor((t.progress / t.target) * 100));
                let txt = getString(t.i18nKey).replace('{target}', t.target);
                
                htmlString += `
                    <div class="p-4 rounded-2xl glass-card border border-slate-800 flex flex-col gap-3 ${t.done ? 'opacity-50' : ''}">
                        <div class="flex items-center justify-between">
                            <p class="text-[11px] font-black text-slate-200 uppercase tracking-wide">${txt}</p>
                            <span class="text-[10px] font-black text-amber-400 bg-amber-950/40 border border-amber-500/30 px-2 py-0.5 rounded-lg shrink-0">+${t.reward} 💰</span>
                        </div>
                        <div class="w-full bg-slate-950 h-2 rounded-full overflow-hidden border border-slate-900">
                            <div class="h-full bg-indigo-500 rounded-full transition-all duration-500" style="width: ${pct}%"></div>
                        </div>
                `;
                
                if(t.progress >= t.target && !t.done) {
                    htmlString += `<button onclick="claimTaskReward('${t.id}')" class="w-full py-2 rounded-xl bg-emerald-600 text-white font-black text-[10px] tracking-widest uppercase shadow-md active:scale-95 animate__animated animate__pulse animate__infinite">CLAIM REWARD</button>`;
                } else if(t.done) {
                    htmlString += `<div class="w-full py-1.5 rounded-xl bg-slate-900 text-slate-500 font-black text-[10px] tracking-widest uppercase text-center border border-slate-800">COMPLETED</div>`;
                }
                htmlString += `</div>`;
            });
            htmlString += `</div>`;

        function initiateQuestionCountdownTimer() {

            countdownTimerRef = setInterval(() => {
                if (isFreezeActive || inputInteractionsBlocked) return;

                secondsRemaining--;
                let pct = Math.max(0, (secondsRemaining / initialSecondsAllowed) * 100);
                
                if (progressBar) {
                    progressBar.style.width = `${pct}%`;
                    if (pct <= 30) {
                        progressBar.className = "h-full bg-red-500 rounded-full shadow-[0_0_15px_rgba(239,68,68,0.8)]";
                        triggerAudioTone(120, 0.05, 'sawtooth');

                        progressBar.className = "h-full bg-amber-400 rounded-full";
                    }
                }
                
                const clockNode = document.getElementById('clock-digit');
                if(clockNode) clockNode.innerText = secondsRemaining < 10 ? '0'+secondsRemaining : secondsRemaining;

                if (secondsRemaining <= 0) {
                    executeFluidFailure();
                }
            }, 1000);
        }

        function initStarfieldAmbientLayer() {
            const canvas = document.getElementById('ambient-particle-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let dots = [];
            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            window.addEventListener('resize', resize); resize();
            for(let i=0; i<30; i++) dots.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, r: Math.random() * 2 + 1, vY: Math.random() * 0.2 + 0.1, alpha: Math.random() * 0.3 + 0.1 });
            function loop() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                dots.forEach(d => {
                    d.y -= d.vY;
                    if(d.y < -10) d.y = canvas.height + 10;
                    ctx.fillStyle = `rgba(129, 140, 248, ${d.alpha})`;
                    ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.fill();
                });
                requestAnimationFrame(loop);
            }
            loop();
        }

        // Heavy Blizzard System for Freeze Perk (150 particles)
        function toggleSnowSystemPipeline(run) {
            const canvas = document.getElementById('snow-freeze-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            if (!run) {
                canvas.style.opacity = "0";
                if(snowAnimationId) cancelAnimationFrame(snowAnimationId);
                return;
            }
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            canvas.style.opacity = "1"; snowFlakesArray = [];

            for (let i = 0; i < 150; i++) {
                snowFlakesArray.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, r: Math.random() * 3 + 1, speed: Math.random() * 3 + 1, density: Math.random() * 50 });
            }
            function frame() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "rgba(224, 242, 254, 0.9)"; ctx.beginPath();
                for (let i = 0; i < 150; i++) {
                    let p = snowFlakesArray[i];
                    ctx.moveTo(p.x, p.y); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2, true);
                    p.y += p.speed; p.x += Math.sin(p.density) * 1.5;
                    if (p.y > canvas.height) snowFlakesArray[i] = { x: Math.random() * canvas.width, y: -10, r: p.r, speed: p.speed, density: p.density };
                }
                ctx.fill();
                snowAnimationId = requestAnimationFrame(frame);
            }
            frame();
        }

        function initAudioContext() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function triggerAudioTone(freq, dur, type = 'sine') {
            if (!audioCtx || globalAudioMuted) return;
            try {
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + dur);
            } catch (err) {}
        }

        function startProceduralAmbianceLoop() {
            if (activeBackgroundToneLoop) clearInterval(activeBackgroundToneLoop);
            runMoodSynthesizerTick();
            activeBackgroundToneLoop = setInterval(runMoodSynthesizerTick, currentBackgroundMoodType === 'war' ? 800 : 3000);
        }

        function runMoodSynthesizerTick() {
            if (globalAudioMuted || !audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;

            if (currentBackgroundMoodType === 'war') {
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.type = 'triangle'; osc.frequency.setValueAtTime(65, now); osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.4);
                gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.4);
            } else {
                let freqs = [146.83, 220.00, 293.66];
                freqs.forEach((f) => {
                    let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(f, now);
                    gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(0.02, now + 1.0); gain.gain.exponentialRampToValueAtTime(0.0001, now + 2.8);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(now); osc.stop(now + 3.0);
                });
            }
        }

        function switchBackgroundMoodSoundtrack(mood) {
            initAudioContext();
            if (currentBackgroundMoodType === mood) return;
            currentBackgroundMoodType = mood;
            startProceduralAmbianceLoop();
        }

        function toggleAudioAmbiance() {
            const btn = document.getElementById('ambiance-toggle-btn');
            if (!audioCtx) {
                initAudioContext(); globalAudioMuted = false;
                if (btn) btn.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span><span class="text-emerald-400">ON</span>`;
                startProceduralAmbianceLoop();
                return;
            }
            globalAudioMuted = !globalAudioMuted;
            if (globalAudioMuted) {
                if (activeBackgroundToneLoop) { clearInterval(activeBackgroundToneLoop); activeBackgroundToneLoop = null; }
                if (btn) btn.innerHTML = `<span class="w-2 h-2 rounded-full bg-slate-500"></span><span class="text-slate-400">OFF</span>`;
            } else {
                startProceduralAmbianceLoop();
                if (btn) btn.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span><span class="text-emerald-400">ON</span>`;
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            initStarfieldAmbientLayer();
            switchContextTerminalWindow('home');
            saveState();
        });
    </script>
</body>
</html>
