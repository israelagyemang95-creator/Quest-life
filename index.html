<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Quest: Arcade Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        #bg-overlay { position: fixed; inset: 0; background-color: #060913; z-index: 0; }
        #bg-tint { position: fixed; inset: 0; background: radial-gradient(circle at center, rgba(15, 23, 42, 0.45) 0%, rgba(3, 7, 18, 0.98) 100%); z-index: 1; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; color: white; }
        
        .btn-choice { width: 100%; text-align: left; padding: 1.1rem 1.4rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.07); background: rgba(255,255,255,0.03); font-weight: 600; color: #f1f5f9; transition: all 0.2s ease; position: relative; }
        .btn-choice:hover { background: rgba(255, 255, 255, 0.08); transform: translateY(-1px); }
        
        /* 🌈 RAINBOW GRADIENT CORRECT ANSWER CELEBRATION */
        @keyframes rainbowBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .rainbow-correct { 
            background: linear-gradient(270deg, #ff0055, #00ff66, #00ffff, #ffcc00, #ff00ff) !important;
            background-size: 300% 300% !important;
            animation: rainbowBorder 2s linear infinite !important;
            border-color: transparent !important;
            color: #ffffff !important;
            font-weight: 900 !important;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }

        /* ❄️ ADVANCED CHILL FREEZE AND FALLING SNOW ENGINE */
        #frost-frame { position: fixed; inset: 0; border: 12px solid rgba(56, 189, 248, 0.5); pointer-events: none; opacity: 0; transition: opacity 0.3s ease; z-index: 40; box-shadow: inset 0 0 60px rgba(14, 165, 233, 0.3); }
        .frost-active { opacity: 1 !important; }
        
        .snowflake { position: fixed; top: -10%; color: #fff; font-size: 1em; pointer-events: none; z-index: 45; animation: fall linear infinite; }
        @keyframes fall {
            0% { top: -10%; transform: translateX(0) rotate(0deg); }
            100% { top: 110%; transform: translateX(100px) rotate(360deg); }
        }

        /* 🛡️ SHIELD OVERLAY */
        #shield-frame { position: fixed; inset: 0; border: 12px solid rgba(245, 158, 11, 0.5); pointer-events: none; opacity: 0; transition: opacity 0.3s ease; z-index: 40; box-shadow: inset 0 0 60px rgba(245, 158, 11, 0.25); }
        .shield-active { opacity: 1 !important; }

        @keyframes clockPulse {
            0%, 100% { transform: scale(1); border-color: rgba(255,255,255,0.1); }
            50% { transform: scale(1.06); border-color: #ef4444; color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        }
        .alarm-on { animation: clockPulse 0.5s infinite; }
    </style>
</head>
<body class="p-4 min-h-screen flex flex-col items-center justify-start text-white overflow-x-hidden font-sans select-none">
    
    <div id="bg-overlay"></div>
    <div id="bg-tint"></div>

    <!-- Visual FX Overlay Containers -->
    <div id="frost-frame"></div>
    <div id="shield-frame"></div>
    <div id="snow-box"></div>

    <!-- Top Universal Navigation Hud Element -->
    <div class="fixed top-4 left-4 right-4 flex justify-between items-center z-50 max-w-md mx-auto w-full px-2">
        <button onclick="exitToMenu()" id="back-btn" class="hidden bg-slate-900/95 border border-white/10 text-white px-4 py-2 rounded-full font-bold text-xs uppercase tracking-wider shadow-2xl transition-all">
            🚪 Map Hub
        </button>
        <div class="flex gap-2 ml-auto">
            <button onclick="toggleLanguage()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-full font-bold text-xs uppercase shadow-md transition-all">
                🌐 <span id="lang-label">English</span>
            </button>
            <div id="gold-container" class="bg-slate-900/95 border border-white/10 px-4 py-2 rounded-full shadow-2xl flex items-center gap-2 animate__animated">
                <span>💰</span>
                <span id="gold-val" class="font-black text-amber-400">500</span>
            </div>
        </div>
    </div>

    <!-- MAIN INTERACTIVE HUB WINDOW -->
    <main id="window-canvas" class="w-full max-w-md mt-16 relative z-10 space-y-4 flex flex-col mb-24"></main>

    <!-- 🎒 BOOTSTRAP LOBBY SHOP INVENTORY MODAL MENU -->
    <div id="shop-modal" class="fixed inset-0 bg-black/85 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div class="glass-card w-full max-w-sm p-6 space-y-4 border-indigo-500/30 bg-slate-950/80 animate__animated animate__zoomIn">
            <div class="flex justify-between items-center border-b border-white/10 pb-3">
                <div class="flex items-center gap-2">
                    <span class="text-xl">🛒</span>
                    <h3 class="text-sm font-black uppercase tracking-wider text-indigo-300">Purchase Armory Supplies</h3>
                </div>
                <button onclick="closeShopModal()" class="text-slate-400 hover:text-white font-black text-sm bg-white/5 w-7 h-7 rounded-full flex items-center justify-center">✕</button>
            </div>
            <div id="modal-shop-grid" class="space-y-2 max-h-[360px] overflow-y-auto"></div>
        </div>
    </div>

    <!-- PERSISTENT LOBBY BAG TRIGGER (Hidden completely during active gameplay stages) -->
    <button id="lobby-bag-btn" onclick="openShopModal()" class="fixed bottom-6 right-6 z-40 bg-gradient-to-tr from-indigo-600 to-purple-600 border border-white/20 w-14 h-14 rounded-full flex items-center justify-center shadow-2xl text-2xl animate__animated animate__pulse animate__infinite">
        🎒
    </button>

    <script src="questions.js"></script>
    <script>
        let state = JSON.parse(localStorage.getItem('bqArcadeV4Data')) || {
            gold: 500,
            lang: 'en',
            perks: { freeze: 2, half: 2, skip: 2, shield: 1, elixir: 2 },
            streak: 0
        };

        let currentCampaign = "";
        let levelIndex = 0;
        let activePool = [];
        let bookQuestions = [];
        let questionIndex = 0;
        let activeQuestion = null;
        let timerClockInterval = null;
        let secondsLeft = 0;
        let maxSeconds = 20;
        let isClockFrozen = false;
        let inputBlocked = false;
        let isShieldActive = false;

        let audioCtx = null;

        function saveState() {
            localStorage.setItem('bqArcadeV4Data', JSON.stringify(state));
            document.getElementById('gold-val').innerText = state.gold;
        }

        // 🎵 Robust Cross-Browser Responsive Mobile Audio Synth Engine
        function initAudioEngine() {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            } catch(e) { console.log("Web Audio Initialization Blocked", e); }
        }

        function playSoundFX(type) {
            initAudioEngine();
            if (!audioCtx) return;
            
            // Resume contextual audio graph loop threads if suspended by android hardware power cycles
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }

            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                if (type === 'correct') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                    gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                    osc.start();
                    osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); // E5
                    osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2); // G5
                    osc.stop(audioCtx.currentTime + 0.35);
                } else if (type === 'wrong') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(140, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                    osc.start();
                    osc.frequency.linearRampToValueAtTime(70, audioCtx.currentTime + 0.25);
                    osc.stop(audioCtx.currentTime + 0.3);
                } else if (type === 'perk') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                    osc.start();
                    osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.2);
                    osc.stop(audioCtx.currentTime + 0.25);
                } else if (type === 'tick') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(900, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.04);
                }
            } catch(err){}
        }

        function openShopModal() {
            playSoundFX('perk');
            const inventoryItems = [
                { id: 'freeze', name: 'Chrono Freeze', desc: 'Stops countdown progression.', cost: 50, icon: '❄️' },
                { id: 'half', name: 'Divine 50:50', desc: 'Discards two incorrect choice pathways.', cost: 75, icon: '⚖️' },
                { id: 'skip', name: 'Prophetic Skip', desc: 'Skips node without penalty risks.', cost: 100, icon: '🔮' },
                { id: 'shield', name: 'Aegis Shield', desc: 'Blocks negative 20 coin deductions.', cost: 60, icon: '🛡️' },
                { id: 'elixir', name: 'Time Elixir', desc: 'Grants +10 seconds onto active clocks.', cost: 40, icon: '🧪' }
            ];

            const grid = document.getElementById('modal-shop-grid');
            grid.innerHTML = "";
            
            inventoryItems.forEach(item => {
                const row = document.createElement('div');
                row.className = "flex items-center justify-between p-3 bg-slate-900/80 rounded-2xl border border-white/5";
                row.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="text-2xl bg-slate-950 p-2 rounded-xl">${item.icon}</span>
                        <div>
                            <h4 class="text-xs font-black text-slate-200">${item.name}</h4>
                            <p class="text-[9px] text-indigo-400 font-black">Owned: ${state.perks[item.id] || 0}</p>
                        </div>
                    </div>
                    <button onclick="buyPerk('${item.id}', ${item.cost})" class="bg-indigo-600 hover:bg-indigo-500 font-bold text-xs px-3 py-1.5 rounded-xl text-white">${item.cost} 💰</button>
                `;
                grid.appendChild(row);
            });
            document.getElementById('shop-modal').classList.remove('hidden');
        }

        function closeShopModal() { document.getElementById('shop-modal').classList.add('hidden'); }

        function buyPerk(id, cost) {
            if (state.gold >= cost) {
                state.gold -= cost;
                state.perks[id] = (state.perks[id] || 0) + 1;
                saveState();
                openShopModal();
            } else {
                alert("Insufficient gold funds!");
            }
        }

        function renderMenuMap() {
            currentCampaign = "";
            document.getElementById('back-btn').classList.add('hidden');
            document.getElementById('lobby-bag-btn').classList.remove('hidden');
            stopSnowingEffect();
            
            const canvas = document.getElementById('window-canvas');
            canvas.innerHTML = `
                <div class="text-center space-y-1 animate__animated animate__fadeInDown">
                    <h1 class="text-4xl font-black bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400">BIBLE QUEST</h1>
                    <p class="text-xs text-slate-500 font-bold tracking-widest uppercase">Select Campaign Mode Route</p>
                </div>

                <div class="space-y-2.5 animate__animated animate__fadeInUp">
                    <button onclick="launchCampaign('nt')" class="w-full p-4 glass-card text-left flex justify-between items-center hover:border-indigo-500 transition-all">
                        <div><h3 class="text-sm font-black text-indigo-300">Phase 1: New Testament</h3><p class="text-[10px] text-slate-400">Gospels & Epistles Letters</p></div>
                        <span class="text-lg">⚡</span>
                    </button>
                    <button onclick="launchCampaign('ot')" class="w-full p-4 glass-card text-left flex justify-between items-center hover:border-emerald-500 transition-all">
                        <div><h3 class="text-sm font-black text-emerald-300">Phase 2: Old Testament</h3><p class="text-[10px] text-slate-400">Torah, Law & Hebrew History Chronicles</p></div>
                        <span class="text-lg">📜</span>
                    </button>
                    <button onclick="launchCampaign('mix')" class="w-full p-4 glass-card text-left flex justify-between items-center hover:border-purple-500 transition-all">
                        <div><h3 class="text-sm font-black text-purple-300">Phase 3: Grand Mixture Journey</h3><p class="text-[10px] text-slate-400">Full Structural Random Pool Mix</p></div>
                        <span class="text-lg">🌀</span>
                    </button>
                    <!-- ✒️ RESTORED PHASE 4 SECTION -->
                    <button onclick="launchCampaign('egw')" class="w-full p-4 glass-card text-left flex justify-between items-center hover:border-amber-400 transition-all">
                        <div><h3 class="text-sm font-black text-amber-300">Phase 4: E.G. White Writings</h3><p class="text-[10px] text-slate-400">Prophetic History Insights</p></div>
                        <span class="text-lg">✒️</span>
                    </button>
                    <!-- 🔥 RESTORED PHASE 5 SECTION -->
                    <button onclick="launchCampaign('master')" class="w-full p-4 glass-card text-left flex justify-between items-center hover:border-rose-500 transition-all">
                        <div><h3 class="text-sm font-black text-rose-400">Phase 5: Mastery Blitz Mode</h3><p class="text-[10px] text-slate-400">Hyper Speed Speedrun: 5-Second Blitz Clock!</p></div>
                        <span class="text-lg">🔥</span>
                    </button>
                </div>
            `;
        }

        function launchCampaign(mode) {
            initAudioEngine();
            currentCampaign = mode;
            levelIndex = 0;
            state.streak = 0;
            document.getElementById('back-btn').classList.remove('hidden');
            document.getElementById('lobby-bag-btn').classList.add('hidden'); // Hide lobby bag
            
            if (mode === 'nt') activePool = quizDatabase.filter(b => b.group === 'NT');
            else if (mode === 'ot') activePool = quizDatabase.filter(b => b.group === 'OT');
            else if (mode === 'egw') activePool = quizDatabase.filter(b => b.group === 'EGW');
            else activePool = [...quizDatabase].sort(() => Math.random() - 0.5);

            initNewBookTrack();
        }

        function initNewBookTrack() {
            if (levelIndex >= activePool.length) { renderVictoryScreen(); return; }
            const targetBook = activePool[levelIndex];
            bookQuestions = [...targetBook.questions].sort(() => Math.random() - 0.5);
            questionIndex = 0;
            loadQuestionNode();
        }

        function loadQuestionNode() {
            if (questionIndex >= bookQuestions.length) { levelIndex++; initNewBookTrack(); return; }

            inputBlocked = false;
            isClockFrozen = false;
            isShieldActive = false;
            document.getElementById('frost-frame').className = "";
            document.getElementById('shield-frame').className = "";
            stopSnowingEffect();

            const targetBook = activePool[levelIndex];
            activeQuestion = bookQuestions[questionIndex];
            let tier = activeQuestion.subGroup || "Easy"; 

            // Hard 5-Second Blitz Logic Configuration Evaluation Check
            if (currentCampaign === 'master') {
                maxSeconds = 5;
            } else {
                maxSeconds = tier === "Difficult" ? 10 : tier === "Moderate" ? 15 : 20;
            }
            secondsLeft = maxSeconds;

            let tierColorClass = "bg-emerald-500";
            if (tier === "Moderate") tierColorClass = "bg-amber-500";
            else if (tier === "Difficult" || currentCampaign === 'master') tierColorClass = "bg-rose-500";

            let questionText = (state.lang === 'tw' && activeQuestion.q_twi) ? activeQuestion.q_twi : activeQuestion.q;
            let choicesArray = (state.lang === 'tw' && activeQuestion.a_tw) ? activeQuestion.a_tw : activeQuestion.a;

            const canvas = document.getElementById('window-canvas');
            canvas.innerHTML = `
                <!-- Top Header Panel Metrics -->
                <div class="glass-card p-4 space-y-3 flex flex-col animate__animated animate__fadeIn">
                    <div class="flex justify-between items-center">
                        <div>
                            <h2 class="text-lg font-black text-slate-100 tracking-wide">${targetBook.name}</h2>
                            <span class="text-[9px] uppercase px-2 py-0.5 rounded font-black bg-slate-950 text-slate-400 mt-1 inline-block">
                                ${currentCampaign === 'master' ? '5s Mastery Blitz' : tier}
                            </span>
                        </div>
                        <div id="clock-wrapper" class="text-2xl font-black tracking-tighter tabular-nums text-amber-400 bg-slate-950/70 px-3 py-1.5 rounded-2xl border border-white/10">
                            ⏰ <span id="clock-digit">${secondsLeft}</span>s
                        </div>
                    </div>
                    <div class="w-full bg-slate-950/60 h-2 rounded-full overflow-hidden p-0.5 border border-white/5">
                        <div id="bar-fill" class="h-full rounded-full ${tierColorClass}" style="width: 100%; transition: width 1s linear;"></div>
                    </div>
                </div>

                <!-- Core Main Display Canvas View -->
                <div class="glass-card p-6 min-h-[110px] flex items-center justify-center text-center animate__animated animate__zoomIn">
                    <h3 class="text-md font-bold leading-snug text-slate-100">${questionText}</h3>
                </div>

                <div id="choice-matrix" class="space-y-2.5"></div>

                <!-- 🛒 FIXED LIVE HUD HOTBAR POWER-UP SYSTEM PANEL SECTION -->
                <div class="fixed bottom-0 left-0 right-0 p-3 bg-slate-950/95 border-t border-white/10 z-40 flex justify-center gap-2">
                    <button onclick="triggerInGamePerk('freeze')" class="flex-1 bg-slate-900 border border-sky-500/30 p-2 rounded-xl flex flex-col items-center">
                        <span class="text-base">❄️</span>
                        <span class="text-[9px] text-slate-400 font-bold">Qty: ${state.perks.freeze}</span>
                    </button>
                    <button onclick="triggerInGamePerk('half')" class="flex-1 bg-slate-900 border border-rose-500/30 p-2 rounded-xl flex flex-col items-center">
                        <span class="text-base">⚖️</span>
                        <span class="text-[9px] text-slate-400 font-bold">Qty: ${state.perks.half}</span>
                    </button>
                    <button onclick="triggerInGamePerk('skip')" class="flex-1 bg-slate-900 border border-purple-500/30 p-2 rounded-xl flex flex-col items-center">
                        <span class="text-base">🔮</span>
                        <span class="text-[9px] text-slate-400 font-bold">Qty: ${state.perks.skip}</span>
                    </button>
                    <button onclick="triggerInGamePerk('shield')" class="flex-1 bg-slate-900 border border-amber-500/30 p-2 rounded-xl flex flex-col items-center">
                        <span class="text-base">🛡️</span>
                        <span class="text-[9px] text-slate-400 font-bold">Qty: ${state.perks.shield}</span>
                    </button>
                    <button onclick="triggerInGamePerk('elixir')" class="flex-1 bg-slate-900 border border-emerald-500/30 p-2 rounded-xl flex flex-col items-center">
                        <span class="text-base">🧪</span>
                        <span class="text-[9px] text-slate-400 font-bold">Qty: ${state.perks.elixir}</span>
                    </button>
                </div>
            `;

            const matrix = document.getElementById('choice-matrix');
            choicesArray.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "btn-choice animate__animated animate__fadeInUp";
                btn.style.animationDelay = `${idx * 0.03}s`;
                btn.innerText = opt;
                btn.onclick = () => evaluateAnswer(idx, btn);
                matrix.appendChild(btn);
            });

            runCountdownLoop();
        }

        function runCountdownLoop() {
            clearInterval(timerClockInterval);
            timerClockInterval = setInterval(() => {
                if (isClockFrozen || inputBlocked) return;
                secondsLeft--;
                
                const digit = document.getElementById('clock-digit');
                if (digit) digit.innerText = secondsLeft;

                const fill = document.getElementById('bar-fill');
                if (fill) fill.style.width = `${(secondsLeft / maxSeconds) * 100}%`;

                if (secondsLeft <= 2) {
                    playSoundFX('tick');
                    const wrap = document.getElementById('clock-wrapper');
                    if (wrap) wrap.classList.add('alarm-on');
                }

                if (secondsLeft <= 0) {
                    clearInterval(timerClockInterval);
                    handleFailurePenalty();
                }
            }, 1000);
        }

        function triggerInGamePerk(id) {
            if (state.perks[id] <= 0 || inputBlocked) return;
            state.perks[id]--;
            saveState();
            playSoundFX('perk');

            // Instantly redraw hotbar labels to sync counts
            loadQuestionNode(); 

            if (id === 'freeze') {
                isClockFrozen = true;
                document.getElementById('frost-frame').classList.add('frost-active');
                startSnowingEffect();
                const clk = document.getElementById('clock-wrapper');
                if (clk) clk.className = "text-2xl font-black bg-sky-950 text-sky-400 px-3 py-1.5 rounded-2xl border border-sky-400 animate__animated animate__pulse animate__infinite";
            } 
            else if (id === 'half') {
                const buttons = document.getElementById('choice-matrix').getElementsByTagName('button');
                let wrongs = [];
                for(let i=0; i<buttons.length; i++) { if (i !== activeQuestion.correct) wrongs.push(i); }
                wrongs.sort(() => Math.random() - 0.5).slice(0, 2).forEach(idx => {
                    buttons[idx].classList.add('animate__animated', 'animate__zoomOut');
                    setTimeout(() => { buttons[idx].style.opacity = "0"; buttons[idx].style.pointerEvents = "none"; }, 300);
                });
            } 
            else if (id === 'skip') {
                questionIndex++;
                loadQuestionNode();
            } 
            else if (id === 'shield') {
                isShieldActive = true;
                document.getElementById('shield-frame').classList.add('shield-active');
            } 
            else if (id === 'elixir') {
                secondsLeft = Math.min(maxSeconds, secondsLeft + 10);
                const clkDigit = document.getElementById('clock-digit');
                if (clkDigit) clkDigit.innerText = secondsLeft;
            }
        }

        function startSnowingEffect() {
            const box = document.getElementById('snow-box');
            box.innerHTML = "";
            for(let i=0; i<25; i++) {
                const snow = document.createElement('div');
                snow.className = "snowflake";
                snow.innerText = "❄️";
                snow.style.left = `${Math.random() * 100}%`;
                snow.style.animationDuration = `${Math.random() * 3 + 2}s`;
                snow.style.animationDelay = `${Math.random() * 2}s`;
                snow.style.fontSize = `${Math.random() * 14 + 10}px`;
                box.appendChild(snow);
            }
        }

        function stopSnowingEffect() { document.getElementById('snow-box').innerHTML = ""; }

        function evaluateAnswer(selectedIdx, clickedElement) {
            if (inputBlocked) return;
            inputBlocked = true;
            clearInterval(timerClockInterval);

            if (selectedIdx === activeQuestion.correct) {
                clickedElement.className = "btn-choice rainbow-correct shadow-2xl";
                playSoundFX('correct');
                
                state.gold += 15;
                state.streak++;
                saveState();
                setTimeout(loadQuestionNode, 1500);
            } else {
                clickedElement.className = "btn-choice bg-rose-600 border-rose-400 text-white animate__animated animate__shakeX font-bold shadow-lg";
                playSoundFX('wrong');
                setTimeout(handleFailurePenalty, 1200);
            }
        }

        function handleFailurePenalty() {
            clearInterval(timerClockInterval);
            state.streak = 0;

            if (isShieldActive) {
                alert("🛡️ Aegis Shield Blocked Your Coin Penalty! Shuffling book now.");
            } else {
                state.gold = Math.max(0, state.gold - 20);
                saveState();
                
                const goldHUD = document.getElementById('gold-container');
                if (goldHUD) {
                    goldHUD.classList.add('animate__shakeX', 'bg-red-950/80');
                    setTimeout(() => goldHUD.classList.remove('animate__shakeX', 'bg-red-950/80'), 800);
                }
                alert("❌ Incorrect! 20 Coins deducted. Book shuffled!");
            }

            const targetBook = activePool[levelIndex];
            bookQuestions = [...targetBook.questions].sort(() => Math.random() - 0.5);
            questionIndex = 0; 
            loadQuestionNode();
        }

        function renderVictoryScreen() {
            const canvas = document.getElementById('window-canvas');
            canvas.innerHTML = `
                <div class="glass-card p-8 text-center space-y-5 animate__animated animate__backInDown border border-amber-500/20">
                    <h1 class="text-3xl font-black bg-clip-text text-transparent bg-gradient-to-r from-amber-400 to-yellow-200">🏆 ROUTE CLEARED</h1>
                    <button onclick="exitToMenu()" class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 p-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">
                        Return to Map Selection
                    </button>
                </div>
            `;
        }

        function toggleLanguage() {
            state.lang = state.lang === 'en' ? 'tw' : 'en';
            saveState();
            document.getElementById('lang-label').innerText = state.lang === 'en' ? "English" : "Twi";
            if (currentCampaign !== "") loadQuestionNode();
            else renderMenuMap();
        }

        function exitToMenu() {
            clearInterval(timerClockInterval);
            renderMenuMap();
        }

        window.onload = () => {
            saveState();
            renderMenuMap();
        };
    </script>
</body>
</html>
